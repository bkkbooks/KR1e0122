body:
  text: 春秋繁露卷五滅國上第七王者民之所往君者不失其群者也故能使萬民往之而得天下之群者無敵於天下失國之君三十一亡國之君五十二小國德薄不朝聘大國不與諸侯會聚孤特不相守獨居不同群遭難莫之救所以亡也非獨公侯大人如此生天地之間根本微者不可遭大風疾雨立鑠消耗衛侯朔固事齊襄而天下患之虞虢并力晉獻難之晉趙盾一夫之士也無尺寸之土無一介之衆也而靈公據霸王之餘尊而欲誅之窮變極詐詐盡力竭禍大及身推盾之心載小國之位孰能亡之哉故伍子胥一夫之士也去楚干闔廬遂得意於吳所托者誠是何可禦耶楚王髡托其國於子玉得臣而天下畏之虞公托其國於宮之奇晉獻患之及髡殺得臣天下輕之虞公不用宮之奇晉獻亡之存亡之端不可不知也諸侯見加以兵逃遁奔走至于滅亡而莫之救平生之素行可見也隱代桓立所謂僅存耳使無駭帥師滅極內無諫臣外無諸侯之救載亦由是也宋蔡衛國伐之鄭因其力而取之此無以異於遺重寶於道而莫之守見者掇之也鄧穀失地而朝魯桓鄧穀失地不亦宜乎滅國下第八紀侯之所以滅者乃九世之讎也一旦之言危百世之嗣故曰大去衛人侵成鄭入成及齊師圍成三被大兵終滅莫之救所恃者安在齊桓公欲行霸道談遂違命故滅而奔莒不事大而事小曹伯之所以戰死於位諸侯莫助憂者幽之會齊桓數合諸侯曹小未嘗來也魯大國幽之會莊公不往戎人乃窺兵於濟西由見魯孤獨而莫之救也此時大夫廢君命專救危者魯莊公二十七年齊桓為幽之會衛人不來其明年桓公怒而大敗之及伐山戎張旗陳獲以驕諸侯於是魯一年三築臺亂臣比三起於內夷狄之兵仍滅於外衛滅之端以失幽之會亂之本存親內蔽邢未嘗會齊桓也附晉又微晉侯獲於韓而背之淮之會是也齊桓卒豎刁易牙之亂作邢與狄伐其同姓取之其行如此雖爾親庸能親爾乎是君也其滅于同姓衛侯燬滅邢是也齊桓為幽之會衛不至桓怒而伐之狄滅之桓憂而立之魯莊為柯之盟劫汶陽魯絶桓立之邢杞未嘗朝聘齊桓見其滅率諸侯而立之用心如此豈不霸哉故以憂天下與之隨本消息第九顏淵死子曰天喪豫子路死子曰天祝豫西狩獲麟曰吾道窮吾道窮三年身隨而卒階此而觀天命成敗聖人知之有所不能救命矣夫先晉獻公之卒齊桓為葵邱之會再致其集先齊孝未卒一年魯僖乞師取穀晉文之威天子再致先卒一年魯僖公之心分而事齊文公不事晉先齊侯潘卒一年文公如晉衛侯鄭伯皆不期來齊侯已卒諸侯果會晉大夫於新城魯昭公以事楚之故晉人不入楚國強而得意一年再會諸侯伐強吳為齊誅亂臣遂滅厲魯得其威以滅鄫其明年如晉無河上之難先晉昭之卒一年無難楚國內亂臣弒君諸侯會於平邱謀誅楚亂臣昭公不得與盟大夫見執吳大敗楚之黨六國於雞父公如晉而大辱春秋為之諱而言有疾由此觀之所行從不足恃所事者不可不慎此亦存亡榮辱之要也先楚莊王卒之三年晉滅赤狄潞氏及甲氏留吁先楚子審卒之三年鄭服蕭魚晉侯周卒一年先楚子昭卒之二年與陳蔡伐鄭而大克其明年楚屈建會諸侯而張中國卒之三年諸夏之君朝於楚楚子卷繼之四年而卒其國不為侵奪而顧隆盛強大中國不出年餘何也楚子昭蓋諸侯可者也天下之疾其君者皆起訴而乘之兵四五出常以衆擊少以專擊散義之盡也先卒四五年中國內乖齊晉魯衛之兵分守大國襲小諸夏再會陳儀齊不肯往吳在其南而二君殺中國在其北而齊衛殺其君慶封劫君亂國石惡之徒聚而成群衛衎據陳儀而為諼林父據戚而以畔宋公殺其世子魯大飢中國之行亡國之迹也譬如於文宣之際中國之君五年之中五君殺以晉靈之行使一大夫立於斐林拱揖指撝諸侯莫敢不出此猶隰之有泮也盟會要第十至意雖難喻蓋聖人者貴除天下之患貴除天下之患故春秋重而書天下之患遍矣以為本於見天下之所以致患其意欲以除天下之患何謂哉天下者無患然後性可善性可善然後清廉之化流清廉之化流然後王道舉禮樂興其心在此矣傳曰諸侯相聚而盟君子修國曰此將率為也哉是以君子以天下為憂也患乃至於弒君三十一亡國五十二細惡不絶之所致也辭已喻矣故曰立義以明尊卑之分強幹弱枝以明大小之職別嫌疑之行以明正世之義采托托意以矯失禮善無小而不舉惡無小而不去以純其美別賢不肖以明其尊親近以來遠因其國而容天下名倫等物不失其理公心以是非賞善誅惡而王澤洽始於除患正一而萬物備故曰大矣哉其號兩言而管天下此之謂也正貫第十一春秋大義之所本耶六者之科六者之指之謂也然後援天端布流物而貫通其理則事變散其辭矣故志得失之所從生而後差貴賤之所始矣論罪源深淺定法誅然後絶屬之分別矣立義定尊卑之序而後君臣之職明矣載天下之賢方表謙義之所在則見復正焉耳幽隱不相踰而近之則密矣而後萬物之應無窮者故可施其用於人而不悖其倫矣是以必明其統於施之宜故知其氣矣然後能食其志也知其聲矣而後能扶其精也知其行矣而後能遂其形也知其物矣然後能別其情也故唱而民和之動而民隨之是知引其天性所好而壓其情之所憎者也如是則言雖約説必布矣事雖小功必大矣聲響盛化運於物散入於理德在天地神明休集並行而不竭盈於四海而頌聲詠書曰八音克諧無相奪倫神人以和乃是謂也故明於情性乃可與論為政不然雖勞無功夙夜是寤思慮惓心猶不能覩故天下有非者三示當中孔子之所謂非尚安知通哉十指第十二春秋二百四十二年之文天下之大事變之博無不有也雖然大略之要有十指十指者事之所繫也王化之所由得流也舉事變見有重焉一指也見事變之所至者一指也因其所以至者而治之一指也強幹弱枝大本小末一指也別嫌疑異同類一指也論賢才之義別所長之能一指也親近來遠同民所欲一指也承周文而反之質一指也木生火火為夏天之端一指也切刺譏之所罰考變異之所加天之端一指也舉事變見有重焉則百姓安矣見事變之所至者則得失審矣因其所以至而治之則事之本正矣強幹弱枝大本小末則君臣之分明矣別嫌疑異同類則是非著矣論賢才之義別所長之能則百官序矣承周文而反之質則化所務立矣親近來遠同民所欲則仁恩達矣木生火火為夏則陰陽四時之理相受而次矣切刺譏之所罰考異變之所加則天所欲為行矣統此而舉之仁往而義來德澤廣大衍溢於四海陰陽和調萬物靡不得其理矣説春秋者凡用是矣此其法也重政第十三惟聖人能屬萬物於一而繫之元也終不及本所從來而承之不能遂其功是以春秋變一謂之元元猶原也其義以隨天地終始也故人唯有終始也而生不必應四時之變故元者為萬物之本而人之元在焉安在之乃存乎天地之前故人雖生天氣及奉天氣者不得與天元本天元命而共違其所為也故春正月者承天地之所為也繼天之所為而終之也其道相與共功持業安容言乃天地之元天地之元奚為於此惡施於人大其貫承意之理矣能説鳥獸之類者非聖人所欲説也聖人所欲説在於説仁義而理之知其分科條別貫所附明其義之所審勿使嫌疑是乃聖人之所貴而已矣不然傳於衆辭觀於衆物説不急之言而以惑後進者君子之所甚惡也奚以為哉聖人思慮不厭晝日繼之以夜然後萬物察者仁義矣由此言之尚自為得之哉故曰於乎為人師者可無慎耶夫義出於經經傳大本也棄營勞心也苦志盡情頭白齒落尚不合自録也哉人始生有大命是其體也有變命存其間者其政也政不齊則人有忿怒之志若將施危難之中而時有隨遭者神明之所接絶屬之符也亦有變其間使之不齊如此不可不省之省之則重政之本矣撮以為一進義誅惡絶之本而以其施此與湯武同而有異湯武用之治仁故春秋明得失差貴賤本之天王之所失天下者使諸侯得以大亂之説而後引而反之故曰博而明切而深矣
