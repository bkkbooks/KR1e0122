body:
  text: 春秋繁露卷七考功名第二十一考績之法考其所積也天道積聚衆精以為光聖人積聚衆善以為功故日月之明非一精之光也聖人致太平非一善之功也明所從生不可為源善所從出不可為端量勢立權因事制義故聖人之為天下興利也其猶春氣之生草也各因其生小大而量其多少其為天下除害也若川瀆之瀉於海也各順其勢傾側而制於南北故異孔而同歸殊施而鈞德其趣於興利除害一也是以興利之要在於致之不在於多少除害之要在於去之不在於南北考績絀陟計事除廢有益者謂之公無益者謂之煩攬名責實不得虛言有功者賞有罪者罰功盛者賞顯罪多者罰重不能致功雖有賢名不豫之賞官職不廢雖有愚名不加之罰賞罰用於實不用於名賢愚在於質不在於文故是非不能混喜怒不能傾姦軌不能弄萬物各得其真則百官勸職爭進其功考試之法大者緩小者急貴者舒而賤者促諸侯月試其國州伯時試其部四試而一考天子歲試天下三試而一考前後三考而絀陟命之曰計考試之法合其爵祿并其秩積其日陳其實計功量罪以多除少以為名定實先內弟之其先比二三分以為上中下以考進退然後外集通名曰進退增減多少有率為第九分三三列之亦有上中下以一為最五為中九為殿有餘歸之於中中而上者有得中而下者有負得少者以一益之至於四負多者以四減之至於一皆逆行三四十二而成於計得滿計者絀陟之次次每計各逐其第以通來數初次再計次次四計各不失故第而亦滿計絀陟之初次再計謂上第二也次次四計謂上第三也九年為一第二得九并去其六為置三第六六得等為置二并中者得三盡去之并三三計得六并得一計得六此為四計也絀者亦然通國身第二十二氣之清者為精人之清者為賢治身者以賢積精為寶治國者以積賢為道身以心為本國以君為主精積於其本則血氣相承受賢積於其主則上下相制使血氣相承受則形體無所苦上下相制使則百官各得其所形體無所苦然後身可得而安也百官各得其所然後國可得而守也夫欲致精者必虛靜其形欲致賢者必卑謙其身形靜志虛者精氣之所趣也謙尊自卑者仁賢之所事也故治身者務執虛靜以致精治國者務盡卑謙以致賢能致精則合明而壽仁能致賢則德澤洽而國太平三代改制質文第二十三春秋曰王正月傳曰王者孰謂謂文王也曷為先言王而後言正月王正月也何以謂之王正月曰王者必受命而後王王者必改正朔易服色制禮樂一統於天下所以明易姓非繼人通以己受之於天也王者受命而王制此月以應變故作科以奉天地故謂之王正月也王者改制作科奈何曰當十二色歷各法而正色逆數三而復絀三之前曰五帝帝迭首一色順數五而相復禮樂各以其法象其宜順數四而相復咸作國號遷宮邑易官名制禮作樂故湯受命而王應天變夏作殷號時正白統親夏故虞絀唐謂之帝堯以神農為赤帝作宮邑於下洛之陽名相宮曰尹作濩樂制質禮以奉天文王受命而王應天變殷作周號時正赤統親殷故夏絀虞謂之帝舜軒轅曰黃帝推神農以為九皇作宮邑於豐名相宮曰宰作武樂制文禮以奉天武王受命作宮邑於鄗制爵五等作象樂繼文以奉天周公輔成王受命作宮邑於洛陽成文武之制作汋樂以奉天殷湯之後稱邑示天之變反命故天子命無常唯命是德慶故春秋應天作新王之事時正黑統王魯尚黑絀夏親周故宋樂宜親招武故以虞録親樂制宜商合伯子男為一等然則其略說奈何曰三正以黑統初正日月朔於營室斗建寅天統氣始通化物物見萌達其色黑故朝正服黑首服藻黑正路輿質黑馬黑大節綬幘尚黑旗黑大寶玉黑郊牲黑犧牲角卵冠於阼昏禮逆於庭喪禮殯於東階之上祭牲黑牡薦尚肝樂器黑質法不刑有懷任新産是月不殺聽朔廢刑發德具存二王之後也親赤統故日分平明平明朝正正白統奈何曰正白統者歷正日月朔於虛斗建丑天統氣始蛻化物物始芽其色白故朝正服白首服藻白正路輿質白馬白大節綬幘尚白旗白大寶玉白郊牲白犧牲角繭冠於堂昏禮逆於堂喪事殯於楹柱之間祭牲白牡薦尚肺樂器白質法不刑有身懷任是月不殺聽朔廢刑發德具存二王之後也親黑統故日分鳴晨鳴晨朝正正赤統奈何曰正赤統者歷正日月朔于牽牛斗建子天統氣始施化物物始動其色赤故朝正服赤首服藻赤正路輿質赤馬赤大節綬幘尚赤旗赤大寶玉赤郊牲騂犧牷角栗冠於房昏禮逆於戶喪禮殯於西階之上祭牲騂牡薦尚心樂器赤質法不刑有身重懷藏以養微是月不殺聽朔廢刑發德具存二王之後也親白統故日分夜半夜半朝正改正之義奉元而起古之王者受命而王改制稱號正月服色定然後郊告天地及群神遠追祖禰然後布天下諸侯廟受以告社稷宗廟山川然後感應一其司三統之變近夷遐方無有生煞者獨中國然而三代改正必以三統天下曰三統五端化四方之本也天始廢始施地必待中是故三代必居中國法天奉本執端要以統天下朝諸侯也是以朝正之義天子純統色衣諸侯統衣纁緣紐大夫士以冠參近夷以綬遐方各衣其服而朝所以明乎天統之義也其謂統三正者曰正者正也統致其氣萬物皆應而正統正其餘皆正凡歲之要在正月也法正之道正本而末應正內而外應動作舉錯靡不變化隨從可謂法正也故君子曰武王其以正月矣春秋曰杞伯來朝王者之後稱公杞何以稱伯春秋上黜夏下存周以春秋當行新王春秋當新王者奈何曰王者之法必正號絀王謂之帝封其後以小國使奉祀之下存二王之後以大國使服其服行其禮樂稱客其朝故同時稱帝者五稱王者三所以昭五端通三統也是故周人之王尚推神農為九皇而改號軒轅謂之皇帝因存帝顓頊帝嚳帝堯之帝號絀虞而號舜曰帝舜録五帝以小國下存禹之後於杞存湯之後於宋以方百里爵號公皆使服其服行其禮樂稱先王客而朝春秋作新王之事變周之制當正黑統而殷周為王者之後絀夏改號禹謂之帝録其後以小國故曰絀夏存周以春秋當新王不以杞侯弗同王者之後也稱子又稱伯何見殊之小國也黃帝之先諡四帝之後諡何也曰帝號必存五帝代首天之色號至五而反周人之王軒轅直首天黃號故曰黃帝云帝號尊而諡卑故四帝後諡也帝尊號也録以小何曰遠者號尊而地小近者號卑而地大親疏之義也故王者有不易者有再而復者有三而復者有四而復者有五而復者有九而復者明此通天地陰陽四時日月星辰山川人倫德侔天地者稱皇帝天祐而子之號稱天子故聖王生則稱天子崩遷則存為三王絀滅則為五帝下至附庸絀為九皇下極其為民有一謂之三代故雖絶地廟位祝牲猶列於郊號宗於代宗故曰聲名魂魄施於虛極壽無疆何謂再而復四而復春秋鄭忽何以名春秋曰伯子男一也辭無所貶何以為一曰周爵五等春秋三等春秋何三等曰王者以制一商一夏一質一文商質者主天夏文者主地春秋者主人故三等也主天法商而王其道佚陽親親而多仁朴故立嗣豫子篤母弟妾以子貴昏冠之禮字子以父別眇夫婦對坐而食喪禮別葬祭禮先臊夫妻昭穆別位制爵三等祿士二品制郊宮明堂員其屋高嚴侈員惟祭器員玉厚九分白藻五絲衣制大上首服嚴員鸞輿尊蓋法天列象垂四鸞樂載鼓用錫儛儛溢員先毛血而後用聲正刑多隱親戚多諱封禪於尚位主地法夏而王其道進陰尊尊而多義節故立嗣與孫篤世子妾不以子稱貴號昏冠之禮字子以母別眇夫婦同坐而食喪禮合葬祭禮先亨婦從夫為昭穆制爵五等祿士三品制郊宮明堂方其屋卑污方祭器方玉厚八分白藻四絲衣制大下首服卑退鸞輿卑法地周象載垂二鸞樂設鼓用纖施儛儛溢方先烹而後用聲正刑天法封壇於下位主天法質而王其道佚陽親親而多質愛故立嗣豫子篤母弟妾以子貴昏冠之禮字子以父別眇夫婦對坐而食喪禮別葬祭禮先嘉疏夫婦昭穆別位制爵三等祿士二品制郊宮明堂內員外橢其屋如倚靡員橢祭器橢玉厚七分白藻三絲衣長前衽首服員轉鸞輿尊蓋備天列象垂四鸞樂桯鼓用羽籥儛儛溢橢先用玉聲而後烹正刑多隱親戚多赦封壇於左位主地法文而王其道進陰尊尊而多禮文故立嗣豫孫篤世子妾不以子稱貴號昏冠之禮字子以母別眇夫妻同坐而食喪禮合葬祭禮先秬鬯婦從夫為昭穆制爵五等祿士三品制郊宮明堂內方外衡其屋習而衡祭器衡同作秩機玉厚六分白藻三絲衣長後衽服首習而垂流鸞輿卑備地周象載垂二鸞樂縣鼓用萬儛儛溢衡先烹而後用樂正刑文公封壇於左位四法修於所故祖於先帝故四法如四時然終而復始窮則反本四法之天施符受聖人王法則性命形乎先祖大昭乎王君故天將授舜主天法商而王祖錫姓為姚氏至舜形體大上而員首而明有二童子性長於天文純於孝慈天將授禹主地法夏而王祖錫姓為姒氏至禹生發於背形體長長足肵疾行先左隨以右勞左佚右也性長於行習地明水天將授湯主天法質而王祖錫姓為子氏謂契母吞玄鳥卵生契契先發於胸性長於人倫至湯體長專小足左扁而右便勞右佚左也性長於天光質易純仁天將授文王主地法文而王祖錫姓姬氏謂后稷母姜原履天之跡而生后稷后稷長於邰土播田五穀至文王形體博長有四乳而大足性長於地文勢故帝使禹皋論姓知殷之德陽德也故以子為姓知周之德陰德也故以姬為姓故殷王改文書始以男周王以女書姬故天道各以其類動非聖人孰能明之官制象天第二十四王者制官三公九卿二十七大夫八十一元士凡百二十人而列臣備矣吾聞聖王所取儀法天之大經三起而成四轉而終官制亦然者此其儀與三人而為一選儀於三月而為一時也四選而止儀於四時而終也三公者王之所以自持也天以三成之王以三自持立成數以為植而四重之其可以無失矣備天數以參事治謹於道之意也此百二十臣者皆先王之所與直道而行也是故天子自參以三公三公自參以九卿九卿自參以三大夫三大夫自參以三士三人為選者四重自三之道以治天下若天之四重自三之時以終始歲也一陽而三者非自三之時與而天四重之其數同矣天有四時時三月王有四選選三臣是故有孟有仲有季一時之情也有上有下有中一選之情也三臣而為一選四選而止人情盡矣人之材固有四選如天之時固有四變也聖人為一選君子為一選善人為一選正人為一選由此而下者不足選也四選之中各有節也是故天選四堤十二而人變盡矣盡人之變合之天唯聖人者能之所以立王事也何謂天之大經三起而成日三日而成規三旬而成月三月而成時三時而成功寒暑與和三而成物日月與星三而成光天地與人三而成德由此觀之三而一成天之大經也以此為天制是故禮三讓而成一節官三人而成一選三公為一選三卿為一選三大夫為一選三士為一選凡四選三臣應天之制凡四時之三月也是故其以三為選取諸天之經其以四為制取諸天之時其以十二臣為一條取諸歲之度其至十條而止取之天端何謂天之端曰天有十端十端而止矣天為一端地為一端陰為一端陽為一端火為一端金為一端木為一端水為一端土為一端人為一端凡十端而畢天之數也天數畢於十王者受十端於天而一條之率每條一端以十二時如天之每終一歲以十二月也十者天之數也十二者歲之度也用歲之度條天之數十二而天數畢是故終十歲而用百二十月條十端亦用百二十臣以率被之皆合於天其率三臣而成一慎故八十一元士為二十七慎以持二十七大夫二十七大夫為九慎而持九卿九卿為三慎以持三公三公為一慎以持天子天子積四十慎以為四選選一慎三臣皆天數也是故以四選率之則選三十人三四十二百二十人亦天數也以十端四選十端積四十慎慎三臣三四十二百二十人亦天數也以三公之勞率之則公四十人三四十二百二十人亦天數也故散而名之為百二十臣選而賓之為十二長所以名之雖多莫若謂之四選十二長然而分別率之皆有所合無不中天數者也求天數之微莫若於人人之身有四肢每肢有三節三四十二十二節相持而形體立矣天有四時每一時有三月三四十二十二月相受而歲數終矣官有四選每一選有三人三四十二十二臣相參而事治行矣以此見天之數人之形官之制相參相得也人之與天多此類者而皆微忽不可不察也天地之理分一歲之變以為四時四時亦天之四選已是故春者少陽之選也夏者太陽之選也秋者少陰之選也冬者太陰之選也四選之中各有孟仲季是選之中有選故一歲之中有四時一時之中有三長天之節也人生於天而體天之節故亦有大小厚薄之變人之氣也先王因人之氣而分其變以為四選是故三公之位聖人之選也三卿之位君子之選也三大夫之位善人之選也三士之位正直之選也分人之變以為四選選立三臣如天之分歲之變以為四時時有三節也天以四時之選與十二節相和而成就歲王以四位之選與十二臣相砥礪而致極道必極於其所至然後能得天地之美也堯舜不擅移湯武不專殺第二十五堯舜何緣而得擅移天下哉孝經之語曰事父孝故事天明事天與父同禮也今父有以重豫子子不敢擅豫他人人心皆然則王者亦天之子也天以天下豫堯舜堯舜受命於天而王天下子猶安敢擅以所重受天者豫他人也天有不以豫堯舜漸奪之故明為子道則堯舜之不私傳天下而擅移位也無所疑也儒者以湯武為至賢大聖也以為全道究義盡美者故列之堯舜謂之聖王如法則之今足下以湯武為不義然則足下之所謂義者何世之王也曰弗知弗知者以天下王為無義者邪其有義者而足下不知邪則答之以神農應之曰神農氏之為天子與天地俱起乎將有所伐乎神農氏有所伐可湯武有所伐獨不可何也且天之生民非為王也而天立王以為民也故其德足以安樂民者天豫之其惡足以賊害民者天奪之詩云殷士膚敏祼將于京侯服于周天命靡常言天之無常豫無常奪也故封太山之上禪梁父之下易姓而王德如堯舜者七十二人王者天之所豫也其所伐皆天之所奪也今唯以湯武之伐桀紂為不義則七十二王亦有伐也推足下之說將以七十二王為皆不義也故夏無道而殷伐之殷無道而周伐之周無道而秦伐之秦無道而漢伐之有道伐無道此天理也所從來久矣寧能至湯武而然耶夫非湯武之伐桀紂者亦將非秦之伐周非徒不知天理又不明人禮禮子為父隱惡今使伐人者而信不義當為國諱之豈宜如誹謗者此所謂一言而再過者也君也者掌令者也令行而禁止也今桀紂令天下而不行禁天下而不止安在其能臣天下也果不能臣天下何謂湯武弒服制第二十六率得十六萬國三分之則各度爵而制服量祿而用財飲食有量衣服有制宮室有度畜産人徒有數舟車甲器有禁生則有軒冕服位貴祿田宅之分死則有棺槨絞衾壙壟之度雖有賢才美體無其爵不敢服其服雖有富家多資無其祿不敢用其財天子服有文章夫人不得以燕饗公以廟將軍大夫不得以燕卿以廟將軍大夫以朝官吏以命士止於帶緣散民不敢服雜采百工商賈不敢服狐貉刑餘戮民不敢服絲玄纁乘馬謂之服制
