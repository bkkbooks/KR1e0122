body:
  text: 春秋繁露卷十二陰陽終始第四十八天之道終而復始故北方者天之所終始也陰陽之所合別也冬至之後陰俯而西入陽仰而東出出入之處常相反也多少調和之適常相順也有多而無溢有少而無絶春夏陽多而陰少秋冬陽少而陰多多少無常未嘗不分而相散也以出入相損益以多少相溉濟也多勝少者倍入入者損一而出者益二天所起一動而再倍常乘反衡再登之勢以就同類與之相報故其氣相俠而以變化相輸也春秋之中陰陽之氣俱相併也中春以生中秋以殺由此見之天之所起其氣積天之所廢其氣隨故至春少陽東出就木與之俱生至夏太陽南出就火與之俱暖此非各就其類而與之相起與少陽就木太陽就火火木相稱各就其正此非正其倫與至於秋時少陰興而不得以秋從金從金而傷火功雖不得以從金亦以秋出於東方俯其處而適其事以成歲功此非權與陰之行固常居虛而不得居實至於冬而止空虛太陽乃得北就其類而與水起寒是故天之道有倫有經有權陰陽義第四十九天道之常一陰一陽陽者天之德也陰者天之刑也迹陰陽終歲之行以觀天之所親而任成天之功猶謂之空空者之實也故清溧之於歲也若酸鹹之於味也僅有而已矣聖人之治亦從而然天之少陰用於功太陰用於空人之少陰用於嚴而太陰用於喪喪亦空空亦喪也是故天之道以三時成生以一時喪死死之者謂百物枯落也喪之者謂陰氣悲哀也天亦有喜怒之氣哀樂之心與人相副以類合之天人一也春喜氣也故生秋怒氣也故殺夏樂氣也故養冬哀氣也故藏四者天人同有之有其理而一用之與天同者大治與天異者大亂故為人主之道莫明於在身之與天同者而用之使喜怒必當義乃出如寒暑之必當其時乃發也使德之厚於刑也如陽之多於陰也是故天之行陰氣也少取以成秋其餘以歸之冬聖人之行陰氣也少取以立嚴其餘以歸之喪喪亦人之冬氣故人之太陰不用於刑而用於喪天之太陰不用於物而用於空空亦為喪喪亦為空其實一也皆喪死亡之心也陰陽出入上下第五十天道大數相反之物也不得俱出陰陽是也春出陽而入陰秋出陰而入陽夏右陽而左陰冬右陰而左陽陰出則陽入陽出則陰入陰右則陽左陰左則陽右是故春俱南秋俱北而不同道夏交於前冬交於後而不同理並行而不相亂澆滑而各持分此之謂天之意而何以從事天之道初薄大冬陰陽各從一方來而移於後陰由東方來西陽由西方來東至於中冬之月相遇北方合而為一謂之日至別而相去陰適右陽適左適左者其道順適右者其道逆逆氣左上順氣右下故下暖而上寒以此見天之冬右陰而左陽也上所右而下所左也冬月盡而陰陽俱南還陽南還出於寅陰南還入於戌此陰陽所始出地入地之見處也至於中春之月陽在正東陰在正西謂之春分春分者陰陽相半也故晝夜均而寒暑平陰日損而隨陽陽日益而鴻故為暖熱初得大夏之月相遇南方合而為一謂之日至別而相去陽適右陰適左適左由下適右由上上暑而下寒以此見天之夏右陽而左陰也上其所右下其所左夏月盡而陰陽俱北還陽北還而入於申陰北還而入於辰此陰陽之所始出地入地之見處也至於中秋之月陽在正西陰在正東謂之秋分秋分者陰陽相半也故晝夜均而寒暑平陽日損而隨陰陰日益而鴻故至於季秋而始霜至於孟冬而始寒小雪而物咸成大寒而物畢藏天地之功終矣天道無二第五十一天之常道相反之物也不得兩起故謂之一一而不二者天之行也陰與陽相反之物也故或出或入或右或左春俱南秋俱北夏交於前冬交於後並行而不同路交會而各代理此其文與天之道有一出一入一休一伏其度一也然而不同意陽之出常縣於前而任歲事陰之出常縣於後而守空虛陽之休也功已成於上而伏於下陰之伏也不得近義而遠其處也天之任陽不任陰好德不好刑如是故陽出而前陰出而後尊德而卑刑之心見矣陽出而積於夏任德以歲事也陰出而積於冬錯刑於空處也必以此察之天無常於物而一於時時之所宜而一為之故開一塞一起一廢一至畢時而止終有復始於一一者一也是於天凡在陰位者皆惡亂善不得主名天之道也故常一而不滅天之道事無大小物無難易反天之道無成者是以目不能二視耳不能二聽一手不能二事一手畫方一手畫圓莫能成人為小易之物而終不能成反天之不可行如是是故古之人物而書文心止於一中者謂之忠持二中者謂之患患人之中不一者也不一者故患之所由生也是故君子賤二而貴一人孰無善善不一故不足以立身治孰無常常不一故不足以致功詩云上帝臨汝無二爾心知天道者之言也暖燠孰多第五十二天之道出陽為暖以生之出陰為凊以成之是故非薰也不能有育非溧也不能有熟歲之精也知心而不省薰與溧孰多者用之必與天戾與天戾雖勞不成是自正月至於十月而天之功畢計其間者陰與陽各居幾何薰與溧其日孰多距物之初生至其畢成露與霜其下孰倍故從中春生於秋氣溫柔和調乃季秋九月陰乃始多於陽天於是時出溧下霜出溧下霜而大降物固已皆成矣故九月者天之功大究於是月也十月而悉畢故案其迹數其實清溧之日少少耳功已畢成之後陰乃大出天之成功也少陰與而太陰不與少陰在內而太陰在外故霜加物而雪加於空空者亶地而已不逮物也功已畢成之後物未復生之前太陰之所常出也雖曰陰亦以太陽資化其位而不知所受之故聖王在上位天覆地載風令雨施雨施者布德均也風令者言令直也詩云不識不知順帝之則言弗能知識而效天之所為云爾禹水湯旱非常經也適遭世氣之變而陰陽失平堯視民如子民親堯如父母尚書曰二十有八載放勳乃殂落百姓如喪考妣四海之內閼密八音三年三年陽氣壓於陰陰氣大興此禹所以有水名也桀天下之殘賊也湯天下之盛德也天下除殘賊而得盛德大善者再是重陽也故湯有旱之名皆適遭之變非禹湯之過毋以適遭之變疑平生之常則所守不失則正道益明基義第五十三凡物必有合合必有上必有下必有左必有右必有前必有後必有表必有裏有美必有惡有順必有逆有喜必有怒有寒必有暑有晝必有夜此皆其合也陰者陽之合夫者妻之合子者父之合臣者君之合物莫無合而合各有陰陽陽兼於陰陰兼於陽夫兼於妻妻兼於夫父兼於子子兼於父君兼於臣臣兼於君君臣父子夫婦之義皆取諸陰陽之道君為陽臣為陰父為陽子為陰夫為陽妻為陰陰道無所獨行其始也不得專起其終也不得分功有所兼之義是故臣兼功於君子兼功於父妻兼功於夫陰兼功於陽地兼功於天舉而上者抑而下也有屏而左也有引而右也有親而任也有疏而遠也有欲日益也有欲日損也益而用而損其妨有時損少而益多有時損多而益少少而不至絶多而不至溢陰陽二物終歲各一出一其出遠近同度而不同意陽之出也常縣於前而任事陰之出也常縣於後而守空處此見天之親陽而疏陰任德而不任刑也是故仁義制度之數盡取之天天為君而覆露之地為臣而持載之陽為夫而生之陰為婦而助之春為父而生之夏為子而養之秋為死而棺之冬為痛而喪之王道之三綱可求於天天出陽為暖以生之地出陰為凊以成之不暖不生不凊不成然而計其多少之分則暖暑居百而凊寒居一德教其與刑罰猶此也故聖人多其愛而少其嚴厚其德而簡其刑以此配天天之大數必有十旬旬天地之數十而畢舉旬生長之功十而畢成天之氣徐乍寒乍暑故寒不凍暑不渴以其有餘徐來不暴卒也易曰履霜堅冰蓋言遜也然則上堅不踰等果是天之所為弗作而成也人之所為亦當弗作而極也凡有興者稍稍上之以遜順往使人心説而安之無使人心恐而不使故曰君子以人治人謹能願此之謂也聖人之道同諸天地蕩諸四海變習易俗闕文
