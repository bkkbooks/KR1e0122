body:
  text: 春秋繁露卷十三四時之副第五十五天之道春暖以生夏暑以養秋涼以殺冬寒以藏暖暑凊寒異氣而同功皆天之所以成歲也聖人副天之所行以為政故以慶副暖而當春以賞副暑而當夏以罰副涼而當秋以刑副寒而當冬慶賞罰刑異事而同功皆王者之所以成德也慶賞罰刑與春夏秋冬以類相應也如合符故曰王者配天謂其道天有四時王有四政四政若四時通類也天人所同有也慶為春賞為夏罰為秋刑為冬慶賞罰刑之不可不具也如春夏秋冬不可不備也慶賞罰刑當其處不可不發若暖暑凊寒當其時不可不出也慶賞罰刑各有正處如春夏秋冬各有時也四政者不可以相干也猶四時不可相干也四政者不可以易處也猶四時不可易處也故慶賞罰刑有不行於其正處者春秋譏也人副天數第五十六天德施地德化人德義天氣上地氣下人氣在其間春生夏長百物以興秋殺冬收百物以藏故莫精於氣莫富於地莫神於天天地之精所以生物者莫貴於人人受命乎天也故超然有以倚物疢疾莫能為仁義唯人獨能為仁義物疢疾莫能偶天地唯人獨能偶天地人有三百六十節偶天之數也形體骨肉偶地之厚也上有耳目聰明日月之象也體有空竅理脈川谷之象也心有哀樂喜怒神氣之類也觀人之體一何高物之甚而類於天也物旁折取天之陰陽以生活耳而人乃爛然有其文理是故凡物之形莫不伏從旁折天地而行人猶題直立端尚正正當之是故所取天地少者旁折之所取天地多者正當之此見人之絶於物而參天地是故人之身首𡛑而員象天容也髮象星辰也耳目戾戾象日月也鼻口呼吸象風氣也胸中達知象神明也腹胞實虛象百物也百物者最近地故要以下地也天地之象以要為帶頸以上者精神尊嚴明天類之狀也頸而下者豐厚卑辱土壤之比也足布而方地形之象也是故禮帶置紳必直其頸以別心也帶而上者盡為陽帶而下者盡為陰各其分陽天氣也陰地氣也故陰陽之動使人足病喉痺起則地氣上為雲雨而象亦應之也天地之符陰陽之副常設於身身猶天也數與之相參故命與之相連也天以終歲之數成人之身故小節三百六十六副日數也大節十二分副月數也內有五藏副五行數也外有四肢副四時數也乍視乍瞑副晝夜也乍剛乍柔副冬夏也乍哀乍樂副陰陽也心有計慮副度數也行有倫理副天地也此皆暗膚著身與人俱生比而偶之弇合于其可數也副數不可數者副類皆當同而副天一也是故陳其有形以著其無形者拘其可數以著其不可數者以此言道之亦宜以類相應猶其形也以數相中也同類相動第五十七今平地注水去燥就濕均薪施火去濕就燥百物去其所與異而從其所與同故氣同則會聲比則應其驗皎然也試調琴瑟而錯之鼓其宮則他宮應之鼓其商而他商應之五音比而自鳴非有神其數然也美事召美類惡事召惡類類之相應而起也如馬鳴則馬應之帝王之將興也其美祥亦先見其將亡也妖孽亦先見物故以類相召也故以龍致雨以扇逐暑軍之所處生以棘楚美惡皆有從來以為命莫知其處所天將陰雨人之病故為之先動是陰相應而起也天將欲陰雨又使人欲睡臥者陰氣也有憂亦使人臥者是陰相求也有喜者使人不欲臥者是陽相索也水得夜益長數分東風至而酒湛溢病者至夜而疾益甚雞至幾明皆鳴而相薄其氣益精故陽益陽而陰益陰陽陰之氣固可以類相益損也天有陰陽人亦有陰陽天地之陰氣起而人之陰氣應之而起人之陰氣起而天地之陰氣亦宜應之而起其道一也明於此者欲致雨則動陰以起陰欲止雨則動陽以起陽故致雨非神也而疑於神者其理微妙也非獨陰陽之氣可以類進退也雖不祥禍福所從生亦由是也無非己先起之而物以類應之而動者也故聰明聖神內視反聽言為明聖內視反聽故獨明聖者知其本心皆在此耳故琴瑟報彈其宮他宮自鳴而應之此物之以類動者也其動以聲而無形人不見其動之形則謂之自鳴也又相動無形則謂之自然其實非自然也有使之然者矣物固有實使之其使之無形尚書大傳言周將興之時有大赤鳥銜穀之種而集王屋之上者武王喜諸大夫皆喜周公曰茂哉茂哉天之見此以勸之也恐恃之五行相勝第五十八木者司農也司農為姦朋黨比周以蔽主明退匿賢士絶滅公卿教民奢侈賓客交通不勸田事博戲鬭雞走狗弄馬長幼無禮大小相虜並為寇賊橫恣絶理司徒誅之齊桓是也行霸任兵侵蔡蔡潰遂伐楚楚人降伏以安中國木者君之官也夫木者農也農者民也不順如叛則命司徒誅其率正矣故曰金勝木火者司馬也司馬為讒反言易辭以譖訴人內離骨肉之親外疏忠臣賢聖旋亡讒邪日昌魯上大夫季孫是也專權擅勢薄國威德反以怠惡譖訴其群臣劫惑其君孔子為魯司寇據義行法季孫自消墮費郈城兵甲有差夫火者大朝有讒邪熒惑其君執法誅之執法者水也故曰水勝火土者君之官也其相司營司營為神主所為皆曰可主所言皆曰善讇順主指聽從為比進主所善以快主意陷主以邪導主不義大為宮室多為臺榭雕文刻鏤五色成光賦斂無度以奪民財多發徭役以奪民時作事無極以奪民力百姓愁苦叛去其國楚靈王是也作乾溪之臺三年不成百姓罷弊而叛及其身弒夫土者君之官也君太奢侈過度失禮民叛矣其民叛其君窮矣故曰木勝土金者司徒也司徒為賊內得於君外驕軍士專權擅勢誅殺無罪侵伐暴虐攻戰妄取令不行禁不止將率不親士卒不使兵弱地削令君有恥則司馬誅之楚殺其司徒得臣是也得臣數戰破敵內得於君驕蹇不恤其下卒不為使當敵而弱以危楚國司馬誅之金者司徒司徒弱不能使士衆則司馬誅之故曰火勝金水者司寇也司寇為亂足恭小謹巧言令色聽謁受賂阿黨不平慢令急誅誅殺無罪則司營誅之營蕩是也為齊司寇太公封於齊問為以治國之要營蕩對曰任仁義而已太公曰任仁義奈何營蕩對曰仁者愛人義者尊老太公曰愛人尊老奈何營蕩對曰愛人者有子不食其力尊老者妻長而夫拜之太公曰寡人欲以仁義治齊今子以仁義亂齊寡人立而誅之以定齊國夫水者執法司寇也執法附黨不平依法刑人則司營誅之故曰土勝水五刑相生第五十九天地之氣合而為一分為陰陽判為四時列為五行行者行也其行不同故謂之五行五行者五官也比相生而間相勝也故謂治逆之則亂順之則法東方者木農之本司農尚仁進經術之士道之以帝王之路將順其美匡救其惡執規而生至溫潤下知地形肥饒美惡立事生則因地之宜召公是也親入南畝之中觀民墾草發淄耕種五穀積蓄有餘家給人足倉庫充實司馬實穀司馬本朝也本朝者火也故曰木生火南方者火也本朝司馬尚智進賢聖之士上知天文其形兆未見其萌芽未生昭然獨見存亡之機得失之要治亂之源豫禁未然之前執矩而長至忠厚仁輔翼其君周公是也成王幼弱周公相誅管叔蔡叔以定天下天下既寧以安君官者司營司營者土也故曰火生土中央者土君官也司營尚信卑身賤體夙興夜寐稱述往古以厲主意明見成敗微諫納善防滅其惡絶原塞隙執繩而制四方至忠厚信以事其君據義割恩太公是也應天因時之化威武強禦以成大理者司徒也司徒者金也故曰土生金西方者金大理司徒也司徒尚義臣死君而衆人死父親有尊卑位有上下各死其事事不踰矩執權而伐兵不苟克取不苟得義而後行至廉而威質直剛毅子𦙃是也伐有罪討不義是以百姓附親邊境安寧寇賊不發邑無獄訟則親安執法者司寇也司寇者水也故曰金生水北方者水執法司寇也司寇尚禮君臣有位長幼有序朝廷有爵鄉黨以齒升降揖讓般伏拜謁折旋中矩立而罄折拱則抱鼓執衡而藏至清廉平賂遺不受請謁不聽據法聽訟無有所阿孔子是也為魯司寇斷獄屯屯與衆共之不敢自專是死者不恨生者不怨百工維時以成器械器械既成以給司農司農者田官也田官者木故曰水生木五行逆順第六十木者春生之性農之本也勸農事無奪民時使民歲不過三日行什一之稅進經術之士挺群禁出輕繫去稽留除桎梏開閉闔通障塞恩及草木則樹木華美而朱草生恩及鱗蟲則魚大為鱣鯨不見群龍下如人君出入不時走狗試馬馳騁不反宮室好淫樂飲酒沈湎縱恣不顧政治事多發役以奪民時作謀增稅以奪民財民病疥搔溫體足胻痛咎及於木則茂木枯槁工匠之輪多傷敗毒水淹群漉陂如魚咎及鱗蟲則魚不為群龍深藏鯨出見火者夏成長本朝也舉良賢進茂才官得其能任得其力賞有功封有德出貨財振困乏正封疆使四方恩及於人則火順人而甘露降恩及羽蟲則飛鳥大為黃鵠出見鳳凰翔如人君惑於讒邪內離骨肉外疏忠臣至殺世子誅殺不辜逐忠臣以妾為妻棄法令婦妾為政賜豫不當則民病血壅腫目不明咎及於火則大旱必有火災摘巢採鷇咎及羽蟲則飛鳥不為冬應不來梟梟群鳴鳳凰高翔土者夏中成熟百種君之官循宮室之制謹夫婦之別加親戚之恩恩及土則五穀成而嘉禾興恩及倮蟲則百姓親附城郭充實賢聖皆遷仙人降如人君好淫佚妻妾過度犯親戚侮父兄欺罔百姓大為臺榭五色成光雕文刻鏤則民病心腹宛黃舌爛痛咎及於土則五穀不成暴虐妄誅咎及倮蟲倮蟲不為百姓叛去賢聖放亡金者秋殺氣之始也建立旗鼓杖把旄鉞以誅賊殘禁暴虐安集故動衆興師必應義理出則祠兵入則振旅以間習之因於彼狩存不忘亡安不忘危修城郭繕墻垣審群禁飾兵甲警百官誅不法恩及於金石則涼風出恩及於毛蟲則走獸大為麒麟至如人君好戰侵陵諸侯貪城邑之賂輕百姓之命則民病喉咳嗽筋攣鼻鼽塞咎及於金則鑄化凝滯凍堅不成四面張網焚林而獵咎及毛蟲則走獸不為白虎妄搏麒麟遠去水者冬藏至陰也宗廟祭祀之始敬四時之祭禘祫昭穆之序天子祭天諸侯祭土閉門閭大搜索斷刑罰執當罪飭關梁禁外徙恩及於水則醴泉出恩及介蟲則黿鼉大為靈龜出如人君簡宗廟不禱祀廢祭祀執法不順逆天時則民病流腫水張痿痺孔竅不通咎及於水霧氣冥冥必有大水水為民害咎及介蟲則龜深藏黿鼉詬治水五行第六十一日冬至七十二日木用事其氣燥濁而清七十二日火用事其氣慘陽而赤七十二日土用事其氣濕濁而黃七十二日金用事其氣慘淡而白七十二日水用事其氣凊寒而黑七十二日復得木木用事則行柔惠挺群禁至於立春出輕繫去稽留除桎梏開門闔通障塞存幼孤矜寡獨無伐木火用事則正封疆循田疇至于立夏舉賢良封有德賞有功出使四方無縱火土用事則養長老存幼孤矜寡獨賜孝悌施恩澤無興土功金用事則修城郭繕牆垣審群禁飭甲兵警百官誅不法存長老無焚金石水用事則閉門閭大搜索斷刑罰執當罪飭關梁禁外徙無決池隄
