body:
  text: 春秋繁露卷十四治亂五行第六十二火干木蟄蟲蚤出蚿雷蚤行土干木胎夭卵毈鳥蟲多傷金干木有兵水干木春下霜土干火則多雷金干火草木夷水干火夏雹木干火則地動金干木則五穀傷有殃水干土夏寒雨霜木干土倮蟲不為火干土則大旱水干金則魚不為木干金則草木再生火干金則草木秋榮土干金五穀不成木干水冬蟄不藏土干水則蟄蟲冬出火干水則星墜金干水則冬大寒五行變救第六十三五行變至當救之以德施之天下則咎除不救以德不出三年天當雨石木有變春凋秋榮秋木冰春多雨此繇役衆賦斂重百姓貧窮叛去道多饑人救之者省繇役薄賦斂出倉穀賑困窮矣火有變冬溫夏寒此王者不明善者不賞惡者不絀不肖在位賢者伏匿則寒暑失序而民疾疫救之者舉賢良賞有功封有德土有變大風至五穀傷此不信仁賢不敬父兄淫泆無度宮室榮救之者省宮室去雕文舉孝悌恤黎元金有變畢昴為回三覆有武多兵多盜寇此棄義貪財輕民命重貨賂百姓趣利多姦軌救之者舉廉潔立正直隱武行文束甲械水有變冬濕多霧春夏雨雹此法令緩刑罰不行救之者憂囹圄案姦宄誅有罪蓃五日五行五事第六十四王者與臣無禮貌不肅敬則木不曲直而夏多暴風風者木之氣也其音角也故應之以暴風王者言不從則金不從革而秋多霹靂霹靂者金氣也其音商也故應之以霹靂王者視不明則火不炎上而秋多電電者火氣也其音徵也故應之以電王者聽不聰則水不潤下而春夏多暴雨雨者水氣也其音羽也故應之以暴雨王者心不能容則稼穡不成而秋多雷雷者土之氣也其音宮也故應之以雷五事一曰貌二曰言三曰視四曰聽五曰思何謂也夫五事者人之所受命於天也而王者所修而治民也故王者為民治則不可以不明準繩不可以不正王者貌曰恭恭者敬也言曰從從者可從視曰明明者知賢不肖者分明黑白也聽曰聰聰者能聞事而審其意也思曰容容者言無不容恭作肅從作乂明作哲聰作謀容作聖何謂也恭作肅言王者誠能內有恭敬之姿而天下莫不肅矣從作乂言王者言可從明正從行而天下治矣明作哲哲者知也王者明則賢者進不肖者退天下知善而勸之知惡而恥之矣聰作謀謀者謀事也王者聰則聞事與臣下謀之故事無失謀矣容作聖聖者設也王者心寬大無不容則聖能施設事各得其宜也王者能敬則肅肅則春氣得故肅者主春春陽氣微萬物柔易移弱可化於時陰氣為賊故王者欽欽不以議陰事然後萬物遂生而木可曲直也春行秋政則草木雕行冬政則雪行夏政則殺春失政則王者能治則義立義立則秋氣得故乂者主秋秋氣始殺王者行小刑罰民不犯則禮義成於時陽氣為賊故王者輔以官牧之事然後萬物成熟秋草木不榮華金從革也秋行春政則華行夏政則喬行冬政則落秋失政則春大風不解雷不發聲王者能知則知善惡知善惡則夏氣得故哲者主夏夏陽氣始盛萬物兆長王者不掩明則道不退塞而夏至之後大暑隆萬物茂育懷任王者恐明不知賢不肖分明白黑於時寒為賊故王者輔以賞賜之事然後夏草木不霜火炎上也夏行春政則風行秋政則水行冬政則落夏失政則冬不凍冰五穀不藏大寒不解王者無失謀然後冬氣得故謀者主冬冬陰氣始盛草木必死王者能聞事審謀慮之則不侵伐不侵伐且殺則死者不恨生者不怨冬日至之後大寒降萬物藏於下於時暑為賊故王者輔之以急斷之事以水潤下也冬行春政則蒸行夏政則雷行秋政則旱冬失政則夏草木不實霜五穀疾枯郊語第六十五人之言醯去烟鴟羽去昧慈石取鐵頸金取火蠶珥絲於室而絃絶于堂禾實于野而粟缺于倉蕪荑生于燕橘枳死于荊此十物者皆奇而可怪非人所意也夫非人所意而然既已有之矣或者吉凶禍福利不利之所從生無有奇怪非人所意如是者乎此等可畏也孔子曰君子有三畏畏天命畏大人畏聖人之言彼豈無傷害於人如孔子徒畏之哉以此見天之不可不畏敬猶主上之不可不謹事不謹事主其禍來至顯不畏敬天其殃來至暗暗者不見其端若自然也故曰堂堂如天殃言不必立校默而無聲潛而無形也由是觀之天殃與上罰所以別者暗與顯耳不然其來逮人殆無以異孔子同之俱言可畏也天地神明之心與人事成敗之真固莫之能見也惟聖人能見之聖人者見人之所不見者也故聖人之言亦可畏也奈何而廢郊禮郊禮者人所最甚重也廢聖人所最甚重而吉凶利害在於冥冥不可得見之中雖已多受其病何從知之故曰問聖人者問其所為而無問其所以為也問其所以為終弗能見不如勿問問其所為而為之所不為而勿為是與聖人同實也何過之有詩云不愆不忘率由舊章舊章者先聖人之故文章也率由各有修從之也此言先聖人之故文章者雖不能深見而詳知其則猶不知其美譽之功矣今郊事天之義此聖人故云云
