body:
  text: 春秋繁露卷十七天地之行第七十八天地之行美也是故春襲葛夏居密陰秋避殺風冬避重漯就其和也衣欲常漂食欲常饑體欲常勞而無長佚居多也凡天地之物乘以其泰而生厭於其勝而死四時之變是也故冬之水氣東加於春而木生乘其泰也春之生西至金而死厭於勝也生於木者至金而死生於金者至火而死春之所生而不得過秋秋之所生不得過夏天之數也飲食臭味每至一時亦有所勝有所不勝之理不可不察也四時不同氣氣各有所宜宜之所在其物代美視代美而代養之同時美者雜食之是皆其所宜也故薺以冬美而芥以夏成此可以見冬夏之所宜服矣冬水氣也薺甘味也乘於水氣而美者甘勝寒也薺之為言濟與濟大水也夏火氣也芥苦味也乘於火氣而成者苦勝暑也天無所言而意以物物不與群物同時而生死者必深察之是天之所以告人也故薺成告之甘芥成告之苦也君子察物而成告謹是以至薺不可食之時而盡遠甘物至芥成就也天所獨代之成者君子獨代之是冬夏之所宜也春秋雜物其和而冬夏代服其宜則當得天地之美四時和矣凡擇味之大體各因其時之所美而違天不遠矣是故當百物大生之時群物皆生而難不惜其命所以救窮也推進光榮褒揚其善所以助明也受命宣恩輔成君子所以助化也功成事就歸德於上所以致義也是故地明其理為萬物母臣明其職為一國宰母不可以不信宰不可以不忠母不信則草木傷其根宰不忠則姦臣危其君根傷則亡其枝葉君危則亡其國故為地者務暴其形為臣者務著其情一國之君其猶一體之心也隱居深宮若心之藏於胸至貴無與敵若心之神無與雙也其官人上士高清明而下重濁若身之貴目而賤足也任群臣無所親若四肢之各有職也內有四輔若心之有肝肺脾腎也外有百官若心之有形體孔竅也親聖近賢若神明皆聚於心也上下相承順若肢體相為使也布恩施惠若元氣之流皮毛腠理也百姓皆得其所若血氣和平形體無所苦也無為致太平若神氣自通於淵也致黃龍鳳凰若神明之致玉女芝英也君明臣蒙其功若心之神體得以全臣賢君蒙其恩若形體之靜而心得以安上亂下被其患若耳目不聰明而手足為傷也臣不忠而君滅亡若形體妄動而心為之喪是故君臣之禮若心之與體心不可以不堅君不可以不賢體不可以不順臣不可以不忠心所以全者體之力也君所以安者臣之功也是以天高其位而下其施藏其形而見其光序列星而近至精考陰陽而降霜露高其位所以為尊也下其施所以為仁也藏其形所以為神也見其光所以為明也序列星所以相承也近至精所以為剛也考陰陽所以成歲也降霜露所以生殺也為人君者其法取象於天故貴爵而臣國所以為仁也深居隱處不見其體所以為神也任賢使能觀聽四方所以為明也量能授官賢愚有差所以相承也引賢自近以備股肱所以為剛也考實事功次序殿最所以成世也有功者進無功者退所以賞罰也是故天執其道為萬物主君執其常為一國主天不可以不剛主不可以不堅天不剛則列星亂其行主不堅則邪臣亂其官星亂則亡其天臣亂則亡其君故為天者務剛其氣為君者務堅其政剛堅然後陽道制命地卑其位而上其氣暴其形而著其情受其死而獻其生成其事而歸其功卑其位所以事天也上其氣所以養陽也暴其形所以為忠也著其情所以為信也受其死所以藏終也獻其生所以助明也成其事所以助化也歸其功所以致義也為人臣者其法取象於地故朝夕進退奉職應對所以事貴也供設飲食候視疚疾所以致養也委身致命事無專制所以為忠也竭愚寫情不飾其過所以為信也伏節死義代四時也而人之所治也安取久留當行之理而必待四時也此之謂壅非其中也人有喜怒哀樂猶天之有春秋冬夏也喜怒哀樂之至其時而欲發也若春秋冬夏之至其時而欲出也皆天氣之然也其宜直行而無鬱滯一也天終歲乃一遍此四者而人主終日不知過此四之數其理故不可以相待且天之欲利人非宜其欲利穀也除穢不待時況穢人乎蘇輿本天地之行第七十八天地之行美也是以天高其位而下其施藏其形而見其光序列星而近至精考陰陽而降霜露高其位所以為尊也下其施所以為仁也藏其形所以為神也見其光所以為明也序列星所以相承也近至精所以為剛也考陰陽所以成歲也降霜露所以生殺也為人君者其法取象於天故貴爵而臣國所以為仁也深居隱處不見其體所以為神也任賢使能觀聽四方所以為明也量能授官賢愚有差所以相承也引賢自近以備股肱所以為剛也考實事功次序殿最所以成世也有功者進無功者退所以賞罰也是故天執其道為萬物主君執其常為一國主天不可以不剛主不可以不堅天不剛則列星亂其行主不堅則邪臣亂其官星亂則亡其天臣亂則亡其君故為天者務剛其氣為君者務堅其政剛堅然後陽道制命地卑其位而上其氣暴其形而著其情受其死而獻其生成其事而歸其功卑其位所以事天也上其氣所以養陽也暴其形所以為忠也著其情所以為信也受其死所以藏終也獻其生所以助明也成其事所以助化也歸其功所以致義也為人臣者其法取象於地故朝夕進退奉職應對所以事貴也供設飲食候視疢疾所以致養也委身致命事無專制所以為忠也竭愚寫情不飾其過所以為信也伏節死難不惜其命所以救窮也推進光榮褒揚其善所以助明也受命宣恩輔成君子所以助化也功成事就歸德於上所以致義也是故地明其理為萬物母臣明其職為一國宰母不可以不信宰不可以不忠母不信則草木傷其根宰不忠則姦臣危其君根傷則亡其枝葉君危則亡其國故為地者務暴其形為臣者務著其情一國之君其猶一體之心也隱居深宮若心之藏於胸至貴無與敵若心之神無與雙也其官人上士高清明而下重濁若身之貴目而賤足也任群臣無所親若四肢之各有職也內有四輔若心之有肝肺脾腎也外有百官若心之有形體孔竅也親聖近賢若神明皆聚於心也上下相承順若肢體相為使也布恩施惠若元氣之流皮毛腠理也百姓皆得其所若血氣和平形體無所苦也無為致太平若神氣自通於淵也致黃龍鳳皇若神明之致玉女芝英也君明臣蒙其功若心之神體得以全臣賢君蒙其恩若形體之靜而心得以安上亂下被其患若耳目不聰明而手足為傷也臣不忠而君滅亡若形體妄動而心為之喪是故君臣之禮若心之與體心不可以不堅君不可以不賢體不可以不順臣不可以不忠心所以全者體之力也君所以安者臣之功也威德所生第七十九天有和有德有平有威有相受之意有為政之理不可不審也春者天之和也夏者天之德也秋者天之平也冬者天之威也天之序必先和然後發德必先平然後發威此可以見不和不可以發慶賞之德不平不可以發刑罰之威又可以見德生於和威生於平也不和無德不平無威天之道也達者以此見之矣我雖有所愈而喜必先和心以求其當然後發慶賞以立其德雖有所忿而怒必先平心以求其政然後發刑罰以立其威能常若是者謂之天德行天德者謂之聖人為人主者居至德之位操殺生之勢以變化民民之從主也如草木之應四時也喜怒當寒暑威德當冬夏冬夏者威德之合也寒暑者喜怒之偶也喜怒之有時而當發寒暑亦有時而當出其理一也當喜而不喜猶當暑而不暑當怒而不怒猶當寒而不寒也當德而不德猶當夏而不夏也當威而不威猶當冬而不冬也喜怒威德之不可以不直處而發也如寒暑冬夏之不可不當其時而出也故謹善惡之端何以效其然也春秋采善不遺小掇惡不遺大諱而不隱罪而不忽以是非正理以褒貶喜怒之發威德之處無不皆中其應可以參寒暑冬夏之不失其時已故曰聖人配天如天之為第八十陰陽之氣在上天亦在人在人者為好惡喜怒在天者為暖凊寒暑出入上下左右前後平行而不止未嘗有所稽留滯鬱也其在人者亦宜行而無留若四時之條條然也夫喜怒哀樂之止動也此天之所為人性命者臨其時而欲發其應亦天應也與暖凊寒暑之至其時而亦發無異若留德而待春夏留刑而待秋冬也此有順四時之名實逆於天地之經在人者亦天也奈何其久留天氣使之鬱滯不得以其正周行也是故天行穀朽寅而秋生麥告除穢而繼乏也所以成功繼乏以贍人也天之生有大經也而所周行者又有害功也除而殺殛者行急皆不待時也天之志也而聖人承之以治是故春修仁而求善秋修義而求惡冬修刑而致清夏修德而致寬此所以順天地體陰陽然而方求善之時見惡而不釋方求惡之時見善亦立行方致清之時見大善亦立舉之方致寬之時見大惡亦立去之以效天地之方生之時有殺也方殺之時有生也是故志意隨天地緩急倣陰陽然而人事之宜行者無所鬱滯且恕於人順於天天人之道兼舉此謂執其中天非以春生人以秋殺人也當生者曰生當死者曰死非殺物之任擬神明亂世之所起亦博若是皆因天地之化以成敗物乘陰陽之資以任其所為故為惡愆人力而功傷名自過也天地之間有陰陽之氣常漸人者若水常漸魚也所以異於水者可見與不可見耳其淡淡也然則人之居天地之間其猶魚之離水一也其無間若氣而淖於水水之比於氣也若泥之比於水也是天地之間若虛而實人常漸是淡淡之中而以治亂之氣與之流通相殽饌也故人氣調和而天地之化美殽於惡而味敗此易之物也推物之類以易見難者其情可得治亂之氣邪正之風是殽天地之化者也生於化而反殽化與運連也春秋舉世事之道夫有書天之盡與不盡王者之任也詩云天難諶斯不易維王此之謂也夫王者不可以不知天知天詩人之所難也天意難見也其道難理是故明陽陰入出實虛之處所以觀天之志辨五行之本末順逆小大廣狹所以觀天道也天志仁其道也義為人主者豫奪生殺各當其義若四時列官置吏必以其能若五行好仁惡戾任德遠刑若陰陽此之謂能配天天者其道長萬物而王者長人人主之大天地之參也好惡之分陰陽之理也喜怒之發寒暑之比也官職之事五行之義也以此長天地之間蕩蘇輿本如天之為第八十陰陽之氣在上天亦在人在人者為好惡喜怒在天者為暖凊寒暑出入上下左右前後平行而不止未嘗有所稽留滯鬱也其在人者亦宜行而無留若四時之條條然也夫喜怒哀樂之止動也此天之所為人性命者臨其時而欲發其應亦天應也與暖凊寒暑之至其時而欲發無異若留德而待春夏留刑而待秋冬也此有順四時之名實逆於天地之經在人者亦天也奈何其久留天氣使之鬱滯不得以其正周行也是故天行穀朽寅而秋生麥告除穢而繼乏也所以成功繼乏以贍人也天之生有大經也而所周行者又有害功也除而殺殛者行急皆不待時也天之志也而聖人承之以治是故春修仁而求善秋修義而求惡冬修刑而致清夏修德而致寬此所以順天地體陰陽然而方求善之時見惡而不釋方求惡之時見善亦立行方致清之時見大善亦立舉之方致寬之時見大惡亦立去之以效天地之方生之時有殺也方殺之時有生也是故志意隨天地緩急倣陰陽然而人事之宜行者無所鬱滯且恕於人順於天天人之道兼舉此謂執其中天非以春生人以秋殺人也當生者曰生當死者曰死非殺物之義待四時也而人之所治也安取久留當行之理而必待四時也此之謂壅非其中也人有喜怒哀樂猶天之有春夏秋冬也喜怒哀樂之至其時而欲發也若春夏秋冬之至其時而欲出也皆天氣之然也其宜直行而無鬱滯一也天終歲乃一遍此四者而人主終日不知過此四之數其理故不可以相待且天之欲利人非直其欲利穀也除穢不待時況穢人乎天地陰陽第八十一天地陰陽木火土金水九與人而十者天之數畢也故數者至十而止書者以十為終皆取之此聖人何其貴者起於天至於人而畢畢之外謂之物物者投所貴之端而不在其中以此見人之超然萬物之上而最為天下貴也人下長萬物上參天地故其治亂之故動靜順逆之氣乃損益陰陽之化而搖蕩四海之內物之難知者若神不可謂不然也今投地死傷而不騰相助投淖相動而近投水相動而愈遠由此觀之夫物愈淖而愈易變動搖蕩也今氣化之淖非直水也而人主以衆動之無已時是故常以治亂之氣與天地之化相殽而不治也世治而民和志平而氣正則天地之化精而萬物之美起世亂而民乖志僻而氣逆則天地之化傷氣生災害起是故治世之德潤草木澤流四海功過名者所以別物也親者重疏者輕尊者文卑者質近者詳遠者略文辭不隱情明情不遺文人心從之而不逆古今通貫而不亂名之義也男女猶道也人生別言禮義名號之由人事起也不順天道謂之不義察天人之分觀道命之異可以知禮之說矣見善者不能無好見不善者不能無惡好惡去就不能堅守故有人道人道者人之所由樂而不亂復而不厭者萬物載名而生聖人因其象以命之然而可易也皆有義從也故正名以明義也物也者共名也皆名也而物有私名此物也非夫物故曰萬物動而不形者意也形而不易者德也樂而不亂復而不厭者道也四海之內殽陰陽之氣與天地相雜是故人言既曰王者參天地矣苟參天地則是化矣豈獨天地之精哉王者亦參而殽之治則以正氣殽天地之化亂則以邪氣殽天地之化亂則同者相益異者相損之數也無可疑者矣天地陰陽第八十一天地陰陽木火土金水九與人而十者天之數畢也故數者至十而止書者以十為終皆取之此聖人何其貴者起於天至於人而畢畢之外謂之物物者投所貴之端而不在其中以此見人之超然萬物之上而最為天下貴也人下長萬物上參天地故其治亂之故動靜順逆之氣乃損益陰陽之化而搖蕩四海之內物之難知者若神不可謂不然也今投地死傷而不騰相助投淖相動而近投水相動而愈遠由此觀之夫物愈淖而愈易變動搖蕩也今氣化之淖非直水也而人主以衆動之無已時是故常以治亂之氣與天地之化相殽而不治也世治而民和志平而氣正則天地之化精而萬物之美起世亂而民乖志僻而氣逆則天地之化傷氣生災害起是故治世之德潤草木澤流四海功過神明亂世之所起亦博若是皆因天地之化以成敗物乘陰陽之資以任其所為故為惡愆人力而功傷名自過也天地之閒有陰陽之氣常漸人者若水常漸魚也所以異於水者可見與不可見耳其淡淡也然則人之居天地之閒其猶魚之離水一也其無閒若氣而淖於水水之比於氣也若泥之比於水也是天地之閒若虛而實人常漸是淡淡之中而以治亂之氣與之流通相殽也故人氣調和而天地之化美殽於惡而味敗此易之物也推物之類以易見難者其情可得治亂之氣邪正之風是殽天地之化者也生於化而反殽化與運連也春秋舉世事之道夫有書天之盡與不盡王者之任也詩云天難諶斯不易維王此之謂也夫王者不可以不知天知天詩人之所難也天意難見也其道難理是故明陽陰入出實虛之處所以觀天之志辨五行之本末順逆小大廣狹所以觀天道也天志仁其道也義為人主者豫奪生殺各當其義若四時列官置吏必以其能若五行好仁惡戾任德遠刑若陰陽此之謂能配天天者其道長萬物而王者長人人主之大天地之參也好惡之分陰陽之理也喜怒之發寒暑之比也官職之事五行之義也以此長天地之閒蕩四海之內殽陰陽之氣與天地相雜是故人言既曰王者參天地矣苟參天地則是化矣豈獨天地之精哉王者亦參而殽之治則以正氣殽天地之化亂則以邪氣殽天地之化同者相益異者相損之數也無可疑者矣天道施第八十二天道施地道化人道義聖人見端而知本精之至也得一而應萬類之治也動其本者不知靜其末受其始者不能辭其終利者盜之本也妄者亂之始也夫受亂之始動盜之本而欲民之靜不可得也故君子非禮而不言非禮而不動好色而無禮則流飲食而無禮則爭流爭則亂故禮體情而防亂者也民之情不能制其欲使之度禮目視正色耳聽正聲口食正味身行正道非奪之情也所以安其情也變謂之情雖持異物性亦然者故曰內也變變之變謂之外故雖以情然不為性說故曰外物之動性若神之不守也積習漸靡物之微者也其入人不知習忘乃為常然若性不可不察也純知輕思則慮達節欲順行則倫得以諫爭僩靜為宅以禮義為道則文德是故至誠遺物而不與變躬寬無爭而不以與俗推衆強弗能入蜩蛻濁穢之中含得命施之理與萬物遷徙而不自失者聖人之心也蘇輿本天道施第八十二天道施地道化人道義聖人見端而知本精之至也得一而應萬類之治也動其本者不知靜其末受其始者不能辭其終利者盜之本也妄者亂之始也夫受亂之始動盜之本而欲民之靜不可得也故君子非禮而不言非禮而不動好色而無禮則流飲食而無禮則爭流爭則亂夫禮體情而防亂者也民之情不能制其欲使之度禮目視正色耳聽正聲口食正味身行正道非奪之情也所以安其情也變謂之情雖持異物性亦然者故曰內也變變之變謂之外故雖以情然不為性說故曰外物之動性若神之不守也積習漸靡物之微者也其入人不知習忘乃為常然若性不可不察也純知輕思則慮達節欲順行則倫得以諫爭僩靜為宅以禮義為道則文德是故至誠遺物而不與變躬寬無爭而不以與俗推衆強弗能入蜩蛻濁穢之中含得命施之理與萬物遷徙而不自失者聖人之心也名者所以別物也親者重疏者輕尊者文卑者質近者詳遠者略文辭不隱情明情不遺文人心從之而不逆古今通貫而不亂名之義也男女猶道也人生別言禮義名號之由人事起也不順天道謂之不義察天人之分觀道命之異可以知禮之說矣見善者不能無好見不善者不能無惡好惡去就不能堅守故有人道人道者人之所由樂而不亂復而不厭者萬物載名而生聖人因其象而命之然而可易也皆有義從也故正名以名義也物也者洪名也皆名也而物有私名此物也非夫物故曰萬物動而不形者意也形而不易者德也樂而不亂復而不厭者道也
