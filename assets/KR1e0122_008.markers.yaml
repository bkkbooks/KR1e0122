  - {type: variant, offset: 186, length: 129, content: 所以難治也孔子曰君子不盡利以遺民詩云彼有遺秉此有不斂穧伊寡婦之利故君子仕則不稼田則不漁食時不力珍大夫不坐羊士不坐犬詩曰采葑采菲無以下體德音莫違及爾同死以此防民民猶忘義而爭利以亡其身天不重與有角不得有上齒故已有大者不得有小者天數也夫已有大者又兼小者天不能足之況, SBCK: 况}
