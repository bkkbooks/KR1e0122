  - {type: variant, offset: 2551, length: 0, content: '', SBCK: 春秋襄公二十一年邾庶其以漆閭邱來奔左氏日庶其非􅀸也公羊日邾庶其者何邾婁大夫也二十三年邾卑我來奔杜注卑我是庶其之黨同有竊邑叛君之罪公羊作鼻我邾婁大夫也穀梁作􅂌我案以上七十九字據文義乃舊時繁露注原本他本俱誤作正文今校正春秋繁露卷九}
  - {type: variant, offset: 2551, length: 0, content: '', WYG: 春秋襄公二十一年邾庶其以漆閭邱來奔左氏曰庶其非卿也公羊曰邾庶其者何邾婁大夫也二十三年邾卑我來奔杜注卑我是庶其之黨同有竊邑叛君之罪公羊作鼻我邾婁大夫也榖梁作畀我本案以上七十九字據文義乃舊時繁露注原本他俱誤作正文今校正春秋繁露卷九}
  - {type: variant, offset: 2551, length: 0, content: '', krp: 春秋襄公二十一年邾庶其以漆閭邱來奔左氏日庶其非卿也公羊日邾庶其者何邾婁大夫也二十三年邾卑我來奔杜注卑我是庶其之黨同有竊邑叛君之罪公羊作鼻我邾婁大夫也穀梁作卑我案以上七十九字據文義乃舊時繁露注原本他本俱誤作正文今校正春秋繁露卷九}
