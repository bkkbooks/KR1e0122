  - {type: variant, offset: 0, length: 4910, content: 春秋繁露卷十六執贄第七十二凡執贄天子用暢公侯用玉卿用羔大夫用鴈鴈乃有類於長者長者在民上必施然有先後之隨必淑然有行列之治故大夫以為贄羔乃有其類天者天之道任陽不任陰王者之道任德不任刑順天也羔有角而不任設備而不用類好仁者執之不鳴殺之不諦類死義者羔食於其母必跪而受之類知禮者故羊之為言猶祥與故卿以為贄玉有似君子子曰人而不曰如之何如之何者吾末如之何也矣故匿病者不得良醫羞問者聖人去之以為遠功而近有災是則不有玉至清而不蔽其惡內有瑕穢必見之於外故君子不隱其短不知則問不能則學取之玉也君子比之玉玉潤而不污是仁而至清潔也廉而不殺是義而不害也堅而不硻過而不濡視之如庸展之如石狀如石搔而不可從燒潔白如素而不受污玉類備者故公侯以為贄暢有似於聖人者純仁淳粹而有知之貴也擇於身者盡為德音發於事者盡為潤澤積美暢芬香以通之天暢亦取百香之心獨末之合之為一而達其臭氣暢于天其淳粹無擇與聖人一也故天子以為贄而各以事上也觀贄之意可以見其事山川頌第七十三山則巃嵸𡾋崔嶊嵬㠑巍久不崩弛似夫仁人志士孔子曰山川神祇立寶藏殖器用資曲直合大者可以為宮室臺榭小者可以為舟輿浮灄大者無不中小者無不入持斧則斫折鐮則艾生人立禽獸伏死人入多其功而不言是以君子取譬也且積土成山無損也成其高無害也成其大無虧也小其上泰其下久長安後世無有去就儼然獨處惟山之惪詩云節彼南山惟石巖巖赫赫師尹民具爾瞻此之謂也水則源泉混混沄沄晝夜不竭既似力者盈科後行既似持平者循微赴下不遺小間既似察者循溪谷不迷或奏萬里而必至既似知者鄣防之而清淨既似知命者不清而入潔清而出既似善化者赴千仞之壑石而不疑既似勇者物皆困於火而水獨勝之既似武者咸得之而生失之而死既似有德者孔子在川上曰逝者如斯夫不舍晝夜此之謂也求雨第七十四春旱求雨令縣邑以水日令民禱社家祀戶無伐名木無斬山林暴巫聚尪八日於邑東門之外為四通之壇方八尺植蒼繒八其神共工祭之以生魚八玄酒具清酒膊脯擇巫之清潔辯言利辭者以祝祝齋三日服蒼衣先再拜乃跪陳陳已復再拜乃起祝曰昊天生五穀以養人今五穀病旱恐不成敬進清酒膊脯再拜請雨雨幸大澍奉牲禱以甲乙日為大蒼龍一長八丈居中央為小龍七各長四丈於東方皆東鄉其間相去八尺小童八人皆齋三日服青衣而舞之田嗇夫亦齋三日服青衣而立之諸里社通之於閭外之溝取五蝦蟆錯置社中池方八尺深二尺置水蝦蟆焉具清酒膊脯祝齋三日服蒼衣拜跪陳祝如初取三歲雄雞三歲豬皆燔之於四通神宇令闔邑里南門置水其外開北門具老猳豬一置之于里北門之外市中亦置一猳豬聞鼓聲皆燒豬尾取死人骨埋之開山淵積薪而燔之決通道橋之壅塞不行者決瀆之幸而得雨報以豬一酒鹽黍財足以茅為席毋斷夏求雨令縣邑以水日家人祀竈無舉土功更水浚井暴釜於壇臼杵於術七日為四通之壇於邑南門外方七尺植赤繒七其神蚩尤祭之以赤雄雞七玄酒具清酒膊脯祝齋三日服赤衣拜跪陳祝如春辭以丙丁日為大赤龍一長七丈居中央又為小龍六長各三丈五尺於南方皆南鄉其間相去七尺壯者七人皆齋三日服赤衣而舞之司空嗇夫亦齋三日服赤衣而立之鑿而通之閭外之溝取五蝦蟆錯置里社之中池方七尺深一尺酒脯祝齋衣赤衣拜跪陳祝如初取三歲雄雞猳豬燔之四通神宇開陰閉陽如春季夏禱山陵以助之令縣邑壹徙市於邑南門之外五日禁男子無得行入市家人祠中霤無興土功聚巫市傍為之結蓋為四通之壇於中央植黃繒五其神后稷祭之以母𩛆五玄酒具清酒膊脯令名為祝齋三日衣黃衣皆如春祠以戊己日為大黃龍一長五丈居中央又為小龍四各長二丈五尺於南方皆南鄉其間相去五尺丈夫五人皆齋三日服黃衣而舞之五人亦齋三日衣黃衣而立之亦通社中於閭外之溝取蝦蟆池方五尺深一尺他皆如前神農求雨第十九日戊己不雨命為黃龍又為大龍社者舞之季立之又曰東方小僮舞之南方壯者西方沾人北方人舞之秋暴巫至九日無舉火事無煎金器家人祀門為四通之壇於邑西門之外方九尺植白繒九其神少昊祭之以桐木魚九玄酒具清酒膊脯衣白衣他如春以庚辛日為大白龍一長九丈居中央為小龍八各長四丈五尺於西方皆西向其間相去九尺鰥者九人皆齋三日服白衣而舞之司馬亦齋三日衣白衣而立之蝦蟆池方九尺深一尺他皆如前冬儛龍六日禱於名山以助之家人祀井無壅水為四通之壇於邑北門之外方六尺植黑繒六其神玄冥祭之以黑狗子六玄酒具清酒膊脯祝齋三日衣黑衣祝禮如春以壬癸日為大黑龍一長六丈居中央又為小龍五各長三丈於北方皆北鄉其間相去六尺老者六人皆齋三日衣黑衣而舞之尉亦齋三日服黑衣而立之蝦蟆池皆如春四時皆以水日為龍必取潔土為之結蓋龍成而發之四時皆以庚子之日令吏民夫婦皆偶處凡求雨之大體丈夫欲藏匿女子欲和而樂神農書又曰開神山神淵積薪夜擊鼓譟而燔之為其旱也止雨第七十五雨太多令縣邑以土日塞水瀆絕道蓋井禁婦人不得行入市令縣鄉里皆掃社下縣邑若丞令吏嗇夫三人以上祝一人鄉嗇夫若吏三人以上祝一人里正父老三人以上祝一人皆齋三日各衣時衣具豚一黍鹽美酒財足祭社擊鼓三日而祝先再拜乃跪陳陳已復再拜乃起祝曰嗟天生五穀以養人今淫雨太多五穀不和敬進肥牲清酒以請社靈幸為止雨除民所苦無使陰滅陽陰滅陽不順於天天之常意在於利人人願止雨敢告于社鼓而無歌至罷乃止凡止雨之大禮女子欲其藏而匿也丈夫欲其和而樂也開陽而閉陰闔水而開火以朱絲縈社十周衣朱衣赤幘三日罷二十一年八月甲申朔丙午江都相仲舒告內史中尉陰雨太久恐傷五穀趣止雨止雨之禮廢陰起陽書十七縣八十離鄉及都官吏千石以下夫婦在官者咸遣婦歸女子不得至市市無詣井蓋之勿令泄鼓用牲於社祝之曰雨以太多五穀不和敬進肥牲以請社靈社靈幸為止雨除民所苦無使陰滅陽陰滅陽不順於天天意常在於利民願止雨敢告鼓用牲于社皆壹以辛亥之日書到即起縣社令長若丞尉官長各城邑社嗇夫里吏正里人皆出至於社下餔而罷三日而止未至三日天大暒亦止祭義第七十六五穀食物之性也天之所以為賜人也宗廟上四時之所成受賜而薦之宗廟敬之性也於祭之而宜矣宗廟之祭物之厚無上也春上豆實夏上算實秋上朹實冬上敦實豆實韭也春之始所生也算實麷也夏之所受初也朹實黍也秋之所先成也敦實稻也冬之所畢熟也始生故曰祠善其司也夏約故曰礿貴所初礿也先成故曰嘗嘗言甘也畢熟故曰蒸蒸言眾也奉四時所受於天者而上之為上祭貴天賜且尊宗廟也孔子受君賜則以祭況受天賜乎一年之中天賜四至至則上之此宗廟所以歲四祭也故君子未嘗不食新新天賜至必先薦之乃取食之尊天敬宗廟之心也尊天美義也敬宗廟大禮也聖人之所謹也不多而欲潔清不貪數而欲恭敬君子之祭也恭親之致其中心之誠盡敬潔之道以接至尊故鬼享之享之如此乃可謂之能祭祭者察也以善逮鬼神之謂也善乃逮不可聞見者故謂之察吾以名之所享故祭之不虛安所可察哉祭之為言際也與祭然後能見不見見不見之見者然後知天命鬼神知天命鬼神然後明祭之意明祭之意乃知重祭事孔子曰吾不與祭祭神如神在重祭事如事生故聖人於鬼神也畏之而不敢欺也信之而不獨任事之而不專恃恃其公報有德也幸其不私與人福也其見於詩曰嗟爾君子毋恒安息靜共爾位好是正直神之聽之介爾景福正直者得福也不正者不得福此其法也以詩為天下法矣何謂不法哉其辭直而重有再歎之欲人省其意也而人尚不省何其忘哉孔子曰書之重辭之復嗚呼不可不察也其中必有美者焉此之謂也循天之道第七十七循天之道以養其身謂之道也天有兩和以成二中歲立其中用之無窮是北方之中用合陰而物始動於下南方之中用合陽而養始美於上其動於下者不得東方之和不能生中春是也其養於上者不得西方之和不能成中秋是也然則天地之美惡在兩和之處二中之所來歸而遂其為也是故和東方生而西方成東方和生北方之所起前而西方和成南方之所養長起之不至於和之所不能生養長之不至於和之所不能成成於和生必和也始於中止必中也中者天下之所終始也而和者天地之所生成也夫德莫大於和而道莫正於中中者天地之美達理也聖人之所保守也詩云不剛不柔布政優優此非中和之謂歟是故能以中和理天下者其德大盛能以中和養其身者其壽極命男女之法法陰與陽陽氣起於北方至南方而盛盛極而合乎陰陰氣起乎中夏至中冬而盛盛極而合乎陽不盛不合是故十月而壹俱盛終歲而乃再合天地久節以此為常是故先法之內矣養身以全使男子不堅牡不家室陰不極盛不相接是故身精明難衰而堅固壽考無忒此天地之道也天氣先盛牡而後施精故其精固地氣盛牝而後化故其化良是故陰陽之會冬合北方而物動於下夏合南方而物動於上上下之大動皆在日至之後為寒則凝冰裂地為熱則焦沙爛石氣之精至於是故天地之化春氣生而百物皆出夏氣養而百物皆長秋氣殺而百物皆死冬氣收而百物皆藏是故惟天地之氣而精出入無形而物莫不應實之至也君子法乎其所貴天地之陰陽當男女人之男女當陰陽陰陽亦可以謂男女男女亦可以謂陰陽天地之經至東方之中而所生大養至西方之中而所養大成一歲四起業而必於中中之所為而必就於和故曰和其要也和者天之正也陰陽之平也其氣最良物之所生也誠擇其和者以為大得天地之奉也天地之道雖有不和者必歸之於和而所為有功雖有不中者必止之於中而所為不失是故陽之行始於北方之中而止於南方之中陰之行始於南方之中而止於北方之中陰陽之道不同至於盛而皆止於中其所始起皆必於中中者天地之大極也日月之所至而卻也長短之隆不得過中天地之制也兼和與不和中與不中而時用之盡以為功是故時無不時者天地之道也順天之道節者天之制也陽者天之寬也陰者天之急也中者天之用也和者天之功也舉天地之道而美於和是故物生皆貴氣而迎養之孟子曰我善養吾浩然之氣者也謂行必終禮而心自喜常以陽得生其意也公孫之養氣曰裏藏泰實則氣不通泰虛則氣不足熱勝則氣寒勝則氣泰勞則氣不入泰佚則氣宛至怒則氣高喜則氣散憂則氣狂懼則氣懾凡此十者氣之害也而皆生於不中和故君子怒則反中而自說以和喜則反中而收之以正憂則反中而舒之以意懼則反中而實之以精夫中和之不可不反如此故君子道至氣則華而上凡氣從心心氣之君也何為而氣不隨也是以天下之道者皆言內心其本也故仁人之所以多壽者外無貪而內清淨心平和而不失中正取天地之美以養其身是其且多且治鶴之所以壽者無宛氣於中是故食冰猿之所以壽者好引其末是故氣四越天氣常下施於地是故道者亦引氣於足天之氣常動而不滯是故道者亦不宛氣苟不治雖滿不虛是故君子養而和之節而法之去其群泰取其眾和高臺多陽廣室多陰遠天地之和也故聖人勿為適中而已矣法人八尺四尺其中也宮者中央之音也甘者中央之味也四尺者中央之制也是故三王之禮味皆尚甘聲皆尚和處其身所以常自漸於天地之道其道同類一氣之辨也法天者乃法人之辨天之道嚮秋冬而陰來嚮春夏而陰去是故古之人霜降而迎女冰泮而殺內與陰俱近與陽俱遠也天地之氣不致盛滿不交陰陽是故君子甚愛氣而游於房以體天也氣不傷於以盛通而傷於不時天并不與陰陽俱往來謂之不時恣其欲而不顧天數謂之天并君子治身不敢違天是故新牡十日而一游於房中年者倍新牡始衰者倍中年中衰者倍始衰大衰者以月當新牡之日而上與天地同節矣此其大略也然而其要皆期於不極盛不相遇疏春而曠夏謂不遠天地之數民皆知愛其衣食而不愛其天氣天氣之於人重於衣食衣食盡尚猶有間氣盡而立終故養生之大者乃在愛氣氣從神而成神從意而出心之所之謂意意勞者神擾神擾者氣少氣少者難久矣故君子閑欲止惡以平意平意以靜神靜神以養氣氣多而治則養身之大者得矣古之道士有言曰將欲無陵固守一德此言神無離形則氣多內充而忍饑寒也和樂者生之外泰也精神者生之內充也外泰不若內充而況外傷乎忿恤憂恨者生之傷也和說勸善者生之養也君子慎小物而無大敗也行中正聲嚮榮氣意和平居處虞樂可謂養生矣凡養生者莫精於氣故天下之君此物獨死可食者告其味之便於人也其不食者告殺穢除害之不待秋也當物之大枯之時群物皆死如此物獨生其可食者益食之天為之利人獨代生之其不可食益畜之天愍州華之間故生宿麥中歲而熟之君子察物之異以求天意大可見矣是故男女體其盛臭味取其勝居處就其和勞佚居其中寒煖無失適饑飽無過平欲惡度理動靜順性命喜怒止於中憂懼反之正此中和常在乎其身謂之大得天地泰大得天地泰者其壽引而長不得天地泰者其壽傷而短短長之質人之所由受於天也是故壽有短長養有得失及至其末也大率而必讎於此莫之得離故壽之為言猶讎也天下之人雖眾不得不各讎其所生而壽夭於其所自行自行可久之道者其壽讎於久自行不可久之道者其壽亦讎於不久久與不久之情各讎其生平之所行今如後至不可得勝故曰壽者讎也然則人之所自行乃與其壽夭相益損也其自行佚而壽長者命益之也其自行端而壽短者命損之也以天命之所損益疑人之所得失此大惑也是故天長之而人傷之者其長損天短之而人養之者其短益夫損夭者皆人人其天之繼歟出其質而人勿繼豈獨立哉, WYG: ''}
