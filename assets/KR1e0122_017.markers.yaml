  - {type: variant, offset: 0, length: 0, content: '', WYG: 欽定四庫全書經部五春秋繁露目録春秋類附録卷一楚莊王第一玉杯第二卷二竹林第三卷三玉英第四精華第五巻四王道第六卷五滅國上第七滅國下第八隨本消息第九盟㑹要第十正貫第十一十指第十二重政第十三卷六服制象第十四二端第十五符瑞第十六俞序第十七離合根第十八立元神第十九保位權第二十卷七考功名第二十一通國身第二十二三代改制第二十三官制象天第二十四堯舜湯武第二十五服制第二十六卷八度制第二十七爵國第二十八仁義法第二十九必仁且知第三十卷九身之養第三十一對膠西王第三十二觀徳第三十三奉本第三十四卷十深察名號第三十五實性第三十六諸侯第三十七五行第三十八闕文第三十九闕文第四十卷十一為人者第四十一五行之義第四十二陽尊隂卑第四十三王道通三第四十四天容第四十五天辨在人第四十六隂陽位第四十七卷十二隂陽終始第四十八隂陽義第四十九隂陽出入第五十天道無二第五十一煖燠孰多第五十二基義第五十三闕文第五十四卷十三四時之副第五十五人副天數第五十六同類相動第五十七五行相勝第五十八五行相生第五十九五行逆順第六十治水五行第六十一卷十四治亂五行第六十二五行變救第六十三五行五事第六十四郊語第六十五卷十五郊義第六十六郊祭第六十七四祭第六十八郊祀第六十九順命第七十郊事對第七十一卷十六執贄第七十二山川頌第七十三求雨第七十四止雨第七十五祭義第七十六循天之道第七十七卷十七天地之行第七十八威徳所生第七十九如天之為第八十天地隂陽第八十一天道施第八十二臣等謹案春秋繁露十七卷漢董仲舒撰繁或作蕃蓋古字相通其立名之義不可解中興館閣書目謂繁露冕之所垂有聨貫之象春秋比事屬辭立名或取諸此亦以意為説也其書發揮春秋之㫖多主公羊而徃徃及隂陽五行考仲舒本傳蕃露玉杯竹林皆所著書名而今本玉杯竹林乃在此書之中故崇文總目頗疑之而程大昌攻之尤力今觀其文雖未必全出仲舒然中多根極理要之言非後人所能依託也是書宋代已有四本多寡不同至樓鑰所校乃為定本鑰木原闕三篇明人重刻又闕第五十五篇及第五十六篇首三百九十六字第七十五篇中一百八十字第四十八篇中二十四字又第三十五篇顛倒一頁遂不可讀其餘訛脱不可勝乙蓋海内藏書之家不見完本三四百年於兹矣今以永樂大典所存樓鑰本詳校其異于他本者凡補一千一百餘字刪一百十餘字改定一千八百二十餘字神明煥然頓還舊觀雖曰習見之書實則絶無僅有之本也儻非幸遇聖朝右文稽古使已湮舊籍復發幽光則此十七卷者終沈於蠧簡中矣兹豈非萬世一遇哉臣等編校之餘為是書幸且為讀是書者幸也乾隆四十二年六月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀欽定四庫全書春秋繁露卷一漢董仲舒撰楚莊王第一楚莊王殺陳夏徴舒春秋貶其文不予專討也靈王殺齊慶封而直稱楚子何也曰莊王之行賢而徴舒之罪重以賢君討重罪其於人心善若不貶孰知其非正經春秋常於其嫌得者見其不得也是故齊桓不予專地而封晉文不予致王而朝楚莊弗予專殺而討三者不得則諸侯之得殆原註恐是不待貶案他本貶作此矣此楚靈之所以稱子而討也春秋之辭多所况是文約而法明也問者曰不予諸侯之專封復見於陳蔡之滅不予諸侯之專討獨不復見慶封之殺何也曰春秋之用辭已明者去之未明者著之今諸侯之不得專討固已明矣而慶封之罪未有所見也故稱楚子以霸討之著其罪之宜死以為天下大禁曰人臣之行貶主之位亂國之臣雖不簒殺其罪皆宜死比於此其云爾也春秋曰晉伐鮮虞奚惡乎晉而同夷狄也曰春秋尊禮而重信信重於地禮尊於身何以知其然也宋伯姬恐不原註恐不一作疑禮而死於火齊桓公疑信而虧其地春秋賢而舉之以為天下法曰禮而信禮無不答施無不報天之數也今我君臣同姓適女女無良心禮以不答有恐畏我何其不夷狄也公子慶父之亂魯危殆亡而齊桓安案他本安作公之於彼無親尚來憂我如何與同姓而殘賊遇我詩云宛彼鳴鳩翰飛戾天我心憂傷念彼先人明發不寐有懷二人人皆有此心也今晉文不以其同姓憂我而彊大厭我我心望焉故言之不好謂之晉而已是婉辭也問者曰晉惡而不可親公徃而不敢至乃人情耳君子何恥而稱公有疾也曰惡無故自來君子不恥内省不疚何憂何懼案他本何懼作於志是已矣今春秋恥之者昭公有以取之也臣凌其君始於文而甚於昭公受亂陵夷而無懼惕之心囂囂然輕詐妄討案他本討作對犯大禮而取同姓接不義而重自輕也人之言曰國家治則四鄰賀國家亂則四鄰散是故季孫專其位而大國莫之正出走八年死乃得歸身亡子危困之至也君子不恥其困而恥其所以窮昭公雖逢此時苟不取同姓詎至於是雖取同姓能用孔子自輔亦不至如是時難而治簡行枉而無救是其所以窮也春秋分十二世以為三等有見有聞有傳聞有見三世有聞四世有傳聞五世故哀定昭君子之所見也襄成文宣君子之所聞也僖閔莊桓隱君子之所傳聞也所見六十一年所聞八十五年所傳聞九十六年於所見微其辭於所聞痛其禍於傳聞殺其恩與情俱也是故逐季氏而言又雩微其辭也子赤殺弗忍言日痛其禍也子般殺而書乙未殺其恩也屈伸之志詳畧之文皆應之吾以其近近而遠遠親親而疎疎也亦知其貴貴而賤賤重重而輕輕也有知其厚厚而薄薄善善而惡惡也有知其陽陽而隂隂白白而黒黒也百物皆有合偶偶之合之仇之匹之善矣案他本矣作也詩云威儀抑抑徳音秩秩無怨無惡率由羣匹此之謂也然則春秋義之大者也得一端而博達之觀其是非可以得其正法視其温辭可以知其塞怨是故於外道而不顯於内諱而不隱案此下他本有於尊亦然四字於賢亦然此其别内外差賢不肖而等尊卑也義不訕上智不危身故遠者以義諱近者以智畏畏與義兼則世逾原註一作愈近而言逾謹矣此定哀之所以微其辭以故用則天下平不用則安其身春秋之道也春秋之道奉天而法古是故雖有巧手弗修規矩不能正方圓雖有察耳不吹六律不能定五音雖有知心不覽案他本覽作覺先王不能平天下然則先王之遺道亦天下之規矩六律已故聖者法天賢者法聖此其大數也得大數而治失大數而亂此治亂之分也所聞天下無二道故聖人異治同理也古今通達故先賢傳其法於後世也春秋之於世事也善復古譏易常欲其法先王也然而介以一言曰王者必改制自僻者得此以為辭曰古苟可循先王之道何莫相因世迷是聞以疑正道而信邪言甚可患也答之曰人有聞諸侯之君射貍首之樂者於是自㫁貍首縣而射之曰安在於樂也此聞其名而不知其實者也今所謂新王必改制者非改其道非變其理受命於天易姓更王非繼前王而王也若一因前制修故業而無有案他本脱有字所改是與繼前王而王者無以别受命之君天之所大顯也事父者承意事君者儀志事天亦然今天大顯已物襲所代而率與同則不顯不明非天志故必徙居處更稱號改正朔易服色者無他焉不敢不順天志而明自顯也若其大綱人倫道理政治教化習俗文義盡如故亦何改哉故王者有改制之名無易道之實孔子曰無為而治者其舜乎言其主堯之道而已此非不易之效與問者曰物改而天受顯矣其必更作樂何也曰樂異乎是制為應天改之樂為應人作之彼之所授命者必民之案他本無之字所同樂也是故大改制於初所以明天命也更作樂於終所以見天功也緣天下之所新樂而為之文曲且以和政且以興徳天下未徧案他本徧作偏合和王者不虛作樂樂者盈於内而動發於外者也應其治時制禮作樂以成之成者本末質文皆以具矣是故作樂者必反天下之所始樂於己以為本舜時民樂其昭堯之業也故韶韶者昭也禹之時民樂其三聖相繼故夏夏者大也湯之時民樂其救之於患害也故頀頀者救也文王之時民樂其興師征伐也故武武者伐也四者天下同樂之案同樂之三字他本作之同樂一也其所同樂之端不可一也作樂之法必反本之所樂所樂不同事樂安得不世異是故舜作韶而禹作夏湯作頀而文王作武四樂案他本樂作代殊名則各順其民始樂於己也吾見其效矣詩云文王受命有此武功既伐于崇作邑于豐樂之風也又曰王赫斯怒爰整其旅當是時紂為無道諸侯大亂民樂文王之怒而詠歌之也周人徳已洽天下反本以為樂謂之大武言民所始樂者武也云爾故凡樂者作之於終而名之以始重本之義也由此觀之正朔服色之改受命應天制禮作樂之異人心之動也二者離而復合所為一也玉杯第二春秋譏文公以喪娶難者曰喪之法案之法二字他本作者月不過三年三年之喪二十五月今按經文公乃四十一月乃原註一作方娶娶時無喪出其法也矣何以謂之喪娶曰春秋之論事案此下原本重一事字莫重乎志今娶必納幣納幣之月在喪分故謂之喪娶也且文公以秋祫祭以冬納幣皆失於大蚤春秋不譏其前而顧譏其後必以三年之喪肌膚之情也雖從俗而不能終猶宜未平於心今全無悼遠之志反思念娶事是春秋之所甚疾也故譏不出三年於首而已譏以喪娶也不别先後賤其無人心也縁此以論禮禮之所重者在其志志敬而節具則君子予之知禮志和而音雅則君子予之知樂志哀而居約則君子予之知喪故曰非虛加之重志之謂也志為質物為文文著於質質不居文文安施質質文兩備然後其禮成文質偏行不得有我爾之名俱不能備而偏行之寧有質而無文雖弗予能禮尚少善之介葛盧來是也有文無質非直不予乃少惡之謂州公寔來是也然則春秋之序道也先質而後文右志而左物故曰案他本脱故曰二字禮云禮云玉帛云乎哉推而前之亦宜曰朝云朝云辭令云乎哉樂云樂云鐘鼓云乎哉引而後之亦宜曰喪云喪云衣服云乎哉是故孔子立新王之道明其貴志以反和見其好誠以滅偽其有繼周之弊故若此也春秋之法以人隨君以君隨天曰縁民臣之心不可一日無君一日不可無君而猶三年稱子者為君心之未當立也此非以人隨君耶孝子之心三年不當三年不當而踰年即位者與天數俱終始也此非以君隨天耶故屈民而伸君屈君而伸天春秋之大義也春秋論十二世之事人道浹而王道備法布二百四十二年之中相為左右以成文采其居參錯非襲古也是故論春秋者合而通之緣而求之伍其比隅案他本隅作偶其類覽其緒屠其贅是以人道案他本道作心浹而王法立以為不然今夫天子踰年即位諸侯於封内三年稱子皆不在經也而操之與在經無以異非無其辨也有所見而經安受其贅也故能以比貫類以辨付贅者大得之矣人受命於天有善善惡惡之性可養而不可改可豫而不可去若形體之可肥臞而不可得革也是故雖有至賢能為君親含容其惡不能為君親令無惡書曰厥辟不辟去厥祗事親亦然皆忠孝之極也非至賢安能如是父不父則子不子君不君則臣不臣耳文公不能服喪不時奉祭倒序以不三年案倒序以不三年他本作不以三年又以喪娶娶於大夫以卑宗廟亂其羣祖以逆先公小善無一而大惡四五故諸侯弗予命大夫弗為使是惡惡之徵不臣之效也出侮於外入奪於内無位之君也孔子曰政逮於大夫四世矣蓋自文公以來之謂也君子知在位者之不能以案以字他本誤作在惡服人也是故簡六藝以贍養之詩書序其志禮樂純其美易春秋明其知六學皆大而各有所長詩道志故長於質禮制節故長於文樂詠徳故長於風書著功故長於事易本天地故長於數春秋是非故長於治人能兼得其所長而不能偏舉其詳也故人主大節則知闇大博則業厭二者異失同貶其傷必至不可不察也是故善為師者既美其道有慎其行齎案齎他本作齊時蚤晚任多少適疾徐造而勿趨稽而勿苦省其所為而成其所湛音耽故力不勞而身大成此之謂聖化吾取之春秋之好微與其貴志也春秋修本末之義達變故之應通生死之志遂人道之極者也是故君殺賊討則善而書其誅若莫之討則君不書葬而賊不復見矣不書葬以為無臣子也賊不復見以其宜滅絶也今趙盾弑君四年之後别牘案牘字原本他本俱誤作獨今據黄氏日鈔所引改正復見非春秋之常辭也古今之學者異而問之曰是弑君何以復見猶曰賊未討何以書葬何以書葬者不宜書葬也而書葬何以復見者亦不宜復見也而復見二者同貫不得不相若也盾之復見直以赴問而辨不親弑非不當誅也則亦不得不謂悼公之書葬直以赴問而辨當故案他本故作誅弑亦不當罪也若是則春秋之説亂矣豈可法哉故貫比而論是非雖難悉得其義一也今誅盾無傳弗誅無傳不交無傳以比言之法論也無比而處之誣辭也今視其比皆不當死何以誅之春秋赴問數百應問數千同留經中憣案他本憣作繙援比類以發其端卒無妄言而得應於傳者今使外賊不可誅故皆復見而問曰此復見何也言莫妄於是何以得應乎故吾以其得應知其問之不妄以其問之不妄知盾之獄不可不察也夫名為弑父而實免罪者已有之矣亦有名為弑君而罪不誅者逆而罪案他本罪作距之不若徐而味之且吾語盾有本詩云他人有心予忖度之此言物莫無鄰察視其外可以見其内也今按盾事而觀其心愿而不刑合而信之非篡弑之鄰也按盾辭號乎天苟内不誠安能如是案他本下衍一是字故訓其終始無弑之志挂惡謀者過在不遂去罪在不討賊而已臣之宜為君案此下他本有之字討賊也猶子之宜為父嘗藥也子不嘗藥故加之弑父臣不討賊故加之弑君其意一也所以示天下廢臣子之節其惡之大若此也故盾之不討賊為弑君也與子之不甞藥為弑父無以異盾不宜誅以此參之問者曰夫謂之弑而有不誅其論難知案他本知作之非衆案他本衆作董之所能見也故赦子之罪以傳明之盾不誅無傳何也曰案他本脱曰字世亂義廢背上不臣篡弑覆君者多而有明大惡之誅誰言其誅故晉趙盾楚公子比皆不誅之文而弗為傳弗欲明之心也問者曰人弑其君重案他本重作者卿在而弗能討者案他本無者字非一國也靈公弑趙盾不在不在之與在惡有薄厚春秋責在而不討賊者弗繫臣子爾也責不在而不討賊者乃加弑焉何其責厚惡之薄薄惡之厚也曰春秋之道視人所惑為立説以大明之今趙盾案他本脱盾字賢而不遂於理皆見其善莫知其罪故因其所賢而加之大惡繫之重責使人湛思而自省悟以反道曰吁臣君之大義父子之道乃至乎此此所由惡薄而責之厚也他國不討賊者諸斗筲之民何足數哉弗繫人數而已此所由惡厚而責薄也傳曰輕為重重為輕非是之謂乎故公子比嫌可以立趙盾嫌無臣責許止嫌無子罪春秋為人不知惡而恬行不備也是故重累責之以矯枉世而直之矯者不過其正弗能直知此而義畢矣春秋繁露卷一欽定四庫全書春秋繁露卷二漢董仲舒撰竹林第三春秋之常辭也不予夷狄而予中國為禮至邲之戰偏然反之何也曰春秋無通辭從變而移今晉變而為夷狄楚變案他本脱變字而為君子故移其辭以從其事夫莊王之舍鄭有可貴之美晉人不知其善而欲擊之所救已解如案他本如作而古而如二字通用挑與之戰此無善善之心而輕救民之意也是以賤之而不使得與賢者為禮秦穆侮蹇叔而大敗鄭文輕衆而喪師春秋之敬賢重民如是是故戰攻侵伐雖數百起必一二書傷其害所重也問者曰其書戰伐甚謹其惡戰伐無辭何也曰㑹同之事大者主小戰伐之事後者主先苟不惡何為使起之者居下是其惡戰伐之辭已且春秋之法凶年不修舊意在無苦民爾苦民尚惡之况傷民乎傷民尚痛之况殺民乎故曰凶年修舊則譏造邑則諱是害民之案他本無之字小者惡之小也害民之大者惡之大也今戰伐之於民其為害幾何攷意而觀指則春秋之所惡者不任徳而任力驅民而殘案殘他本作賤賊之其所好案好他本作惡者設而勿用仁義以服之也詩云矢其文徳洽此四國此春秋之所善也夫徳不足以親近而文不足以來遠而㫁㫁原註一作齗齗以戰伐為之者此固春秋之所甚疾已皆非義也難者曰春秋之書戰伐也有惡有善也惡詐擊而善偏戰恥伐喪而榮復讎奈何以案他本無以字春秋為無義戰而盡惡之也曰凡春秋之記災異也雖畆有數莖猶謂之無麥苗也今天下之大三百年之乆戰攻侵伐不可勝數而復讎者有二焉是何以異於無麥苗之有數莖哉不足以難之故謂之無義戰也以無義戰案他本脱戰字為不可則無麥苗亦不可矣案他本矣作也以無麥苗為可則無義戰亦可矣若春秋之於偏戰案戰他本作義也善其偏不善其戰有以效其然也春秋愛人而戰者殺人君子奚説善殺其所愛哉故春秋之於偏戰也案他本無也字猶其於諸夏也引案引字原本作隱今從他本改正下同之魯則謂之外引之夷狄則謂之内比之詐戰則謂之義比之不戰則謂之不義故盟不如不盟然而有所謂善盟戰不如不戰然而有所謂善戰不義之中有義義之中有不義辭不能及皆在於指非精心達思者其孰能知之詩曰棠棣之華偏其反而豈不爾思室是遠而子曰未之思也夫何遠之有由是觀之見其指者案他本無者字不任其辭不任其辭然後可與適道矣司馬子反為其君使廢君命與敵情從其所請與宋平是内專政而外擅名也專政則輕君擅名則不臣而春秋大之案大之他本作之大奚由哉曰為其有慘怛之恩不忍餓一國之民使之相食推恩者遠之而大為仁者自然而美今子反出已之心矜宋之民無計其間故大之也難者曰春秋之法卿不憂諸侯政不在大夫子反為楚臣而恤宋民是憂諸侯也不復其君而與敵平是政案他本無政字在大夫也湨古闃反梁之盟信案他本無信字在大夫而春秋刺之為其奪君尊也平在大夫亦奪君尊而春秋大之此所問也且春秋之義臣有惡君案君字他本作擅名美故忠臣不顯諌欲其由君出也書曰爾有嘉謀嘉猷入告爾君于内爾乃順之于外曰此謀此猷惟我君之徳此為人臣之法也古之良大夫其事君皆若是今子反去君近而不復荘王可見而不告皆以其解二國之難為不得已也奈其奪君名美何此所惑也曰春秋之道固有常有變變用於變常用於常各止案止他本作正其科非相妨也今諸子所稱皆天下之常雷同之義案義他本作意也子反之行一曲之變術原註術疑作獨修之義也夫目驚而體失其容心驚而事有所忘人之情也通於驚之情者取其一美不盡其失詩云采葑采菲無以下體此之謂也今子反徃視宋聞人相食大驚而哀之不意之至於此也是以心駭目動而違常禮禮者庶於仁文質而成體者也今使人相食大失其仁安著其禮方救其質奚恤其文故曰當仁不讓此之謂也春秋之辭有所謂賤者夫有賤乎賤者則亦有貴乎貴者矣今讓者春秋之所貴雖然見人相食驚人相㸑救之忘其讓案他本脱讓字君子之道有貴於讓者也故説春秋者無以平定之常義疑變故之大義則案義則他本作則義幾可論矣春秋記天下之得失而見所以然之故甚幽而明無傳而著不可不察也夫泰山之為大弗察弗見而况微眇者乎故按春秋而適徃事窮其端而視其故案故原本作殺得志之君子有喜之人不可不慎也齊頃公親齊桓公之孫國固廣大而地勢便利矣又得霸主之餘尊而志加於諸侯以此之故難使㑹同而易使驕奢即位九年未嘗肯一與㑹同之事有怒魯衛之志而從諸侯于清邱㫁道春徃伐魯入其北郊顧返伐衛敗之新築當是時也方乘案乘他本作求勝而志廣大國徃聘慢而弗敬其使者晉魯俱怒内悉其衆外得黨與衛曹四國相輔大困之鞌音安獲齊頃公斮音捉逢丑父深本頃公之所以大辱身幾亡國為天下笑其端乃從懾魯勝衛起伐魯魯不敢出擊衛大敗之因得案得他本作其氣而無敵國以興患也故曰得志有喜不可不戒此其效也自是後頃公恐懼不聴聲樂不飲酒食肉内愛百姓問疾弔喪外敬諸侯從㑹與盟卒終其身家國安寧是福之本生於憂而禍起於喜也嗚呼物之所由然其於人切近可不省耶逢丑父殺其身以生其君何以不得為知權丑父欺晉祭仲許宋俱枉正以存其君然而丑父之所案所他本作難為難於祭仲祭仲見賢而丑父猶見非何也曰是非難别者在此此其嫌疑相似而不同理者不可不察夫去位而避兄弟者君子之所甚貴獲虜逃遁者君子之所甚案他本脱甚字賤祭仲措其君於人所甚貴以生其君故春秋以為知權而賢之丑父措其君於人所甚賤以生其君春秋以為不知權而簡之其俱枉正以存君相似也其使君榮之與使君辱不同理故凡人之有為也前枉而後義者謂之中權雖不能成春秋善之魯隱公鄭祭仲是也前正而後有枉者謂之邪道雖能成之春秋不愛齊頃公逢丑父是也夫冒大辱以生案生字原本作徃其情無樂故賢人不為也而衆人疑焉春秋以為人之不知義而疑也故示之以義曰國滅君死之正也正也者正於天之為人性命也天之為人性命使行仁義而羞可恥非若鳥獸然苟為生苟為利而已是故春秋推天施而順人案人他本作天理以至尊為不可以生於至辱大羞故獲者絶之以至辱為亦案他本無亦字不可以加於至尊大位故雖失位弗君也已反國復案他本無復字在位矣而春秋猶有不君之辭况其溷然方獲而虜耶其於義也案他本無也字非君定矣若非君則丑父何權矣故欺三軍為大罪於晉其免頃公為辱宗廟於齊是以雖難而春秋不愛丑父大義宜言於頃公曰君慢侮而怒諸侯是失禮大矣今被大辱而弗能死是無恥也而復案復他本作獲重罪請俱死無辱宗廟無羞社稷如此雖陷其身尚有亷名當此之時死賢於生故君子生以辱不如死以榮正是之謂也由法論之則丑父欺而不中權忠而不中義以為不然復察春秋春秋之序辭也置王於春正之間非曰原註猶言豈非上奉天施而下正人然後可以為王也云爾今善善惡惡好榮憎辱非人能自生此天施之在人者也君子以天施之在人者聴之則丑父弗忠也天施之在人者使人有亷恥者不生大辱大辱莫甚於去南面之位而束獲為虜也曽子曰辱若可避避之而已及其不可避君子視死如歸謂如頃公者也春秋曰鄭伐許奚惡於鄭而夷狄之也曰衛侯速卒鄭師侵之是伐喪也鄭與諸侯盟于蜀以盟而歸諸侯於是鄭伐是叛盟也伐喪無義叛盟無信無信無義故大惡之問者曰是君死其子未踰年有稱伯不子法辭其罪何曰先王之制有大喪者三年不呼其門順其志之不在事也詩云高宗諒闇三年不言居喪之義也今縱不能如是奈何其父卒未踰年即以喪舉兵也春秋以薄恩且施失其子心故不復得稱子謂之鄭伯以辱之也且其先君襄公伐喪叛盟得罪諸侯諸侯怒之未解惡之未已繼其業者宜務善以覆之今又重之無故居喪以伐人父伐人案原本無伐人二字今從他本増入喪子以喪伐人父加不義於人子施失恩於親以犯中國是父負故惡於前已起大惡於後諸侯果怒而憎之卒案他本卒作率而俱至謀共擊之鄭乃恐懼去楚而成蠱牢之盟是也楚與中國俠案他本俠作挾而擊之鄭罷弊危亡終身愁辜吾本其端無義而敗由輕心然孔子曰道千乘之國敬事而信知其為得失之大也故敬而慎之今鄭伯既案他本無既字無子恩又不孰計一舉兵不當被患不窮自取之也是以生不得稱子去其義也死不得書葬案他本衍一不字見其窮案他本窮作罪也曰有國者視此行案他本行作得身不放義與事不審時其案他本其字在時字上何如此爾春秋繁露卷二欽定四庫全書春秋繁露卷三漢董仲舒撰玉英第四謂一元者大始也知元年志者案他本無者字大人之所重小人之所輕是故治國之端在正名名之正興五世五傳之外美惡乃形可謂得原註一作冒其真矣非子路之所能見非其位而即之雖受之先君春秋危之宋繆公是也非其位不受案此下他本複不受二字之先君而自即之春秋危之呉王僚是也雖然苟能行善得衆春秋弗危衛侯晉以正書葬是也俱不宜立而宋繆受之先君而危衛宣弗受先君而不危以此見得衆心之為大安也故齊桓非直弗受之先君也乃率宜弗為君者而立罪亦重矣然而知恐懼故案故他本作敬舉賢人而以自覆蓋知不背要盟以自湔浣也遂為案他本脱為字賢君而霸諸侯使齊桓被案被他本誤作背惡而無此美得免殺滅乃幸已何霸之有魯桓忘其憂而禍逮其身齊桓憂其憂而立功名推而散之凡人有憂而不知憂者凶有憂而深憂之者吉易曰復自道何其咎此之謂也匹夫之反道以除咎尚難人主之反道以除咎甚易詩云徳輶如毛言其易也公觀魚于棠何惡也凡人之性莫不善義然而不能義者利敗之也故君子終日言不及利欲以勿言愧之而已愧之以案以他本作則塞其源也夫處位動風化者徒言利之名爾猶惡之况求利乎故天王使人求賻求金皆為大惡而書今案他本無今字誤衍一非字非直使人也親自求之是為甚惡譏何故言觀魚猶言觀社也皆諱案諱他本作為大惡之辭也春秋有經禮有變禮為如安性平心者經禮也至有於性雖不安於心雖不平於道無以易之此變禮也是故婚禮不稱主人經禮也辭窮無稱稱案他本脱一稱字主人變禮也天子三年然後稱王經禮也有物故則未三年而稱王變禮也婦人無出境之事經禮也母為子娶婦案他本無婦字奔喪父母變禮也明乎經變之事然後知輕重之分可與適權矣難者曰春秋事同者辭同此四者俱為變禮而或達於經或不達於經何也曰春秋理百物案他本理作禮辨品類别嫌微修本末者也是故星墜謂之隕螽墜謂之雨其所發之處不同或降於天或發於地其辭不可同也今四者俱為變禮也同而其所發亦不同或發於男或發於女其辭不可同也是或達於常或達於變也桓之志無王故不書王其志欲立故書即位書即位者言其弑君兄也不書王者以言其背天子是故隱不言正桓不言王者皆從其志以見其事也從賢之志以達其義從不肖之志以著其惡由此觀之春秋之所善善也所不善亦不善也不可不兩省也經曰宋督案他本脱宋督二字弑其君與夷傳言莊公馮殺之不可及於經何也曰非不可及於經其及之端眇不足以類鈎案他本鈎作鈞之故難知也傳曰臧孫許與晉郤克同時而聘乎齊按經無有豈不微哉不書其徃而有避也今此傳言莊公馮而於經不書亦有以避也是故不書聘乎案他本無乎字齊避所羞也不書莊公馮殺避所善也是故讓者春秋之所善宣公不與其子而與其弟其弟亦不與子而反之兄子雖不中法皆有讓高不可棄也故君子為之諱不居正之謂避其後也亂移之宋督以存善志此亦春秋之義善無遺案他本遺誤作道也若直原註一作止書其篡則宣繆之高滅而善之無所見矣案他本無矣字難者曰為賢者諱皆言之為宣繆諱獨弗言何也曰不成於賢也其為善不法不可取亦不可棄棄之則棄善志也取之則害王法故不棄亦不載以意見之而已苟志於仁無惡此之謂也器從名地從主人之謂案謂他本作位制權之端焉不可不察也夫權雖反經亦必在可以然之域不在可以然之域故雖死亡終弗為也公子目夷是也故諸侯父子兄弟不宜立而立者案者字他本作也春秋視其國與宜立之君無以異也此皆在可以然之域也至於鄫取乎莒以之案以之二字他本作之以為同居目曰莒人滅鄫此不在案他本脱在字可以然之域也故諸侯在不可以然之域者謂之大徳大徳無踰閑者謂正經諸侯在可以然之域者謂之小徳小徳出入可也權譎也尚歸之以奉鉅經耳故春秋之道博而要詳而反一也公子目夷復其君終不與國祭仲已與後改之晉荀息死而不徳衛曼姑拒而弗内此四臣事異而同心其義一也目夷之弗與重宗廟祭仲與之亦重宗廟荀息死之貴先君之命曼姑拒之亦貴先君之命也事雖相反所為同俱為重宗廟貴先君之命耳難者曰公子目夷祭仲之所為之案他本無之字者皆存之事君善之可矣荀息曼姑非有此事也案他本無也字而所欲恃者皆不宜立者何以得載乎義曰春秋之法君立不義案義他本作宜立不書大夫立則書書之者弗予大夫之得立不宜立者也不書予君之得立之案他本無之字也君之立不案立不二字原本誤作不立今據他本改正宜立者非也既立之大夫奉之是也荀息曼姑之所得為義也難紀季曰春秋之法大夫不得用地又曰公案公他本作君子無去國之義又曰君子不避外難紀季犯此三者何以為賢賢臣固盜地以下敵棄君以避患乎曰賢者不為是是故託賢於紀季以見季之弗為也紀季弗為而紀侯使之可知矣春秋之書事時詭案詭他本誤作記其實以有避也其書人時易其名以有諱也故詭晉文得志之實以代案代他本作伐諱避致王也詭莒子號謂之人避隱公也易慶父之名謂之仲孫變盛謂之成諱大惡也然則説春秋者入則詭辭隨其委曲而後得之今紀季受命乎君而經書專無善一名而文見賢此皆詭辭不可不察春秋之於所賢也固順其志而一其辭章其義而裒其美今紀侯春秋之所貴也是以聴其入齊之志而詭其服罪之辭也移之紀季故告糴于齊者實莊公為之而春秋詭其辭以予臧孫辰以酅入于齊者實紀侯為之而春秋詭其辭以予紀季所以詭之不同其實一也難者曰有國家者人欲立之固盡不聴國滅君死之正也何賢乎紀侯曰齊將復讎紀侯自知力不加而志距之故謂其弟曰我宗廟之主不可以不死也案他本作不以死也汝以酅徃服罪於齊請以立五廟使我先君嵗時有所依歸率一國之衆以衛九世原註一作代之主襄公逐之不去求之弗予上下同心而俱死之案他本無之字故謂之大去春秋賢死義且得衆心也故為諱滅以為之諱見其賢之也以其賢之也見其中仁義也精華第五春秋慎辭謹於名倫等物者也是故小夷言伐而不得言戰大夷言戰而不得言獲中國言獲而不得言執各有辭也有小夷避大夷而不得言戰大夷避中國而不得言獲中國避天子而不得言執名倫弗予嫌於相臣之辭也是故小大不踰等貴賤如其倫義之正也大雩者何旱祭也難者曰大旱雩祭而請雨大水鳴鼔而攻社天地之所為隂陽之所起也或請焉或怒焉者何曰大旱者陽滅隂也陽滅隂者尊壓卑也固其義也雖大甚拜請之而已無敢有加也大水者隂滅陽也隂滅陽者卑勝尊也日食亦然皆下犯上以賤傷貴者案他本無者字逆節也故鳴皷而攻之朱絲而案他本無而字脅之為其不義也此亦春秋之為强禦也故變天地之位正隂陽之序直行其道而不忘其難義之至也是故脅嚴社而不為不敬靈出天王而不為不尊上辭父之命而不為不承親絶母之屬而不為不孝慈案他本無慈字義矣案他本無矣字夫原註一作乎難者曰春秋之法大夫無遂事又曰出境有可以安社稷利國家者則專之可也又曰大夫以君命出進退在大夫也又曰案他本無曰字聞喪徐行而不反也夫既曰無遂事矣又曰專之可也既曰進退在大夫矣又曰徐行不反也若相悖然是何謂也曰四者各有所處得其處則皆是也失其處則皆非也春秋固有常義又有應變無遂事者謂平生安寧也專之可也者謂救案他本脱救字危除患也進退在大夫者謂將案他本無謂將二字率用兵也徐行不反者謂不以親害尊不以私妨公也此之謂將得其私知其指故公子結受命徃媵陳人之婦于鄄道生案道生二字他本誤作遂其事從齊桓盟春秋弗非以為救莊公之危公子遂受案他本脱受字命使京師道案道他本誤作遂生事之晉春秋非之以為是時僖公安寧無危而救故案他本無故字有危而不專救謂之不忠無危而擅生事是卑君也故此二臣俱生事春秋有是有非其義然也齊桓仗案仗他本作挾賢相之能用大國之資即位案位他本誤作衛五年不能致一諸侯於柯之盟見其大信一年而近國之君畢至鄄幽之㑹是也其後二十年之間亦乆矣尚未能大合諸侯也至於救邢衛之事見存亡繼絶之義而明年遠國之君畢至貫澤陽榖之㑹是也故曰親近者不以言召遠者不以使此其效也其後矜功振而自足而不修徳故楚人滅弦而志弗憂江黄伐陳而不徃救損人之國而執其大夫不救陳之患而責陳不離案離他本作納原本及黄氏日鈔所引俱作離不復安鄭案鄭他本誤作正而必欲迫案迫原本誤作必今據他本改正之以兵功未良成而志已滿矣故曰管仲之器小哉此之謂也自是日衰九國叛矣春秋之聴獄也必本其事而原其志志邪者不待成首惡者罪特重本直者其論輕是故逢丑父當斮而轅濤塗不宜執案執他本誤作直魯季子追慶父而呉季子釋闔廬此四者罪同異論其本殊也俱欺三軍或死或不死俱弑君或誅或不誅聴訟折獄可無審邪故折獄而是也理益明教益行折獄而案他本無而字非也闇理迷衆與教相妨教政之本也獄政之末也其事異域其用一也不可不以相順故君子重之也難晉事者曰春秋之法未踰年之君稱子蓋人心之正也至里克殺奚齊避此正辭而稱君之子何也曰所聞詩無達詁案詁他本誤作話易無達占案占字原本作吉當是占字誤筆他本作言亦誤今據文義改正春秋無達辭從變從義而一以奉人仁人案他本無人字錄其同姓之禍固宜易操晉春秋之同姓也驪姬一謀而三君死之天下之所共痛也本其所為為之者蔽于所欲得位而不見其難也春秋疾其所蔽故去其位案位他本作正辭徒言君之子而已若謂奚齊曰嘻嘻為大國君之子富貴足矣何以兄之位為欲居之以至此乎云爾錄所痛之辭也故痛之中有痛無罪而受其死者申生奚齊卓子是也惡之中有惡者已立之已殺之不得如他臣之弑君者齊公子商人是也故晉禍痛而齊禍重春秋傷痛而敦重是以奪晉子繼位之辭與齊子成君之號詳見之也古之人有言曰不知來視諸徃今春秋之為學也道徃而明來者也然而其辭體天之微故案他本無故字難知案他本知作之也弗能察寂原註一作蒙若無能察之無物不在是故為春秋者得一端而多連之見一空原註空或作宜而博貫之則天下盡矣魯僖公以亂即位而知親任季子季子無恙之時内無臣下之亂外無諸侯之患行之二十年國家安寧季子卒之後魯不支鄰國之患直乞師楚耳僖公之情非輒不肖而國衰益危者何也以無季子也以魯人之若是也亦知他國之皆若是也以他國之皆若是亦知天下之皆若是也案他本無也字此之謂連而貫之故天下雖大古今雖乆以是定矣以所任賢謂之主尊國安所任非其人謂之主卑國危萬世必然無所疑也其在易曰鼎折足覆公餗夫鼎折足者任非其人也覆公餗者國家傾也是故任非其人而國家不傾者自古至今未嘗聞也故吾按春秋而觀成敗乃切悁悁於前世之興亡也任賢臣者國家之興也夫知不足以知賢無可奈何案他本無何字矣知之不能任大者以死亡小者以亂危其若是何耶以莊公不知季子賢耶安知病將死召而授以國政以殤公為不知孔父賢耶安知孔父死已必死趨而救之二主知皆足以知賢而不決不能任故魯莊以危宋殤以弑使莊公早用季子而宋殤素任孔父尚案尚他本誤作南將興鄰國豈直弑哉此吾所悁悁而悲者也春秋繁露卷三欽定四庫全書春秋繁露卷四漢董仲舒撰王道第六春秋何貴乎元而言之元者始也言本正也道王道也王者人之始也王正則元氣和順風雨時景星見黄龍下王不正則上變天賊氣案他本無氣字並見五帝三王之治天下不敢有君民之心什一而税教以愛使以忠敬長老親親而尊尊不奪民時使民不過嵗三日民家給人足無怨望忿怒之患彊弱之難無讒案讒他本作强賊妒疾之人民修徳而美好被髪銜哺而游不慕富貴恥惡不犯父不哭子兄不哭弟毒蟲不螫猛獸不搏抵蟲不觸案蟲不觸他本誤作不觸蟲故天為之下甘露朱草生醴泉出風雨時嘉禾興鳯凰麒麟遊於郊囹圄空虛畫衣裳而民不犯四夷傳譯而朝民情至樸而不文郊天祀地秩山川以時至封於泰山禪於梁父立明堂宗祀先帝以祖配天天下諸侯各以其職來祭貢土地所有案所有二字他本誤作有所先以入宗廟端冕盛服而後見先徳恩之報奉元之應也桀紂皆聖王之後驕溢妄行侈宫室廣苑囿窮五采之變極飾材之工困野獸之足竭山澤之利食類惡之獸奪民財食高雕文刻鏤之觀盡案盡他本誤作畫金玉骨象之工盛羽族之飾窮原註一作殽白黒之變深刑妄殺以凌下聴鄭衛之音充傾宫原註一作害之志靈案他本無靈字虎兕文采之獸以希見之意賞佞賜讒以糟為邱以酒為池孤貧不養殺聖賢而剖其心生燔人聞其臭剔婦孕見其化斮朝涉之足察其拇原註一作腑一作脛殺梅伯以為醢刑鬼侯之女取其環誅求無已天下空虛羣臣畏恐莫敢盡忠紂愈自賢周發兵不期㑹於孟津之上者八百諸侯共誅紂大亡天下春秋以為戒曰亳社災周衰天子微弱諸侯力政大夫專國士專邑不能行度制法文之禮諸侯背叛莫修貢聘奉獻天子臣弑其君子弑其父孽殺其宗不能統理更相伐銼以廣地以强相脅不能制屬强奄弱衆暴寡富使貧并兼無已臣下上僭不能禁止日為之食星霣如雨雨螽沙鹿崩夏大雨水冬大雨雪霣石于宋五六鷁退飛霣霜不殺草李梅實正月不雨至於秋七月地震梁山崩壅河三日不流晝晦彗星見于東方孛于原註一作升大辰鸜鵒來巢春秋異之以此見悖亂之徴孔子明得失差貴賤反王道之本譏天王以致太平刺惡譏微不遺小大善無細而不舉惡無細而不去進善誅惡絶諸本案他本無本字而已矣天王使宰咺來歸惠公仲子之賵刺不及事也天王伐鄭譏親也㑹王世子譏微也祭公來逆王后譏失禮也刺家父求車武氏毛伯求賻金王人救衛王師敗于貿戎案貿戎地名本公羊傳他本俱從左傳作茅戎下同天王不養案他本無不養二字出居于鄭殺母弟王室亂不能及外分為東西周無以先天下召衛侯不能致遣子突征衛不能絶伐鄭不能從無駭滅極不能誅諸侯得以大亂篡弑無已臣下上偪僭儗天子諸侯彊者行威小國破滅晉至三侵周與天王戰于貿戎而大敗之戎執凡伯于楚以歸諸侯本怨隨惡發兵相破夷人宗廟社稷不能統理臣子强至弑其君法度廢而不復用威武絶而不復行案他本無行字誤衍一復字故鄭魯易地晉文再致天子齊桓㑹王世子擅封邢衛杞横行中國意欲王天下魯舞八佾北祭泰山郊天祀地如天子之為以此之故弑君三十二亡國五十一細惡不絶之所致也春秋立義天子祭天地諸侯祭社稷諸山川不在封内不祭有天子在諸侯不得專地不得專封不得專執天子之大夫不得舞天子之樂不得致天子之賦不得適天子之貴君親無將將案他本脱一將字而誅大夫不得世大夫不得廢置君命立適以長不以賢立子以貴不以長立夫人以適不以妾天子不臣母后之黨親迎案迎字原本他本俱同據文義疑是近字之誤以來遠故案他本無逺故二字未有不先近而致遠者也案他本無也字故内其國而外諸夏内諸夏而外夷狄言自近者始也諸侯案侯他本作夏來朝者得褒邾婁儀父稱字滕薛稱侯荆得人介葛盧得名内出言如諸侯來曰朝大夫來曰聘王道之意也案他本無也字誅惡而不得遺細大諸侯不得為匹夫興師不得執天子之大夫執天子之案之字他本誤移在大夫二字下大夫與伐國同罪執凡伯言伐獻八佾諱八言六鄭魯易地諱易言假晉文再致天子諱致言狩桓公存邢衛杞不見春秋内心予之行法絶而不予止亂之道也非諸侯所當為也春秋之義臣不討賊非臣也子不復讎非子也故誅趙盾賊不討者不書葬臣子之誅也許世子止不嘗藥而誅為弑父楚公子比脅而立而不免於死齊桓晉文擅封致天子誅絶繼絶案絶他本作世存亡侵伐㑹同常為本主曰桓公救中國攘夷狄卒服楚至為王者事晉文再致天子皆止不誅善其牧案牧他本作救諸侯奉獻天子而復周室春秋予之為伯誅意不誅辭之謂也魯隱之代桓立祭仲之出忽立突仇牧孔父荀息之死節公子目夷不與楚國此皆執權存國行正世之義守惓惓之心春秋嘉氣義焉故皆見之復正之謂也夷狄邾婁人牟人葛人為其天王崩而相朝聘也此其誅也殺世子母弟直稱君明失親親也魯季子之免罪呉季子之讓國明親親之恩也閽殺呉子餘祭見刑人之不可近鄭伯髠頑卒于㑹諱殺痛彊臣專君君不得為善也衛人殺州吁齊人殺無知明君臣之義守國之正也衛人立晉美得衆也君將不言率師重君之義也正月公在楚臣子思君無一日無君之意也誅受令恩衛葆以正囹圄之平也言圍成甲午祠兵案祠兵本公羊傳他本從左傳作治兵以别迫脅之罪誅意之法也作南門刻桷丹楹作雉門及兩觀築三臺新延廐譏驕溢不恤下也故臧孫辰請糴于齊孔子曰君子為國必有三年之積一年不熟乃請糴失君之職也誅犯始者省刑絶惡疾案他本無疾字始也大夫盟於澶淵刺大夫之專政也諸侯㑹同賢為主賢賢也春秋紀纖芥之失反之王道追古貴信結言而已不至用牲盟而後成約故曰齊侯衛侯胥命于蒲傳曰古者不盟結言而退宋伯姬曰婦人夜出傅母不在不下堂曰古者周公東征則西國怨桓公曰無貯粟無鄣谷無易樹子無以妾為妻宋襄公曰不鼓不成列不阨人莊王曰古者杅不穿皮不蠧則不出君子篤於禮薄於利要其人不要其土告從不赦不祥彊不凌弱齊頃公弔死視疾孔父正色而立於朝人莫過而致難乎其君齊國佐不辱君命而尊齊侯此春秋之救文以質也救文以質見天下諸侯所以失其國者亦有焉潞子欲合中國之禮義離乎夷狄未合乎中國所以亡也呉王夫差行彊於越臣人之王妾人之妻卒以自亡宗廟夷案夷他本作失社稷滅其可痛也長王投死於戲豈不哀哉晉靈行無禮處臺上彈羣臣枝解宰人而棄漏陽處父之謀使陽處父死及患趙盾之諌欲殺之卒為趙穿案穿他本誤作盾所殺晉獻公行逆理殺世子申生以驪姬立奚齊卓子皆殺死國大亂四世乃定幾為秦所從驪姬起也原註所下脱一字從一作徒非楚昭王行無度殺伍子胥父兄蔡昭公朝之因請其裘昭公不與呉王非之舉兵加楚大敗之君舍乎君室大夫舍大夫室妻楚王之母貪暴之所致也晉厲公行暴道殺無罪人一朝而殺大臣三人明年臣下畏恐晉國殺之陳侯佗淫乎蔡蔡人殺之古者諸侯出疆必其左右備一案一字他本作二師以備不虞今蔡侯恣以身出入民間案他本無民間二字至死閭里之庸甚非人君之行也宋閔公矜婦人而心妒案而心他本誤作心而與大夫萬博萬案他本脱博萬二字譽魯莊公曰天下諸侯宜為君唯魯侯爾閔公妒其言曰此虜也爾虜焉知魯侯之美惡乎致萬怒搏閔公絶脰此以與臣博之過也古者人君立於隂大夫立於陽所以别位明貴賤今與臣相對而博置婦人在側此君臣無别也故使萬稱他國卑閔公之意閔公籍萬而身與之博下君自置有辱之婦人之房俱而矜案矜他本誤作務婦人獨得殺死之道也春秋曰大夫不適君遠此逼案逼他本作過也梁内役原註一作取民無已其民不能堪使民比地為伍一家亡五家殺刑其民曰先亡者封後亡者刑君者將使民以孝於父母順於長老守墓承宗廟世世祀其先今求財不足行罸如將不勝殺戮如屠原註一作從仇讎其民魚爛而止案而止二字他本作則亡國中盡空春秋曰梁亡亡者自亡也非人亡之也虞公貪財不顧其難快耳説目受晉之璧屈産之乘假晉師道還以自滅宗廟破毁社稷不祀身死不葬貪財之所致也故春秋以此見物不空來寶不虛出自内出者無匹不行自外至者無主不止此其應也楚靈王行彊乎陳蔡意廣以武不顧其行慮所美内罷其衆乾谿有物女水盡則女見水滿則不見靈王舉發其國而役三年不罷楚國大怨案怨他本作怒有行暴意殺無罪臣成然楚國大懣公子棄疾卒令靈王父子自殺而取其國虞不離津澤農不去疇土而民相愛也此非盈意之過耶魯莊公好宫室一年三起臺夫人内淫兩弟弟兄子父相殺國絶莫繼為齊所存夫人淫之過也妃匹貴妾可不慎邪此皆内自彊從心之敗已見自彊之敗尚有正諌而不用卒皆取亡曹羈諌案諌他本作陳其君案他本下有也字曰戎衆以無義君無自適原註一作敵君不聴果死戎寇伍子胥諌呉王以為越不可不取呉王不聴至死伍子胥還九年越果大滅呉國秦穆公將襲鄭百里蹇叔諌曰千里而襲人者未有不亡者也穆公不聴師果大敗殽中匹馬隻輪無反者晉假道道案原本無下道字虞虞公許之宫之竒諌曰唇亡齒寒虞虢之相救非相賜也君請勿許虞公不聴後虞果亡於春秋明此存亡道可觀也觀乎亳社知驕溢之罰觀乎許田知諸侯不得專封觀乎齊桓晉文宋襄楚莊知任賢奉上之功觀乎魯隱祭仲叔武孔父荀息仇牧呉季子公子目夷知忠臣之效觀乎楚公子比知臣子之道效死之義觀乎潞子知無輔自詛之敗觀乎公在楚知臣子之恩觀乎漏言知忠道之絶觀乎獻案他本無獻字六羽知上下之差觀乎宋伯姬知貞婦之信觀乎呉王夫差知彊凌弱觀乎晉獻公知逆理近色之過觀乎楚昭王之伐蔡知無義之反觀乎晉厲之妄殺無罪知行暴之報案報他本誤作暴觀乎陳佗宋閔知妒案妒他本作嫉淫之過觀乎虞公梁亡知貪財枉法之窮觀乎楚靈知苦民之壤觀乎魯莊之起臺知驕奢淫泆之失觀乎衛侯朔知不即召之罪觀乎執凡伯知犯上之法觀乎晉郤缺之伐邾婁知臣下作福之誅觀乎公子翬知臣窺原註一作規君之意觀乎世卿知移權之敗故明王視於冥冥聴於無聲天覆地載天下萬國莫敢不悉靖共職受命者不示臣下以知之至也故道同則不能案他本無能字相先情同則不能相使此其教也由此觀之未有去人君之權能制其勢者也未有貴賤無差能全其案他本無其字位者也故君子慎之春秋繁露卷四欽定四庫全書春秋繁露卷五漢董仲舒撰滅國上第七王者民之所徃君者不失其羣者也案他本無也字故能使萬民徃之而得天下之羣者無敵於天下失國之君三十一亡國之君五十二小國徳薄不朝聘大國不與諸侯㑹聚孤特不相守獨居不同案同他本作成羣遭難莫之救所以亡也非獨公侯大人如此生天地之間根本微者不可遭大風疾雨立鑠消耗衛侯朔固事齊襄而天下患之虞虢并力晉獻難之晉趙盾一夫之士也無尺寸之土無一介之衆也而靈公據霸王之餘尊而欲誅之窮變極詐詐盡力竭禍大及身推盾之心載案載他本作戴小國之位孰能亡之哉故伍子胥一夫之士也去楚干闔廬遂得意於楚所托者誠是何可禦耶楚王髠托其國於子玉得臣而天下畏之虞公托其國於宫之竒晉獻患之及髠殺得臣天下輕之虞公不用宫之竒晉獻亡之存亡之端不可不知也諸侯見加以兵逃遁奔走至于滅亡而案他本脱遁奔以下八字莫之救平生之素行可見也隱代桓立所謂僅存耳使無駭帥師滅極内無諌臣外無諸侯之救載亦由是也宋蔡衛國伐之鄭因其力而取之此無以異於遺重寶於道而莫之守見者掇之也鄧榖失地而朝魯桓鄧榖失地不亦宜乎滅國下第八紀侯之所以滅者乃九世之讎也一旦之言危百世之嗣故曰大去衛人侵成鄭入成及齊師圍成三被大兵終滅莫之救所恃者安在齊桓公欲行霸道譚遂違命故滅而奔莒不事大而事小曹伯之所以戰死於位諸侯莫助憂者幽之㑹齊桓數合諸侯曹小未嘗來也魯大國幽之㑹莊公不徃戎人乃窺兵於濟西由見魯孤獨而莫之救也此時大夫廢君命專救危者魯莊公二十七年齊桓為幽之案他本無之字㑹衛人不來其明年桓公怒而大敗之及伐山戎張旗陳獲以驕諸侯於是魯一年三築臺亂臣比案比他本作此三起於内夷狄之兵仍滅於外衛滅之端以失案他本無失字幽之㑹亂之本存親内蔽邢未嘗㑹齊桓也附晉又微晉侯獲於韓而背之淮之㑹是也齊桓卒豎刁易牙之亂作邢與狄伐案伐他本誤作戎其同姓取之其行如此雖爾親庸能親爾乎是君也其滅于同姓衛案衛他本誤作魏侯燬滅邢是也齊桓為幽之㑹衛不至桓怒而伐之狄滅之桓憂而立之魯莊為柯之盟劫汶陽魯絶案絶他本作滅桓立之邢杞未嘗朝聘齊桓見其滅率諸侯而立之用心如此豈不霸哉故以憂天下與之隨本消息第九顔淵死子曰天喪予子路死子曰天祝予西狩獲麟曰吾道窮吾道窮三年身隨而卒階此而觀天命成敗聖人知之有所不能救命矣夫先晉獻公之卒齊桓為葵邱之㑹再致其集先齊孝未卒案他本無卒字一年魯僖乞師取榖晉文之威天子再致先卒一年魯僖公之心分而事齊文公不事晉先齊侯潘卒一年文公如晉衛侯鄭伯皆不期來齊侯已卒諸侯果㑹晉大夫於新城魯昭公以事楚案楚他本作齊之故晉人不入楚國彊而得意一年再㑹諸侯伐彊呉為齊誅亂臣遂滅厲魯得其威案威他本誤作滅以滅鄫其明年如案如他本作知晉無河上之難先晉昭之卒一年無難楚國内亂臣弑君諸侯㑹於平邱謀誅楚亂臣昭公不得與盟案盟他本誤作明大夫見執呉大敗楚之黨六國於雞父公如晉而大辱春秋為之諱而言有疾由此觀之所行從不足恃所事者不可不慎此亦存亡榮辱之要也先楚莊王之卒三年晉滅赤狄潞氏及甲氏留吁先楚子審卒之三年鄭服蕭魚晉侯周卒一年先楚子昭之卒年與陳蔡伐鄭而大克其明年楚屈建㑹諸侯而張中國卒之三年諸夏之君朝于楚楚子卷繼之四年而卒其國不為侵奪而顧隆盛彊大中國不出年餘何也楚子昭蓋諸侯可者也天下之疾其君者皆起愬而乘之兵四五出常以衆擊少以專擊散義之盡也先卒四五年案他本作四十五年誤中國内乖齊晉魯衛之兵分守大國襲小案他本無小字諸夏再㑹陳儀齊不肯徃呉在其南而二君殺中國在其北而齊衛殺其君慶封刦案刦他本誤作切君亂國石惡之徒聚而成羣衛衎據陳儀而為諼林父據戚而以案以他本作已畔宋公殺其世子魯大饑中國之行亡國之跡也譬如於案他本無於字文宣之際中國之君五年之中案之中他本誤作中之五君殺以晉靈之行使一大夫立於蜚案蜚他本誤作棐林拱揖指撝諸侯莫敢不出此猶濕之有拔也原註一作隰之有泮盟㑹要第十至意雖難喻蓋聖人者貴除天下之患貴除天下之患故春秋重而書天下之患偏矣以為本於見天下之所以致患其意欲以除天下之案他本無之字患何謂哉天下者無患然後性可善性可善然後清亷之化流清亷之化流然後王道舉禮樂興其心在此矣傳曰諸侯相聚而盟案盟他本誤作明君子修國曰此將率為也哉是以君子以天下為憂也患乃至於弑君三十一亡國五十二細惡不絶之所致也辭已喻矣故曰立義以明尊卑之分彊幹弱枝以明大小之職别嫌疑之行以明正世之義采摭托意以矯失案失他本誤作矣禮善無小而不舉惡無小而不去以純其美别賢不肖以明其尊親近以來遠因原註一作自其國而容天下名倫案倫他本誤作何等物不失其理公心以是非賞善誅惡而王澤洽始於除患正一而萬物備故曰大矣哉其號案號他本作别兩言而管天下此之謂也正貫第十一春秋大義之所本耶六者之科六者之指之謂也然後援天端布流物而貫通其理則事變散其辭矣故志得失之所從生而後差貴賤之所始矣論罪源深淺定法誅然後絶屬之分别矣立義定尊卑之序而後君臣之職明矣載定下之賢方表謙案謙他本作兼義之所在則見復正焉耳幽隱不相踰而近之則密矣而後萬物之應無窮者故可施其用於人而不悖其倫矣是以必明其統於施之宜故知其氣矣然後能食其志也知其聲矣而後能扶其精也知其行矣而後能遂其形案形他本作刑也知其物矣然後能别其情也故唱而民和之動而民隨之是知引其天性所好而壓其情之所憎者也如是則言雖約説原註一作徳必布矣事雖小功必大矣聲響盛化運於物散入於理徳在天地神明休集並行而不竭盈於四海而頌聲案他本無聲字詠書曰八音克諧無相奪倫神人以和乃是謂也故明於情案他本無情字性乃可與論為政不然雖勞無功夙夜是寤思慮惓心猶不能覩故天下案下他本作不有非案非他本作罪者三示當中孔子之所謂非尚安知通哉十指第十二春秋二百四十二年之文天下之大事變之博無不有也雖然大畧之案他本無之字要有十指十指者事之所案他本無所字繫也王化之由得流也舉事變見有重焉一指也見事變之所至者一指也因其所以至者而治之一指也彊幹弱枝大本小末一指也别嫌疑異同類一指也論賢才之義别所長之能一指也親近來遠同民所欲一指也承周文而反之質一指也木生火火為夏天之端一指也切刺譏之所罰考變異之所加天案天他本作大之端一指也舉事變見有重焉則百姓安矣見事變之所至者則得案則得他本誤作得則失審矣因其所以至而治之則事之本正矣彊幹弱枝大本小末則君臣之分明矣别嫌疑異同類案類他本作異則是非著矣論賢才之義别所長之能則百官序矣承周文而反之質則化所務立矣親近來遠同民所欲則仁恩達矣木生火火為夏則隂陽四時之理相受而次矣切刺譏之所罰考異變之所加則天所欲為行矣統此案他本行矣下有切刺譏之四字無統此二字而舉之仁徃而義來徳澤廣大衍溢於四海隂陽和調萬物靡不得其理矣説春秋者凡用是矣此其法也重政第十三惟聖人能屬萬物於一而繫之元也終原註作故不及本所從來而承之不能遂其功是以春秋變一謂之元元猶原也其義以隨天地終始也故人唯有終始也而生不必應四時之變故元者為萬物之本而人之元在焉安在之乃存乎天地之前案他本無前字故人雖生天氣及奉天氣者不得與天元本天元命而共違其所為也故春正月者承天地之所為也繼天之所為而終之也其道相與共功持業安容言乃案乃他本作及天地之元天地之元奚為於此惡施於人大其貫承意之理矣能説鳥獸之類者非聖人所欲案他本無欲字説也聖人所欲説在於説仁義而理之知其分科條别貫所附明其義之所審勿使嫌疑是乃聖人之所貴而已矣不然傳於衆辭觀於衆物説不急之言而以惑後進者君子之所甚惡也奚以為哉聖人思慮不厭晝日繼之以夜然後萬物察者仁義矣由此言之尚自為得之哉故曰於乎為人師者可無慎耶夫案夫字下他本衍一之字義出於經經傳大本也棄營勞心也苦志盡情頭白齒落尚不合自錄也哉人始生有大命是其體也有變命案此下他本複衍有變命三字存其間者其政案政他本作致也政不齊則人案他本無人字有忿怒之志若將施危難之中而時有隨遭者神明之所接絶屬之符也亦有變其間使之不齊如此不可不省之省之則重政之本矣撮以為一進義誅惡絶之本而以其施此與湯武同案他本無同字而有異湯武用之治仁案仁他本作徃故春秋明得失差貴賤本之天王之所失天下者使諸侯得以大亂之説而後引而反之故曰博案博他本誤作傳而明切而深矣春秋繁露卷五欽定四庫全書春秋繁露卷六漢董仲舒撰服制象第十四天地之生萬物也以養人故其可食案食他本作適者以養身體其可威者以為容服禮案禮他本誤作體之所為興也劍之在左青龍之象也刀之在右白虎之象也鈎之在前赤烏之象也冠之在首元武之象也四者人之盛飾也夫能通古今别然不然乃能服此也原註一作通古别今然後能服此也蓋元武者貌之最嚴有威者也其像在右原註一作後其服反居首武之至而不用矣聖人之案他本無之字所以超然雖欲從之末由也已夫執介胄而後能拒敵者故非聖人之所貴也君子顯之于服而勇武者消其志于貌也矣故文徳為貴而威武為下此天下之所以永全也于春秋何以言之孔父義形於色而姦臣不敢容邪虞有宫之竒而獻公為之不寐晉厲之彊中國以寢尸流血不已故武王克殷裨冕而搢笏虎賁之士説劔安在勇猛必任武殺然後威是以君子所服為上矣故望之儼然者亦已至哉案哉他本作矣豈可不察乎二端第十五春秋至意有二端不本二端之所從起亦未可與論災異也小大微著之分也夫覽求微細於無端之處誠知小之為大也微之將為著也吉凶未形聖人所獨立也雖欲從之末由也已此之謂也故王者受命改正朔不順數而徃必迎來而受之者授受之義也故聖人能繫心於微而致之著也是故春秋之道以無案無他本作元之深正天之端以天之端正王之政以王之政案原本無以王之政四字正諸侯之位五者俱正而化大行然書日蝕星隕有􅈮山崩地震夏大雨水冬大雨雪隕霜不殺草自正月不雨至於秋七月有鸜鵒來巢春秋異之以此見悖亂之徴是小者不得大微者不得著雖甚末原註一作其本未亦一案他本無一字端孔子以此效之吾所以貴微案他本無微字重始是也因惡夫推災異之象于前然後圖安危禍亂于後者非春秋之所甚貴案他本脱貴字也然而春秋舉之以為一端者亦欲其省天譴而畏天威内動于心志外見于事情修身審已明善心以反道者也豈非貴微重始慎終推效者哉符瑞第十六有非力之所能致而自致者西狩獲麟受命之符是也然後託乎春秋正不正之間而明改制之義一統乎天子而加憂于天下之憂也務除案務除他本誤作除務天下所患案他本脱患字而欲以上通五帝下極三王以通百王之道而隨天之終始博得失之效而攷案攷他本作攻命象之為極理以盡情性之宜則天容遂矣案矣他本作以百官同望異路一之者在主率之者在相俞序第十七仲尼之作春秋也上探原註一作深正天端王公之位萬案他本萬字下有物字民之所欲原註一作始下明得失起賢才以待後聖故引史記理徃事正是非見案見他本作也王公史記十二公之間皆衰世之事故門人惑孔子曰吾原註一無曰吾字因其行事而加乎王心焉以為見之空言不如行事博深切明案他本無明字故子貢閔子公肩子言其切而為國家賢案賢他本作資也其為切而至於殺君亡國奔走不得保社稷其所以然是皆不明於道不覽於春秋也故衛子夏言有國家者不可不學春秋不學春秋則無以見前後旁側之危則不知國之大柄君之案之他本作子重任也故或脅窮失國揜殺於位一朝至爾苟能述春秋之法致行其道豈徒除禍哉乃堯舜之徳也故世子曰功及子孫光輝百案此下自世聖王之徳起至故其所善止共三百五十八字原本錯簡在第十八篇今據他本校正世聖王之徳莫美於恕案恕他本誤作世故予先言春秋詳已而畧人因其國而容天下春秋之道大得之則以王小得之則以霸故曽子予石盛美齊侯安諸侯尊天子霸王之道皆本於仁仁天心故次以天心愛人之大者莫大於思患而豫防之故蔡得意於呉魯得意於齊而春秋皆不告故次以言怨人不可邇案邇他本作通敵國不可狎攘竊之國不可使乆親皆防患為民除患之意也不愛民之漸乃至於死亡故言楚靈王晉厲公生弑於位不仁之所致也故善宋襄公不厄人不由其道而勝不如由其道而敗春秋貴之將以變習俗而成王化也故子案他本脱子字夏言春秋重人諸譏皆本此或奢侈使人憤怨或暴虐賊害人終皆禍及身故子池言魯莊築臺丹楹刻桷晉厲之刑刻意者皆不得以壽終上奢侈刑又急皆不内恕求備於人故次以春秋緣人情赦小過而傳明之曰君子辭也孔子明得失見成敗疾時原註一無時字世之不仁失王道之體故緣人情案他本脱道之體故緣人情七字誤衍下文孔子曰吾因行事七字赦小過傳又明之曰君子辭案辭他本作亂也孔子曰吾因行事加吾王心焉假其位號以正人倫因其成敗以明順逆故其所善案以上係校正錯簡則桓文行之而遂其所惡則亂國行之終以敗故始言大惡殺君亡國終言赦小過是亦始於麤糲終於精微教化流行徳澤大洽天下之人人有士君子之行而少過矣亦譏二名之意也離合根第十八天高其位而下其施藏其形而見其光高其位所以為尊也下其施所以為仁也藏其形所以為神見其光所以為明故位尊而施仁藏神而見光者天之行也故為人主者法天之行是故内深藏所以為神外博觀所以為明也任羣賢所以為受成乃不自勞於事所以為尊也汎愛羣生不以喜怒賞罰所以為仁也故為人主者以無為為道以不私為寶立無為之位而乘備具之官案之官他本誤作官之足不自動而相者導進口不自言而擯者賛辭心不自慮而羣臣效當故莫見其為之而功成矣此人主所以法天之行也為人臣者法地之道暴其形出其情以示人高下險易堅耎案耎他本誤作災剛柔肥臞美惡累原註一無累字可就財也故其形宜不宜可得而財也為人臣者比地貴信而悉見其情于主主亦得而財之故王道威而不失為案為字下原本誤接世聖王之徳云云三百五十八字乃係第十七篇錯簡今已校正歸在前篇功及子孫光輝百下人臣當竭情悉力而見其短原註一作所長使主上得而器使之而猶地之竭竟其情也故其形原註一無形字宜可得而財也立元神第十九君人者國之元發言動作萬物之樞機樞機之發榮辱之端也失之毫釐駟不及追故為人君者謹木詳始敬小慎微志如死灰形如委衣安精養神寂寞無為休形無見影揜聲無出響虛心下士觀來察徃謀於衆賢考求衆人得其心徧案徧他本誤作偏見其情察其好惡以叅忠佞考其徃行騐之於今計其蓄積受於先賢釋其讎怨視其所爭差其黨族所依為臬原註一作宗據位治人用何原註一作苛為名原註一作明累日積乆何功不成可以内叅外可以小占大必知其實是為開闔君人者國之本也夫為國其化莫大於崇本崇本案他本脱下崇本二字則君化若神不崇本則君無以兼人無以兼人雖峻刑重誅而民不從是所謂驅國而棄之者也患孰甚焉何謂本曰天地人萬物之本也天生之地養之人成之天生之以孝悌地養之以衣食人成之以禮樂三者相為手足合以成體不可一無也無孝悌則亡其所以生無衣食則亡其所以養無禮樂則亡其所以成也三者皆亡則民如麋鹿各從其欲家自為俗父不能使子君不能使臣雖有城郭名曰虛邑如此者其君枕塊而僵莫之危而自危莫之喪而自亡是謂自然之罰自然之罰至裹案裹他本誤作裏襲石室分障險阻猶不能逃之也明主賢君必於其信是故肅慎三本郊祀致敬共案共他本誤作其事祖禰舉顯孝悌表異孝行所以奉天本也秉耒躬耕採桑親蠶墾草殖榖開闢以足衣食所以奉地本也立辟廱庠序修孝悌敬讓明以案明以二字他本作以明教化感以禮樂所以奉人本也三者皆奉則民如子弟不敢自專邦如父母不待恩而愛不須嚴而使雖野居露宿厚於宫室如是者其君安枕而臥莫之助而自彊莫之綏而自安是謂自然之賞自然之賞至雖退讓委國而去百姓襁負其子隨而君之君亦不得離也故以徳為國者甘於飴蜜固於膠漆是以聖賢勉而崇本而不敢失也君人者國之證也不可先倡感而後應故居倡之位而不行倡之勢不居和之職而以和為徳常盡其下故能為之上也體國之道在於尊神尊者所以奉其政也神者所以就其化也故不尊不畏不神不化夫欲為尊者在於任賢欲為神者在於同心賢者備股肱則君尊嚴而國安同心相承則變化若神莫見其所為而功徳成是謂尊神也天積衆精以自剛聖人積衆賢以自彊天序日月星辰以自光聖人序爵禄以自明天所以剛者非一精之力聖人所以彊者非一賢之徳也故天道務盛其精聖人務衆其賢盛其精而壹其陽衆其賢而同其心壹其陽然後可以致其神同其心然後可以致其功是以建治之術貴得賢而同心為人君者其要貴神神者不可得而視也不可得而聴也是故視而不見其形聴而不聞其聲聲之不聞故莫得其響不見其形故莫得其影莫得其影則無以曲直也莫得其響則無以清濁也無以曲直則其功不可得而敗無以清濁則其名不可得而度也所謂不見其形者非不見其進止之形也言其所以進止不可得而見也所謂不聞其聲者非不聞其號令之聲也言其所以號令不可得而聞也不見不聞是謂冥昏能㝠則明能昏則彰能冥能昏是謂神人君貴居冥而明其位處隂而向陽惡人見其情而欲知人之心是故為人君者執無源之慮行無端之事以不求奪以不問問吾以不求奪則我利矣彼以不出出案出出二字他本作見出則彼費矣吾以不問問則我神矣彼以不對對則彼情矣故終日問之彼不知其所對終日奪之彼不知其所出吾則以明而彼不知其所亡故人臣居陽而為隂人君居隂而為陽隂道尚形而露情陽道無端而貴神保位權第二十民無所好君無以權也民無所惡君無以畏也無以權無以畏則君無以禁制也無以禁制則比肩齊勢而無以為貴矣故聖人之治國也因天地之性情孔竅之所利以立尊卑之制以等原註一作異貴賤之差設官府爵禄利五味盛五色調五聲案聲他本作音以誘其耳目自令清濁昭然殊體榮辱踔然相駮以感動其心務致民令有所好案好字下他本衍一必字有所好然後可得而勸也故設賞以勸之有所好必有所惡有所惡然後可得而畏也故設罰以畏之既有所勸又有所畏然後可得而制制之者制其所好是以勸賞而不得多也制其所惡是以畏罰而不得案得他本作可過也所好多則作福所惡過案過他本作多則作威作威則君亡權天下相怨作福則君亡徳天下相賊故聖人之制民使案民使二字他本作使民之有欲不得過節使之敦朴不得無欲無欲有欲各得以足而君道得矣國之所以為國者徳也君之所以為君者威也故徳不可共威不可分徳共則失恩威分則失權失權則君賤失恩則民散民散則國亂君賤則臣叛是故為人君者固守其徳以附其民固執其權以正其臣聲有順逆必有清濁形有善惡必有曲直故聖人聞其聲則别其清濁見其形則異其曲直於濁之中必知其清於清之中必知其濁於曲之中必見案見他本作知其直於直之中必見案見他本作知其曲於聲無細案無細二字他本誤作之中而不取於形無小而不舉不以著蔽微不以衆揜寡各應其事以致其報黒白分明然後民知所去就民知所去就然後可以致治是為象則原註一作副為人君者居無為之位行不言之教寂而無聲靜而無形執一無端為國源泉因國以為身因臣以為心以臣言為聲以臣事為形有聲必有響有形必有影聲出於内響報於外形立於上影應於下響有清濁影有曲直響所報非一聲也影所應非一形也故為君虛心靜處聰聴其響明視其影案影他本作形以行賞罰之象其行賞罰也響清則生清者榮響濁則生濁者辱影正則生正者進影枉則生枉者絀擥案擥他本作責名考質以叅其實賞不空施案施他本作行罰不虛出是以羣臣分職而治各敬而事爭進其功顯廣其名而人君得載其中此自然致力之術案術他本誤作樹也聖人由之故功出於臣名歸於君也春秋繁露卷六欽定四庫全書春秋繁露卷七漢董仲舒撰考功名第二十一考績之法考其所積也天道積聚衆精以為光聖人積聚衆善以為功故日月之明非一精之光也聖人致太平非一善之功也明所從生不可為源善所從出不可為端量勢立權因事制義故聖人之為天下興利也其猶春氣之生草也各因其生小大而量其多少其為天下除害也若川瀆之瀉於海也各順其勢傾側而制於南北故異孔而同歸殊施而鈞徳其趣於興利除害一也是以興利之要在於致之不在於多少除害之要在於去之不在於南北考績絀陟計事除廢原註一作費有益者謂之公無益者謂之煩擥案擥他本作挈名責實不得虛言有功者賞有罪者罰功盛者賞顯罪多者罰重不能致功雖有賢名不予之賞官職不廢雖有愚名不加之罰賞罰用於實不用於名賢愚在於質不在於文故是非不能混原註一作詐竒不能枉喜怒不能傾姦軌不能弄原註一作算萬物各得其真原註一作貴非則百官勸職爭進其功考試之法大者緩小者急貴者舒而賤者促諸侯月試其國州伯時試其部四試而一考天子嵗試天下三試而一考前後三考而絀陟命之曰計考試之法合其爵禄并其秩積其日陳其實計功量罪以多除少以為名定實先内弟案弟古第字他本誤作定之其先比二三分以為上中下以案以字他本誤移在然後二字下考進退然後外集通名曰進退増減多少有率為第九分三三列之亦有上中下以為一最五為中九為殿有餘歸之於中中而上者有得中而下者有員得少者以一益之至於四員多者以四減之至於一皆逆行三四十二而成於計得滿計者絀陟之次次每計各逐案逐他本作遂其第以通來數初次再計次次四計各不失故第而亦滿計絀陟之初次再計謂上第二也次次四計謂上第三也九年為一第二得九并去其六為置三第六六得等為置二并中者得三盡去之并三三計得六并得一計得六此為四計也絀者亦然通國身第二十二氣之清者為精人之清者為賢治身者以積精為寶治國者以積賢為道身以心為本國以君為主精積於其本則血氣相承受賢積於其主則上下相制使案此下他本複衍一使字血氣相承受則形體無所苦上下相制使則百官各得其所形體無所苦然後身可得而安也百官各得其所然後國可得而守也夫欲致精者必虛靜其形欲致賢者必卑謙其身形靜志虛者氣精之所趣也謙尊自卑者仁賢之所事也故治身者務執虛靜以致精治國者務盡卑謙以致賢能致精則合明而壽仁案他本無仁字能致賢則徳澤洽而國太平三代改制質文第二十三春秋曰王正月傳曰王者孰謂謂案下謂字他本誤移在文王也下文王也曷為先言王而後言正月王正月也何以謂之王正月曰王者必受命而後王王者必改正朔易服色制禮樂一統於天下所以明易姓非繼仁通以己受之於天也王者案他本無者字受命而王制此月以應變故作科以奉天地故謂之王正月也王者改制作科奈何曰當十二色歴各法而正色逆數三而復絀三之前曰五帝帝迭首一色順數五帝相復禮樂各以其法象其宜順數四而相復咸作國號遷宫邑易官名制禮作樂故湯受命而正應天變夏作殷號時正曰綂故親夏虞絀唐謂之帝堯以神農為赤帝作宫邑於下洛之陽名相宫曰尹原註一作名相曰宫尹爵謂之帝舜軒轅曰黄帝推神農以為九皇作宫邑於豐名相宫曰宰作武樂制文禮以奉天武王受命作宫邑於鄗制爵五等作象樂繼文以奉天周公輔成王受命作宫於洛陽成文武之制作汋樂以奉天殷湯之後稱邑示天之變反命故天子命無常唯命是徳慶故春秋應天作新王之事時王黒統正魯尚黒絀夏親周故宋樂宜親招武故以虞録親樂制宜商合伯子男為一等然則其畧説奈何曰三正以黒統初正日月朔於營室斗建寅天統氣始通化物物見萌達其色黒故朝正服黒首服藻黒案黒他本誤作首正路輿質黒馬黒大節緩幘尚黒旗黒大寶玉黒郊牲黒犧牲角卵冠於阼昏禮逆於庭喪禮殯於東階之上祭黒牲薦尚肝樂器黒質法不刑有懷在新産是月不殺聴案聴字下他本衍一法字朔廢刑發徳案發徳他本誤作法徳具存二王之後也親赤統故日分平明平明朝正正白統奈何曰正白統者歴正日月朔於虛斗建丑天統氣始蜕化物物始芽其色白故朝正服白首服藻白正路輿質白馬白大節緩幘尚白旗白大寶玉白郊牲白犧牷案牷他本作牲角繭冠於堂昏禮逆於堂喪事殯於楹柱之間祭牲白牲薦尚肺樂器白質法不刑有身懷任是月不殺聴朔廢刑發徳具存二王之後也親黒統故日分鳴晨鳴晨朝正正赤統奈何曰正赤統者大節緩幘尚赤旗赤大寶玉赤郊牲騂犧牷角栗冠於房昏禮逆於户喪禮殯於西階之上祭牲騂牡薦尚心樂器赤質法不刑有身重懷藏以養微是月不殺聴朔廢刑發徳具存二王之後也親白統故日分夜半夜半朝正改正之義奉元而起古之王者受命而王改制稱號正月服色定然後郊告天地及羣神案神他本作臣近遠祖禰然後布天下諸侯廟受以告社稷宗廟山川然後感應一其司三統之變近夷遐方無有生然者獨中國然而三代改正必以三統天下曰三統五端化四方之本也天始廢始施地必待中是故三代必居中國法天奉本執端要以統天下朝諸侯也是以朝正之義天子純綂色衣諸侯統衣纒緣紐大夫士以冠參近夷以緩遐方各衣其服而朝所以明乎天綂之義也其謂綂三正者曰正者正也綂致其氣萬物皆應而正綂正其餘皆正凡嵗之要在正月也法正之道正本而末應正内而外應動作舉錯靡不變化隨從可謂法正也故君子曰武王其以正月矣春秋曰杞伯來朝王者之後稱公杞何以稱伯春秋上黜夏下存周以春秋當行新王春秋當新王者奈何曰王者之法必正號絀王謂之帝封其後以小國使奉祀之下存二王之後以大國使服其服行其禮樂稱客其朝故同時稱帝者五稱王者三所以昭五瑞案瑞他本作端通三綂也是故人之王尚推神農為九皇而改號軒轅謂之皇帝因存帝顓頊帝嚳帝堯之帝號絀虞而號舜曰帝舜録五帝以小國下存禹之後於杞存湯之後於宋以方百里爵號公皆使服其服行其禮樂稱先王客而朝春秋作新王之事變周之制當正黒綂而殷周為王者之後絀夏改號禹謂之帝録其後以小國故曰絀夏存周以春秋當新王不以俟原註恐是侯弗同王者之後也稱子又稱伯何見殊之小國也黄帝之先諡四帝之後諡何也曰帝號必存五帝代案帝代他本作代帝首天之色號至五而反周人之王軒轅直首天黄案黄他本作皇號故曰黄帝云帝號尊而諡卑故四帝後諡也帝尊號也録以小何曰遠者尊號而地小近者號卑而地大親疎之義也故王者有不易者有再而復者有三而復者有四而復者有五而復者有九而復者明此通天地隂陽四時日月星辰山川人倫徳侔天地者稱皇帝天祐而子之號稱天子故聖王生則稱天子崩遷則存為三王絀滅則為五帝下至附庸絀為九皇下極其為民有一謂之三代故雖絶案絶他本誤作純地廟位祝牲猶列於郊號宗於代宗故曰聲名魂魄施於虛極壽無疆何謂再而復四而復春秋鄭忽何以名春秋曰伯子男一也辭無所貶何以為一曰周爵五等春秋三等春秋何三等曰王者以制一商一夏一質一文商質者主天夏文者主地春秋者主人故三等也主天法商而王其道佚陽親親而多仁樸案多仁樸他本作仁多樸故立嗣予子篤母弟妾以子貴昏冠之禮字子以父别眇夫婦對坐而食喪禮别葬祭禮先臊夫妻昭穆别位制爵三等禄士二品制郊宫明堂員其屋高嚴侈員惟祭器員玉厚九分白藻五絲衣制大上首服嚴員鸞輿尊蓋法天列象垂四鸞樂載鼓用錫儛儛案他本脱下儛字溢員先血毛而後用聲正刑多隱親多諱封禪於尚位主地法夏而王其道進隂尊尊而多義節案義節他本作節義故立嗣與孫篤世子妾不以子稱貴號昏冠之禮字子以母别眇夫婦同坐而食喪禮合葬案他本脱合葬二字衍一喪字祭禮案他本無禮字先享婦從夫為昭穆制爵五等禄士三品制郊宫明堂方其屋卑汚方祭器方玉厚八分白藻四絲衣制大案大字他本誤作天下首服卑退鸞輿卑法地周象載垂二鸞樂設鼓用纖施儛儛溢方先烹而後用聲正刑天法封壇於下位主天法質而王其道佚陽親親而多質愛故立嗣予子篤母弟妾以子貴昏冠之禮字子以父别眇夫婦對坐而食喪禮别葬祭禮案他本脱别葬祭禮四字乂誤於嘉疏下衍夫别葬祭禮五字先嘉疏夫婦昭穆别位制爵三等禄士二品制郊宫明堂内員外橢原註音妥圓長曰橢一作隨案鄭康成儀禮注隋方曰篋賈疏云狹而長也乂算家有橢圓之術凡非正方正圓通謂之橢其屋如倚靡員橢祭器橢玉原註一無此字厚七分白藻三絲衣長前袵首服員轉鸞輿尊蓋備天列象垂四鸞樂程鼓用羽籥儛儛溢橢先用玉聲而後烹原註一作享正刑多隱親多赦封壇於左位主地法文而王其道進隂尊尊而多禮文故立嗣予孫篤世子妾不以子稱貴號昏冠之禮字子以母别眇夫妻同坐而食喪禮合葬祭禮先秬鬯婦從夫為昭穆制爵五等禄士三品制郊宫明堂内方外衡其屋習而案而他本作其衡祭器衡同作秩案秩他本作佚機玉厚六分白藻三絲衣長後袵服首原註一無首字習而垂流鸞輿卑備地周象載垂二鸞樂縣鼓用萬儛儛溢衡先烹而後用樂正刑文公原註未詳衍案他本公字下複一公字封壇於左位四法修案修他本作條於所故祖於先帝故四法如四時然終而復始窮則反本四法之天施符受聖人王法則性命形乎先祖大昭乎王君故天將授舜主天法商而王祖錫姓為姚氏至舜形體大上而員首而明有二童子性長於天文純於孝慈天將授禹主地法夏而王祖錫姓為姒氏至於生發於背形體長長足肵疾行先案先字他本誤作光左隨以右勞左佚右也性長於行習地明水天將授湯主天法質而王祖錫姓為子氏謂契母呑元鳥卵生契契先發於胸性長於人倫至湯體長專小足左扁而右便勞右佚左也性長於天光質易純仁天將授文王主地法文而王祖錫姓姬氏謂后稷母姜原履天之跡而生后稷后稷長於邰土播田五榖至文王形體博長有四乳而大足性長於地文勢故帝使禹臯論姓知殷之徳陽徳也故以子為姓知周之徳隂徳也故以姬為姓故殷王改文書始以男原註一作以男書子周王以女書姬故天道各以其類動非聖人孰能明之官制象天第二十四王者制官三公九卿二十七大夫八十一元士凡百二十人而列臣備矣吾聞聖王所取儀金天之大經三起而成四轉而終官制亦然者此其儀與三人而為一選儀於三月而為一時也四選而止儀於四時而終也三公者王之所以自持也天以三成之王以三自持立成數以為植而四重之其可以無失矣備天數以參事治謹於道之意也此百二十臣者皆先王之所與直道而行也是案他本無是字故天子自參以三公三公自參以九卿九卿自參以三大夫三大夫自參以三士三人為選者四重自三之道以治天下若天之四重自三之時以終始嵗也一陽而三者案者他本作春非自三之時與而天四重之其數同矣天有四時時三月王有案有他本作者四選選三臣是故有孟有仲有季一時之情案情他本作精也有上有下有中一選之情案情他本作精也三臣而為一選四選而止人情盡矣人之材固有四選如天之時固有四變也聖人為一選君子為一選善人為一選正人為一選由此而下者不足選也四選之中各有節也是故天選四堤原註一作堪十二而人變盡矣盡人之變合之天唯聖人者能之所以立王事也何謂天之大經三起而成日三日而成規三旬而成月三月而成時三時而成功寒暑與和三而成物日月與星三而成光天地與人三而成徳由此觀之三而一成天之大經也以此為天制是故禮三讓而成一節官三人而成一選三公案三公二字他本誤作凡四為一選三卿為一選三大夫為一選三士為一選凡四選三臣應天之制凡四時之三月也是故其以三為選取諸天之經其以四為制案原本作四時為制他本作時四為制據文義時字是衍文今刪之取諸天之時其以十二臣為一條取諸嵗之度其至十條而止取之天端何謂天之端曰天有十端十端而止矣案而止矣他本作止而已天為一端地為一端隂為一端陽為一端火為一端金為一端木為一端水為一端土為一端人為一端凡十端而畢天之數也天數畢於十王者受十端於天而一條案他本複衍一條字之率案率他本作畢每條一端以十二時如天之每終一嵗以十二月也十者天之數也十二者嵗之度也用嵗之度條天之數十二而天數畢是故終案故字他本誤移在終字下十嵗而案他本而誤作百用百二十月條十端亦用百二十臣以率被案他本被作彼之皆合於天其率三臣而成一慎故八十一元士為二十七慎以持二十七大夫二十七大夫為九慎而持九卿九卿為三慎以持三公三公為一慎以持天子天子積四十慎案他本脱慎字以為四選選十慎三臣皆天數也是故以四選率之則選三十人三四十二百二十人案人字他本誤移在百二十上亦天數也以十端四選十端積四十慎慎三臣三案他本脱三字四十二百二十人亦天數也以三公之勞率之則公四十人三四十二百二十人亦天數也故散而名之為百二十臣選而賓之為十二長所以名之雖多莫若謂之四選十二長然而分别率之皆有所合無不中天數者也求天數之微莫若於人人之身有四肢每肢有三節三四十二十二節相持而形體立矣天有四時每一時有三月三四十二十二月相受而嵗數終矣官有四選每一選有三人三四十二十二臣相參而事治行矣以此見天之數人之形官之制相參相得也人之與天多此類者而案他本無而字皆微忽不可不察也天地之理分一嵗之變以為四時四時亦天之四選已是故春者少陽之選也夏者太陽之選也秋者少隂之選也冬者太隂之選也四選之中各有孟仲季是選之中有選故一嵗之中有四時一時之中有三長天之節也人生於天而體天之節故亦有大小厚薄之變案變他本作節人之氣也先王因人之氣而分其變以為四選是故三公之位聖人之選也三卿之位君子之選也三大夫之位善人之選也三士之位正直之選也分人之變以為四選選立三臣如天之分嵗之變以為四時時有三節也天以四時之選與十二節相和而成就嵗王以四位之選與十二相砥礪而致極道必極於其所至然後能得天地之美也堯舜不擅移湯武不專殺第二十五堯舜何緣而得擅移天下哉孝經之語曰事父孝故事天明事天與父同禮也今父有以重予子子不敢擅予他人人心皆然則王者亦天之子也天以天下予堯舜堯舜受命於天而王天下子猶安敢擅以所重受天案天字下他本衍一子字者予他人也天有不以予堯舜漸案漸他本誤作斬奪之故明為子道則堯舜之不私傳天下而擅移位也無所疑也儒者以湯武為至案至他本作大賢大聖也以為全道究義盡美者故列之堯舜之謂聖王如法則之今足下以湯武為不義然則足下之所謂義者何世之王也曰弗知弗知者以天下王為無義者邪其有義者而足下不知邪則答之以神農應之曰神農氏之為天子與天地俱起乎將有所伐乎神農氏有所伐可湯武有所伐獨不可何也且天之生民非為王也而天立王以為民也故其徳足以安樂民者天予之其惡足以賊害民者天奪之詩云殷士膚敏裸將于京侯服于周天命靡常言天之無常予無常奪也故封太山之上禪梁父之下易姓而王徳如堯舜者七十二人王者天之所予也其所伐皆天之所奪也今唯以湯武之伐桀紂為不義則七十二王亦有伐也唯足下之説將以七十二王為皆不義也故夏無道而殷伐之殷無道而周伐之周無道而秦伐之秦無道而漢伐之有道伐無道此天理也所從來乆矣寧能至湯武而然耶夫非湯武之伐桀紂者亦將非秦之伐周非徒不知天理又不明人禮禮子為父隱惡今使伐人者而信不義當為國諱之豈宜如誹謗者此所謂一言而再過者也君也者掌令者也令行而禁止也今桀紂令天下而不行禁天下而不止安在其能臣天下也果不能臣天下何謂湯武弑服制第二十六率得十六萬國三分之則各度爵而制服量禄而用財飲食有量衣服有制宫室有度畜産人徒有數舟車甲器有禁生則有軒冕之服位貴禄田宅之分死則有棺槨絞衾壙襲之度雖有賢才美體無其爵不敢服其服雖有富家多貲無其禄不敢用其財案財他本作才天子服有文章夫人不得以燕饗公以廟將軍大夫不得以燕卿以廟將軍大夫以朝案朝他本誤作明官吏以命士止於帶縁散民不敢服雜采百工商賈不敢服狐貉刑餘戮民不敢服絲元纁乘馬謂之服制春秋繁露卷七欽定四庫全書春秋繁露卷八漢董仲舒撰度制第二十七原註一名調均篇孔子曰不患貧而患不均故有所積重則有所空虛矣大富則驕大貧則憂憂則為盜驕則為暴此衆人之情也聖者則於衆人之情見亂之所從生故其制人道而差上下也使富者足以示貴而不至於驕貧者足以養生而不至於憂以此為度而調均之是以財不匱案原本匱作遺而上下相安故易治也今世棄其度制而各從其欲欲無所窮而俗得自恣其勢無極大人病不足於上而小民羸瘠於下則富者愈貪利而不肯為義貧者日犯禁而不可得止是世之所以難治也孔子曰君子不盡利以遺民詩云彼有遺秉此有不斂穧伊寡婦之利故君子仕則不稼田則不漁食時不力珍案珍他本作修大夫不坐羊士不坐犬詩曰采葑采菲無以下體徳音莫違及爾同死以此防民民猶忘義而爭利以亡其身天不重與有角不得有上齒故已有大者不得有小者天數也夫已有大者又兼小者天不能足案足他本誤作是之况人乎故明聖者象天所為為制度使諸有大奉禄亦皆不得兼小利與民爭利業乃天理也凡百亂之源皆出嫌疑纖微以漸寖稍長至於大聖人章其疑者别其微者絶其纖者不得嫌以蚤防之聖人之道衆隄防之類也謂之度制謂之禮節故貴賤有等衣服有别朝廷有位鄉黨有序則民有所讓而民不敢爭所以一之也書曰舉服有庸誰敢弗讓敢不敬應此之謂也凡衣裳之生也為蓋形煖身也然而染五采飾文章者非以為益肌膚血氣之情也將以貴貴尊賢而明别上下之倫使教亟行使化易成為治為之也若去其度制使人人從其欲快其意以逐無窮是大亂人倫而靡斯財用也失文采所遂生之意矣上下之倫不别其勢不能相治故苦亂也嗜欲之物無限其數不能相足故苦貧也今欲以亂為治以貧為當非反之制度不可古者天子衣文諸侯不以燕大夫以禄亦不以燕庶人衣縵此其大畧也爵國第二十八春秋曰㑹宰周公又曰公㑹齊侯宋公鄭伯許男滕子又曰初獻六羽傳曰天子三公稱公王者之後稱公其餘大國稱侯小國稱伯子男凡五等故周爵五等土案土他本作上三品文多而實少春秋三等合伯子男為一爵土二品文少而實多案土二品文少而實多他本作上二等文多而實少春秋曰荆傳曰氏不若人人不若名名不若字凡四等命曰附庸三代共之然則其地列奈何曰天子邦圻千里公侯百里伯七十里子男五十里附庸字者方三十里名者方二十里人氏者方五十里春秋曰宰周公傳曰天子三公祭伯來傳曰天子大夫宰渠伯糾傳曰下大夫石尚傳曰天子之士也王人傳曰微者謂下士也凡五等春秋曰作三軍傳曰何以書譏何譏爾古者上卿下卿上士下士凡四等小國之大夫與次國下卿同次國大夫與大國下卿同大國下大夫與天案天他本作王子下士同二十四等禄案禄字下他本有一等字八差有大功徳者受大爵土功徳小者受小爵土大材者執大官位小材者受小官位如其能宣治之至也故萬人者曰英千人者曰俊百人者曰傑十人者曰豪豪傑俊英不相陵故治天下如視諸掌上其數何法以然曰天子分左右五等三百六十三人法天一嵗之數五時色之象也通佐十上卿案他本誤移十字在上字下與下卿而二百二十人案二十他本作六十天庭之象也倍諸侯之數也諸侯之外佐四等百二十人法四時六甲之數也通佐五與下而六十人法日辰之數也佐之必三三而相復何曰時三月而成大辰三而成象諸侯之爵或五何法天地之數也五官亦然然案他本無下然字則立置有司分指數奈何曰諸侯大國四軍古之制也案他本無也字其一軍以奉公家也凡口軍三口者何曰大國十六萬口而立口軍三何以言之曰以井田准數之方里而一井一井而九百畆而立口方里八家一家百畆以食五口上農夫耕百畆食九口次八人次七人次六人次五人多寡相補率百畆而三口方里而二十四口方里者十得二百四十口方十里為方里者百得二千四百口方百里為方里者千得二萬四千口方千里為方里者萬得二十四萬口案此條計算恐多舛法三分而除其一城池郭邑屋室閭卷街路市官府園囿萎圈臺沼椽采得良田方十里者六十六十與方里六十六定率得十六萬口三分之則各五案他本脱五字萬三千三百三十口為大口軍三此公侯也天子地方千里為方百里者百亦三分除其一定得田方百里者六十六與方十里者六十六定率得千六百萬口九分之各得百七十七萬七千七百七十七口為京口軍九三京口軍以奉王家故天子立一后一世夫人中左右夫人四姬三良人立一世子三公九卿二十七大夫八十一元士二百四十三下士有七上卿二十一下卿六十三元士百二十九下士王后置一太傅太母三伯三丞二十夫人四姬三良人各有師傅世子一人太傅三傅三率三少士入仕宿衛天子者比下士下士者如上士之下數王后御衛者上下御各五人二十夫人中左右夫人四姬上下御各五人三良人各五人世子妃姬及士衛者如公侯之制王后案后他本誤作侯傅上下史案史字他本誤作吏五人三伯案伯字他本誤作百上下史各五人少伯史各五人世子太傅上下史各五人少傅亦各五人三率三下率亦案他本無亦字各五人三公上下史各五人卿上下史各五人大夫上下史各五人元士上下史各五人上下卿上下士之史上下亦各五人卿大夫元士臣各三人故公侯方百里三分除其一定得田方十里者六十六與方里六十六定率得十六萬口三分之為大國口軍三而立大國一夫人一世婦左右婦三姬二良人立一世子三卿九大夫二十七上士八十一下士亦有五通大夫立上下士上卿位比天子之元士今八百石下卿六百石上士四百石下士三百石夫人一傅母三伯三丞世婦左右婦三姬二良人各有師保世子一上傅丞士宿衛公者比公者比上卿者有三人下卿六人比上下士者如上下之數夫人御衛者上下御各五人世婦左右婦上下御各五人二卿御各五人世子上傅上下史各五人丞史各五人三卿九大夫上士史各五人下士史各五人通大夫士上下史各五人卿臣二人此公侯之制也公侯賢者為州方伯錫斧鉞置虎賁百人故伯七十里七七四十九三分除其一定得田方十里者二十八與方十里者六十六定率得十萬九千二百一十二口為次國口軍三而立次國一夫人世婦左右婦三良人二孺子立一世子三卿九大夫二十七上士八十一下士與五通大夫五上士十五下士其上卿位比大國之下卿今六百石下卿四百石上士三百石下士二百石夫人一傅母三伯三丞世婦左右婦三良人二御案御他本誤作卿人各有師保世子一下士原註一作上下傅士宿衛公者比上卿者三人下卿六人比上下士如上下案此下他本衍一士字之數夫人御衛者上下士御各五人世婦左右婦上下御各五人二御各五人世子上傅上下史各五人丞史各五人三卿九大夫上下史各五人下士史各五人通大夫上下史各五人卿臣二人故子男方五十里五五二十五為方十里者六十六定率得四萬口為小國口軍三而立小國夫人世婦左右婦三良人二孺子立一世子三卿九大夫二十七上士八十一下士與五通大夫五上士十五下士其上卿比次國之下卿今四百石下卿三百石上士二百石下士百石夫人一傅母案母他本作氏三伯三丞世婦左右婦三良人一御案一御他本誤作二卿人各有師保世子一上下傅士宿衛公者比上卿者三人下卿六人御衛者上下御各五人世婦左右婦上下御各五人二御人各五人世子上傅上下史各五人三卿九大夫上下史各五人士各五人通原註一作五大夫上下史亦各五人卿臣三人此周制也春秋合伯子男為一等故附庸字者地方三十里三三而九三分而除其一定得田方十里者六十定率得一萬四千四百口為口師三而立一宗婦二妾一世子宰丕丞案丞他本作承一士一秩士五人宰視子男下卿今三百石宗婦有師保御者三人妾各二人世子一傅士宿衛君者比上卿下卿一人上下各如其數世子傅上下史各五人下良五稱名善者地方半字君之地九半四分除其一得田方十里者三定率得七千二百口一世子宰今二百石下四半三半二十五三分除其一定得田方十里者一與方里者五十定得三千六百口一世子宰今百石史五人宗婦案他本宗婦下有一士字仕衛世子臣仁義法第二十九春秋之所治人與我也所以治人與我者仁與義也以仁安人以義正我故仁之為言人也義之為言我也言名以别矣仁之於人義之於我者不可不察也衆人不察乃反以仁自裕而以義設人詭其處而逆其理鮮不亂矣原註一作必亂是故人莫欲亂而大抵常亂凡以闇於人我之分而不省仁義之所在也是故春秋為仁義法仁之法在愛人不在愛我案愛我他本誤作我愛義之法在正我不在正人我不自正雖能正人弗予為義人不被其愛案愛他本作澤雖厚自愛不予為仁昔者晉靈公殺膳宰以淑飲食彈大夫以娯其意非不厚自愛也然而不得為淑人者不愛人也質於愛民以下至於鳥獸昆蟲莫不愛不愛奚足謂仁案不愛奚足謂仁他本作方足謂仁仁者愛人之名也酅傳案傳他本誤作得無大之之辭自謂追原註一作近則善其所䘏遠也兵已加焉乃徃救之則弗美未至豫備原註一作衛之則美之善其救害之先也夫救蚤而先之則害無由起而天下無害矣然則觀物之動而先覺其萌絶亂塞害於將然而未行之時春秋之志也其明至案至他本作智矣非堯舜之智知禮之本孰能當此故救害而先知之明也公之所恤遠而案而他本作如春秋美之詳其美恤遠之意則天地之間然後快其仁矣非三王之徳選賢之精孰能如此是以知明先而案而他本作以仁厚遠遠而愈賢近而愈不肖者愛也故王者愛及四夷霸者愛及諸侯安者愛及封内危者愛及旁側亡者愛及獨身獨身者雖立天子諸侯之位一夫之人耳無臣民原註一作人之用矣如此者莫之亡而自亡也春秋不言伐梁者而言梁亡蓋愛獨及其身者也故曰仁者愛人不在愛我此其法也義云者非謂正人謂正我雖有亂世枉上莫不欲正人奚謂義昔者楚靈王討陳蔡之賊齊桓公執袁濤塗之罪非不能正人也然而春秋弗予不得為義者我不正也闔廬能正楚案楚他本作陳蔡之難矣而春秋奪之義辭以其身不正也潞子之於諸侯無所能正春秋予之有義其身正也趨利而也原註一無此四字故曰義在正我不在正人此其法也夫我無之求諸人我有之而誹原註一作非諸人人之所不能受也其理逆矣何可謂義義者謂案謂他本誤作得宜在我者宜在我者而我可以稱義故言義者合我與宜以為一言以此操之義之案他本無之字為言我也故曰有為而得義者謂之自得有為而失義者謂之自失人好義者謂之自好人不好義者謂之不自好以此參之義我也明矣是義與仁殊仁謂徃義謂來仁大遠義大近愛在人謂之仁義在我謂之義仁主人義主我也故曰仁者人也義者我也此之謂也君子求仁義之别以紀人我之間然後辨乎内外之分而著於順逆之處也是故内治反理以正身據祉原註一作禮以勸福原註一作贍外治推恩以廣施寛制以容衆孔子謂冉子曰案他本無曰字治民者先富之而後加教語樊遲曰治身者先難後獲以此之謂治身之與治民所先後者不同焉矣詩云飲之食之教之誨之先飲食而後教誨謂治人也又曰坎坎伐輻彼君子兮不素食兮先其事後其食謂之治身也春秋刺上之過而於下之苦小惡在外弗舉在我書而誹原註一作非之凡此六者以仁治人義治我躬自厚而薄責於外此之謂也且論己見之而人不察曰君子攻其惡不攻人之惡不攻人之惡非仁之寛歟自攻其惡非義之全歟此謂之仁造人義造我何以異乎故自稱其惡謂之情稱人之惡謂之賊求諸己謂之厚求諸人謂之薄自責以備謂之明責人以備謂之惑是故以自治之節治人是居上不寛也以治人之度自治是為禮不敬也為禮不敬則傷行而民弗尊居上不寛則傷厚而民弗親弗親則弗信弗尊則弗敬二端之正佹案正佹他本作政詭於上而僻行之則誹於下仁義之處可無論乎夫目不視弗見心弗論不得雖有天下之至味弗嚼弗知其㫖也雖有聖人之至道弗論不知其義也必仁且知第三十莫近於仁莫急於知不仁而有勇力財原註一作材能則狂而操利兵也不知而辯慧獧給則迷而乘良馬也故不仁不知而有材能將以其材能以輔其邪狂之心而贊其僻違之行適足以大其非而甚其惡耳其強足以覆過其禦足以犯詐其慧足以惑愚其辯足以飾非其堅足以㫁辟其嚴足以拒諌此非無材能也其施之不當而處之不義也有否心者不可藉便埶案埶他本作執其質愚者不與利器論之所謂不知人也者恐不知别此等也仁而不知則愛而不别也知而不仁則知而不為也故仁者所以愛人類也智者所以除其害也何謂仁仁者㦧案㦧他本作惻怛愛人謹翕不爭好惡敦倫無傷惡之心無隱忌之志無嫉妒之氣無感愁之欲無險詖之事無辟違之行故其心舒原註一作倫其志平其氣和其欲節其事易其行道故能平易和理而無爭也如此者謂之仁何謂之知先言而後當凡人欲舍行為皆以其知先規而後為之其規是者其所為得其所事當其行遂其名榮其身故利而無患福及子孫徳加萬民湯武是也其規非者其所為不得其事其事案他本無下其事二字不當其行不遂其名辱害及其身絶世無復殘類滅宗亡國是也故曰莫急於知知者見禍福遠其知利害蚤物動而知其化事興而知其歸見始而知其終言之而無敢譁立之而不可廢取之而不可舍前後不相悖終始有類思之而有復及之而不可厭其言寡而足約而喻簡而達省而具少而不可益多而不可損其動中倫原註一作禮其言當務如是者謂之知其大畧之類天地之物有不常之變者謂之異小者謂之災災常先至而異乃隨之災者天之譴也異者天之威也譴之而不知乃畏之以威詩云畏天之威殆此謂也凡災異之本盡生於國家之失國家之失案他本脱下國家之失四字乃始萌芽而天出災害以譴告之譴告之而不知變乃見怪異以驚駭之驚駭之尚不知畏恐其殃咎乃至以此見天意之仁而不欲陷案陷他本他害人也謹按災異以見天意天意有欲也有不欲也所欲所不欲者人内以自省宜有懲於心外以觀其事宜有驗於國故見天意者之於災異也畏之而不惡也以為天欲振吾過救吾失故以此救我也春秋之法上變古易常應是而有天災者謂幸國孔子曰天之所幸有為不善而屢極且莊王曰天不見災地不見孽則禱之於山川曰天其將亡予耶不説吾過極吾罪也以此觀之天災之應過而至也異之顯明可畏案畏他本誤作謂也此乃天之所欲救也春秋之所獨幸也莊王所以禱而請也聖主賢君尚樂受忠臣之諫而况受天譴也春秋繁露卷八欽定四庫全書春秋繁露卷九漢董仲舒撰身之養重於義第三十一天之生人也使之案他本之作人生義與利利以養其體義以養其心心不得義不能樂體不得利不能安義者心之養也利者體之養也體莫貴於心故養莫重於義義之養生人大於利案他本下有矣字奚案他本奚作何以知之今人大有義而甚無利雖貧與賤尚容其行以自好而樂生原憲曽閔之屬是也人甚有利而大無義雖甚富則羞辱大惡惡深禍患重非立死其罪者即旋傷殃憂爾莫能以樂生而終其身案他本脱身字刑戮折夭之民是也夫人原註一作民有義者雖貧能案他本能字在雖字上自樂也而大無案他本無字在大字上義者雖富莫能自存吾以此實義之養生人大於利而案他本而誤作中厚於財也民不能知而常反之皆忘義而殉利去理而走邪以賊其身而禍其家此非其自為計不忠也則其知之所不能明也今握棗與錯金以示嬰兒必取棗而不取金也握一斤金與千萬之案他本無之字珠以示野人野人必取金而不取珠也故物之於人小者易知也其於大者難見也今利之於人小而義之於人大者無怪民之皆趨利而不趨義也固其所闇也聖人事明義以照燿其所闇故民不陷詩云示我顯徳行此之謂也先王顯徳以示民民樂而歌之以為詩説而化之以為俗故不令而自行不禁而自止從上之意不待使之若自然矣故曰聖人天地動四時化者非有他也其見義大故能動動故能化化故能大行化大行故法不犯法不犯故刑不用刑案他本下衍一有字不用則堯舜之功徳此大治之道也先聖傳授而復也故孔子曰誰能出不由户何莫由斯道也今不示顯徳行民闇於義不能照迷於道不能解因欲大嚴㦧以必正之直殘賊案他本賊誤作賤天民而薄主徳耳其勢不行仲尼曰國有道雖加刑無刑也案他本也字在無字上國無道雖殺之不可勝也其所謂有道無道者示之以顯徳行與不示爾對膠西王越大夫不得為仁第三十二命令相曰大夫蠡大夫種大夫庸大夫睪原註音澤大夫車成越王與此五大夫謀伐呉遂滅之雪㑹稽之恥卒為霸主范蠡去之種死之寡人以此案他本以此誤作此以二大夫者為皆賢孔子曰殷有三仁今以案他本以作有越王之賢與蠡種之能此三人者寡人亦以為越有三仁其於君何如桓公決疑於管仲寡人決疑於君仲舒伏地再拜對曰仲舒知褊而學淺不足以決之雖然主有問於臣臣不敢不悉以對禮也臣仲舒聞昔者魯君問於栁下惠曰我欲攻齊何如栁下惠對曰不可退而有憂色曰吾聞之也謀伐國者不問於仁人也此何為至於我但見問而尚羞之而况乃與為詐案他本為詐作詐偽以伐呉乎其不宜明矣以此觀之越本無一仁而安得三仁仁人者正其道不謀其利修其理不急其功致無為而習俗大化可謂仁聖矣三王是也春秋之義貴信而賤詐詐人而勝之雖有功君子弗為也是以仲尼之門五尺之童子言羞稱五伯為其詐以成功苟為而已也故不足稱於大君子之門五伯者比於他諸侯為賢者比於仁案他本仁作聖賢何賢之有譬猶珷玞比於美玉也臣仲舒伏地再拜以聞觀徳第三十三天地者萬物之本先祖之所出也廣大無極其徳炤明歴年衆多永永無疆天出至明原註一作炤衆之案他本之作知類也其伏無不炤也地出至晦星日為明不敢闇君臣父子夫婦之道取之此大禮之終也臣子三年案他本年誤作子不敢當雖當之必稱先君必稱先人不敢貪至尊也百禮之貴皆編於案他本於作之月月編於時時編於君君編於天天之所棄天子弗祐桀紂是也天子之所誅絶臣子弗得立蔡世子逢丑父是也王父父案他本無下父字所絶子孫不得屬魯莊公之原闕不得念母衛輒之辭父命是也故受命而海内順之猶衆星之共北辰流水之宗滄海也况生天地之間法太祖先人之容貌則其至徳取象衆名尊貴案他本貴作賢是以聖人為貴也泰伯至徳之侔天地也上帝為之廢適案他本適誤作週易姓而子之讓其至徳海内懷歸之泰伯三讓而不敢就位伯邑考之羣心貳自引而激順神明也至徳以受命豪英高明之人輻輳歸之高者列為公侯下至卿大夫濟濟乎哉皆以徳序是故案他本無故字呉魯同姓也鍾離之㑹不得序而稱君殊魯而㑹之為其夷狄之行也雞父之戰呉不得與中國為禮至於伯莒黄池之行變而反道乃爵而不殊召陵之㑹魯君在是而不得為主避齊桓也魯桓即位十三年齊宋衛燕舉師而東紀鄭與魯勠力而報之後其已以魯不得徧避紀侯與鄭厲公也春秋常辭夷狄不得與中國為禮至邲之戰夷狄反背中國不得與夷狄為禮避楚莊也案他本避字在禮字上邢衛魯之同姓也狄人滅之春秋不為案他本為作得諱避齊桓也當其如此也唯徳是親其皆先其親是故周之子孫其親等也而文王最先四時等也而春最先十二月等也而正月最先徳等也則先親親魯十二公等而定哀最尊衛俱諸夏也善稻案善稻本公羊傳他本從左傳作善道之㑹獨先内之為其與我同姓也呉俱夷狄也柤之㑹獨先内之為其與我同姓也滅國十五有餘獨先諸夏曹晉俱諸夏也譏二名獨先及之盛伯郜子俱當絶而獨不名為其與我同姓兄弟也外出者衆以母弟出獨大惡之為其亡母背骨肉也滅人者莫案他本莫作不絶衛侯燬滅同姓獨絶賤其本祖而忘先也親等從近者始立適以長母以子貴先原註或有母字甲戌己丑陳侯鮑卒書所見也而不言其闇者隕石于宋五六鷁退飛耳聞而案他本而作其記目見而書或徐或察案他本察誤作蔡皆以其先接於我者序之其於㑹朝聘之禮亦猶是諸侯與盟者衆矣而儀父獨漸進鄭僖公方來㑹我而道殺春秋致其意謂之如㑹潞子離狄而歸黨以得上春秋謂之子以領其意苞來首戴黄池踐土與操之㑹陳鄭案他本脱鄭字去我謂之逃歸鄭處案他本處作去而不來謂之乞盟陳侯後案他本後誤作俊至謂之如㑹莒人疑我貶而稱人諸侯朝案他本脱朝字魯者衆矣而滕薛獨稱侯州公化我奪爵而無號呉楚國先聘我者見賢曲􅁄與鞌之戰先憂我者見賢案他本賢作尊奉本第三十四禮者繼天地體隂陽而慎至容序尊卑貴賤大小之位而差外内遠近新故案他本故作舊之級者也以徳多為象萬物以廣博衆多歴年乆者為象其在天而象天者莫大日月繼天地之光明莫不照也星莫大於太辰北斗常星北斗常星案他本脱下北斗常星四字部星三百衛星三千大火二十六星伐十三案他本三作六星北斗七星常星九辭二十八宿多者宿二十八九其猶蓍百莖而共一本龜千嵗而人寶是以三代傳决疑焉其得地體者莫如山阜人之得天案他本天誤作失得衆者莫如受命之天子下至公侯伯子男海内之心懸於天子疆内之民統於諸侯日月食並吉凶不以其行有星茀于東方泰辰北斗入常星不見地震梁山沙鹿崩宋衛陳鄭災王公大夫篡弑案他本下有者字春秋皆書以為大異不言衆星之茀入霣雨原隰之襲崩一國之小民死亡不決疑於衆草木也唯田邑之稱多者主名君將不言臣臣不言師王夷君獲不言師敗孔子曰唯天為大唯堯則之則之者大也巍巍乎其有成功也言其尊大以成功也齊桓晉文不尊周室不能霸三代聖人不則天地不能至王自原註一作階此而觀之可以知天地之貴案他本貴誤作責矣夫流深者其水不測尊至者其敬無窮是故天之所加雖為災害猶承而大之其欽無窮震夷伯之廟是也天無錯舛之災地有震動之異天子所誅絶所敗師雖不中道而春秋者不敢闕謹之也故師出者衆矣莫言還至師及齊師圍郕郕降于齊師獨言還其君刦外不得已故可直言也至於他師皆其君之適也而曰非師之罪是臣下案他本下誤作莫之不為君父受罪罪不臣子莫大焉夫至明者其照無疆至晦者其闇無疆今春秋緣魯以言王義殺隱桓以為遠祖宗定哀以為考妣至尊且案他本且作尚高至顯且明其基壤之所加潤澤之所被條條無疆前是常數十年鄰之幽人近其墓而高明大國齊宋離不原註一無不字言㑹微國之君卒葬之禮録而辭繁遠夷之君内而不外當此之時魯無鄙疆請案他本無請字諸侯之伐哀者皆言我邾婁庶其鼻我邾婁大夫其於我無以親以近之故乃得顯明隱桓親春秋之先人也益師卒而不日于稷之㑹不日言其亂以通外也黄池之㑹以兩伯之辭言不以為外以近内也春秋襄公二十一年邾庶其以漆閭邱來奔左氏曰庶其非卿也公羊曰邾庶其者何邾婁大夫也二十三年邾卑我來奔杜注卑我是庶其之黨同有竊邑叛君之罪公羊作鼻我邾婁大夫也榖梁作畀我本案以上七十九字據文義乃舊時繁露注原本他俱誤作正文今校正春秋繁露卷九欽定四庫全書春秋繁露卷十漢董仲舒撰深察名號第三十五治天下之端在審辨大辨大之端在深察名號名者大理之首章也録其首章之意以窺其中之事則是非可知案他本知誤作之逆順自著其㡬通於天地矣是非之正取之逆順逆順之正取之名號名號之正取之天地天地為名號之大義也古之聖人謞原註火角切而效天地謂之號鳴而命施謂之名名之為言鳴與命也號之為言謞而效也謞而效天地者為號鳴而命者為名名號異聲而同本皆鳴號而達天意者也天不言使人發其意弗為使人行其中名則聖人所發天意不可不深觀也受命之君天意之所予也故號為天子者宜視天如父事天以孝道也號為諸侯者宜謹視所俟案他本俟作候奉之天子也案他本也作者號為大夫者宜厚其忠信敦其禮義使善大案他本大誤作天於匹夫之義足以化也士者事也民者瞑也士不及化可使守事從上而已案他本下衍一丑字五號自讚各有分分中委曲曲有名名衆於號號其大全名也者名其别離分散也號凡而畧名詳而目目者徧辨其事也凡者獨舉其大案他本無大字事也享鬼神者案他本無者字號一曰祭祭之散名春曰祠夏曰礿秋曰嘗冬曰烝獵禽獸者號一曰田田之散名春苗秋蒐冬狩夏獮無有不皆中天意者物莫不有凡號號莫不有散名如是是故案他本無故字事各順於名名各順於天天人之際合而為一同而通理動而相益順而相受謂之徳道詩曰維號斯言有倫有脊此之謂也深察王號之人意其中有五科皇科方科厈科黄科徃科合此五科以一言謂之王王者皇也王者方也王者厈也王者黄也王者徃也是故王意不普大皇則道不能正直而方道不能正直而方則徳不能厈運周徧徳不厈運周徧則美不能黄美不能黄則四方不能徃四方不能徃則案他本下有可字不全於王故曰天覆無外地載兼愛風行令而一其威雨布施而均其徳王術之謂也深察君號之大意其中亦有五科元科原科權科温科羣科合此五科以一言謂之君君者元也君者原也案他本脱君者原也四字君者權也君者温也君者羣也是故君意不比於元則動而失本動而失本則所為不立所為不立則不效於原不效於原則自委舍自委舍則化不行用權於變則失中適之宜失中適之宜則道不平徳不温道不平徳不温則衆不親安衆不親安則離散不羣離散不羣則不全於君名生於真非其真弗以為名名者聖人之所以真物也名之為言真也故凡百譏有黮黮者各反其真則黮黮者還昭昭耳欲審曲直莫如引繩欲審是非莫如引名名之審於是非也猶繩之審於曲直也詰其名實觀其離合則是非之情不可以相讕原註力但切誣言相加已今世闇於性言之者不同胡不試反性之名性之名非生與如其生之自然之資謂之性性者質也詰性之質於善之名能中之與既不能中矣而尚謂之質善何哉性之名不得離質離質如毛則非性已不可不察也春秋辨物之理以正其名名物如其真不失秋毫之末故名霣石則後其五言退鷁則先其六聖人之謹於正名如此君子於其言無所苟而已五石六鷁之辭是也栣原註栣疑袵知甚切榒也衆惡於内弗使得發於外者心也故心之為名栣也人之受氣苟無惡者心何栣哉吾以心之名得人之誠人之誠有貪有仁仁貪之氣兩在於身身之名取諸天天兩有隂陽之施身亦兩有貪仁之性天有隂陽禁身有情欲栣與天道一也是故隂之行不得千春夏而月之魄常厭於日光乍全乍傷天之禁隂如此安得不損其欲而輟其情以應天天所禁而身禁之故曰身猶天也禁天所禁非禁案他本無禁字天也必知天性不乘於教終不能栣察實以為名無教之時性禁天所禁非天也原註一本無上天字何據若是故性比於禾善比於米米出禾中而禾未可全為米案他本米誤作美也善出性中而性未可全為善也善與米人之所繼天而成於外非在天案他本在天誤作天在所為之内也天之所為有所至而止止之内謂之天性案他本之天性誤作天之性止之外謂之人事事在性外而性不得不成徳民之號取之瞑也使性而已善則何故以瞑為號以霣者言案他本言字在者字上弗扶將則案他本無則字顛陷猖狂安能善性有似目目臥幽而瞑待覺而後見當其未覺可謂有見質而不可謂見今萬民之案他本誤以下文言無驗之説至故謹於正名名非四百六字移在此處性有其質而未能覺譬如瞑者待覺教之然後善當其未覺可謂有質而不可謂善與目之瞑而覺一槩之比也靜心徐察之其言可見矣性如案他本如作而瞑之未覺天所為也效天所為為之起號故謂之民民之為言固猶案他本猶誤作有瞑也隨其名號以入其理則得之矣案他本矣作也是正名號者於天地天地之所生謂之性情性情相與為一瞑情亦性也謂性已善奈其情何故聖人莫謂性善累其名也身之有性情也若天之有隂陽也言人之質而無其情猶言天之陽而無其隂也窮論者無時受也名性不以上不以下以其中民案他本民誤作名之性如繭如卵卵待覆而為雛繭待繰而為絲性待教而為善此之謂真天天生民性有善質而未能善於是為之立王以善之此天意也民受未能善之性於天而退受成性之教於王王承天意以成民之案他本下有善字性為任者案他本無者字也今案其真質而謂民性己善者是失天意而去王任也萬民之性苟性己善則王者受命尚何案他本何誤作可任矣案他本矣作也其設民不正故棄重任而違大命非法案他本法誤作吾言也春秋之辭内事之待外者從外言之今萬民之性待外教然後能善善當與教不當與性與性則多累而不精自成功而無賢聖此世長者案他本者作古之所誤出也非春秋為辭之術也不法之案他本此下誤接未行所始如之何十一字言無騐之説君子之所外何以為哉或曰性有善端心有善質尚安非善應之曰非也繭有絲而繭非絲也卵有雛而卵非雛也比類率然有何疑焉天生民有六經言性者不當異然其或曰性也善或曰性未善則所謂善者各異意也性有善端動之愛父母善於禽獸則謂之善此孟子之言循三綱五紀通八端之理忠信而博愛敦厚而好禮乃可謂善此聖人之善也是故孔子曰善人吾不得而見之得見有恒者斯可矣由是觀之聖人之所謂善案他本下有亦字未易當也非善於禽獸則謂之善也使動其端善於禽獸則可謂之善善奚為弗見也夫善於禽獸之未得為善也猶知於案他本知於作之有草木而不得名知萬民之性善於禽獸而不得名善知之案他本知之作之知名乃取之聖聖人之所命天下以為正正朝夕者視北辰正嫌疑者視聖人聖人以為無王之世不教之名民莫能當善善之難當如此而謂萬民之性皆能當之過矣質於禽獸之性則萬民之性善矣質於人道之善則民性弗及也萬民之性善於禽獸者許之聖人之所案他本下有謂字善者勿許吾質之命性者異孟子孟子下質於禽獸之所為故曰性己善吾上質於聖人之所善故謂性未善善過性聖人過善春秋大元故謹於正名名非所始如之何謂未善已善也實性第三十六孔子曰名不正則言不順今謂性案他本性誤作善己善不幾於無教而如其自然又不順於為政之道矣且名者性之實實者性之質也案他本也誤作之無教之時何處能善善如米性如禾禾雖出米而禾未可謂米也性雖出善而性未可謂善也米與善人之繼天而成於外也非在天所為之内也天所為有所至而止止之内謂之天止之外謂之王教王教在性外而性不得不遂故曰性有善資案他本資作質而未能為善也豈敢美辭其實然也天之所為止於繭麻與禾以麻為布以繭為絲以米為飯以性為善此皆聖人所繼天而進也非情性質樸之能至也故不可謂性正朝夕者視北辰正嫌疑者視聖人聖人之所名天下以為正今按聖人言中本無性善名而有善人吾不得見之矣使萬民之性皆已案他本已作以能善善人者何為不見也觀孔子言此之意以為善難當甚而孟子以為萬民性皆能當之過矣聖人之性不可以名性斗筲之性又不可以名性名性者中民之性中民之性如繭如卵卵待覆二十日而後能為雛繭待繰以綰湯而後能為絲性待漸於教訓而後能為善善教訓案他本訓作誨之所然也非質樸之所至能也故不謂性性者宜知名矣無所待而起生而所自有也善所自有則教訓已非性也是以米出於粟而粟不可謂米玉出於璞而璞不可謂玉善出於性而性不可謂善其比多在物者為然在性者以為不然何不通於類也卵之性未能作雛也繭之性未能作絲也麻之性未能為縷也粟之性未能為米也春秋别物之理以正其名名物必各因其真真案他本脱下真字其義也真其情也乃以為名名霣石則後其五退飛則先其六此皆其真也聖人於言無所苟而已矣性者天質之樸也善者王教之化也無其質則王教不能化無其王教則質樸不能善質而不以善性其名不正故不受也諸侯第三十七生育養長成而案他本脱而字更生終而復始其事所以利活民者案他本下有而字無已天雖不言其欲贍足之意可見也古案他本古誤作士之聖人見天意之厚於人也故南面而君天下必以兼利之為其遠者目不能見其隱者耳不能聞於是千里之外割地分民而建國案他本國誤作間立君使為天子視所不見聴所不聞朝者召而問之也諸侯之為言猶諸侯也五行對第三十八河間獻王問温城董君曰孝經曰夫孝天之經地之義何謂也對曰天有五行木火土金水是也木生火火生土土生金金生水水為冬金為秋土為季夏火為夏木為春春主生夏主長季夏主養秋主収冬主藏藏冬之所成也是故父之所生其子長之父之所長其子養之父之所養其子成之諸父所為其子皆奉承而續行之不敢不致如父之意盡為人之道也故五行者五行也由此觀之父授案他本下有之字子受之乃天之道也故曰夫孝者天之經也此之謂也王曰善哉天經既聞得之矣願聞地之義對曰地出雲為雨起氣為風風雨者地之所為案他本所為誤作為為地不敢有其功名必上之於天命若從天氣者故曰天風天雨也其曰地風地雨也勤勞在地名一歸於天非至有義其孰能行此故下事上如地事天也可謂大忠矣土者火之子也五行莫貴於土土之於四時無所命者不與火分功名木名春火名夏金名秋水名冬忠臣之義孝子之行取之土上者五行最貴者也其義不可以加矣五聲案他本聲作音莫貴於宫五味莫美於甘五色莫貴於黄此謂孝者地之義也王曰善哉衣服容貌者所以説目也聲言應對者所以説耳也好惡去就者所以説心也故君子衣服中而容貌恭則目説矣言理應對遜則耳説矣好仁厚而惡淺薄就善人而遠僻鄙則心説矣故曰行意可樂容止可觀此之謂也闕文第三十九闕文第四十春秋繁露卷十欽定四庫全書春秋繁露卷十一漢董仲舒撰為人者天第四十一為生不能為人為人者天也人之人本於天天亦人之曽祖父也此人之所以乃上類天也人之形體化天數而成人之血氣化天志而仁案他本仁作行人之徳行化天理而義人之好惡化天之暖清人之喜怒化天之寒暑人之受命化天之四時人生有喜怒哀樂之答春秋冬夏之類也喜春之答也怒秋之答也樂夏之答也哀冬之答也天之副在乎人人之情性有由天者矣故曰受由天之號也為人主也道莫明省身之天如天案他本無天字出之也使其出也答天之出四時而必忠其受案他本受作愛也則堯舜之治無以加是可生可殺而不可使為亂故曰非道不行非法不言此之謂也傳曰惟天子受命於天天下受命於天子一國則受命於君君命順則民有順命君命逆則民有逆命故曰一人有慶萬民賴之此之謂也傳曰政有三端父子不親則致其愛慈大臣不和則敬順其禮百姓不安則力其孝弟孝弟者所以安百姓也力者勉行之身以化之天地之數不能獨以寒暑成嵗必有春夏秋冬聖人之道不能獨以威勢成政必有教化故曰先之以博愛教案他本下有之字以仁也難得者君子不貴教以義也雖天子必有尊也教以孝也必有先也教以弟也此威勢之案他本無之字不足獨恃而教化之功不大乎傳曰天生之地載之聖人教之君者民之心也民者君之體也心之所好體必安之君之所好案他本好作命民必從之故君民者貴孝弟而好禮義重仁亷而輕財利躬親職此於上而萬民聴生善於下矣故曰先王見教之可以化民也此之謂也五行之義第四十二天有五行一曰木二曰火三曰土四曰金五曰水木五行之始也水五行之終也土五行之中也此其天次之序也木生火火生土土生金金生水水生木此其父子也木居左金居右火居前水居後土居中央此其父子之序相受而布是故木受水而火受木土受火而案他本無而字金受土水受金也諸授之者皆其父也受之者皆其子也常因其父以使其子天之道也是故木已生而火養之金已死而水藏之火樂木而養以陽水克金而喪以隂土之事天竭其忠故五行者乃孝子忠臣之行也五行之為言案他本下有也字猶五行歟是故以得辭也聖人知之故多其愛而少嚴厚養生而謹送終就天之制也以子而迎成養如火之樂木也喪父如水之尅金也事君若土之敬天也可謂有行人矣五行之隨各如其序五行之官各致其能是故木居東方而主春氣火居南方而主夏氣金居西方而主秋氣水居北方而主冬氣是故木主生而金主殺火主暑而水主寒使人必以其序官人必以其能天之數也土居中央為之天潤土者天之股肱也其徳茂美不可名以一時之事故五行而四時者土兼之也金木水火雖各職不因土方不立若酸醎辛苦之不因甘肥不能成味也甘者五味之本也土者五行之主也五行之主土氣也猶五味之有甘肥也不得不成是故聖人之行莫貴於忠土徳之謂也人官之大者不名所職相其是矣天官之大者不名所生土是矣陽尊隂卑第四十三天之大數畢於十旬旬天地之間十而畢舉旬生長之功十而畢成十者天數之案他本數之作之數所止也古之聖人因天數之所止以為數紀十如更始民世世傳之而不知省其所起知省其所起則見天數之所始見天數之所始則知貴賤逆順所在知貴賤逆順所在則知天地之情著聖人之寶出矣是故陽氣以正月始出於地生育養長於上至其功必成也案他本也作矣而積十月人亦十月而生合於天數也是故十月而成人亦十月而成合於天道也故陽氣出於東北入於西北發於孟春畢於孟冬而物莫不應是陽始出物亦始出陽方盛物亦方盛陽初衰物亦初衰物隨陽而出入數隨陽而終始三王之正隨陽而更起以此見之貴陽而賤隂也故數日者據晝而不據夜數嵗者據陽而不據隂不得達之義是故春秋之於昏禮也達未宋公而不達宋公不宜稱而達達陽而不達隂以天道制之也丈夫案他本夫誤作人雖賤皆為陽婦人雖貴皆為隂隂之中亦相為隂陽之中亦相為陽諸在上者皆為其下陽諸在下者各為其上隂隂猶沈也何名何有皆并一於陽昌力而辭功故出雲起雨必令從之下命之曰天雨不敢有其所出上善而下惡惡者受之善者不受夫喜怒哀樂之發與清煖寒暑其實一類案他本類作貫也喜氣為煖而當春怒氣為清而當秋樂氣為太陽而當夏哀氣為太隂案他本隂誤作陽而當冬四氣者天與人所同有也非人所能案他本能作當畜也故可節而不可止也節之而順止之而亂人生於案他本於作而天而取化於天喜氣取諸春樂氣取諸夏怒氣取諸秋哀氣取諸冬四氣之心也四肢之答案他本無答字各有處如四時寒暑不可移若肢體肢體移易其處謂之壬人寒暑移易其處謂之敗嵗喜怒移易其處謂之亂世明王正喜以當春正怒以當秋正樂以當夏正哀以當冬上下法此以取天之道春氣愛秋氣嚴夏氣樂冬氣哀愛氣以生物嚴氣以成功樂氣以養生哀氣以喪終天之志也是故春氣暖者天之所以愛而生之秋氣清者天之所以嚴而成之夏氣温者天之所以樂而養之冬氣寒者天之所以哀而藏之春主生夏主養冬主藏秋主収生溉其樂以養死溉其哀以藏為人子者也故四時之比父子之道天地之志君臣之義也隂陽理人之法也隂刑氣也陽徳氣也隂始於秋陽始於春春之為言猶偆偆也秋之為言猶湫湫也偆偆者喜樂之貌也湫湫者憂悲之状也是故春喜夏樂秋憂冬悲悲死而樂生以夏養春以冬喪秋大人之志也是故先愛而後嚴樂生而哀終天之當也而人資諸天大徳而小刑也是故人主近天之所近遠天之所遠大天之所大小天之所小是故天數右陽而不右隂務徳而不務刑刑之不可任以成世也猶隂不可任以成嵗也為政而任刑謂之逆天非王道也王道通三第四十四古之造文者三畫而連其中謂之王三畫者天地與人也而連其中者通其道也取天地與人之中以為貫而參通之非王者孰能當是故王者唯天之施施其時而成之法其命而案他本而作如循之諸人法其數而以起事治其道而以出法治其志而歸之於仁仁之美者在於天夫案他本夫作大仁也天覆育萬物既化而生之有養而成之事功無己終而復始凡舉歸之以奉人察於天之意無窮極之仁也人之受命於天也取仁於天而仁也是故人之受命天之尊父兄子弟之親有忠信慈惠之心有禮義亷讓之行有案他本有作者是非逆順之治文理燦然而厚知案他本知作之廣大有而博惟人道為可以參天天常以愛利為意案他本意作義以養長案他本無長字為事春秋冬夏皆其用也王者亦常以愛利天下為意以安樂世為事好惡喜怒而備用也然而主好惡喜怒乃天下案他本無下字之春夏秋冬也其俱煖清寒暑而以變化成功也天出此物者時則嵗美不時則嵗惡人主出此四者義則世治不義則世亂是故治世與義嵗同數亂世與惡嵗同數以此見人理之副天道也天有寒有暑土若地義之至案他本至作主也是故春秋君不名惡臣不名善善皆歸於君惡皆歸於臣臣之義比於地故為人臣下案他本無下字者視地之事天也為人子者視土之事火也雖案他本雖誤作難居中央亦嵗七案他本七作亡十二日之王傳於火以調和養長然而弗名者皆并功於火火得以盛不敢與父分功案他本無功字美孝之至也是故孝子之行忠臣之義皆法於地也地事天也猶下之事上也地天之合也物無合㑹之義是故推天地案他本無地字之精運隂陽之類以别順逆之理安所加以不在上下在大小在强弱在賢不肖在善惡惡之屬盡為隂善之屬盡為陽陽為徳隂為刑刑反徳而順於徳亦權之類也雖曰權皆在案他本皆在作在皆權成是故陽行於順隂行於逆逆行而順順行而逆者隂也是故天以隂為權以陽為經陽出而南隂出而北經用於盛權用於末以此見天之顯經隱權前徳而後刑也故曰陽天之徳隂天之刑也陽氣煖而隂氣寒陽氣予而隂氣奪陽氣仁而隂氣戾陽氣寛而隂氣急陽氣愛而隂氣惡陽氣生而隂氣殺是故陽常居實位而行於盛隂常居空虛而行於末天之好仁而近惡戾之變而遠大徳而小刑之意也先經而後權貴陽而賤隂也故隂夏入居下不得任嵗事冬出居上置之空處也養長之時伏於下遠去之弗使得為陽也無事之時起之空處使案他本使誤作備之備次陳守閉塞也此見天之近陽而遠隂天固有此然而無所之如其身而已矣人主立於生殺之位與天共持變化之勢物莫不應天化天地之化如四時所好之風出則為煖氣而有生於俗所惡之風出則為清氣而有殺於俗喜則為案他本為作有暑氣而有養長也怒則為寒氣而有閉塞也人主以好惡喜怒變習俗案他本習俗作俗習而天以煖清寒暑化草木喜樂時而當則嵗美不時而妄則嵗惡天地人主一也然則人主之好惡喜怒乃天之煖清寒暑也不可不審其處而出也當暑而寒當寒而暑必為惡嵗矣案他本矣作也人主當喜而怒當怒而喜必為亂世矣是故人主之大守在於謹藏而禁内使好惡喜怒必當義乃出若煖清寒暑之必當其時乃發也人主掌此而無失案他本下冇而字使乃好惡喜怒未嘗差也如春秋冬夏之未嘗過也可謂參天矣深藏此四者而勿使妄發可謂天矣天容第四十五天之道有序而時有度而節變而有常及而有相奉微而至遠踔而至精一而少積蓄廣而實虛而盈聖人視天而行是故其禁而審好惡喜怒之處也欲合諸天之案他本無之字非其時不出煖清寒暑也其告之以政令而化風之清微也欲合諸天之顛倒其一而以成嵗也其羞淺末案他本淺末誤作滿末華虛而貴敦厚忠信也欲合諸天之黙然不言而功徳積成也其不阿黨偏私而美汎愛兼利也欲合諸天之所以成物者少霜而多露也其内自省以是而外顯不可以不時人主有喜怒不可以不時可亦為時時亦為義喜怒以類合其理一也故義不義者時之合類也而喜怒乃寒暑之别氣也天辨在人第四十六難者曰隂陽之㑹一嵗再遇於南方者以中夏遇於北方者以中冬冬喪物之氣也則其㑹於是何如金木水火各奉其所主以從隂陽相與一力而并功其實非獨隂陽也然而隂陽因之以起助其所主故少陽因木而起助春之生也太陽因火而起助夏之養也少隂因金而起助秋之成也太隂因水而起助冬之藏也隂雖與水并氣而合冬其實不同故水獨有喪而隂不與焉是以陽隂㑹于中冬者非其案他本其作者喪也春愛志也夏樂志也秋嚴志也冬哀志也故愛而有嚴樂而有哀四時之則也喜怒之禍哀樂之義不獨在人亦在於天而春夏之陽秋冬之隂不獨在天亦在於人人無春氣何以博愛而容衆人無秋氣何以立嚴而成功人無夏氣何以盛養而樂生人無冬氣何以哀死而恤喪天無喜氣亦何以暖而春生育天無怒氣亦何以清而秋殺就天無樂氣亦何以竦案他本竦作疏陽而夏養長天無哀氣亦何以激隂而冬閉藏故曰天乃有喜怒哀樂之行人亦有春秋冬夏之氣者合類之謂也匹夫雖賤而可以見徳刑之用矣是故隂陽之行終各六月遠近同度而所在異處隂之行春居東方秋居西方夏居空右冬至空左夏居空下冬居空上此隂之常處也陽之行春居上冬居下此陽之常處也隂終嵗四移而陽常居實非親陽而疎隂任徳而遠刑與天之志常直隂空處稍取之以為助故刑者徳之奉案他本奉作輔隂者陽之助也陽者嵗之主也天下之昆蟲隨陽而出入天下之草木隨陽而生落天下之三王隨陽而改正天下之尊卑隨陽而序位幼者居陽之所少老者居陽之所老貴者居陽之所盛賤者當陽之所衰藏者言其不得當陽而當陽者臣子也陽者君父是也故人主南面以陽為位也陽貴而隂賤天之刑也禮之尚右非尚隂也敬老陽而尊成功也隂陽位第四十七陽氣始出東北而南行就其位也西轉而北入藏其休也隂氣始東南而案他本無而字北行亦就其位也西轉而南入屏其服也是故陽以南方為位以北方為休隂以北方為位以南方為休陽至其位而大暑熱隂至其位而大寒凍陽至其休而入化於地隂至其伏而避徳於下是故夏出長於上冬入化於下者陽也夏入守虚地於下冬出守虚位於上者隂也陽出實入實隂出空入空天之任陽不任隂好徳不好刑如是也故隂陽終嵗各一出春秋繁露卷十一欽定四庫全書春秋繁露卷十二漢董仲舒撰隂陽終始第四十八天之道終而復始故北方者天之所終始也隂陽之所合别案他本合别作别合也冬至之後隂俛而西入陽仰而東出出入之處常相反也多少調和之適常相順也有多而無溢有少而無絶春夏陽多而隂少秋冬陽少而隂多多少無常未嘗不分而相散也以出入相損益以多少相溉濟也多勝少者倍案他本倍誤作借入入者損一案他本一誤作益而出者益二天所起一案益二以下六字他本闕動而再倍常乘反衡再登之勢以就同類與案以就以下五字他本闕之相報故其氣相俠而以變化相輸也春秋之中案輸也以下六字他本闕隂陽之氣俱相併也中春以生中秋以殺由案生中以下六字他本闕此見之天之所起其氣積天之所廢其氣隨案他本闕隨字故至春少陽東出就木與之俱生至夏太陽南出就火與之俱煖此非各就其類而與之相起與少陽就木太陽就火火木案他本木誤作不相稱各就其正此非正其倫與至於秋時少隂興而不得以秋從金從金而傷火功雖不得以從金亦以秋出於東方俛其處而適其事以成嵗功此非權與隂之行固常居虛而不得居實至於冬而止空虛太陽乃得北就其類而與水起寒是故天之道有倫有經有權隂陽義第四十九天道之常一隂一陽陽者天之徳也隂者天之刑也迹隂陽終嵗之行以觀天之所親而任成天之功猶謂之空空者之實也故清凓案他本凓誤作漂之於嵗也若酸醎之於味也僅有而已矣聖人之治亦從而然天之少隂用於功太隂用於空人之少隂用於嚴而太隂用於喪喪亦空空亦喪也是故天之道以三時成尘以一時喪死死之者謂百物枯落也喪之者謂隂氣悲哀也天亦有喜怒之氣哀樂之心與人相副以類合之天人一也春喜氣也故生秋怒氣也故殺夏樂氣也故養冬哀氣也故藏四者天人同有之有其理而一用之與天同者大治與天異者大亂故為人主之道莫明於在身之與天同者而用之使喜怒必當義乃出如寒暑之必當其時乃發也使徳之厚於刑也如陽之多於隂也是故天之行隂氣也少取以成秋其餘以歸之冬聖人之行隂氣也少取以立嚴其餘歸之喪喪亦人之冬氣故人之太隂不用於刑而用於喪天之太隂不用於物而用於空空亦為喪喪亦為空其實一也皆喪死亡之心也隂陽出入上下第五十天道大數相反之物也不得俱出隂陽是也春出陽而入隂秋出隂而入陽夏右陽而左隂冬右隂而左陽隂出則陽入陽入則隂出隂右則陽左隂左則陽右是故春俱南秋俱北而不同道夏交於前冬交於後而不同理並行而不相亂澆滑而各持分此之謂天之意而何以從事天之道初薄大冬隂陽各從一方來而移於後隂由東方來西陽由西方來東至於中冬之月相遇北方合而為一謂之曰至别而相去隂適右陽適左適左案他本脱下適左二字者其道順適右者其道逆逆氣左上順氣右下故下煖而上寒以此見天之冬右隂案他本隂誤作氣而左陽也上所右而下所左也冬月盡而隂陽俱南還陽南還出於寅隂南還入於戌此隂陽所始出地入地之見處也至於中春之月陽在正東隂在正西謂之春分春分者隂陽相半也故晝夜均而寒暑平隂日損而隨陽陽日益而鴻故為煖案他本煖作燒熱初得大夏之月相遇南方合而為一謂之曰至别而相去陽適右隂適左適左案他本左誤作右由下適右案他本右誤作左由上上暑而下寒以此見天之夏右陽而左隂也上其所右下其所左夏月盡而隂陽俱北還陽北還而入於申隂北還而入於辰此隂陽之所始出地入地之見處也至於中秋之月陽在正西隂在正東謂之秋分秋分者隂陽相半也故晝夜均而寒暑平陽日損而隨隂隂日益而鴻故至於季秋而始霜至於孟冬而始大寒下雪而物咸成大寒而物畢藏天地之功終矣天道無二第五十一天之常道相反之物也不得兩起故謂之一一而不二者天之行也隂與陽相反之物也故或出或入或右或左春俱南秋俱北夏交於前冬交於後並行而不同路交㑹而各代理此其文與天之道有一出一入一休一伏其一度也然而不同意陽之出常縣於前而任嵗事隂之出常縣於後而守空虛陽之休也功已成於上而伏於下隂之伏也不得近義而遠其處也天之任陽不任隂好徳不好刑如是故陽出而前隂出而後尊徳而卑刑之心見矣陽出而積於夏任徳以嵗事也隂出而積於冬錯刑於空處也小以此察之天無常於物而一於時時之所宜而一為之故開一塞一起一廢一而至畢時而止終有復始其一一者一也是於天凡在隂位者皆惡亂善不得主名天之道也故常一而不滅天之道事無大小物無難易反天之道無成者是以目不能二視耳不能二聴一手不能二事一手畫方一手畫圓莫能成人為小易之物而終不能成反天之不可行如是是故古案他本古誤作右之人物而書文止於一者謂之忠持二忠者謂之患患人之忠不一者也不一者故患之所由生也是故君子賤二而貴一人孰無善善不一故不足以立身治孰無常常不一故不足以致功詩云上帝臨汝無一爾心知天道者之言也煖燠孰多第五十二天之道出陽為煖以生之出隂為清以成之是故非薫也不能有育非凓案他本凓誤作漂下同也不能有熟嵗之精也知心而不省薫與凓孰多者用之必與天戾與天戾雖勞不成是自正月至於十月而天之功畢計其間者案他本無者字隂與陽案他本隂與陽誤作與隂陽各居幾何薫與凓其案他本其誤作具下衍者字日孰多距物之初生至其畢成露與霜其下孰倍故從中春生於秋氣温柔和調乃季秋九月隂乃始多於陽天於是時出凓下霜出凓下霜而大案他本大作天降物固已皆成矣故九月者天之功大究於是月也十月而悉畢故案其迹數其實清凓之日少少耳功已畢成之後隂乃大出天之成功也少隂與而太隂不與少隂在内而太隂在外故霜加物而雪加於案他本無於字空空者亶地而已不逮物也功已畢成之後物未復生之前太隂之所常出也雖曰隂亦以太陽資化其位而不知所受之故聖王在上位天覆地載風令雨施雨施者布徳均也風令者言令直也詩云不識不知順帝之則言弗能知識而效天之所為云爾禹水湯旱非常經也適遭世氣之變而隂陽失平堯視民如子民親堯如父母尚書曰二十有八載放勲乃殂落百姓如喪考妣四海之内閼宻八音三年三年陽氣壓於隂隂氣大興此禹所以有水名也桀天下之殘賊也湯天下之盛徳也天下除殘賊而得盛徳大善者再是重陽也故湯有旱之名皆適遭之變非禹湯之過毋以適遭之變疑平生之常則所守不失則正道益明基義第五十三凡物必有合合必有上必有下必有左必有右必有前必有後必有表必有裏有美必有惡有順必有逆有喜必有怒有寒必有暑有晝必有夜此皆其合也隂者陽之合夫者妻之合子者父之合臣者君之合物莫無合而合各有隂陽陽兼於隂隂兼於陽夫兼於妻妻兼於夫父兼於子子兼於父君兼於臣臣兼於君君臣父子夫婦之義皆取諸隂陽之道君為陽臣為隂父為陽子為隂夫為陽妻為隂隂道無所獨行其始也不得專起其終也不得分功有所兼之義是故臣兼功於君子兼功於父妻兼功於夫隂兼功於陽地兼功於天舉而上者抑而下也有屏送而左也有引而右也有親而任也有疎而遠也有欲日益也有欲日損也益而用而損其妨有時損少而益多有時損多而益少少而不至絶多而不至溢隂陽二物終嵗各壹出壹其出遠近同度而不同意陽之出也常縣於前而任事隂之出也常縣於後而守空處而見天之親陽而疎隂任徳而不任刑也是故仁義制度之數盡取之天天為君而覆露之地為臣而持載之陽為夫而生之隂為婦而助之春為父而生之夏為子而養之秋為死而棺之冬為痛而喪之王道之三綱可求於天天出陽為煖以生之地出隂為清以成之不煖不生不清不成然而計其多少之分則煖暑居百而清寒居一徳教其與刑罰猶此也故聖人多其愛而少其嚴厚其徳而簡其刑以此配天天之大數必有十旬旬天地之數十而畢舉旬生長之功十而畢成天之氣徐乍寒乍暑故寒不凍暑不渴以其有餘徐來不暴卒也易曰履霜堅冰蓋言遜也然則上堅不踰等果是天之所為弗作而成也人之所為亦當勿作而極也凡有興者稍稍上之以遜順徃使人心説而安之無使人心案他本心作之恐原註一作怨而不使案他本而字上誤衍作字故曰君子以人治人謹能愿此之謂也聖人之道同諸天地蕩諸四海變習易俗闕文第五十四春秋繁露卷十二欽定四庫全書春秋繁露卷十三漢董仲舒撰四時之副第五十五案此篇他本缺天之道春煖以生夏暑以養秋凉以殺冬寒以藏煖暑清寒異氣而同功皆天之所以成嵗也聖人副天之所行以為政故以慶副煖而當春以賞副暑而當夏以罰副凉而當秋以刑副寒而當冬慶賞罰刑異事而同功皆王者之所以成徳也慶賞罰刑與春夏秋冬以類相應也如合符故曰王者配天謂其道天有四時王有四政四政若四時通類也天人所同有也慶為春賞為夏罰為秋刑為冬慶賞罰刑之不可不具也如春夏秋冬不可不備也慶賞罰刑當其處不可不發若煖暑清寒當其時不可不出也慶賞罰刑各有正處如春夏秋冬各有時也四政者不可以相干也猶四時不可相干也四政者不可以易處也猶四時不可易處也故慶賞罰刑有不行於其正處者春秋譏也人副天數第五十六案此篇首他本闕三百九十六字天徳施地徳化人徳義天氣上地氣下人氣在其間春生夏長百物以興秋殺冬收百物以藏故莫精於氣莫富於地莫神於天天地之精所以生物者莫貴於人人受命乎天也故超然有以倚物疢疾莫能為仁義唯人獨能為仁義物疢疾莫能偶天地唯人獨能偶天地人有三百六十節偶天之數也形體骨肉偶地之厚也上有耳目聰明日月之象也體有空竅理脈川谷之象也心有哀樂喜怒神氣之類也觀人之體一何高物之甚而類於天也物旁折取天之隂陽以生活耳而人乃爛然有其文理是故凡物之形莫不伏從旁折天地而行人猶題直立端尚正正當之是故所取天地少者旁折之所取天地多者正當之此見人之絶於物而參天地是故人之身首原註音分員象天容也髪象星辰也耳目戾戾象日月也鼻口呼吸象風氣也胸中達知象神明也腹胞實虛象百物也百物者最近地故要以下地也天地之象以要為帯頸以上者精神尊嚴明天類之状也頸而下者豐厚卑辱土壤之比也足布而方地形之象也是故禮帯置紳必直其頸以别心也帯而上者盡為陽帯而下者盡為隂各其分陽天氣也隂地氣也案他本以上俱闕故隂陽之動使人足病喉痺起則地氣上為雲雨而象亦應之也天地之符隂陽之副常設於身身猶天也數與之相參故命與之相連也天以終嵗之數成人之身故小節三百六十六副日數也大節十二分副月數也内有五藏副五行數也外有四肢副四時數也乍視乍暝副晝夜也乍剛乍柔副冬夏也乍哀乍樂副隂陽也心有計慮副度數也行有倫理副天地也此皆暗膚案他本膚作慮著身與人俱生比而偶之弇合于其可數也副數不可數者副類皆當同而副天一也是故陳其有形以著其無形者拘其可數者以此言道之亦宜以類相應猶其形也以數相中也同類相動第五十七今平地注水去燥就濕均薪施火去濕就燥百物其去所與異而從其所與同故氣同則㑹聲比則應其騐皦然也試調琴瑟而錯之鼓其宫則他宫應之鼔其商而他商應之五音比而自鳴非有神其數然也美事召美類惡事召惡類類之相應而起也如馬鳴則馬應之帝王之將興也其美祥亦先見其將亡也妖孽亦先見物故以類相召也故以龍致雨以扇逐暑軍之所處以􅁄楚美惡皆有從來以為命莫知其處所天將隂雨人之病故為之先動是隂相應而起也天將欲隂雨又使人欲睡臥者隂氣也有憂亦使人臥者是隂相求也有喜者使人不欲臥者是陽相索也水得夜益長數分東風而酒湛溢病者至夜而疾益甚雞至幾明皆鳴而相薄其氣益精故陽益陽而隂益隂陽隂之氣固可以類相益損也天有隂陽人亦有隂陽天地之隂氣起而人之隂氣應之而起人之隂氣起而天之隂氣亦宜應之而起其道一也明於此者欲致雨則動隂以起隂欲止雨則動陽以起陽故致雨非神案他本神誤作初也而疑於神者其理微妙也非獨隂陽之氣可以類進退也雖不祥禍福所從生亦由是也無非己先起之而物以類應之而動者也故聰明聖神内視反聴言為明聖内視反聴故獨明聖者知其本心皆在此耳故琴瑟報彈其宫他宫自鳴而應之此物之以類動者也其動以聲而無形人不見其動之形則謂之自鳴也又相動無形則謂之自然其實非自然也有使案他本下有人字之然者矣物固有實使之其使之無形尚書傳言周將興之時有大赤烏銜榖之種而集王屋之上者武王喜諸大夫皆喜周公曰茂哉茂哉天之見此以勸之也恐恃之五行相勝第五十八木者司農也司農為姦朋黨比周以蔽主明退匿賢士絶滅公卿教民奢侈賓客交通不勸田事博戲鬭雞走狗弄馬長幼無禮大小相虜並為寇賊横恣絶理司徒誅之齊桓是也行霸任兵侵蔡蔡潰遂伐楚楚人降伏以安中國木者君之官也夫木者農也農者民也不順如叛則命司徒誅其率正矣故曰金勝木火者司馬也司馬為讒反言易辭以譖愬人内離骨肉之親外疎忠臣賢聖旋亡讒邪日昌魯上大夫季孫是也專權擅勢薄國威徳反以怠惡譖愬其羣臣劫惑其君孔子為魯司寇據義行法季孫自消墮費郈城兵甲有差夫火者大朝有讒邪熒惑其君執法誅之執法者水也故曰水勝火案他本脱曰水勝火四字土者君之官也其相司營司營案他本脱下司營二字為神主所為皆曰可主所言皆曰善讇順主指聴從為比進主所善以快主意䧟主以邪導主不義大為宫室多為臺榭雕文刻鏤五色成光賦斂無度以奪民財多發徭役以奪民時作事無極以奪民力百姓愁苦叛去其國楚靈王是也作乾谿之臺三年不成百姓罷弊而叛及案他本及作反其身弑夫土者君之官也君太奢侈過土失案他本失誤作大禮民叛矣其民叛其君窮矣故曰木勝土金者司徒也司徒為賊内得於君外驕軍士專權擅勢誅殺無罪侵伐暴虐攻戰妄取令不行禁不止將率不親士卒不使兵弱地削令君有恥則司馬誅之楚殺其司徒得臣是也得臣數戰破敵内得於君驕蹇不䘏其下卒不為使當敵而弱以危楚國司馬誅之金者司徒司徒弱不能使士衆則司馬誅之故曰火勝金水者司寇也司寇為亂足恭小謹巧言令色聴謁受賂阿黨不平慢令急誅誅殺無罪則司營誅之營蕩是也為齊司寇太公封於齊問為案他本為作焉以治國之要營蕩對曰任仁義而已太公曰任仁義奈何營蕩對曰仁者愛人義者尊老太公曰愛人尊老奈何營蕩對曰愛人者有子不食其力尊老者妻長而夫拜之太公曰寡人欲以仁義治齊今子以仁義亂齊寡人立而誅之以定齊國夫水者執法司寇也執法附黨不平依法刑人則司營誅之故曰土勝水五行相生第五十九天地之氣合而為一分為隂陽判為四時列為五行行者行也其行不同故謂之五行五行者五官也比相生而間相勝也故謂治逆之則亂順之則法東方者木農之本司農尚仁進經術之士道之以帝王之路將順其美匡救其惡執規而生至温潤下案他本下誤作不知地形肥饒美惡立事生則因地之宜召公是也親入南畆之中觀民墾草發淄耕種五榖積蓄有餘家給人足倉庫充實司馬食榖司馬本朝也本朝者火也故曰木生火南方者火也本朝司馬尚智進賢聖之士上知天文其形兆未見其萌芽未生昭然獨見存亡之機得失之要治亂之源豫禁未然之前執矩而長至忠厚仁輔翼其君周公是也成王幼弱周公相誅管叔蔡叔以定天下天下既寧以安君官者司營司營者土也故曰火生土中央者土君官也司營尚信卑身賤體夙興夜寐稱述徃古以厲主案他本主誤作生意明見成敗微諫納善防滅其惡絶原塞隟執繩而制四方至忠厚信以事案他本以字在信字上脱事字其君據義割恩太公是也應天因時之化威武强禦以成大理者司徒也司徒者金也故曰土生金西方者金大理司徒也司徒尚義臣死君而衆人死父親有尊卑位有上下各死其事事不踰矩執權而伐兵不苟克取不苟得義而後行至亷而威質直剛毅子咠原註疑是胥字是也伐有罪討不義是以百姓附親邊境安寧寇賊不發邑無獄訟則親安執法者司寇也司寇者水也故曰金生水北方者水執法司寇也司寇尚禮君臣有位長幼有序朝廷有爵鄉黨以齒升降揖讓般伏拜謁折旋中矩立而罄折拱則抱鼓執衡而藏至清亷平賂案他本賂誤作路遺不受請謁不聴據法聴訟無有所阿孔子是也為魯司寇㫁獄屯屯與衆共之不敢自專是死者不恨生者不怨百工維時以成器械器械既成以給司農司農者田官也田官者木故曰水生木五行逆順第六十木者春生之性農之本也勸農事無奪民時使民嵗不過三日行什一之税進經術之士誕羣禁出輕繫去稽留除桎梏開閉闔通障塞恩及草木則樹木華美而朱案他本朱作諸草生恩及鱗蟲則魚大為鱣鯨不見羣龍下如人君出入不時走狗試馬馳騁不反宫室好媱樂飲酒沈湎縱恣不顧政治事多發役以奪民時作謀増税案他本税誤作瑞以奪民財民病疥搔温體足胻原註去聲痛咎及於木則茂木枯槁工匠之輪多傷敗毒水渰羣漉陂如魚咎及鱗案他本無及鱗二字蟲則魚不為羣龍深藏鯨出見火者夏成長本朝也舉良賢進茂才官得其能任得其力賞有功封有徳出貨財振困乏正封疆使四方恩及於人案他本人作火則火順人而甘露降恩及羽蟲則飛鳥大為黄鵠出見鳯凰翔如人君惑於讒邪内離骨肉外疎忠臣至殺世子誅殺不辜逐忠臣以妾為妻棄法令婦妾為政賜予不當則民病血壅腫目不明咎及於火則大旱必有火災摘巢採鷇咎及羽蟲則飛鳥不為冬應不來梟鴞羣鳴鳯凰高翔土者夏中成熟百種君之官循宫室之制謹夫婦之别加親戚之恩恩及土則五榖成而嘉禾興恩及倮蟲則百姓親附城郭充實賢聖皆遷仙人降如人君好媱佚妻妾過度犯親戚侮父兄欺罔百姓大為臺榭五色成光雕文刻鏤則民病心腹宛黄舌爛痛咎及於土則五榖不成暴虐妄誅咎及倮蟲倮蟲不為百姓叛去賢聖放亡金者秋殺氣之始也建立旗皷杖案他本杖字誤移在誅字下把旄鉞以誅賊殘禁暴虐安集故動衆興師必應義理出則祠案他本祠誤作伺兵入則振旅以閑案他本閑誤作咸習之因案他本因作困於彼狩存不忘亡安不忘危修城郭繕牆垣審羣禁飭兵甲警百官誅不法恩及於金石則凉風出恩及於毛蟲則走獸大為麒麟至如人君好戰侵陵諸侯貪城邑之賂輕百姓之命則民病喉欬𠻳筋攣鼻仇塞咎及於金則鑄化凝滯凍堅不成四面張網焚林而獵咎及毛蟲則走獸不為白虎妄搏麒麟遠去水者冬藏至隂也宗廟祭祀之始敬四時之祭禘祫昭穆之序天子祭天諸侯祭土閉門閭大搜索㫁刑罰執當罪飭闗梁禁外徒恩及於水則醴泉出恩及介蟲則黿鼉大為靈龜出如人君簡宗廟不禱祀廢祭祀執法不順逆天時則病流腫水張痿痺孔竅不通咎及於水霧氣㝠㝠必有大水水為民害咎及介蟲則龜深藏黿鼉呴案他本呴作呁治水五行第六十一日冬至七十二日木用事其氣燥濁而清七十二日火用事其氣慘陽而赤七案他本七誤作也十二日土用事其氣濕案他本濕作温濁而黄七十二日金用事其氣慘淡而白七十二日水用事其氣清寒而黒七十二日復得木木用事則行柔惠誕羣禁至於立春出輕繫去稽留除桎梧開門闔通障塞存幼孤矜寡獨無伐木火用事則正封疆循田疇至于立夏舉賢良封有徳賞有功出使四方無縱火土用事則養長老存幼孤矜寡獨賜孝悌施恩澤無興土功金用事則修城郭繕牆垣審羣禁飭甲兵警百官誅不法存長老無焚金石水用事則閉門閭大搜索㫁刑罰執當罪飭梁闗禁外陡案他本陡作徒無決池隄春秋繁露卷十三欽定四庫全書春秋繁露卷十四漢董仲舒撰治亂五行第六十二火干木蟄蟲蚤出案他本下有蚿字雷蚤行土干木胎夭卵毈鳥蟲多傷金干木有兵水干木春下霜土干火則多雷金干火草木夷水干火夏雹木干火則地動金干土則五榖傷有殃水干土夏寒雨霜木干土倮蟲不為火干土則大旱水干金則魚不為木干金則草木再生火干金則草木秋榮土干金五榖不成木干水冬蟄不藏土干水則蟄蟲冬出火干水則星墜金干水則冬大寒五行變救第六十三五行變至當救之以徳施之天下則咎除不救以徳不出三年天當案他本當作雷雨石木有變春凋秋榮秋原註一無秋字木冰春多雨此繇役衆賦斂重百姓貧窮叛去道多饑人救者省繇役薄賦斂出倉榖賑困窮矣火有變冬温夏寒此王者不明善者不賞惡者不絀不肖在位賢者伏匿則寒暑失序而民疾疫救之者舉賢良賞有功封有徳土有變大風至五榖傷此不信仁賢不敬父兄淫泆無度宫室榮案他本榮作多營救之者省宫室去雕文舉孝悌恤黎元金有變畢昴為囘三覆有武多兵多盜寇此案他本脱此字棄義貪財輕民命重貨賂百姓趣利多姦軌救之者舉亷潔立正直隱武行文束甲械水有變冬濕多霧春夏雨雹此法令緩刑罰不行救之者憂囹圄案姦宄誅有罪蓃五日五行五事第六十四王者與臣無禮貌不肅敬則木不曲直而夏多暴風風者木之氣也其音角也故應之以暴風王者言不從則金不從革而秋多霹靂霹靂者金氣也其音商也故應之以霹靂王者視不明則火不炎上而秋多電電者火氣也其音徵也故應之以電王者聴不聦則水不潤下而春夏多暴雨雨者水氣也其音羽也故應之以暴雨王者心不能容則稼穡不成而秋多雷雷者土之氣也其音宫也故應之以雷五事一曰貌二曰言三曰視四曰聴五曰思何謂也夫五事者人之所受命於天也而王者案他本無者字所修而治民也故王者為民治則不可以不明準繩不可以不正王者貌曰恭恭者敬也言曰從從者可從視曰明明者知賢不肖者分明黒白也聴曰聦聦者能聞事而審其意也思曰容容者言無不容恭作肅從作乂明作哲聦案他本聦作聴作謀容作聖何謂也恭作肅言王誠能内有恭敬之姿而天下莫不肅矣從作乂言王者言可從明正從行而天下治矣明作哲哲者知也王者明則賢者進不肖者退天下知善而勸之知惡而恥之矣聦案他本聦作聴作謀謀者謀事也王者聦則聞事與臣下謀之故事無失謀矣容作聖聖者設也王者心寛大無不容則聖能施設事各得其宜也王者能敬案他本敬誤作欲則春氣得故肅肅者主春春陽氣微萬物柔易移弱可化於時隂氣為賊故王者欽欽不以議隂事然後萬物遂生而木可案他本無可字曲直也春行秋政則草木彫行冬政則雪行夏政則殺春失政則原註有闕文王者能治則義立義立則秋氣得故義者主秋秋氣始殺王者行小刑罰民不犯則禮義成於時陽氣為賊故王者輔以官牧之事然後萬物成熟秋草木不榮華金從革也秋行春政則華行夏政則喬行冬政則落秋失政則春天風不解雷不發王者能知則知善惡知善惡則夏氣得故哲者主夏夏陽氣始盛萬物兆長王者不揜明則道不退塞而夏至之後大暑隆萬物茂育懷任王者恐明不知賢不肖分明白黒於時寒為賊故王者輔以賞賜之事然後夏草木不霜火炎上也夏行春政則風行秋政則水行冬政則落夏失政則冬不凍冰五榖不藏大寒不解王者無失謀然後冬氣得故謀者主冬冬隂氣始盛草木必死王者能聞事審謀慮之則不侵伐不侵伐且殺則死者不恨生者不怨冬日至之後大寒降萬物藏於下於時暑為賊故王者輔之以急㫁之以事水潤下也冬行春案他本春誤作夏政則蒸行夏政則雷行秋政則旱冬失政則夏草木不實霜五榖疾枯郊語第六十五人之言醞去烟鴟羽去昧原註一作昧慈石取鐵頸原註一作真金取火蠶珥絲於室而絃絶于堂禾實于野而粟缺于倉蕪夷生于燕橘枳死于荆此十物者皆竒而可案他本而可作可而怪非人所意也夫非人所意而然既已案他本已作以有之矣或者吉凶禍福利不利之所從生無有竒怪非人所意如是者乎此等可畏也孔子曰君子有三畏畏天命畏大人畏聖人之言彼豈無傷害於人如孔子徒畏之哉以此見天之不可不畏敬猶主上之不可不謹事不謹事主其禍來至顯不畏敬天其殃來至闇闇者不見其端若自然也故曰堂堂如天殃言不必立校黙案他本黙誤作然而無聲潛而無形也由是觀之天殃與上罰所以别者闇與顯耳不然其來逮人殆無以異孔子同之俱言可畏也天地神明之心與人事成敗之真固莫之能見也惟聖人能見之聖人者見人之所不見者也故聖人之言亦可畏也奈何而案他本而作如廢郊禮郊禮者人所最甚重也廢聖人所最甚重而吉凶利害在於㝠㝠不可得見之中雖己多受其病何從知之故曰問聖人者問其所為而無問其所以為也問其所以為終弗能見不如勿問問為而為之所不為而勿為是與聖人同實也何過之有詩云不愆不忘率由舊章舊章者先聖人之故文章也率由各有修從之也此言先聖人之故案他本脱文章也以下十八字文章者雖不能深見而詳知其則猶不知其美譽之功矣今郊事天之義此聖人故云云春秋繁露卷十四欽定四庫全書春秋繁露卷十五漢董仲舒撰郊義第六十六郊義春秋之法王者嵗一祭天于郊四祭于宗廟宗廟因于四時之易案他本易誤作房郊因于新嵗之初聖人有以起之其以祭不可不親也天者百神之君也王者之所最尊也以最尊天之故故易始嵗更紀即以其初郊郊必以正月上辛者言以所最尊首一嵗之事每更紀者以郊郊祭首之先貴之義尊天之道也郊祭第六十七春秋之義國有大喪者止宗廟之祭而不止郊祭不敢以父母之喪廢事天地之禮也父母之喪至哀痛悲苦也尚不敢廢郊也孰足以廢郊者故其在禮亦曰喪者不祭惟祭天為越喪而行事夫古之畏敬天而重天郊如此甚也今羣臣學士不探察曰萬民多貧或頗饑寒足郊乎是何言之誤天子父母事天而案他本而字誤移在天字上子孫畜萬民民未徧飽無用祭天者是猶子孫未得食無用食父母也言莫逆於是是其去禮遠也先貴而後賤孰貴于天子天子號天之子也奈何受為天子之號而無天子之禮天子不可不祭天也無異人之不可以不食父故古之聖王文章之最重者也前世王莫不從重栗精奉之以事上天至於秦而獨闕案他本闕作曠然廢之一何不率由舊章之大甚也天者百神之大君也事天不備雖百神猶無益也何以言其然也祭而地原註疑是他字神者春秋譏之孔子曰獲罪於天無所禱也是其法也故未見秦國致天案他本天作大福如周國也詩曰唯此文王小心翼翼昭事上帝允懷多福多福者非謂人也事功也謂天之所福也傳曰周國子多賢蕃案他本蕃誤作審殖至于駢孕案他本孕誤作厚男者四四産而得八案他本八誤作人男皆君子俊雄也今此天之所以興周國也非周國之所能為也今秦與周俱得為天子而所以事天者異于周以郊為百神始始入嵗首必以正月上辛日先享天乃敢于地先貴之義也夫嵗先之與嵗弗行也相去遠矣天下福若無可怪者然所以乆弗行者案他本者作也非灼灼見其當而故弗行也典禮之官常嫌疑莫案他本莫誤作其能昭昭明其當也今切以為其當與不當可内返於心而定也堯謂舜曰天之歴數在爾躬言察身以知天也今身有子孰不欲其有子禮也聖人正名名不虛生天子者則天之子也以身度天獨何為不欲其子之有子禮也今為其天子而闕然無祭于天天何必善之所聞曰天下和平則災害不生今災害生見天下未和平也天下所未和平者天子之教化不行也詩曰有覺徳行四國順之覺者著也王者有明著之徳行于世則四方莫不響應風化善于彼矣故曰悦于慶賞嚴于刑罰疾于法令四祭第六十八古者嵗四祭四祭者因四時之所生熟而祭其先祖父母也故春曰祠夏曰礿秋曰嘗冬曰蒸此言不失其時以奉祭先祖也過時不祭則失為天子之道也祠者以正月始食韭也礿者以四月食麥也嘗者以七月嘗黍稷也蒸者以十月進初稻也此天之經也地之義也孝子孝婦縁天之時因地之利己受命而王必先祭天乃行王事文王之伐崇是也詩曰濟濟辟王左右奉璋奉璋峩峩髦士攸宜此文王之郊也其下之辭曰淠彼涇舟烝徒檝之周王于邁六師及之此文王之伐崇也上言奉璋下言伐崇以是見文王之先郊而後伐也文王受命則郊郊乃伐崇崇國之民方困於暴亂之君未得被聖人徳澤而文王已郊矣安在徳澤未洽者不可以郊乎郊祀第六十九為人子而不事父者天下莫能以為可今為天之子而不事天何以異是是故天子每至嵗首必先郊祭以享天乃敢為地行子禮也每將興師必先郊祭以吿天乃敢征伐行子道也文王受天命而王天下先郊乃敢行事而興師伐崇其詩曰芃芃棫樸薪之槱之濟濟辟王左右趨之濟濟辟王左右奉璋奉璋峩峩髦士攸宜此郊辭也其下曰淠彼涇舟烝徒檝之周王于邁六師及之此伐辭也其下曰文王受命有此武功既伐于崇作邑于豐以此辭者見文王受命則郊郊乃伐崇伐崇之時民何處央原註一作殃乎周宣王時天下旱嵗惡甚王憂之其詩曰倬彼雲漢昭囘于天王曰嗚呼何辜今之人天降喪亂飢饉薦臻靡神不舉靡愛斯牲圭璧既卒寧莫我聴旱既太甚藴隆蟲蟲不殄禋祀自郊徂宫上下奠瘞靡神不宗后稷不克上帝不臨耗射下土寧丁我躬宣王自以為不能乎后稷不中乎上帝故有此災有此災愈恐懼案他本愈恐懼三字在有此災句上而謹事天天若不予是家是家案他本脱下是家二字者安得立為天子立為天子者天予是家天予是家者天使是家天使是家者是家案他本無家字天之所予也案他本無也字天之所使也天已予之天已使之其間不可以接天何哉故春秋凡議郊未嘗譏君徳不成于郊也及案他本及作乃不郊而祭山川失祭之叙案他本叙誤作後逆于禮故必譏之以此觀之不祭天者乃不可祭小神也郊因先卜不吉不敢郊百神之祭不卜而郊獨卜郊祭最大也春秋譏喪祭不譏喪郊郊不辟喪喪尚不辟况他物郊祀案他本祀作祝曰皇皇上天案他本天作帝照臨下土集地之靈降甘風雨庶物羣生言而已矣夫不自為言而為庶物羣生言以人心庶天無尤焉案他本焉作也天無尤焉而辭恭順宜可喜也右郊祀九句九句者陽數也順命第七十父者子之天也天者父之天也無天而生未之有也天者萬物之祖萬物非天不生獨隂不生獨陽不生隂陽與天地參然後生故曰父之子也可尊母之子也可卑尊者取尊號卑者取卑號故徳侔天地者皇天右而子之號稱天子其次有五等之爵以尊之皆以國邑為號其無徳於天地之間者州國人民甚者不得繫國邑皆絶骨肉之屬離人倫謂之案他本謂之作之調閽盜案他本盜作甚而已無名姓案他本無字誤移在姓字下號氏于天地之間至賤乎賤者也其案他本其作甚尊至徳巍巍乎不可以加矣其案他本其作甚卑至賤冥冥其無下矣春秋列序位卑尊之陳累累乎可得而觀也雖闇且愚莫不昭然地之菜茹𤓰果藝之稻麥黍稷菜生榖熟永思吉日供具祭物齋戒沐浴潔清致敬祀其先祖父母孝子孝婦不使時過已處之以愛敬行之以恭讓亦殆免于罪矣公子慶父罪亦不當繫于國以親之故為之諱而諸母之國齊之仲孫去其公子之親也故有大罪不奉其天命者皆棄其天倫人于天也以道受命其于人以言受命不若于道者天絶之不若于言者人絶之臣子大受命于君辭而出疆唯有社稷國家之危猶得發辭而專安之盟是也天子受命于天諸侯受命于天子子受命于父臣妾受命于君妻受命于夫諸所受命者其尊皆天也雖謂受命于天亦可不天亦可天子不能奉天之命則廢而稱公王者之後是也公侯不能奉天子之命則名絶而不得就位衛侯朔是也子不奉父命則有伯討之罪衛世子蒯聵是也臣不奉君命雖善以叛言晉趙鞅入于晉陽以叛是也妾不奉君之命則媵女先至者是也妻不奉夫之命則絶夫不言及是也曰不奉順於天者其罪如此孔子曰畏天命畏大人畏聖人之言其案他本無其字祭社稷宗廟山川鬼神不以其道無災無害至於祭天不享其卜不從使其牛口案他本口誤作曰傷鼷鼠食其角或言食牛或言食而死或食而生或不食而自死或改卜而牛死或卜而食其角過有深淺薄厚而災有簡甚不可不察也猶郊之變因其災而之變應而無為也見百事之變之所不知而自然者勝言與以此見其可畏專誅絶者其唯案他本唯作為天乎臣殺君子殺父三十有餘諸其賤者則損以此觀之可畏者其唯天命大人乎亡國五十有餘皆不事畏者也况不畏大人專誅之君之滅者何日之有哉魯宣違案他本違誤作為聖人之言變古易常而災立至聖人之言可不慎此三畏者異指而同致故聖人同之俱言其可畏也郊事對第七十一廷尉臣湯昧死言曰臣湯承制以郊事問故膠西相仲舒臣仲舒對曰所聞古者天子之禮莫重於郊郊常以正月上辛者所以先百神而最居前禮三年喪不祭其先而不敢廢郊郊重於宗廟天尊於人也王制曰祭天地之牛繭栗宗廟之牛握賓客之牛尺此言徳滋美而牲滋微也春秋曰魯祭周公用白牡色白貴純也帝牲在滌三月牲貴肥潔而不貪其大也凡養牲之道務在肥潔而已駒犢未能勝芻豢之食莫如令食其母便臣謹問仲舒魯祀周公用白牲非禮臣仲舒對曰禮也臣湯問曰周天子用騂剛羣公不毛周公諸公也何以得用純牲臣仲舒對曰武王崩成王幼案他本幼作立而在襁褓之中周公繼文武之業成二聖之功徳漸天地澤被四海故成王賢而貴之詩云無徳不報故成王使祭周公以白牡上不得與天子同色下有異于諸侯仲舒愚以為報徳之禮臣湯問仲舒天子祭天諸侯祭土魯何縁以祭郊臣仲舒對曰周公傅成王成王遂及聖功莫大於此周公聖人也有祭故成王令魯郊也臣湯問仲舒魯祭周公用白牲其郊何用臣案他本臣誤作至仲舒對曰魯郊用純騂剛周色上赤魯以天子命郊故以騂臣湯問仲舒祠宗廟或以鶩當鳧鶩非鳧可用否仲舒對曰鶩非鳧鳧非鶩也臣聞孔子入太廟每事問慎之至也陛下察躬親齋戒沐浴以承宗廟甚敬謹奈何以鳧當鶩鶩當鳧名實不相應以承太廟不亦不稱乎臣仲舒愚以為不可臣犬焉齒衰賜案他本脱賜字骸骨伏陋巷案他本脱巷字陛下乃幸使九卿問以朝廷之事臣愚陋曽不足以承明詔奉大對臣仲舒昧死以聞春秋繁露卷十五欽定四庫全書春秋繁露卷十六漢董仲舒撰執贄第七十二凡執贄天子用暢公侯用玉卿用羔大夫用鴈鴈乃有類於長者長者在民上必施然有先後之隨必淑案他本淑作俶然有行列之治故大夫以為案他本無為字贄羔乃有其類天者天之道任陽不任隂王者之道任徳不任刑順天也羔有角而不任設備而不用類好仁者執之不鳴殺之不啼類死義者羔食於其母必跪而受之類知禮者故羊之為言猶祥與故卿以為贄玉有似君子子曰人而不曰如之何如之何者吾末如之何也矣故匿病者不得良醫羞問者聖人去之以為遠功而近有災是則不有玉至清案他本清作親而不蔽其惡内有瑕穢必見之於外故君子不隱其短不知則問不能則學取之玉也君子比之玉玉潤而不汚是仁而至清潔也亷而不殺是義而不害也堅而不硻過而不濡視之如庸展之如石状如石搔而不可從燒案他本燒作繞潔白如素而不受汚玉類備者故公侯以為贄暢有似於聖人者純仁淳粹而有知之貴也擇於身者盡為徳音發於事者盡為潤澤積美陽芬香以通之天暢亦取百香之心獨永之合之為一而達其臭氣暢天子其淳粹無擇與聖人一也故天子以為贄而各以事上也觀贄之意可以見其事山川頌第七十三山則巃嵸􅐑崔嵬案他本嵬作嵬崔㠑巍乆不崩弛似夫仁人志士孔子曰山川神祇立寶藏殖案他本殖誤作葅器用資曲直案他本直誤作豈合大者可以為宫室臺榭小者可以為舟輿浮灄大者無不中小者無不入持斧則斫折鐮則艾生人立禽獸伏死人入多其功而不言是以君子取譬也且積工成山無損也成其高案他本高作功無害也成其大無虧也小其上案他本上誤作止大其下乆長安後世無有去就儼然獨處惟山之意詩云節彼南山惟石巖巖赫赫師尹民具爾瞻此之謂也水則源泉混混沄沄案沄沄二字黄氏曰鈔所引同他本誤作汒汒晝夜不竭既似力者盈科後行既似持平者循微案他本微作嶽赴下不遺小間既似察者循溪谷不迷或奏萬里而必至既似知者鄣防山而能清淨既似知命者不清而入潔清而出既似善化者赴千仞之壑石而不疑既似勇者物皆因原註或是困於火案他本火誤作大而水獨勝之既似武者咸得案他本咸得誤作感徳之生失之而死既似有徳者孔子在川上曰逝者如斯夫不舍晝夜此之謂也求雨第七十四春旱求雨令案他本令作合縣邑以水日令民禱社家祀户無伐名木無斬山林暴巫聚蛇八日於邑東門之外為四通之壇方八尺植蒼繒八其神共工祭之以生魚八元酒具清酒膞脯擇巫之清潔辯言利辭者以祝祝齋三日服蒼衣先再拜乃跪陳陳已復再拜乃起祝曰昊天生案他本脱生字五榖以養人今五榖病旱恐不成敬案他本下有起字進清酒􅈩脯再拜請雨雨幸大澍奉牲禱以甲乙日為大蒼龍一長八丈居中央為小龍七各長四丈於東方皆東鄉其間相去八尺小童八人皆齋三日服青衣而舞之田嗇夫亦齋三日服青衣而立之諸里社通之於閭外之溝取五蝦蟇錯置社案他本社誤作秘中池方八尺深二尺置水蝦蟇焉具清酒􅈩脯祝案他本祝作祀下同齋三日服案他本服作取蒼衣拜跪陳祝如初取三嵗雄雞三嵗豬皆燔之於四通神宇令闔邑里南門置水其外開北門具老案他本具誤作其脱老字豭豬一置之于里北門之外市中案他本中誤作者亦置一豭豬聞皷聲皆燒豬尾取死人骨埋之開山淵積薪而燔之決通道橋之壅塞不行者決瀆之幸而得雨以豬一酒鹽黍財足以茅為席母㫁夏求雨令邑以水日家人祀案他本祀作祝竈無舉土功更大浚井暴釡案他本釡誤作金於壇臼杵於術七日為四通之壇於邑南門外方七尺植赤繒七其神蚩尤祭之以赤雄雞七元酒具清酒膊脯祝齋三日服赤衣拜跪陳祝如春辭以丙丁日為大赤龍一長七丈居中央乂為小龍六長各三丈五尺於南方皆南鄉其間相去七尺壯者七人皆齋三日服赤衣而舞之司空嗇夫亦齋三日服赤衣而立之鑿而通之閭外之溝取五蝦蟆錯置里社之中池方七尺深一尺酒脯案他本脯作􅈩祝齋衣赤衣拜跪陳祝如初取三嵗雄雞豭豬燔之四通神宇開隂閉陽如春季夏禱山陵以助之令縣邑壹徙案他本徙誤作徒市於邑南門之外五日禁男子無得行入市家人祠中霤無興土功聚巫市傍案他本傍誤作傷為之結蓋為案他本蓋為誤作為益四通之壇於中央植黄繒五其神后稷祭之以母􅓞案他本闕母􅓞二字五元酒具清酒膊脯令名為祝齋三日衣黄皆如春祠以戊巳日為大黄龍一長五丈居中央又為小龍四案他本四作五各長二丈五尺於南方皆南鄉其間相去五尺丈夫五人齋三日服黄衣而舞之五人亦齋三日案本句五人上疑有脱字衣黄衣而立之亦通社中於閭外溝取蝦蟇池方五尺深一尺他皆如前神農求雨第十九日戊巳不雨命為黄龍又為大龍社者舞之季立之又曰東方小僮舞之南方壯案他本壯誤作牲者西方沾原註未詳人北方原註下疑少一字人舞之秋暴巫至九日無舉火事煎金器家人祀門為四通之壇於邑西門之外九尺植白繒九其神大昊祭之桐案他本桐作相木魚九元酒具清酒􅈩脯衣白衣他如春以庚辛日為大白龍一長九丈居中央為小龍八各長四丈五尺於西方皆西向其間相去九尺鰥者九人皆齋三日服白衣而舞之司馬案他本闕馬字亦齋三日衣白衣而立之蝦蟇池方九尺深一尺他皆如前冬儛龍六日禱於名山以助之家人祀井無壅水為四通之壇於邑北門之外方六尺植黒繒六其神元㝠祭之以黒狗子六元酒具清酒膊脯祝齋三日衣黒衣祝禮如春以壬癸日為大黒龍一長六丈居中央為小龍案此下疑有脱字各長三丈於北方皆北鄉其間相去六尺老者六人皆齋三日衣黒衣而舞之尉亦齋三日服黒衣而立之蝦蟇池如春四時皆以水為龍必取潔土為之結蓋龍成而發之四時皆以庚子之日令吏民夫婦皆偶處凡求雨之大體丈夫欲藏匿女子欲和而樂神書又曰開神案他本神誤作袖山神淵積薪夜擊案他本擊誤作繋皷譟而燔之為其旱案他本旱誤作卑也止雨第七十五雨太多令縣邑以土日塞水瀆絶道蓋井禁婦人不得行入市令縣鄉里皆掃社下縣邑若丞令吏嗇夫三人以上祝一人鄉嗇夫若吏三人以上祝一人里正父老三人以上祝一人皆齋案以下他本闕一百八卜字三日各衣時衣具豚一黍鹽美酒財足祭社擊皷三日而祝先再拜乃跪陳陳已復再拜乃起祝曰諾天生五榖以養人今淫雨太多五榖不和敬進肥牲清酒以請社靈幸為止雨除民所苦無使隂滅陽隂滅陽不順於天天之常意在於利人人願止雨敢吿于社皷而無歌至罷乃止凡止雨之大禮女子欲其藏而匿也丈夫欲其和而樂也開陽而閉隂闔水而開火以朱絲縈社十周衣朱衣赤幘言罷二十一年八月庚申朔丙午江都相仲舒告内史中尉隂雨太乆案以上為他本所闕别以第六王道篇年年之積一年不熟乃請糴失君之職也犯始者省刑絶惡始也大夫盟于澶淵刺大夫之專政也諸侯㑹同賢為主賢賢也春秋五十字錯簡複見於此恐傷五榖趣止雨止雨之禮廢隂起陽書十七縣八十離鄉及都官吏千石以下夫婦在官者咸遣婦女子不得至市市無諸原註一作詣井蓋之勿令泄鼓用牲於社祝之曰雨以太多五榖不和敬進肥牲以請社靈社靈幸為止雨除民所苦無使隂滅陽隂滅陽不順於天天意常案他本常誤作韋在於利民願止雨敢告皷用牲于社皆壹以辛亥之日書到即起縣社令長若丞尉官長各城邑社嗇夫里吏正里人皆出至於社下餔而案他本餔而誤作顧西罷三日而止未至三日天大案他本無大字星亦止祭義第七十六五榖食物之性也天之所以為賜人也宗廟上案他本上誤作止四時之所成受賜而薦之宗廟敬之性也於祭之而宜矣宗廟之祭物之厚無上也春上豆實夏上尊實秋上機案他本機作杌下同實冬上敦實豆實韭也春之始所生也尊實麷原註一作麰也夏之所受初也機實黍也秋之所先成也敦實稻也冬之所畢熟也始生故曰祠善其司案他本司作可也夏約故曰礿貴所初礿也先成故曰嘗嘗言甘也畢熟故曰蒸蒸言衆也奉四時所受於天者而上之為上祭貴天賜且尊宗廟也孔子受君賜則以祭况受天賜乎一年之中天賜四至至則上之此宗廟所以嵗四祭也故君子未嘗不食新新天賜至必先薦之乃取食之尊天敬宗廟之心也尊天美義也敬宗廟大禮也聖人之所謹也案他本大禮也三字誤移在此下句不多而欲潔清不貪數而欲恭敬君子之祭也恭親之致其中心之誠盡敬潔之道以接至尊故鬼享之享之如此乃可謂之能祭祭者察也以善逮鬼神之謂也善乃逮不可聞見者故謂之察吾以名之所享故祭之不虛安所可察哉祭之為言際也與察也祭然後能見不見見不見之見者案見不見之見者六字他本作之見者見不見然後知天命鬼神知天命鬼神然後明祭之意明祭之意乃知重祭事案他本事作祀下同孔子曰吾不與祭祭神如神在重祭事如事生故聖人於鬼神也畏之而不敢欺也信之而不獨任事之而不專恃恃其公報有徳也幸其不私與人福也其見於詩曰嗟爾君子毋恒安息靜共爾位好是正直神之聴之介爾景福正直者得福也不正者不得福此其法也以詩為天下案他本下作子法矣何謂不法哉其辭直而重有再歎之欲人省其意也而人尚不省何其忘哉孔子曰書之重辭之復嗚呼不可不察也其中必有美者焉此之謂也循天之道第七十七循天之道以養其身謂之道也天有兩和以成二中嵗立其中用之無窮是北方之中用合隂而物始動於下南方之中用合陽而養始美於上其動於下者案他本其字誤移在上字上不得東方之和不能生中春是也其養於上者不得西方之和不能成中秋是也然則天地之美惡案他本誤移不能成三字在此句下在兩和之處二中之所來歸而遂其為也是故和案他本無和字東方生而西方成東方和生案他本無生字北方之所起前案他本闕前字而西方和成南方之所養長起之不至於和之所不能生養長之不至於和之所不能成成於和生必和也始於中止必中也中者天下之所終始案他本脱始字也而和者天地之所生成也夫徳莫大於和而道莫正案他本正作止於中中者天地之美逹理也聖人之所保守也詩云不剛不柔布政優優此非中和之謂歟是故能以中和理天下者其徳大盛能以中和養其身者其壽極命男女之法法隂與陽陽氣起於北方至南方而盛盛極而合乎隂隂氣起乎中夏至中冬而盛盛極而合乎陽不盛不合是故十月而壹案他本無壹字俱盛終嵗而乃再合天地乆節以此為常是故先法之内矣養身以全使男子不堅牡不家室隂不極盛案他本極盛作盛極不相接是故身精明難衰而堅固壽考無忒此天地之道也天氣先盛牡而後施精故其精固地氣盛牝而後化故其化良是故隂陽之㑹冬合北方而物動於下夏合南方而物動於上上下之大動皆在日至之後為寒則凝冰裂地為熱則焦沙爛石氣之精至於是故天地之化春氣生而百物皆出夏氣養而百物皆長秋氣殺而百物皆死冬氣收而百物皆藏是故惟天地之氣而精出入無形而物莫不應實之至君子法乎其所貴天地之隂陽當男女人之男女當隂陽隂陽亦可以謂男女男女亦可以謂隂陽天地之經生至東方之中而所生大養至西方之中而所養大成一嵗四起業而必於中中之所為而必就於和故曰和其要也和者天之正也隂陽之平案他本平誤作年也其氣案他本下有於字最良物之所生也誠擇其和者以為大得天地之奉也天地之道雖有不和者必歸之於和而所為有功雖有不中者必止之於中而所為不失是故陽之行始於北方之中而止於南方之中隂之行始於南方之中而止於北方之中隂陽之道不同至於盛而皆止於中其所始起皆必於中中者天地之大極也日月之所至而郤也長短之隆不得過中天地之制也兼和與不和中與不中而時用之盡以為功是故時無不時者天地之道也順天之道節者天之制也陽者天之寛也隂者天之急也中者天之用也和者天之功也舉天地之道而美於和是故物生皆貴氣而迎養之孟子曰我善養吾浩然之氣者也謂行必終禮而心目喜常以陽得生其意也公孫之養氣日裏藏原註三字未詳泰實則氣不通泰虛則氣不足熱勝則氣寒原註此下疑少五字泰勞則氣不入泰佚則氣宛至怒則氣高喜則氣散憂則氣狂懼則氣懾凡此十者氣之害也而皆生於不中和故君子怒則反中而自説以和喜則反中而收之以正憂則反中而舒之以意懼則反中而實之以精夫中和之不可反如此故君子道至而原註一作氣則華而上凡氣從心心氣之君也何為而氣不隨也是以天下之道者皆言内心其本也故仁人之所以多壽者外無貪而内清淨心平和而不失中正取天地之美以養其身是其且多且治鶴之所以壽者無宛氣於中是故食冰猿之所以壽者好引其末是故氣四越天氣常下案他本下誤作不施於地是故道者亦引氣於足天之氣常動而不滯是故道者亦不宛氣苟不治雖滿不虛是故君子養而和之節而法之去其羣泰取其衆和高臺多陽廣室多隂遠天地之和也故人勿為適之而已矣法人八尺四尺其中也宫者中央之音也甘者中央之味也四尺者中央之制也是故三王之禮味皆尚甘聲皆尚和處其身所以常自漸於天地之道其道同類一氣之辨也法天者乃法人之辨天之道嚮秋冬而隂來嚮春夏而隂去是故古之人霜降而迎女氷泮而殺内與隂俱近與陽遠也天地之氣不致盛滿不交隂陽是故君子甚愛氣而游於房以體天也氣不傷於以盛通而傷案他本傷作傖於不時天并不與隂陽俱徃來謂之不時恣其欲而不顧天數謂之天并君子治身不敢違天是故新牡十日而一游於房中年者倍新牡始衰者倍中年中衰者倍始衰大衰者以月當新牡之日而上與天地同節矣此其大畧也然而其要皆期於不極盛不相遇疎春而矌夏謂不遠天地之數民皆知愛其衣食而不愛其天氣天氣之於人重於衣食衣食盡尚猶有間氣而立終故養生之大者乃在愛氣氣從神而成神從意而出心之所之謂意意勞者神擾神擾者氣少氣少者難乆矣故君子閑欲止惡以平意平意以靜案他本靜作淨下同神靜神以養原註一作愛氣氣多而治則養身案他本身誤作人之大者得矣古之道士有言曰將欲無陵固守一徳此言神無離形則氣多内充而忍饑寒也知樂者生之外泰也精神者生之内充也外泰不若内充而况外傷乎忿恤憂案他本恤憂作憂恤恨者生之傷也案他本也誤作亡和説勸善者生之養也君子慎小物而無大敗也行中正聲嚮榮氣意和平居處虞樂可謂養生矣凡養生者莫精於氣故天下之君此物獨死可食者告其味之便於人也其不食者告殺穢除害之不待秋也當物之大枯之時羣物皆死如案他本如作知此物獨生其可食者益食之天為之利人獨代生之其不可食益畜之天愍州華之間故生宿麥中案他本中作正嵗而熟之君子察物之異以求天意大可見矣是故男女體其盛臭味取其勝居處就其和勞佚居其中寒煖無失適饑飽無過平案他本平作乎欲惡度理動靜順性命喜怒止於中憂懼反之正此中和常在乎其身謂之大案他本無大字得天地泰大案他本無大字得天地泰者其壽引而長不得天地泰者其壽傷而短短長之質人之所由受於人也是故壽有短長養有得失及至其末之大卒而必讎於此莫之得離故壽之為言猶讎也天下之人雖衆不得不合讎其所生而壽夭與其所以日自行可乆之道者其壽讎於乆自行不可乆之道者其壽亦讎於不乆乆與不乆案他本脱與不乆三字之情各讎其生平之所行今如案他本今如作如今後至不可得勝故曰壽者讎也然則人之所自行乃與其壽夭相益損也其自行佚而壽長者命益之也其行端而壽短者命損之也以天命之所損益疑人之所得失此大惑也是故天長之而人傷之者其長損天短之而人養之者其短益夫案他本夫誤作失損夭者皆人人其天之繼歟出其質而人勿繼豈獨立案他本立作哀哉春秋繁露卷十六欽定四庫全書}
