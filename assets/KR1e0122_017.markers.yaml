  - {type: variant, offset: 3682, length: 405, content: 之經在人者亦天也奈何其久留天氣使之鬱滯不得以其正周行也是故天行穀朽寅而秋生麥告除穢而繼乏也所以成功繼乏以贍人也天之生有大經也而所周行者又有害功也除而殺殛者行急皆不待時也天之志也而聖人承之以治是故春修仁而求善秋修義而求惡冬修刑而致清夏修德而致寬此所以順天地體陰陽然而方求善之時見惡而不釋方求惡之時見善亦立行方致清之時見大善亦立舉之方致寬之時見大惡亦立去之以效天地之方生之時有殺也方殺之時有生也是故志意隨天地緩急倣陰陽然而人事之宜行者無所鬱滯且恕於人順於天天人之道兼舉此謂執其中天非以春生人以秋殺人也當生者曰生當死者曰死非殺物之義待四時也而人之所治也安取久留當行之理而必待四時也此之謂壅非其中也人有喜怒哀樂猶天之有春夏秋冬也喜怒哀樂之至其時而欲發也若春夏秋冬之至其時而欲出也皆天氣之然也其宜直行而無鬱滯一也天終歲乃一徧此四者而人主終日不知過此四之數其理故不可以相待且天之欲利人非直其欲利穀也除穢不待時況穢人乎天地陰, WYG: 隂}
