  - {type: variant, offset: 5769, length: 0, content: '', SBCK: 篇之數余老矣猶欲得一善本聞婺女潘同年叔度景憲多收異書屬其子弟訪之始得此本果有八十二篇是萍鄕本猶未及其半也喜不可言以校印本各取所長悉加改定義通者兩存之轉寫相訛又古語亦有不可强通者春秋㑹解一書年所集案此句年字上下皆原有缺文仲方摭其引繁露十三條今皆具在余又據說文解字王字下引董仲舒曰古之造文者三畫而連其中謂之王三者天地人也而參通之者王也許叔重在後漢和帝時今所引在王道通三第四十四篇中其餘傳中對越三仁之問朝廷有大議使使者及廷尉張湯就其家問之求􅀨閉諸陽縱諸陰其止雨反是三策中言天之仁愛人君}
