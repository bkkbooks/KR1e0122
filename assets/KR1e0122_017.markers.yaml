  - {type: variant, offset: 4669, length: 775, content: 地陰陽第八十一天地陰陽木火土金水九與人而十者天之數畢也故數者至十而止書者以十為終皆取之此聖人何其貴者起於天至於人而畢畢之外謂之物物者投所貴之端而不在其中以此見人之超然萬物之上而最為天下貴也人下長萬物上參天地故其治亂之故動靜順逆之氣乃損益陰陽之化而搖蕩四海之內物之難知者若神不可謂不然也今投地死傷而不騰相助投淖相動而近投水相動而愈遠由此觀之夫物愈淖而愈易變動搖蕩也今氣化之淖非直水也而人主以眾動之無已時是故常以治亂之氣與天地之化相殽而不治也世治而民和志平而氣正則天地之化精而萬物之美起世亂而民乖志僻而氣逆則天地之化傷氣生災害起是故治世之德潤草木澤流四海功過神明亂世之所起亦博若是皆因天地之化以成敗物乘陰陽之資以任其所為故為惡愆人力而功傷名自過也天地之閒有陰陽之氣常漸人者若水常漸魚也所以異於水者可見與不可見耳其澹澹也然則人之居天地之閒其猶魚之離水一也其無閒若氣而淖於水水之比於氣也若泥之比於水也是天地之閒若虛而實人常漸是澹澹之中而以治亂之氣與之流通相殽也故人氣調和而天地之化美殽於惡而味敗此易之物也推物之類以易見難者其情可得治亂之氣邪正之風是殽天地之化者也生於化而反殽化與運連也春秋舉世事之道夫有書天之盡與不盡王者之任也詩云天難諶斯不易維王此之謂也夫王者不可以不知天知天詩人之所難也天意難見也其道難理是故明陽陰入出實虛之處所以觀天之志辨五行之本末順逆小大廣狹所以觀天道也天志仁其道也義為人主者予奪生殺各當其義若四時列官置吏必以其能若五行好仁惡戾任德遠刑若陰陽此之謂能配天天者其道長萬物而王者長人人主之大天地之參也好惡之分陰陽之理也喜怒之發寒暑之比也官職之事五行之義也以此長天地之閒蕩四海之內殽陰陽之氣與天地相雜是故人言既曰王者參天地矣苟參天地則是化矣豈獨天地之精哉王者亦參而殽之治則以正氣殽天地之化亂則以邪氣殽天地之化同者相益異者相損之數也無可疑者矣天, SBCK: ''}
