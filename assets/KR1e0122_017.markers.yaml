  - {type: variant, offset: 1422, length: 874, content: 蘇輿本天地之行第七十八天地之行美也是以天高其位而下其施藏其形而見其光序列星而近至精考陰陽而降霜露高其位所以為尊也下其施所以為仁也藏其形所以為神也見其光所以為明也序列星所以相承也近至精所以為剛也考陰陽所以成歲也降霜露所以生殺也為人君者其法取象於天故貴爵而臣國所以為仁也深居隱處不見其體所以為神也任賢使能觀聽四方所以為明也量能授官賢愚有差所以相承也引賢自近以備股肱所以為剛也考實事功次序殿最所以成世也有功者進無功者退所以賞罰也是故天執其道為萬物主君執其常為一國主天不可以不剛主不可以不堅天不剛則列星亂其行主不堅則邪臣亂其官星亂則亡其天臣亂則亡其君故為天者務剛其氣為君者務堅其政剛堅然後陽道制命地卑其位而上其氣暴其形而著其情受其死而獻其生成其事而歸其功卑其位所以事天也上其氣所以養陽也暴其形所以為忠也著其情所以為信也受其死所以藏終也獻其生所以助明也成其事所以助化也歸其功所以致義也為人臣者其法取象於地故朝夕進退奉職應對所以事貴也供設飲食候視疢疾所以致養也委身致命事無專制所以為忠也竭愚寫情不飾其過所以為信也伏節死難不惜其命所以救窮也推進光榮襃揚其善所以助明也受命宣恩輔成君子所以助化也功成事就歸德於上所以致義也是故地明其理為萬物母臣明其職為一國宰母不可以不信宰不可以不忠母不信則草木傷其根宰不忠則姦臣危其君根傷則亡其枝葉君危則亡其國故為地者務暴其形為臣者務著其情一國之君其猶一體之心也隱居深宮若心之藏於胸至貴無與敵若心之神無與雙也其官人上士高清明而下重濁若身之貴目而賤足也任群臣無所親若四肢之各有職也內有四輔若心之有肝肺脾腎也外有百官若心之有形體孔竅也親聖近賢若神明皆聚於心也上下相承順若肢體相為使也布恩施惠若元氣之流皮毛腠理也百姓皆得其所若血氣和平形體無所苦也無為致太平若神氣自通於淵也致黃龍鳳皇若神明之致玉女芝英也君明臣蒙其功若心之神體得以全臣賢君蒙其恩若形體之靜而心得以安上亂下被其患若耳目不聰明而手足為傷也臣不忠而君滅亡若形體妄動而心為之喪是故君臣之禮若心之與體心不可以不堅君不可以不賢體不可以不順臣不可以不忠心所以全者體之力也君所以安者臣之功也, SBCK: ''}
