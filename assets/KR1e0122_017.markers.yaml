  - {type: variant, offset: 5762, length: 4, content: 天道施第, krp: 皆有余高祖正議先生序文始得寫本於里中亟傳而讀之舛誤至多恨無他本可校巳而得京師印本以爲必佳而相去殊不遠又竊疑竹林玉杯等名與其書不相關後見尚書程公跋語亦以篇名爲疑又以通典太平御覽太平寰宇記所引繁露之書今書皆無之遂以爲非董氏本書且以其名謂必類小說家後自爲一編記雜事名演繁露行於世開禧三年今編修胡君仲方榘宰萍鄕得羅氏蘭堂本刻之縣庠考證頗備凡程公所引三書之言皆在書中則知程公所見者未廣遂謂爲小說者非也然止於三十七篇終不合崇文總目及歐陽文忠公所藏}
