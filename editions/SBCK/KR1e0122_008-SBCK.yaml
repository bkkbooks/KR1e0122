body:
  text: 漢董仲舒撰度制第二十七原註一名調均篇孔子曰不患貧而患不均故有所積重則有所空虛矣大富則驕大貧則憂憂則爲盜驕則爲暴此衆人之情也聖者則於衆人之情見亂之所從生故其制人道而差上下也使富者足以示貴而不至於驕貧者足以養生而不至於憂以此爲度而調均之是以財不匱案原本匱作遺而上下相安故易治也今世棄其度制而各從其欲他本誤作是之况人乎故明聖者象天所爲爲制度使諸有大奉祿亦皆不得兼小利與民爭利業乃天理也凡百亂之源皆出嫌疑纖微以漸寖稍長至於大聖人章其疑者别其微者絶其纖者不得嫌以蚤防之聖人之道衆隄防之類也謂之度制謂之禮節故貴賤有等衣服有别朝廷有位鄕黨有序則民有所讓而民不敢爭所以一之也書曰轝服有庸誰敢弗讓敢不敬應此之謂也凡衣裳之生也爲蓋形煖身也然而染五采飾文章者非以爲益肌膚血氣之情也將以貴貴尊賢而明别上下之倫使敎亟行使化易成爲治爲之也若去其度制使人人從其欲快其意以逐無窮是大亂人倫而靡斯財用也失文采所遂生之意矣上下之倫不别其勢不能相治故苦亂也嗜欲之物無限其數不能相足故苦貧也今欲以亂爲治以貧爲富非反之制度不可古者天子衣文諸侯不以燕大夫以祿亦不以燕庶人衣縵此其大略也爵國第二十八春秋曰會宰周公又曰公㑹齊侯宋公鄭伯許男滕子又曰初獻六羽傳曰天子三公稱公王者之後稱公其餘大國稱侯小國稱伯子男凡五等故周爵五等土案土他本作上三品文多而實少春秋三等合伯子男爲一爵土二品文少而實多案土二品文少而實多他本作上二等文多而實少春秋曰荆傳曰氏不若人人不若名名不若字凡四等命曰附庸三代共之然則其地列奈何曰天子􅀖圻千里公侯百里伯七十里子男五十里附庸字者方三十里名者方二十里人氏者方十五里春秋曰宰周公傳曰天子三公祭伯來傳曰天子大夫宰渠伯糾傳曰下大夫石尙傳曰天子之士也王人傳曰微者謂下士也凡五等春秋曰作三軍傳曰何以書譏何譏爾古者上􅀸下􅀸上士下士凡四等小國之大夫與次國下􅀸同次國大夫與大國下􅀸同大國下大夫與天案天他本作王子下士同二十四等祿案祿字下他本有一等字八差有大功德者受大爵士功德小者受小爵土大材者執大官位小材者受小官位如其能宣治之至也故萬人者曰英千人者曰俊百人者曰傑十人者曰豪豪傑俊英不相陵故治天下如視諸掌上其數何法以然曰天子分左右五等三百六十三人法天一歲之數五時色之象也通佐十上􅀸案他本誤移十字在上字下與下􅀸而二百二十人案二十他本作六十天庭之􅁚也倍諸侯之數也諸侯之外佐四等百二十人法四時六甲之數也通佐五與下而六十人法日辰之數也佐之必三三而相復何曰時三月而成大辰三而成象諸侯之爵或五何法天地之數也五官亦然然案他本無下然字則立置有司分指數奈何曰諸侯大國四軍古之制也案他本無也字其一軍以奉公家也凡口軍三口者何曰大國十六萬口而立口軍三何以言之曰以井田准數之方里而一井一井而九百畝而立口方里八家一家百畝以食五口上農夫耕百畝食九口次八人次七人次六人次五人多寡相補率百畝而三口方里而二十四口方里者十得二百四十口方十里爲方里者百得二千四百口方百里爲方里者千得二萬四千口方千里爲方里者萬得二十四萬口案此條計算恐多舛法三分而除其一城池郭邑屋室閭巷街路市官府園囿萎􆂁臺沼椽采得良田方十里者六十六十與方里六十六定率得十六萬口三分之則各五案他本脫五字萬三千三百三十口爲大口軍三此公侯也天子地方千里爲方百里者百亦三分除其一定得田方百里者六十六與方十里者六十六定率得千六百萬口九分之各得百七十七萬七千七百七十七口爲京口軍九三京口軍以奉王家故天子立一后一世夫人中左右夫人四姬三良人立一世子三公九􅀸二十七大夫八十一元士二百四十三下士有七上􅀸二十一下􅀸六十三元士百二十九下士王后置一太傅太母三伯三丞二十夫人四姬三良人各有師傅世子一人太傅三傅三率三少士入仕宿衞天子者比下士下士者如上士之下數王后御衞者上下御各五人二十夫人中左右夫人四姬上下御各五人三良人各五人世子妃姬及士衞者如公侯之制王后案后他本誤作侯􅀓上下史案史字他本誤作吏五人三伯案伯字他本誤作百上下史各五人少伯史各五人世子太傅上下史各五人少傅亦各五人三率三下率亦案他本無亦字各五人三公上下史各五人􅀸上下史各五人大夫上下史各五人元士上下史各五人上下􅀸上下士之史上下亦各五人卿大夫元士臣各三人故公侯方百里三分除其一定得田方十里者六十六與方里六十六定率得十六萬口三分之爲大國口軍三而立大國一夫人一世婦左右婦三姬二良人立一世子三􅀸九大夫二十七上士八十一下士亦有五通大夫立上下士上􅀸位比天子之元士今八百石下􅀸六百石上士四百石下士三百石夫人一傅母三伯三丞世婦左右婦三姬二良人各有師保世子一上傅丞士宿衞公者比公者比上􅀸者有三人下􅀸六人比上下士者如上下之數夫人御衞者上下御各五人世婦左右婦上下御各五人二􅀸御各五人世子上傅上下史各五人丞史各五人三􅀸九大夫上士史各五人下士史各五人通大夫士上下史各五人􅀸臣二人此公侯之制也公侯賢者爲州方伯錫斧鉞置虎賁百人故伯七十里七七四十九三分除其一定得田方十里者二十八與方十里者六十六定率得十萬九千二百一十二口爲次國口軍三而立次國一夫人世婦左右婦三良人二孺子立一世子三􅀸九大夫二十七上士八十一下士與五通大夫五上士十五下士其上􅀸位比大國之下􅀸今六百石下􅀸四百石上士三百石下士二百石夫人一傅母三伯三丞世婦左右婦三良人二御案御他本誤作􅀸人各有師保世子一下士原註一作上下傅士宿衞公者比上􅀸者三人下卿六人比上下士如上下案此下他本衍一士字之數夫人御衞者上下士御各五人世婦左右婦上下御各五人二御各五人世子上傅上下史各五人丞史各五人三􅀸九大夫上下史各五人下士史各五人通大夫上下史各五人􅀸臣二人故子男方五十里五五二十五爲方十里者六十六定率得四萬口爲小國口軍三而立小國夫人世婦左右婦三良人二孺子立一世子三􅀸九大夫二十七上士八十一下士與五通大夫五上士十五下士其上􅀸比次國之下􅀸今四百石下􅀸三百石上士二百石下士百石夫人一傅母案母他本作氏三伯三丞世婦左右婦三良人一御案一御他本誤作二􅀸人各有師保世子一上下傅士宿衞公者比上􅀸者三人下􅀸六人御衞者上下御各五人世婦左右婦上下御各五人二御人各五人世子上傅上下史各五人三􅀸九大夫上下史各五人士各五人通原註一作五大夫上下史亦各五人􅀸臣三人此周制也春秋合伯子男爲一等故附庸字者地方三十里三三而九三分而除其一定得田方十里者六十定率得一萬四千四百口爲口師三而立一宗婦二妾一世子宰丕丞案丞他本作承一士一秩士五人宰視子男下􅀸今三百石宗婦有師保御者三人妾各二人世子一傅士宿衞君者比上􅀸下􅀸一人上下各如其數世子傅上下史各五人下良五稱名善者地方半字君之地九半四分除其一得田方十里者三定率得七千二百口一世子宰今二百石下四半三半二十五三分除其一定得田方十里者一與方里者五十定得三千六百口一世子宰今百石史五人宗婦案他本宗婦下有一士字仕衞世子臣仁義法第二十九春秋之所治人與我也所以治人與我者仁與義也以仁安人以義正我故仁之爲言人也義之爲言我也言名以别矣仁之於人義之於我者不可不察也衆人不察乃反以仁自裕而以義設人詭其處而逆其理鮮不亂矣原註一作必亂是故人莫欲亂而大抵常亂凡以闇於人我之分而不省仁義之所在也是故春秋爲仁義法仁之法在愛人不在愛我案愛我他本誤作我愛義之法在正我不在正人我不自正雖能正人弗予爲義人不被其愛案愛他本作澤雖厚自愛不予爲仁昔者晉靈公殺膳宰以淑飮食彈大夫以娛其意非不厚自愛也然而不得爲淑人者不愛人也質於愛民以下至於鳥獸昆蟲莫不愛不愛奚足謂仁案不愛奚足謂仁他本作方足謂仁仁者愛人之名也酅傳案傳他本誤作得無大之之辭自爲追原註一作近則善其所卹遠也兵巳加焉乃徃救之則弗美未至豫備原註一作衛之則美之善其救害之先也夫救蚤而先之則害無由起而天下無害矣然則觀物之動而先覺其萌絶亂塞害於將然而未行之時春秋之志也其明至案至他本作智矣非堯舜之智知禮之本孰能當此故救害而先知之明也公之所恤遠而案而他本作如春秋美之詳其美恤遠之意則天地之間然後快其仁矣非三王之德選賢之精孰能如此是以知明先而案而他本作以仁厚遠遠而愈賢近而愈不肖者愛也故王者愛及四夷霸者愛及諸侯安者愛及封内危者愛及旁側亡者愛及獨身獨身者雖立天子諸侯之位一夫之人耳無臣民原註一作人之用矣如此者莫之亡而自亡也春秋不言伐梁者而言梁亡蓋愛獨及其身者也故曰仁者愛人不在愛我此其法也義云者非謂正人謂正我雖有亂世枉上莫不欲正人奚謂義昔者楚靈王討陳蔡之賊齊桓公執袁濤塗之罪非不能正人也然而春秋弗予不得爲義者我不正也闔廬能正楚案楚他本作陳蔡之難矣而春秋奪之義辭以其身不正也潞子之於諸侯無所能正春秋予之有義其身正也趨利而也原註一無此四字故曰義在正我不在正人此其法也夫我無之求諸人我有之而誹原註一作非諸人人之所不能受也其理逆矣何可謂義義者謂案謂他本誤作得宜在我者宜在我者而後可以稱義故言義者合我與宜以爲一言以此操之義之案他本無之字爲言我也故曰有爲而得義者謂之自得有爲而失義者謂之自失人好義者謂之自好人不好義者謂之不自好以此參之義我也明矣是義與仁殊仁謂徃義謂來仁大遠義大近愛在人謂之仁義在我謂之義仁主人義主我也故曰仁者人也義者我也此之謂也君子求仁義之别以紀人我之間然後辨乎内外之分而著於順逆之處也是故内治反理以正身據祉原註一作禮以勸福原註一作贍外治推恩以廣施寛制以容衆孔子謂冉子曰案他本無曰字治民者先富之而後加教語樊遲曰治身者先難後獲以此之謂治身之與治民所先後者不同焉矣詩云飮之食之敎之誨之先飮食而後教誨謂治人也又曰坎坎伐輻彼君子兮不素餐兮先其事後其食謂之治身也春秋刺上之過而矜下之苦小惡在外弗舉在我書而誹原註一作非之凡此六者以仁治人義治我躬自厚而薄責於外此之謂也且論巳見之而人不察曰君子攻其惡不攻人之惡不攻人之惡非仁之寛歟自攻其惡非義之全歟此謂之仁造人義造我何以異乎故自稱其惡謂之情稱人之惡謂之賊求諸巳謂之厚求諸人謂之薄自責以備謂之明責人以備謂之惑是故以自治之節治人是居上不寛也以治人之度自治是爲禮不敬也爲禮不敬則傷行而民弗尊居上不寛則傷厚而民弗親弗親則弗信弗尊則弗敬二端之正佹案正佹他本作政詭於上而僻行之則誹於下仁義之處可無論乎夫目不視弗見心弗論不得雖有天下之至味弗嚼弗知其旨也雖有聖人之至道弗論不知其義也必仁且知第三十莫近於仁莫急於智不仁而有勇力財原註一作材能則狂而操利兵也不智而辯慧獧給則迷而乘良馬也故不仁不智而有材能將以其材能以輔其邪狂之心而贊其僻違之行適足以大其非而甚其惡耳其强足以覆過其禦足以犯詐其慧足以惑愚其辯足以飾非其堅足以斷辟其嚴足以拒諫此非無材能也其施之不當而處之不義也有否心者不可藉便埶案埶他本作執其質愚者不與利器論之所謂不知人也者恐不知別此等也仁而不知則愛而不别也知而不仁則知而不爲也故仁者所以愛人類也智者所以除其害也何謂仁仁者㦧案㦧他本作惻怛愛人謹翕不爭好惡敦倫無傷惡之心無隱忌之志無嫉妒之氣無感愁之欲無險詖之事無辟違之行故其心舒原註一作倫其志平其氣和其欲節其事易其行道故能平易和理而無爭也如此者謂之仁何謂之知先言而後當凡人欲舍行爲皆以其知先規而後爲之其規是者其所爲得其所事當其行遂其名榮其身故利而無患福及子孫德加萬民湯武是也其規非者其所爲不得其事其事案他本無下其事二字不當其行不遂其名辱害及其身絶世無復殘類滅宗亡國是也故曰莫急於知知者見禍福遠其知利害蚤物動而知其化事興而知其歸見始而知其終言之而無敢譁立之而不可廢取之而不可舍前後不相悖終始有類思之而有復及之而不可厭其言寡而足約而喻簡而達省而具少而不可益多而不可損其動中倫原註一作禮其言當務如是者謂之知其大畧之類天地之物有不常之變者謂之異小者謂之災災常先至而異乃隨之災者天之譴也異者天之威也譴之而不知乃畏之以威詩云畏天之威殆此謂也凡災異之本盡生於國家之失國家之失案他本脫下國家之失四字乃始萌芽而天出災害以譴告之譴告之而不知變乃見怪異以驚駭之驚駭之尚不知畏恐其殃咎乃至以此見天意之仁而不欲陷案陷他本作害人也謹按災異以見天意天意有欲也有不欲也所欲所不欲者人内以自省宜有懲於心外以觀其事宜有驗於國故見天意者之於災異也畏之而不惡也以爲天欲振吾過救吾失故以此救我也春秋之法上變古易常應是而有天災者謂幸國孔子曰天之所幸有爲不善而屢極且莊王曰天不見災地不見孽則禱之於山川曰天其將亡予􅁘不說吾過極吾罪也以此觀之天災之應過而至也異之顯明可畏案畏他本誤作謂也此乃天之所欲救也
