body:
  text: 春秋繁露卷十一漢董仲舒撰爲人者天第四十一爲生不能爲人爲人者天也人之人本於天天亦人之曾祖父也此人之所以乃上類天也人之形體化天數而成人之血氣化天志而仁案他本仁作行人之德行化天理而義人之好惡化天之暖清人之喜怒化天之寒暑人之受命化天之四時人生有喜怒哀樂之答春秋冬夏之類也喜春之答也怒秋之答也樂夏之答也哀冬之答也天之副在乎人人之情性有由天者矣故曰受由天之號也爲人主也道莫明省身之天如天案他本無天字出之也使其出也答天之出四時而必忠其受案他本受作愛也則堯舜之治無以加是可生可殺而不可使爲亂故曰非道不行非法不言此之謂也傳曰惟天子受命於天天下受命於天子一國則受命於君君命順則民有順命君命逆則民有逆命故曰一人有慶萬民頼之此之謂也傳曰政有三端父子不親則致其愛慈大臣不和則敬順其禮百姓不安則力其孝弟孝弟者所以安百姓也力者勉行之身以化之天地之數不能獨以寒暑成歲必有春夏秋冬聖人之道不能獨以威勢成政必有教化故曰先之以博愛敎案他本下有之字以仁也難得者君子不貴教以義也雖天子必有尊也教以孝也必有先也敎以弟也此威勢之案他本無之字不足獨恃而教化之功不大乎傳曰天生之地載之聖人教之君者民之心也民者君之體也心之所好體必安之君之所好案他本好作命民必從之故君民者貴孝弟而好禮義重仁廉而輕財利躬親職此於上而萬民聽生善於下矣故曰先王見敎之可以化民也此之謂也五行之義第四十二天有五行一曰木二曰火三曰土四曰金五曰水木五行之始也水五行之終也土五行之中也此其天次之序也木生火火生土土生金金生水水生木此其父子也木居左金居右火居前水居後土居中央此其父子之序相受而布是故木受水而火受木土受火而案他本無而字金受土水受金也諸授之者皆其父也受之者皆其子也常因其父以使其子天之道也是故木巳生而火養之金巳死而水藏之火樂木而養以陽水克金而喪以陰土之事天竭其忠故五行者乃孝子忠臣之行也五行之爲言案他本下有也字猶五行歟是故以得辭也聖人知之故多其愛而少嚴厚養生而謹送終就天之制也以子而迎成養如火之樂木也喪父如水之尅金也事君若土之敬天也可謂有行人矣五行之隨各如其序五行之官各致其能是故木居東方而主春氣火居南方而主夏氣金居西方而主秋氣水居北方而主冬氣是故木主生而金主殺火主暑而水主寒使人必以其序官人必以其能天之數也土居中央爲之天潤土者天之股肱也其德茂美不可名以一時之事故五行而四時者土兼之也金木水火雖各職不因土方不立若酸醎辛苦之不因甘肥不能成味也甘者五味之本也土者五行之主也五行之主土氣也猶五味之有甘肥也不得不成是故聖人之行莫貴於忠土德之謂也人官之大者不名所職相其是矣天官之大者不名所生土是矣陽尊隂卑第四十三天之大數畢於十旬旬天地之間十而畢舉旬生長之功十而畢成十者天數之案他本數之作之數所止也古之聖人因天數之所止以爲數紀十如更始民世世傳之而不知省其所起知省其所起則見天數之所始見天數之所始則知貴賤逆順所在知貴賤逆順所在則知天地之情著聖人之寶出矣是故陽氣以正月始出於地生育養長於上至其功必成也案他本也作矣而積十月人亦十月而生合於天數也是故十月而成人亦十月而成合於天道也故陽氣出於東北入於西北發於孟春畢於孟冬而物莫不應是陽始出物亦始出陽方盛物亦方盛陽初衰物亦初衰物隨陽而出入數隨陽而終始三王之正隨陽而更起以此見之貴陽而賤陰也故數日者據晝而不據夜數歲者據陽而不據陰不得達之義是故春秋之於昏禮也達未宋公而不達宋公不宜稱而達達陽而不達陰以天道制之也丈夫案他本夫誤作人雖賤皆爲陽婦人雖貴皆爲陰陰之中亦相爲陰陽之中亦相爲陽諸在上者皆爲其下陽諸在下者各爲其上隂陰猶沈也何名何有皆并一於陽昌力而辭功故出雲起雨必令從之下命之曰天雨不敢有其所出上善而下惡惡者受之善者不受夫喜怒哀樂之發與清煖寒暑其實一類案他本類作貫也喜氣爲煖而當春怒氣爲清而當秋樂氣爲太陽而當夏哀氣爲太陰案他本陰誤作陽而當冬四氣者天與人所同有也非人所能案他本能作當畜也故可節而不可止也節之而順止之而亂人生於案他本於作而天而取化於天喜氣取諸春樂氣取諸夏怒氣取諸秋哀氣取諸冬四氣之心也四肢之答案他本無答字各有處如四時寒暑不可移若肢體肢體移易其處謂之壬人寒暑移易其處謂之敗歲喜怒移易其處謂之亂世明王正喜以當春正怒以當秋正樂以當夏正哀以當冬上下法此以取天之道春氣愛秋氣嚴夏氣樂冬氣哀愛氣以生物嚴氣以成功樂氣以養生哀氣以喪終天之志也是故春氣暖者天之所以愛而生之秋氣清者天之所以嚴而成之夏氣温者天之所以樂而養之冬氣寒者天之所以哀而藏之春主生夏主養冬主藏秋主收生漑其樂以養死漑其哀以藏爲人子者也故四時之比父子之道天地之志君臣之義也陰陽理人之法也隂刑氣也陽德氣也陰始於秋陽始於春春之爲言猶偆偆也秋之爲言猶湫湫也偆偆者喜樂之貌也湫湫者憂悲之狀也是故春喜夏樂秋憂冬悲悲死而樂生以夏養春以冬喪秋大人之志也是故先愛而後嚴樂生而哀終天之當也而人資諸天大德而小刑也是故人主近天之所近遠天之所遠大天之所大小天之所小是故天數右陽而不右隂務德而不務刑刑之不可任以成世也猶陰不可任以成歲也爲政而任刑謂之逆天非王道也王道通三第四十四古之造文者三畫而連其中謂之王三畫者天地與人也而連其中者通其道也取天地與人之中以爲貫而參通之非王者孰能當是故王者唯天之施施其時而成之法其命而案他本而作如循之諸人法其數而以起事治其道而以出法治其志而歸之於仁仁之美者在於天夫案他本夫作大仁也天覆育萬物旣化而生之有養而成之事功無巳終而復始凡舉歸之以奉人察於天之意無窮極之仁也人之受命於天也取仁於天而仁也是故人之受命天之尊父兄子弟之親有忠信慈惠之心有禮義廉讓之行有案他本有作者是非逆順之治文理燦然而厚知案他本知作之廣大有而博惟人道爲可以參天天常以愛利爲意案他本意作義以養長案他本無長字爲事春秋冬夏皆其用也王者亦常以愛利天下爲意以安樂世爲事好惡喜怒而備用也然而主好惡喜怒乃天下案他本無下字之春夏秋冬也其俱煖淸寒暑而以變化成功也天出此物者時則歲美不時則歲惡人主出此四者義則世治不義則世亂是故治世與義歲同數亂世與惡歲同數以此見人理之副天道也天有寒有暑土若地義之至案他本至作主也是故春秋君不名惡臣不名善善皆歸於君惡皆歸於臣臣之義比於地故爲人臣下案他本無下字者視地之事天也爲人子者視土之事火也雖案他本雖誤作難居中央亦歲七案他本七作亡十二日之王傳於火以調和養長然而弗名者皆并功於火火得以盛不敢與父分功案他本無功字美孝之至也是故孝子之行忠臣之義皆法於地也地事天也猶下之事上也地天之合也物無合㑹之義是故推天地案他本無地字之精運陰陽之類以別順逆之理安所加以不在上下在大小在强弱在賢不肖在善惡惡之屬盡爲陰善之屬盡爲陽陽爲德陰爲刑刑反德而順於德亦權之類也雖曰權皆在案他本皆在作在皆權成是故陽行於順隂行於逆逆行而順順行而逆者陰也是故天以陰爲權以陽爲經陽出而南陰出而北經用於盛權用於末以此見天之顯經隱權前德而後刑也故曰陽天之德陰天之刑也陽氣煖而隂氣寒陽氣予而陰氣奪陽氣仁而隂氣戾陽氣寛而陰氣急陽氣愛而隂氣惡陽氣生而陰氣殺是故陽常居實位而行於盛隂常居空虛而行於末天之好仁而近惡戾之變而遠大德而小刑之意也先經而後權貴陽而賤陰也故陰夏入居下不得任歲事冬出居上置之空處也養長之時伏於下遠去之弗使得爲陽也無事之時起之空處使案他本使誤作備之備次陳守閉塞也此見天之近陽而遠陰天固有此然而無所之如其身而巳矣人主立於生殺之位與天共持變化之勢物莫不應天化天地之化如四時所好之風出則爲煖氣而有生於俗所惡之風出則爲清氣而有殺於俗喜則爲案他本爲作有暑氣而有養長也怒則爲寒氣而有閉塞也人主以好惡喜怒變習俗案他本習俗作俗習而天以煖淸寒暑化草木喜樂時而當則歲美不時而妄則歲惡天地人主一也然則人主之好惡喜怒乃天之煖淸寒暑也不可不審其處而出也當暑而寒當寒而暑必爲惡歲矣案他本矣作也人主當喜而怒當怒而喜必爲亂世矣是故人主之大守在於謹藏而禁内使好惡喜怒必當義乃出若煖淸寒暑之必當其時乃發也人主掌此而無失案他本下有而字使乃好惡喜怒未嘗差也如春秋冬夏之未嘗過也可謂參天矣深藏此四者而勿使妄發可謂天矣天容第四十五天之道有序而時有度而節變而有常及而有相奉微而至遠踔而至精一而少積蓄廣而實虛而盈聖人視天而行是故其禁而審好惡喜怒之處也欲合諸天之案他本無之字非其時不出煖清寒暑也其告之以政令而化風之清微也欲合諸天之顚倒其一而以成歲也其羞淺末案他本淺末誤作滿末華虛而貴敦厚忠信也欲合諸天之默然不言而功德積成也其不阿黨偏私而美汎愛兼利也欲合諸天之所以成物者少霜而多露也其内自省以是而外顯不可以不時人主有喜怒不可以不時可亦爲時時亦爲義喜怒以類合其理一也故義不義者時之合類也而喜怒乃寒暑之别氣也天辨在人第四十六難者曰陰陽之會一歲再遇於南方者以中夏遇於北方者以中冬冬喪物之氣也則其㑹於是何如金木水火各奉其所主以從陰陽相與一力而并功其實非獨陰陽也然而陰陽因之以起助其所主故少陽因木而起助春之生也太陽因火而起助夏之養也少陰因金而起助秋之成也太陰因水而起助冬之藏也隂雖與水并氣而合冬其實不同故水獨有喪而陰不與焉是以陽陰㑹於中冬者非其案他本其作者喪也春愛志也夏樂志也秋嚴志也冬哀志也故愛而有嚴樂而有哀四時之則也喜怒之禍哀樂之義不獨在人亦在於天而春夏之陽秋冬之陰不獨在天亦在於人人無春氣何以博愛而容衆人無秋氣何以立嚴而成功人無夏氣何以盛養而樂生人無冬氣何以哀死而恤喪天無喜氣亦何以暖而春生育天無怒氣亦何以淸而秋殺就天無樂氣亦何以竦案他本竦作疏陽而夏養長天無哀氣亦何以激陰而冬閉藏故曰天乃有喜怒哀樂之行人亦有春秋冬夏之氣者合類之謂也匹夫雖賤而可以見德刑之用矣是故陰陽之行終各六月遠近同度而所在異處隂之行春居東方秋居西方夏居空右冬居空左夏居空下冬居空上此陰之常處也陽之行春居上冬居下此陽之常處也陰終歲四移而陽常居實非親陽而疎隂任德而遠刑與天之志常􅈂陰空處稍取之以爲助故刑者德之奉案他本奉作輔陰者陽之助也陽者歲之主也天下之昆蟲隨陽而出入天下之草木隨陽而生落天下之三王隨陽而改正天下之尊卑隨陽而序位幼者居陽之所少老者居陽之所老貴者居陽之所盛賤者當陽之所衰藏者言其不得當陽而當陽者臣子也陽者君父是也故人主南面以陽爲位也陽貴而陰賤天之刑也禮之尚右非尚陰也敬老陽而尊成功也陰陽位第四十七陽氣始出東北而南行就其位也西轉而北入藏其休也陰氣始東南而案他本無而字北行亦就其位也西轉而南入屏其服也是故陽以南方爲位以北方爲休陰以北方爲位以南方爲休陽至其位而大暑􅀬陰至其位而大寒凍陽至其休而入化於地陰至其伏而避德於下是故夏出長於上冬入化於下者陽也夏入守虛地於下冬出守虛位於上者陰也陽出實入實陰出空入空天之任陽不任陰好德不好刑如是也故陰陽終歲各一出春秋繁露卷十一
