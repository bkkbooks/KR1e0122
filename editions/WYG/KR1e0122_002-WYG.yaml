  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1e0122_WYG_002-1a, image: WYG0181/WYG0181-0708a.png}
body:
  text: 春秋繁露卷二漢董仲舒撰竹林第三春秋之常辭也不予夷狄而予中國為禮至邲之戰偏然反之何也曰春秋無通辭從變而移今晉變而為夷狄楚變案他本脱變字而為君子故移其辭以從其事夫莊王之舍鄭有可貴之美晉人不知其善而欲擊之所救已解如案他本如作而古而如二字通用挑與之戰此無善善之心而輕救民之意也是以賤之而不使得與賢者為禮秦穆侮蹇叔而大敗鄭文輕衆而喪師春秋之敬賢重民如是是故戰攻侵伐雖數百起必一二書傷其害所重也問者曰其書戰伐甚謹其惡戰伐無辭何也曰㑹同之事大者主小戰伐之事後者主先苟不惡何為使起之者居下是其惡戰伐之辭已且春秋之法凶年不修舊意在無苦民爾苦民尚惡之况傷民乎傷民尚痛之况殺民乎故曰凶年修舊則譏造邑則諱是害民之案他本無之字小者惡之小也害民之大者惡之大也今戰伐之於民其為害幾何攷意而觀指則春秋之所惡者不任徳而任力驅民而殘案殘他本作賤賊之其所好案好他本作惡者設而勿用仁義以服之也詩云矢其文徳洽此四國此春秋之所善也夫徳不足以親近而文不足以來遠而㫁㫁原註一作齗齗以戰伐為之者此固春秋之所甚疾已皆非義也難者曰春秋之書戰伐也有惡有善也惡詐擊而善偏戰恥伐喪而榮復讎奈何以案他本無以字春秋為無義戰而盡惡之也曰凡春秋之記災異也雖畆有數莖猶謂之無麥苗也今天下之大三百年之乆戰攻侵伐不可勝數而復讎者有二焉是何以異於無麥苗之有數莖哉不足以難之故謂之無義戰也以無義戰案他本脱戰字為不可則無麥苗亦不可矣案他本矣作也以無麥苗為可則無義戰亦可矣若春秋之於偏戰案戰他本作義也善其偏不善其戰有以效其然也春秋愛人而戰者殺人君子奚説善殺其所愛哉故春秋之於偏戰也案他本無也字猶其於諸夏也引案引字原本作隱今從他本改正下同之魯則謂之外引之夷狄則謂之内比之詐戰則謂之義比之不戰則謂之不義故盟不如不盟然而有所謂善盟戰不如不戰然而有所謂善戰不義之中有義義之中有不義辭不能及皆在於指非精心達思者其孰能知之詩曰棠棣之華偏其反而豈不爾思室是遠而子曰未之思也夫何遠之有由是觀之見其指者案他本無者字不任其辭不任其辭然後可與適道矣司馬子反為其君使廢君命與敵情從其所請與宋平是内專政而外擅名也專政則輕君擅名則不臣而春秋大之案大之他本作之大奚由哉曰為其有慘怛之恩不忍餓一國之民使之相食推恩者遠之而大為仁者自然而美今子反出已之心矜宋之民無計其間故大之也難者曰春秋之法卿不憂諸侯政不在大夫子反為楚臣而恤宋民是憂諸侯也不復其君而與敵平是政案他本無政字在大夫也湨古闃反梁之盟信案他本無信字在大夫而春秋刺之為其奪君尊也平在大夫亦奪君尊而春秋大之此所問也且春秋之義臣有惡君案君字他本作擅名美故忠臣不顯諌欲其由君出也書曰爾有嘉謀嘉猷入告爾君于内爾乃順之于外曰此謀此猷惟我君之徳此為人臣之法也古之良大夫其事君皆若是今子反去君近而不復荘王可見而不告皆以其解二國之難為不得已也奈其奪君名美何此所惑也曰春秋之道固有常有變變用於變常用於常各止案止他本作正其科非相妨也今諸子所稱皆天下之常雷同之義案義他本作意也子反之行一曲之變術原註術疑作獨修之義也夫目驚而體失其容心驚而事有所忘人之情也通於驚之情者取其一美不盡其失詩云采葑采菲無以下體此之謂也今子反徃視宋聞人相食大驚而哀之不意之至於此也是以心駭目動而違常禮禮者庶於仁文質而成體者也今使人相食大失其仁安著其禮方救其質奚恤其文故曰當仁不讓此之謂也春秋之辭有所謂賤者夫有賤乎賤者則亦有貴乎貴者矣今讓者春秋之所貴雖然見人相食驚人相㸑救之忘其讓案他本脱讓字君子之道有貴於讓者也故説春秋者無以平定之常義疑變故之大義則案義則他本作則義幾可論矣春秋記天下之得失而見所以然之故甚幽而明無傳而著不可不察也夫泰山之為大弗察弗見而况微眇者乎故按春秋而適徃事窮其端而視其故案故原本作殺得志之君子有喜之人不可不慎也齊頃公親齊桓公之孫國固廣大而地勢便利矣又得霸主之餘尊而志加於諸侯以此之故難使㑹同而易使驕奢即位九年未嘗肯一與㑹同之事有怒魯衛之志而從諸侯于清邱㫁道春徃伐魯入其北郊顧返伐衛敗之新築當是時也方乘案乘他本作求勝而志廣大國徃聘慢而弗敬其使者晉魯俱怒内悉其衆外得黨與衛曹四國相輔大困之鞌音安獲齊頃公斮音捉逢丑父深本頃公之所以大辱身幾亡國為天下笑其端乃從懾魯勝衛起伐魯魯不敢出擊衛大敗之因得案得他本作其氣而無敵國以興患也故曰得志有喜不可不戒此其效也自是後頃公恐懼不聴聲樂不飲酒食肉内愛百姓問疾弔喪外敬諸侯從㑹與盟卒終其身家國安寧是福之本生於憂而禍起於喜也嗚呼物之所由然其於人切近可不省耶逢丑父殺其身以生其君何以不得為知權丑父欺晉祭仲許宋俱枉正以存其君然而丑父之所案所他本作難為難於祭仲祭仲見賢而丑父猶見非何也曰是非難别者在此此其嫌疑相似而不同理者不可不察夫去位而避兄弟者君子之所甚貴獲虜逃遁者君子之所甚案他本脱甚字賤祭仲措其君於人所甚貴以生其君故春秋以為知權而賢之丑父措其君於人所甚賤以生其君春秋以為不知權而簡之其俱枉正以存君相似也其使君榮之與使君辱不同理故凡人之有為也前枉而後義者謂之中權雖不能成春秋善之魯隱公鄭祭仲是也前正而後有枉者謂之邪道雖能成之春秋不愛齊頃公逢丑父是也夫冒大辱以生案生字原本作徃其情無樂故賢人不為也而衆人疑焉春秋以為人之不知義而疑也故示之以義曰國滅君死之正也正也者正於天之為人性命也天之為人性命使行仁義而羞可恥非若鳥獸然苟為生苟為利而已是故春秋推天施而順人案人他本作天理以至尊為不可以生於至辱大羞故獲者絶之以至辱為亦案他本無亦字不可以加於至尊大位故雖失位弗君也已反國復案他本無復字在位矣而春秋猶有不君之辭况其溷然方獲而虜耶其於義也案他本無也字非君定矣若非君則丑父何權矣故欺三軍為大罪於晉其免頃公為辱宗廟於齊是以雖難而春秋不愛丑父大義宜言於頃公曰君慢侮而怒諸侯是失禮大矣今被大辱而弗能死是無恥也而復案復他本作獲重罪請俱死無辱宗廟無羞社稷如此雖陷其身尚有亷名當此之時死賢於生故君子生以辱不如死以榮正是之謂也由法論之則丑父欺而不中權忠而不中義以為不然復察春秋春秋之序辭也置王於春正之間非曰原註猶言豈非上奉天施而下正人然後可以為王也云爾今善善惡惡好榮憎辱非人能自生此天施之在人者也君子以天施之在人者聴之則丑父弗忠也天施之在人者使人有亷恥者不生大辱大辱莫甚於去南面之位而束獲為虜也曽子曰辱若可避避之而已及其不可避君子視死如歸謂如頃公者也春秋曰鄭伐許奚惡於鄭而夷狄之也曰衛侯速卒鄭師侵之是伐喪也鄭與諸侯盟于蜀以盟而歸諸侯於是鄭伐是叛盟也伐喪無義叛盟無信無信無義故大惡之問者曰是君死其子未踰年有稱伯不子法辭其罪何曰先王之制有大喪者三年不呼其門順其志之不在事也詩云高宗諒闇三年不言居喪之義也今縱不能如是奈何其父卒未踰年即以喪舉兵也春秋以薄恩且施失其子心故不復得稱子謂之鄭伯以辱之也且其先君襄公伐喪叛盟得罪諸侯諸侯怒之未解惡之未已繼其業者宜務善以覆之今又重之無故居喪以伐人父伐人案原本無伐人二字今從他本増入喪子以喪伐人父加不義於人子施失恩於親以犯中國是父負故惡於前已起大惡於後諸侯果怒而憎之卒案他本卒作率而俱至謀共擊之鄭乃恐懼去楚而成蠱牢之盟是也楚與中國俠案他本俠作挾而擊之鄭罷弊危亡終身愁辜吾本其端無義而敗由輕心然孔子曰道千乘之國敬事而信知其為得失之大也故敬而慎之今鄭伯既案他本無既字無子恩又不孰計一舉兵不當被患不窮自取之也是以生不得稱子去其義也死不得書葬案他本衍一不字見其窮案他本窮作罪也曰有國者視此行案他本行作得身不放義與事不審時其案他本其字在時字上何如此爾春秋繁露卷二
