body:
  text: 春秋繁露卷三漢董仲舒撰玉英第四謂一元者大始也知元年志者案他本無者字大人之所重小人之所輕是故治國之端在正名名之正興五世五傳之外美惡乃形可謂得原註一作冒其真矣非子路之所能見非其位而即之雖受之先君春秋危之宋繆公是也非其位不受案此下他本複不受二字之先君而自即之春秋危之呉王僚是也雖然苟能行善得衆春秋弗危衛侯晉以正書葬是也俱不宜立而宋繆受之先君而危衛宣弗受先君而不危以此見得衆心之為大安也故齊桓非直弗受之先君也乃率宜弗為君者而立罪亦重矣然而知恐懼故案故他本作敬舉賢人而以自覆蓋知不背要盟以自湔浣也遂為案他本脱為字賢君而霸諸侯使齊桓被案被他本誤作背惡而無此美得免殺滅乃幸已何霸之有魯桓忘其憂而禍逮其身齊桓憂其憂而立功名推而散之凡人有憂而不知憂者凶有憂而深憂之者吉易曰復自道何其咎此之謂也匹夫之反道以除咎尚難人主之反道以除咎甚易詩云徳輶如毛言其易也公觀魚于棠何惡也凡人之性莫不善義然而不能義者利敗之也故君子終日言不及利欲以勿言愧之而已愧之以案以他本作則塞其源也夫處位動風化者徒言利之名爾猶惡之况求利乎故天王使人求賻求金皆為大惡而書今案他本無今字誤衍一非字非直使人也親自求之是為甚惡譏何故言觀魚猶言觀社也皆諱案諱他本作為大惡之辭也春秋有經禮有變禮為如安性平心者經禮也至有於性雖不安於心雖不平於道無以易之此變禮也是故婚禮不稱主人經禮也辭窮無稱稱案他本脱一稱字主人變禮也天子三年然後稱王經禮也有物故則未三年而稱王變禮也婦人無出境之事經禮也母為子娶婦案他本無婦字奔喪父母變禮也明乎經變之事然後知輕重之分可與適權矣難者曰春秋事同者辭同此四者俱為變禮而或達於經或不達於經何也曰春秋理百物案他本理作禮辨品類别嫌微修本末者也是故星墜謂之隕螽墜謂之雨其所發之處不同或降於天或發於地其辭不可同也今四者俱為變禮也同而其所發亦不同或發於男或發於女其辭不可同也是或達於常或達於變也桓之志無王故不書王其志欲立故書即位書即位者言其弑君兄也不書王者以言其背天子是故隱不言正桓不言王者皆從其志以見其事也從賢之志以達其義從不肖之志以著其惡由此觀之春秋之所善善也所不善亦不善也不可不兩省也經曰宋督案他本脱宋督二字弑其君與夷傳言莊公馮殺之不可及於經何也曰非不可及於經其及之端眇不足以類鈎案他本鈎作鈞之故難知也傳曰臧孫許與晉郤克同時而聘乎齊按經無有豈不微哉不書其徃而有避也今此傳言莊公馮而於經不書亦有以避也是故不書聘乎案他本無乎字齊避所羞也不書莊公馮殺避所善也是故讓者春秋之所善宣公不與其子而與其弟其弟亦不與子而反之兄子雖不中法皆有讓高不可棄也故君子為之諱不居正之謂避其後也亂移之宋督以存善志此亦春秋之義善無遺案他本遺誤作道也若直原註一作止書其篡則宣繆之高滅而善之無所見矣案他本無矣字難者曰為賢者諱皆言之為宣繆諱獨弗言何也曰不成於賢也其為善不法不可取亦不可棄棄之則棄善志也取之則害王法故不棄亦不載以意見之而已苟志於仁無惡此之謂也器從名地從主人之謂案謂他本作位制權之端焉不可不察也夫權雖反經亦必在可以然之域不在可以然之域故雖死亡終弗為也公子目夷是也故諸侯父子兄弟不宜立而立者案者字他本作也春秋視其國與宜立之君無以異也此皆在可以然之域也至於鄫取乎莒以之案以之二字他本作之以為同居目曰莒人滅鄫此不在案他本脱在字可以然之域也故諸侯在不可以然之域者謂之大徳大徳無踰閑者謂正經諸侯在可以然之域者謂之小徳小徳出入可也權譎也尚歸之以奉鉅經耳故春秋之道博而要詳而反一也公子目夷復其君終不與國祭仲已與後改之晉荀息死而不徳衛曼姑拒而弗内此四臣事異而同心其義一也目夷之弗與重宗廟祭仲與之亦重宗廟荀息死之貴先君之命曼姑拒之亦貴先君之命也事雖相反所為同俱為重宗廟貴先君之命耳難者曰公子目夷祭仲之所為之案他本無之字者皆存之事君善之可矣荀息曼姑非有此事也案他本無也字而所欲恃者皆不宜立者何以得載乎義曰春秋之法君立不義案義他本作宜立不書大夫立則書書之者弗予大夫之得立不宜立者也不書予君之得立之案他本無之字也君之立不案立不二字原本誤作不立今據他本改正宜立者非也既立之大夫奉之是也荀息曼姑之所得為義也難紀季曰春秋之法大夫不得用地又曰公案公他本作君子無去國之義又曰君子不避外難紀季犯此三者何以為賢賢臣固盜地以下敵棄君以避患乎曰賢者不為是是故託賢於紀季以見季之弗為也紀季弗為而紀侯使之可知矣春秋之書事時詭案詭他本誤作記其實以有避也其書人時易其名以有諱也故詭晉文得志之實以代案代他本作伐諱避致王也詭莒子號謂之人避隱公也易慶父之名謂之仲孫變盛謂之成諱大惡也然則説春秋者入則詭辭隨其委曲而後得之今紀季受命乎君而經書專無善一名而文見賢此皆詭辭不可不察春秋之於所賢也固順其志而一其辭章其義而裒其美今紀侯春秋之所貴也是以聴其入齊之志而詭其服罪之辭也移之紀季故告糴于齊者實莊公為之而春秋詭其辭以予臧孫辰以酅入于齊者實紀侯為之而春秋詭其辭以予紀季所以詭之不同其實一也難者曰有國家者人欲立之固盡不聴國滅君死之正也何賢乎紀侯曰齊將復讎紀侯自知力不加而志距之故謂其弟曰我宗廟之主不可以不死也案他本作不以死也汝以酅徃服罪於齊請以立五廟使我先君嵗時有所依歸率一國之衆以衛九世原註一作代之主襄公逐之不去求之弗予上下同心而俱死之案他本無之字故謂之大去春秋賢死義且得衆心也故為諱滅以為之諱見其賢之也以其賢之也見其中仁義也精華第五春秋慎辭謹於名倫等物者也是故小夷言伐而不得言戰大夷言戰而不得言獲中國言獲而不得言執各有辭也有小夷避大夷而不得言戰大夷避中國而不得言獲中國避天子而不得言執名倫弗予嫌於相臣之辭也是故小大不踰等貴賤如其倫義之正也大雩者何旱祭也難者曰大旱雩祭而請雨大水鳴鼔而攻社天地之所為隂陽之所起也或請焉或怒焉者何曰大旱者陽滅隂也陽滅隂者尊壓卑也固其義也雖大甚拜請之而已無敢有加也大水者隂滅陽也隂滅陽者卑勝尊也日食亦然皆下犯上以賤傷貴者案他本無者字逆節也故鳴皷而攻之朱絲而案他本無而字脅之為其不義也此亦春秋之為强禦也故變天地之位正隂陽之序直行其道而不忘其難義之至也是故脅嚴社而不為不敬靈出天王而不為不尊上辭父之命而不為不承親絶母之屬而不為不孝慈案他本無慈字義矣案他本無矣字夫原註一作乎難者曰春秋之法大夫無遂事又曰出境有可以安社稷利國家者則專之可也又曰大夫以君命出進退在大夫也又曰案他本無曰字聞喪徐行而不反也夫既曰無遂事矣又曰專之可也既曰進退在大夫矣又曰徐行不反也若相悖然是何謂也曰四者各有所處得其處則皆是也失其處則皆非也春秋固有常義又有應變無遂事者謂平生安寧也專之可也者謂救案他本脱救字危除患也進退在大夫者謂將案他本無謂將二字率用兵也徐行不反者謂不以親害尊不以私妨公也此之謂將得其私知其指故公子結受命徃媵陳人之婦于鄄道生案道生二字他本誤作遂其事從齊桓盟春秋弗非以為救莊公之危公子遂受案他本脱受字命使京師道案道他本誤作遂生事之晉春秋非之以為是時僖公安寧無危而救故案他本無故字有危而不專救謂之不忠無危而擅生事是卑君也故此二臣俱生事春秋有是有非其義然也齊桓仗案仗他本作挾賢相之能用大國之資即位案位他本誤作衛五年不能致一諸侯於柯之盟見其大信一年而近國之君畢至鄄幽之㑹是也其後二十年之間亦乆矣尚未能大合諸侯也至於救邢衛之事見存亡繼絶之義而明年遠國之君畢至貫澤陽榖之㑹是也故曰親近者不以言召遠者不以使此其效也其後矜功振而自足而不修徳故楚人滅弦而志弗憂江黄伐陳而不徃救損人之國而執其大夫不救陳之患而責陳不離案離他本作納原本及黄氏日鈔所引俱作離不復安鄭案鄭他本誤作正而必欲迫案迫原本誤作必今據他本改正之以兵功未良成而志已滿矣故曰管仲之器小哉此之謂也自是日衰九國叛矣春秋之聴獄也必本其事而原其志志邪者不待成首惡者罪特重本直者其論輕是故逢丑父當斮而轅濤塗不宜執案執他本誤作直魯季子追慶父而呉季子釋闔廬此四者罪同異論其本殊也俱欺三軍或死或不死俱弑君或誅或不誅聴訟折獄可無審邪故折獄而是也理益明教益行折獄而案他本無而字非也闇理迷衆與教相妨教政之本也獄政之末也其事異域其用一也不可不以相順故君子重之也難晉事者曰春秋之法未踰年之君稱子蓋人心之正也至里克殺奚齊避此正辭而稱君之子何也曰所聞詩無達詁案詁他本誤作話易無達占案占字原本作吉當是占字誤筆他本作言亦誤今據文義改正春秋無達辭從變從義而一以奉人仁人案他本無人字錄其同姓之禍固宜易操晉春秋之同姓也驪姬一謀而三君死之天下之所共痛也本其所為為之者蔽于所欲得位而不見其難也春秋疾其所蔽故去其位案位他本作正辭徒言君之子而已若謂奚齊曰嘻嘻為大國君之子富貴足矣何以兄之位為欲居之以至此乎云爾錄所痛之辭也故痛之中有痛無罪而受其死者申生奚齊卓子是也惡之中有惡者已立之已殺之不得如他臣之弑君者齊公子商人是也故晉禍痛而齊禍重春秋傷痛而敦重是以奪晉子繼位之辭與齊子成君之號詳見之也古之人有言曰不知來視諸徃今春秋之為學也道徃而明來者也然而其辭體天之微故案他本無故字難知案他本知作之也弗能察寂原註一作蒙若無能察之無物不在是故為春秋者得一端而多連之見一空原註空或作宜而博貫之則天下盡矣魯僖公以亂即位而知親任季子季子無恙之時内無臣下之亂外無諸侯之患行之二十年國家安寧季子卒之後魯不支鄰國之患直乞師楚耳僖公之情非輒不肖而國衰益危者何也以無季子也以魯人之若是也亦知他國之皆若是也以他國之皆若是亦知天下之皆若是也案他本無也字此之謂連而貫之故天下雖大古今雖乆以是定矣以所任賢謂之主尊國安所任非其人謂之主卑國危萬世必然無所疑也其在易曰鼎折足覆公餗夫鼎折足者任非其人也覆公餗者國家傾也是故任非其人而國家不傾者自古至今未嘗聞也故吾按春秋而觀成敗乃切悁悁於前世之興亡也任賢臣者國家之興也夫知不足以知賢無可奈何案他本無何字矣知之不能任大者以死亡小者以亂危其若是何耶以莊公不知季子賢耶安知病將死召而授以國政以殤公為不知孔父賢耶安知孔父死已必死趨而救之二主知皆足以知賢而不決不能任故魯莊以危宋殤以弑使莊公早用季子而宋殤素任孔父尚案尚他本誤作南將興鄰國豈直弑哉此吾所悁悁而悲者也春秋繁露卷三
