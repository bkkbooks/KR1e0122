body:
  text: 春秋繁露卷六漢董仲舒撰服制象第十四天地之生萬物也以養人故其可食案食他本作適者以養身體其可威者以為容服禮案禮他本誤作體之所為興也劍之在左青龍之象也刀之在右白虎之象也鈎之在前赤烏之象也冠之在首元武之象也四者人之盛飾也夫能通古今别然不然乃能服此也原註一作通古别今然後能服此也蓋元武者貌之最嚴有威者也其像在右原註一作後其服反居首武之至而不用矣聖人之案他本無之字所以超然雖欲從之末由也已夫執介胄而後能拒敵者故非聖人之所貴也君子顯之于服而勇武者消其志于貌也矣故文徳為貴而威武為下此天下之所以永全也于春秋何以言之孔父義形於色而姦臣不敢容邪虞有宫之竒而獻公為之不寐晉厲之彊中國以寢尸流血不已故武王克殷裨冕而搢笏虎賁之士説劔安在勇猛必任武殺然後威是以君子所服為上矣故望之儼然者亦已至哉案哉他本作矣豈可不察乎二端第十五春秋至意有二端不本二端之所從起亦未可與論災異也小大微著之分也夫覽求微細於無端之處誠知小之為大也微之將為著也吉凶未形聖人所獨立也雖欲從之末由也已此之謂也故王者受命改正朔不順數而徃必迎來而受之者授受之義也故聖人能繫心於微而致之著也是故春秋之道以無案無他本作元之深正天之端以天之端正王之政以王之政案原本無以王之政四字正諸侯之位五者俱正而化大行然書日蝕星隕有􅈮山崩地震夏大雨水冬大雨雪隕霜不殺草自正月不雨至於秋七月有鸜鵒來巢春秋異之以此見悖亂之徴是小者不得大微者不得著雖甚末原註一作其本未亦一案他本無一字端孔子以此效之吾所以貴微案他本無微字重始是也因惡夫推災異之象于前然後圖安危禍亂于後者非春秋之所甚貴案他本脱貴字也然而春秋舉之以為一端者亦欲其省天譴而畏天威内動于心志外見于事情修身審已明善心以反道者也豈非貴微重始慎終推效者哉符瑞第十六有非力之所能致而自致者西狩獲麟受命之符是也然後託乎春秋正不正之間而明改制之義一統乎天子而加憂于天下之憂也務除案務除他本誤作除務天下所患案他本脱患字而欲以上通五帝下極三王以通百王之道而隨天之終始博得失之效而攷案攷他本作攻命象之為極理以盡情性之宜則天容遂矣案矣他本作以百官同望異路一之者在主率之者在相俞序第十七仲尼之作春秋也上探原註一作深正天端王公之位萬案他本萬字下有物字民之所欲原註一作始下明得失起賢才以待後聖故引史記理徃事正是非見案見他本作也王公史記十二公之間皆衰世之事故門人惑孔子曰吾原註一無曰吾字因其行事而加乎王心焉以為見之空言不如行事博深切明案他本無明字故子貢閔子公肩子言其切而為國家賢案賢他本作資也其為切而至於殺君亡國奔走不得保社稷其所以然是皆不明於道不覽於春秋也故衛子夏言有國家者不可不學春秋不學春秋則無以見前後旁側之危則不知國之大柄君之案之他本作子重任也故或脅窮失國揜殺於位一朝至爾苟能述春秋之法致行其道豈徒除禍哉乃堯舜之徳也故世子曰功及子孫光輝百案此下自世聖王之徳起至故其所善止共三百五十八字原本錯簡在第十八篇今據他本校正世聖王之徳莫美於恕案恕他本誤作世故予先言春秋詳已而畧人因其國而容天下春秋之道大得之則以王小得之則以霸故曽子予石盛美齊侯安諸侯尊天子霸王之道皆本於仁仁天心故次以天心愛人之大者莫大於思患而豫防之故蔡得意於呉魯得意於齊而春秋皆不告故次以言怨人不可邇案邇他本作通敵國不可狎攘竊之國不可使乆親皆防患為民除患之意也不愛民之漸乃至於死亡故言楚靈王晉厲公生弑於位不仁之所致也故善宋襄公不厄人不由其道而勝不如由其道而敗春秋貴之將以變習俗而成王化也故子案他本脱子字夏言春秋重人諸譏皆本此或奢侈使人憤怨或暴虐賊害人終皆禍及身故子池言魯莊築臺丹楹刻桷晉厲之刑刻意者皆不得以壽終上奢侈刑又急皆不内恕求備於人故次以春秋緣人情赦小過而傳明之曰君子辭也孔子明得失見成敗疾時原註一無時字世之不仁失王道之體故緣人情案他本脱道之體故緣人情七字誤衍下文孔子曰吾因行事七字赦小過傳又明之曰君子辭案辭他本作亂也孔子曰吾因行事加吾王心焉假其位號以正人倫因其成敗以明順逆故其所善案以上係校正錯簡則桓文行之而遂其所惡則亂國行之終以敗故始言大惡殺君亡國終言赦小過是亦始於麤糲終於精微教化流行徳澤大洽天下之人人有士君子之行而少過矣亦譏二名之意也離合根第十八天高其位而下其施藏其形而見其光高其位所以為尊也下其施所以為仁也藏其形所以為神見其光所以為明故位尊而施仁藏神而見光者天之行也故為人主者法天之行是故内深藏所以為神外博觀所以為明也任羣賢所以為受成乃不自勞於事所以為尊也汎愛羣生不以喜怒賞罰所以為仁也故為人主者以無為為道以不私為寶立無為之位而乘備具之官案之官他本誤作官之足不自動而相者導進口不自言而擯者賛辭心不自慮而羣臣效當故莫見其為之而功成矣此人主所以法天之行也為人臣者法地之道暴其形出其情以示人高下險易堅耎案耎他本誤作災剛柔肥臞美惡累原註一無累字可就財也故其形宜不宜可得而財也為人臣者比地貴信而悉見其情于主主亦得而財之故王道威而不失為案為字下原本誤接世聖王之徳云云三百五十八字乃係第十七篇錯簡今已校正歸在前篇功及子孫光輝百下人臣當竭情悉力而見其短原註一作所長使主上得而器使之而猶地之竭竟其情也故其形原註一無形字宜可得而財也立元神第十九君人者國之元發言動作萬物之樞機樞機之發榮辱之端也失之毫釐駟不及追故為人君者謹木詳始敬小慎微志如死灰形如委衣安精養神寂寞無為休形無見影揜聲無出響虛心下士觀來察徃謀於衆賢考求衆人得其心徧案徧他本誤作偏見其情察其好惡以叅忠佞考其徃行騐之於今計其蓄積受於先賢釋其讎怨視其所爭差其黨族所依為臬原註一作宗據位治人用何原註一作苛為名原註一作明累日積乆何功不成可以内叅外可以小占大必知其實是為開闔君人者國之本也夫為國其化莫大於崇本崇本案他本脱下崇本二字則君化若神不崇本則君無以兼人無以兼人雖峻刑重誅而民不從是所謂驅國而棄之者也患孰甚焉何謂本曰天地人萬物之本也天生之地養之人成之天生之以孝悌地養之以衣食人成之以禮樂三者相為手足合以成體不可一無也無孝悌則亡其所以生無衣食則亡其所以養無禮樂則亡其所以成也三者皆亡則民如麋鹿各從其欲家自為俗父不能使子君不能使臣雖有城郭名曰虛邑如此者其君枕塊而僵莫之危而自危莫之喪而自亡是謂自然之罰自然之罰至裹案裹他本誤作裏襲石室分障險阻猶不能逃之也明主賢君必於其信是故肅慎三本郊祀致敬共案共他本誤作其事祖禰舉顯孝悌表異孝行所以奉天本也秉耒躬耕採桑親蠶墾草殖榖開闢以足衣食所以奉地本也立辟廱庠序修孝悌敬讓明以案明以二字他本作以明教化感以禮樂所以奉人本也三者皆奉則民如子弟不敢自專邦如父母不待恩而愛不須嚴而使雖野居露宿厚於宫室如是者其君安枕而臥莫之助而自彊莫之綏而自安是謂自然之賞自然之賞至雖退讓委國而去百姓襁負其子隨而君之君亦不得離也故以徳為國者甘於飴蜜固於膠漆是以聖賢勉而崇本而不敢失也君人者國之證也不可先倡感而後應故居倡之位而不行倡之勢不居和之職而以和為徳常盡其下故能為之上也體國之道在於尊神尊者所以奉其政也神者所以就其化也故不尊不畏不神不化夫欲為尊者在於任賢欲為神者在於同心賢者備股肱則君尊嚴而國安同心相承則變化若神莫見其所為而功徳成是謂尊神也天積衆精以自剛聖人積衆賢以自彊天序日月星辰以自光聖人序爵禄以自明天所以剛者非一精之力聖人所以彊者非一賢之徳也故天道務盛其精聖人務衆其賢盛其精而壹其陽衆其賢而同其心壹其陽然後可以致其神同其心然後可以致其功是以建治之術貴得賢而同心為人君者其要貴神神者不可得而視也不可得而聴也是故視而不見其形聴而不聞其聲聲之不聞故莫得其響不見其形故莫得其影莫得其影則無以曲直也莫得其響則無以清濁也無以曲直則其功不可得而敗無以清濁則其名不可得而度也所謂不見其形者非不見其進止之形也言其所以進止不可得而見也所謂不聞其聲者非不聞其號令之聲也言其所以號令不可得而聞也不見不聞是謂冥昏能㝠則明能昏則彰能冥能昏是謂神人君貴居冥而明其位處隂而向陽惡人見其情而欲知人之心是故為人君者執無源之慮行無端之事以不求奪以不問問吾以不求奪則我利矣彼以不出出案出出二字他本作見出則彼費矣吾以不問問則我神矣彼以不對對則彼情矣故終日問之彼不知其所對終日奪之彼不知其所出吾則以明而彼不知其所亡故人臣居陽而為隂人君居隂而為陽隂道尚形而露情陽道無端而貴神保位權第二十民無所好君無以權也民無所惡君無以畏也無以權無以畏則君無以禁制也無以禁制則比肩齊勢而無以為貴矣故聖人之治國也因天地之性情孔竅之所利以立尊卑之制以等原註一作異貴賤之差設官府爵禄利五味盛五色調五聲案聲他本作音以誘其耳目自令清濁昭然殊體榮辱踔然相駮以感動其心務致民令有所好案好字下他本衍一必字有所好然後可得而勸也故設賞以勸之有所好必有所惡有所惡然後可得而畏也故設罰以畏之既有所勸又有所畏然後可得而制制之者制其所好是以勸賞而不得多也制其所惡是以畏罰而不得案得他本作可過也所好多則作福所惡過案過他本作多則作威作威則君亡權天下相怨作福則君亡徳天下相賊故聖人之制民使案民使二字他本作使民之有欲不得過節使之敦朴不得無欲無欲有欲各得以足而君道得矣國之所以為國者徳也君之所以為君者威也故徳不可共威不可分徳共則失恩威分則失權失權則君賤失恩則民散民散則國亂君賤則臣叛是故為人君者固守其徳以附其民固執其權以正其臣聲有順逆必有清濁形有善惡必有曲直故聖人聞其聲則别其清濁見其形則異其曲直於濁之中必知其清於清之中必知其濁於曲之中必見案見他本作知其直於直之中必見案見他本作知其曲於聲無細案無細二字他本誤作之中而不取於形無小而不舉不以著蔽微不以衆揜寡各應其事以致其報黒白分明然後民知所去就民知所去就然後可以致治是為象則原註一作副為人君者居無為之位行不言之教寂而無聲靜而無形執一無端為國源泉因國以為身因臣以為心以臣言為聲以臣事為形有聲必有響有形必有影聲出於内響報於外形立於上影應於下響有清濁影有曲直響所報非一聲也影所應非一形也故為君虛心靜處聰聴其響明視其影案影他本作形以行賞罰之象其行賞罰也響清則生清者榮響濁則生濁者辱影正則生正者進影枉則生枉者絀擥案擥他本作責名考質以叅其實賞不空施案施他本作行罰不虛出是以羣臣分職而治各敬而事爭進其功顯廣其名而人君得載其中此自然致力之術案術他本誤作樹也聖人由之故功出於臣名歸於君也春秋繁露卷六
