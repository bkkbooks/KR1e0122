body:
  text: 春秋繁露卷七漢董仲舒撰考功名第二十一考績之法考其所積也天道積聚衆精以為光聖人積聚衆善以為功故日月之明非一精之光也聖人致太平非一善之功也明所從生不可為源善所從出不可為端量勢立權因事制義故聖人之為天下興利也其猶春氣之生草也各因其生小大而量其多少其為天下除害也若川瀆之瀉於海也各順其勢傾側而制於南北故異孔而同歸殊施而鈞徳其趣於興利除害一也是以興利之要在於致之不在於多少除害之要在於去之不在於南北考績絀陟計事除廢原註一作費有益者謂之公無益者謂之煩擥案擥他本作挈名責實不得虛言有功者賞有罪者罰功盛者賞顯罪多者罰重不能致功雖有賢名不予之賞官職不廢雖有愚名不加之罰賞罰用於實不用於名賢愚在於質不在於文故是非不能混原註一作詐竒不能枉喜怒不能傾姦軌不能弄原註一作算萬物各得其真原註一作貴非則百官勸職爭進其功考試之法大者緩小者急貴者舒而賤者促諸侯月試其國州伯時試其部四試而一考天子嵗試天下三試而一考前後三考而絀陟命之曰計考試之法合其爵禄并其秩積其日陳其實計功量罪以多除少以為名定實先内弟案弟古第字他本誤作定之其先比二三分以為上中下以案以字他本誤移在然後二字下考進退然後外集通名曰進退増減多少有率為第九分三三列之亦有上中下以為一最五為中九為殿有餘歸之於中中而上者有得中而下者有員得少者以一益之至於四員多者以四減之至於一皆逆行三四十二而成於計得滿計者絀陟之次次每計各逐案逐他本作遂其第以通來數初次再計次次四計各不失故第而亦滿計絀陟之初次再計謂上第二也次次四計謂上第三也九年為一第二得九并去其六為置三第六六得等為置二并中者得三盡去之并三三計得六并得一計得六此為四計也絀者亦然通國身第二十二氣之清者為精人之清者為賢治身者以積精為寶治國者以積賢為道身以心為本國以君為主精積於其本則血氣相承受賢積於其主則上下相制使案此下他本複衍一使字血氣相承受則形體無所苦上下相制使則百官各得其所形體無所苦然後身可得而安也百官各得其所然後國可得而守也夫欲致精者必虛靜其形欲致賢者必卑謙其身形靜志虛者氣精之所趣也謙尊自卑者仁賢之所事也故治身者務執虛靜以致精治國者務盡卑謙以致賢能致精則合明而壽仁案他本無仁字能致賢則徳澤洽而國太平三代改制質文第二十三春秋曰王正月傳曰王者孰謂謂案下謂字他本誤移在文王也下文王也曷為先言王而後言正月王正月也何以謂之王正月曰王者必受命而後王王者必改正朔易服色制禮樂一統於天下所以明易姓非繼仁通以己受之於天也王者案他本無者字受命而王制此月以應變故作科以奉天地故謂之王正月也王者改制作科奈何曰當十二色歴各法而正色逆數三而復絀三之前曰五帝帝迭首一色順數五帝相復禮樂各以其法象其宜順數四而相復咸作國號遷宫邑易官名制禮作樂故湯受命而正應天變夏作殷號時正曰綂故親夏虞絀唐謂之帝堯以神農為赤帝作宫邑於下洛之陽名相宫曰尹原註一作名相曰宫尹爵謂之帝舜軒轅曰黄帝推神農以為九皇作宫邑於豐名相宫曰宰作武樂制文禮以奉天武王受命作宫邑於鄗制爵五等作象樂繼文以奉天周公輔成王受命作宫於洛陽成文武之制作汋樂以奉天殷湯之後稱邑示天之變反命故天子命無常唯命是徳慶故春秋應天作新王之事時王黒統正魯尚黒絀夏親周故宋樂宜親招武故以虞録親樂制宜商合伯子男為一等然則其畧説奈何曰三正以黒統初正日月朔於營室斗建寅天統氣始通化物物見萌達其色黒故朝正服黒首服藻黒案黒他本誤作首正路輿質黒馬黒大節緩幘尚黒旗黒大寶玉黒郊牲黒犧牲角卵冠於阼昏禮逆於庭喪禮殯於東階之上祭黒牲薦尚肝樂器黒質法不刑有懷在新産是月不殺聴案聴字下他本衍一法字朔廢刑發徳案發徳他本誤作法徳具存二王之後也親赤統故日分平明平明朝正正白統奈何曰正白統者歴正日月朔於虛斗建丑天統氣始蜕化物物始芽其色白故朝正服白首服藻白正路輿質白馬白大節緩幘尚白旗白大寶玉白郊牲白犧牷案牷他本作牲角繭冠於堂昏禮逆於堂喪事殯於楹柱之間祭牲白牲薦尚肺樂器白質法不刑有身懷任是月不殺聴朔廢刑發徳具存二王之後也親黒統故日分鳴晨鳴晨朝正正赤統奈何曰正赤統者大節緩幘尚赤旗赤大寶玉赤郊牲騂犧牷角栗冠於房昏禮逆於户喪禮殯於西階之上祭牲騂牡薦尚心樂器赤質法不刑有身重懷藏以養微是月不殺聴朔廢刑發徳具存二王之後也親白統故日分夜半夜半朝正改正之義奉元而起古之王者受命而王改制稱號正月服色定然後郊告天地及羣神案神他本作臣近遠祖禰然後布天下諸侯廟受以告社稷宗廟山川然後感應一其司三統之變近夷遐方無有生然者獨中國然而三代改正必以三統天下曰三統五端化四方之本也天始廢始施地必待中是故三代必居中國法天奉本執端要以統天下朝諸侯也是以朝正之義天子純綂色衣諸侯統衣纒緣紐大夫士以冠參近夷以緩遐方各衣其服而朝所以明乎天綂之義也其謂綂三正者曰正者正也綂致其氣萬物皆應而正綂正其餘皆正凡嵗之要在正月也法正之道正本而末應正内而外應動作舉錯靡不變化隨從可謂法正也故君子曰武王其以正月矣春秋曰杞伯來朝王者之後稱公杞何以稱伯春秋上黜夏下存周以春秋當行新王春秋當新王者奈何曰王者之法必正號絀王謂之帝封其後以小國使奉祀之下存二王之後以大國使服其服行其禮樂稱客其朝故同時稱帝者五稱王者三所以昭五瑞案瑞他本作端通三綂也是故人之王尚推神農為九皇而改號軒轅謂之皇帝因存帝顓頊帝嚳帝堯之帝號絀虞而號舜曰帝舜録五帝以小國下存禹之後於杞存湯之後於宋以方百里爵號公皆使服其服行其禮樂稱先王客而朝春秋作新王之事變周之制當正黒綂而殷周為王者之後絀夏改號禹謂之帝録其後以小國故曰絀夏存周以春秋當新王不以俟原註恐是侯弗同王者之後也稱子又稱伯何見殊之小國也黄帝之先諡四帝之後諡何也曰帝號必存五帝代案帝代他本作代帝首天之色號至五而反周人之王軒轅直首天黄案黄他本作皇號故曰黄帝云帝號尊而諡卑故四帝後諡也帝尊號也録以小何曰遠者尊號而地小近者號卑而地大親疎之義也故王者有不易者有再而復者有三而復者有四而復者有五而復者有九而復者明此通天地隂陽四時日月星辰山川人倫徳侔天地者稱皇帝天祐而子之號稱天子故聖王生則稱天子崩遷則存為三王絀滅則為五帝下至附庸絀為九皇下極其為民有一謂之三代故雖絶案絶他本誤作純地廟位祝牲猶列於郊號宗於代宗故曰聲名魂魄施於虛極壽無疆何謂再而復四而復春秋鄭忽何以名春秋曰伯子男一也辭無所貶何以為一曰周爵五等春秋三等春秋何三等曰王者以制一商一夏一質一文商質者主天夏文者主地春秋者主人故三等也主天法商而王其道佚陽親親而多仁樸案多仁樸他本作仁多樸故立嗣予子篤母弟妾以子貴昏冠之禮字子以父别眇夫婦對坐而食喪禮别葬祭禮先臊夫妻昭穆别位制爵三等禄士二品制郊宫明堂員其屋高嚴侈員惟祭器員玉厚九分白藻五絲衣制大上首服嚴員鸞輿尊蓋法天列象垂四鸞樂載鼓用錫儛儛案他本脱下儛字溢員先血毛而後用聲正刑多隱親多諱封禪於尚位主地法夏而王其道進隂尊尊而多義節案義節他本作節義故立嗣與孫篤世子妾不以子稱貴號昏冠之禮字子以母别眇夫婦同坐而食喪禮合葬案他本脱合葬二字衍一喪字祭禮案他本無禮字先享婦從夫為昭穆制爵五等禄士三品制郊宫明堂方其屋卑汚方祭器方玉厚八分白藻四絲衣制大案大字他本誤作天下首服卑退鸞輿卑法地周象載垂二鸞樂設鼓用纖施儛儛溢方先烹而後用聲正刑天法封壇於下位主天法質而王其道佚陽親親而多質愛故立嗣予子篤母弟妾以子貴昏冠之禮字子以父别眇夫婦對坐而食喪禮别葬祭禮案他本脱别葬祭禮四字乂誤於嘉疏下衍夫别葬祭禮五字先嘉疏夫婦昭穆别位制爵三等禄士二品制郊宫明堂内員外橢原註音妥圓長曰橢一作隨案鄭康成儀禮注隋方曰篋賈疏云狹而長也乂算家有橢圓之術凡非正方正圓通謂之橢其屋如倚靡員橢祭器橢玉原註一無此字厚七分白藻三絲衣長前袵首服員轉鸞輿尊蓋備天列象垂四鸞樂程鼓用羽籥儛儛溢橢先用玉聲而後烹原註一作享正刑多隱親多赦封壇於左位主地法文而王其道進隂尊尊而多禮文故立嗣予孫篤世子妾不以子稱貴號昏冠之禮字子以母别眇夫妻同坐而食喪禮合葬祭禮先秬鬯婦從夫為昭穆制爵五等禄士三品制郊宫明堂内方外衡其屋習而案而他本作其衡祭器衡同作秩案秩他本作佚機玉厚六分白藻三絲衣長後袵服首原註一無首字習而垂流鸞輿卑備地周象載垂二鸞樂縣鼓用萬儛儛溢衡先烹而後用樂正刑文公原註未詳衍案他本公字下複一公字封壇於左位四法修案修他本作條於所故祖於先帝故四法如四時然終而復始窮則反本四法之天施符受聖人王法則性命形乎先祖大昭乎王君故天將授舜主天法商而王祖錫姓為姚氏至舜形體大上而員首而明有二童子性長於天文純於孝慈天將授禹主地法夏而王祖錫姓為姒氏至於生發於背形體長長足肵疾行先案先字他本誤作光左隨以右勞左佚右也性長於行習地明水天將授湯主天法質而王祖錫姓為子氏謂契母呑元鳥卵生契契先發於胸性長於人倫至湯體長專小足左扁而右便勞右佚左也性長於天光質易純仁天將授文王主地法文而王祖錫姓姬氏謂后稷母姜原履天之跡而生后稷后稷長於邰土播田五榖至文王形體博長有四乳而大足性長於地文勢故帝使禹臯論姓知殷之徳陽徳也故以子為姓知周之徳隂徳也故以姬為姓故殷王改文書始以男原註一作以男書子周王以女書姬故天道各以其類動非聖人孰能明之官制象天第二十四王者制官三公九卿二十七大夫八十一元士凡百二十人而列臣備矣吾聞聖王所取儀金天之大經三起而成四轉而終官制亦然者此其儀與三人而為一選儀於三月而為一時也四選而止儀於四時而終也三公者王之所以自持也天以三成之王以三自持立成數以為植而四重之其可以無失矣備天數以參事治謹於道之意也此百二十臣者皆先王之所與直道而行也是案他本無是字故天子自參以三公三公自參以九卿九卿自參以三大夫三大夫自參以三士三人為選者四重自三之道以治天下若天之四重自三之時以終始嵗也一陽而三者案者他本作春非自三之時與而天四重之其數同矣天有四時時三月王有案有他本作者四選選三臣是故有孟有仲有季一時之情案情他本作精也有上有下有中一選之情案情他本作精也三臣而為一選四選而止人情盡矣人之材固有四選如天之時固有四變也聖人為一選君子為一選善人為一選正人為一選由此而下者不足選也四選之中各有節也是故天選四堤原註一作堪十二而人變盡矣盡人之變合之天唯聖人者能之所以立王事也何謂天之大經三起而成日三日而成規三旬而成月三月而成時三時而成功寒暑與和三而成物日月與星三而成光天地與人三而成徳由此觀之三而一成天之大經也以此為天制是故禮三讓而成一節官三人而成一選三公案三公二字他本誤作凡四為一選三卿為一選三大夫為一選三士為一選凡四選三臣應天之制凡四時之三月也是故其以三為選取諸天之經其以四為制案原本作四時為制他本作時四為制據文義時字是衍文今刪之取諸天之時其以十二臣為一條取諸嵗之度其至十條而止取之天端何謂天之端曰天有十端十端而止矣案而止矣他本作止而已天為一端地為一端隂為一端陽為一端火為一端金為一端木為一端水為一端土為一端人為一端凡十端而畢天之數也天數畢於十王者受十端於天而一條案他本複衍一條字之率案率他本作畢每條一端以十二時如天之每終一嵗以十二月也十者天之數也十二者嵗之度也用嵗之度條天之數十二而天數畢是故終案故字他本誤移在終字下十嵗而案他本而誤作百用百二十月條十端亦用百二十臣以率被案他本被作彼之皆合於天其率三臣而成一慎故八十一元士為二十七慎以持二十七大夫二十七大夫為九慎而持九卿九卿為三慎以持三公三公為一慎以持天子天子積四十慎案他本脱慎字以為四選選十慎三臣皆天數也是故以四選率之則選三十人三四十二百二十人案人字他本誤移在百二十上亦天數也以十端四選十端積四十慎慎三臣三案他本脱三字四十二百二十人亦天數也以三公之勞率之則公四十人三四十二百二十人亦天數也故散而名之為百二十臣選而賓之為十二長所以名之雖多莫若謂之四選十二長然而分别率之皆有所合無不中天數者也求天數之微莫若於人人之身有四肢每肢有三節三四十二十二節相持而形體立矣天有四時每一時有三月三四十二十二月相受而嵗數終矣官有四選每一選有三人三四十二十二臣相參而事治行矣以此見天之數人之形官之制相參相得也人之與天多此類者而案他本無而字皆微忽不可不察也天地之理分一嵗之變以為四時四時亦天之四選已是故春者少陽之選也夏者太陽之選也秋者少隂之選也冬者太隂之選也四選之中各有孟仲季是選之中有選故一嵗之中有四時一時之中有三長天之節也人生於天而體天之節故亦有大小厚薄之變案變他本作節人之氣也先王因人之氣而分其變以為四選是故三公之位聖人之選也三卿之位君子之選也三大夫之位善人之選也三士之位正直之選也分人之變以為四選選立三臣如天之分嵗之變以為四時時有三節也天以四時之選與十二節相和而成就嵗王以四位之選與十二相砥礪而致極道必極於其所至然後能得天地之美也堯舜不擅移湯武不專殺第二十五堯舜何緣而得擅移天下哉孝經之語曰事父孝故事天明事天與父同禮也今父有以重予子子不敢擅予他人人心皆然則王者亦天之子也天以天下予堯舜堯舜受命於天而王天下子猶安敢擅以所重受天案天字下他本衍一子字者予他人也天有不以予堯舜漸案漸他本誤作斬奪之故明為子道則堯舜之不私傳天下而擅移位也無所疑也儒者以湯武為至案至他本作大賢大聖也以為全道究義盡美者故列之堯舜之謂聖王如法則之今足下以湯武為不義然則足下之所謂義者何世之王也曰弗知弗知者以天下王為無義者邪其有義者而足下不知邪則答之以神農應之曰神農氏之為天子與天地俱起乎將有所伐乎神農氏有所伐可湯武有所伐獨不可何也且天之生民非為王也而天立王以為民也故其徳足以安樂民者天予之其惡足以賊害民者天奪之詩云殷士膚敏裸將于京侯服于周天命靡常言天之無常予無常奪也故封太山之上禪梁父之下易姓而王徳如堯舜者七十二人王者天之所予也其所伐皆天之所奪也今唯以湯武之伐桀紂為不義則七十二王亦有伐也唯足下之説將以七十二王為皆不義也故夏無道而殷伐之殷無道而周伐之周無道而秦伐之秦無道而漢伐之有道伐無道此天理也所從來乆矣寧能至湯武而然耶夫非湯武之伐桀紂者亦將非秦之伐周非徒不知天理又不明人禮禮子為父隱惡今使伐人者而信不義當為國諱之豈宜如誹謗者此所謂一言而再過者也君也者掌令者也令行而禁止也今桀紂令天下而不行禁天下而不止安在其能臣天下也果不能臣天下何謂湯武弑服制第二十六率得十六萬國三分之則各度爵而制服量禄而用財飲食有量衣服有制宫室有度畜産人徒有數舟車甲器有禁生則有軒冕之服位貴禄田宅之分死則有棺槨絞衾壙襲之度雖有賢才美體無其爵不敢服其服雖有富家多貲無其禄不敢用其財案財他本作才天子服有文章夫人不得以燕饗公以廟將軍大夫不得以燕卿以廟將軍大夫以朝案朝他本誤作明官吏以命士止於帶縁散民不敢服雜采百工商賈不敢服狐貉刑餘戮民不敢服絲元纁乘馬謂之服制春秋繁露卷七
