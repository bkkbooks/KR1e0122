body:
  text: 春秋繁露卷九漢董仲舒撰身之養重於義第三十一天之生人也使之案他本之作人生義與利利以養其體義以養其心心不得義不能樂體不得利不能安義者心之養也利者體之養也體莫貴於心故養莫重於義義之養生人大於利案他本下有矣字奚案他本奚作何以知之今人大有義而甚無利雖貧與賤尚容其行以自好而樂生原憲曽閔之屬是也人甚有利而大無義雖甚富則羞辱大惡惡深禍患重非立死其罪者即旋傷殃憂爾莫能以樂生而終其身案他本脱身字刑戮折夭之民是也夫人原註一作民有義者雖貧能案他本能字在雖字上自樂也而大無案他本無字在大字上義者雖富莫能自存吾以此實義之養生人大於利而案他本而誤作中厚於財也民不能知而常反之皆忘義而殉利去理而走邪以賊其身而禍其家此非其自為計不忠也則其知之所不能明也今握棗與錯金以示嬰兒必取棗而不取金也握一斤金與千萬之案他本無之字珠以示野人野人必取金而不取珠也故物之於人小者易知也其於大者難見也今利之於人小而義之於人大者無怪民之皆趨利而不趨義也固其所闇也聖人事明義以照燿其所闇故民不陷詩云示我顯徳行此之謂也先王顯徳以示民民樂而歌之以為詩説而化之以為俗故不令而自行不禁而自止從上之意不待使之若自然矣故曰聖人天地動四時化者非有他也其見義大故能動動故能化化故能大行化大行故法不犯法不犯故刑不用刑案他本下衍一有字不用則堯舜之功徳此大治之道也先聖傳授而復也故孔子曰誰能出不由户何莫由斯道也今不示顯徳行民闇於義不能照迷於道不能解因欲大嚴㦧以必正之直殘賊案他本賊誤作賤天民而薄主徳耳其勢不行仲尼曰國有道雖加刑無刑也案他本也字在無字上國無道雖殺之不可勝也其所謂有道無道者示之以顯徳行與不示爾對膠西王越大夫不得為仁第三十二命令相曰大夫蠡大夫種大夫庸大夫睪原註音澤大夫車成越王與此五大夫謀伐呉遂滅之雪㑹稽之恥卒為霸主范蠡去之種死之寡人以此案他本以此誤作此以二大夫者為皆賢孔子曰殷有三仁今以案他本以作有越王之賢與蠡種之能此三人者寡人亦以為越有三仁其於君何如桓公決疑於管仲寡人決疑於君仲舒伏地再拜對曰仲舒知褊而學淺不足以決之雖然主有問於臣臣不敢不悉以對禮也臣仲舒聞昔者魯君問於栁下惠曰我欲攻齊何如栁下惠對曰不可退而有憂色曰吾聞之也謀伐國者不問於仁人也此何為至於我但見問而尚羞之而况乃與為詐案他本為詐作詐偽以伐呉乎其不宜明矣以此觀之越本無一仁而安得三仁仁人者正其道不謀其利修其理不急其功致無為而習俗大化可謂仁聖矣三王是也春秋之義貴信而賤詐詐人而勝之雖有功君子弗為也是以仲尼之門五尺之童子言羞稱五伯為其詐以成功苟為而已也故不足稱於大君子之門五伯者比於他諸侯為賢者比於仁案他本仁作聖賢何賢之有譬猶珷玞比於美玉也臣仲舒伏地再拜以聞觀徳第三十三天地者萬物之本先祖之所出也廣大無極其徳炤明歴年衆多永永無疆天出至明原註一作炤衆之案他本之作知類也其伏無不炤也地出至晦星日為明不敢闇君臣父子夫婦之道取之此大禮之終也臣子三年案他本年誤作子不敢當雖當之必稱先君必稱先人不敢貪至尊也百禮之貴皆編於案他本於作之月月編於時時編於君君編於天天之所棄天子弗祐桀紂是也天子之所誅絶臣子弗得立蔡世子逢丑父是也王父父案他本無下父字所絶子孫不得屬魯莊公之原闕不得念母衛輒之辭父命是也故受命而海内順之猶衆星之共北辰流水之宗滄海也况生天地之間法太祖先人之容貌則其至徳取象衆名尊貴案他本貴作賢是以聖人為貴也泰伯至徳之侔天地也上帝為之廢適案他本適誤作週易姓而子之讓其至徳海内懷歸之泰伯三讓而不敢就位伯邑考之羣心貳自引而激順神明也至徳以受命豪英高明之人輻輳歸之高者列為公侯下至卿大夫濟濟乎哉皆以徳序是故案他本無故字呉魯同姓也鍾離之㑹不得序而稱君殊魯而㑹之為其夷狄之行也雞父之戰呉不得與中國為禮至於伯莒黄池之行變而反道乃爵而不殊召陵之㑹魯君在是而不得為主避齊桓也魯桓即位十三年齊宋衛燕舉師而東紀鄭與魯勠力而報之後其已以魯不得徧避紀侯與鄭厲公也春秋常辭夷狄不得與中國為禮至邲之戰夷狄反背中國不得與夷狄為禮避楚莊也案他本避字在禮字上邢衛魯之同姓也狄人滅之春秋不為案他本為作得諱避齊桓也當其如此也唯徳是親其皆先其親是故周之子孫其親等也而文王最先四時等也而春最先十二月等也而正月最先徳等也則先親親魯十二公等而定哀最尊衛俱諸夏也善稻案善稻本公羊傳他本從左傳作善道之㑹獨先内之為其與我同姓也呉俱夷狄也柤之㑹獨先内之為其與我同姓也滅國十五有餘獨先諸夏曹晉俱諸夏也譏二名獨先及之盛伯郜子俱當絶而獨不名為其與我同姓兄弟也外出者衆以母弟出獨大惡之為其亡母背骨肉也滅人者莫案他本莫作不絶衛侯燬滅同姓獨絶賤其本祖而忘先也親等從近者始立適以長母以子貴先原註或有母字甲戌己丑陳侯鮑卒書所見也而不言其闇者隕石于宋五六鷁退飛耳聞而案他本而作其記目見而書或徐或察案他本察誤作蔡皆以其先接於我者序之其於㑹朝聘之禮亦猶是諸侯與盟者衆矣而儀父獨漸進鄭僖公方來㑹我而道殺春秋致其意謂之如㑹潞子離狄而歸黨以得上春秋謂之子以領其意苞來首戴黄池踐土與操之㑹陳鄭案他本脱鄭字去我謂之逃歸鄭處案他本處作去而不來謂之乞盟陳侯後案他本後誤作俊至謂之如㑹莒人疑我貶而稱人諸侯朝案他本脱朝字魯者衆矣而滕薛獨稱侯州公化我奪爵而無號呉楚國先聘我者見賢曲􅁄與鞌之戰先憂我者見賢案他本賢作尊奉本第三十四禮者繼天地體隂陽而慎至容序尊卑貴賤大小之位而差外内遠近新故案他本故作舊之級者也以徳多為象萬物以廣博衆多歴年乆者為象其在天而象天者莫大日月繼天地之光明莫不照也星莫大於太辰北斗常星北斗常星案他本脱下北斗常星四字部星三百衛星三千大火二十六星伐十三案他本三作六星北斗七星常星九辭二十八宿多者宿二十八九其猶蓍百莖而共一本龜千嵗而人寶是以三代傳决疑焉其得地體者莫如山阜人之得天案他本天誤作失得衆者莫如受命之天子下至公侯伯子男海内之心懸於天子疆内之民統於諸侯日月食並吉凶不以其行有星茀于東方泰辰北斗入常星不見地震梁山沙鹿崩宋衛陳鄭災王公大夫篡弑案他本下有者字春秋皆書以為大異不言衆星之茀入霣雨原隰之襲崩一國之小民死亡不決疑於衆草木也唯田邑之稱多者主名君將不言臣臣不言師王夷君獲不言師敗孔子曰唯天為大唯堯則之則之者大也巍巍乎其有成功也言其尊大以成功也齊桓晉文不尊周室不能霸三代聖人不則天地不能至王自原註一作階此而觀之可以知天地之貴案他本貴誤作責矣夫流深者其水不測尊至者其敬無窮是故天之所加雖為災害猶承而大之其欽無窮震夷伯之廟是也天無錯舛之災地有震動之異天子所誅絶所敗師雖不中道而春秋者不敢闕謹之也故師出者衆矣莫言還至師及齊師圍郕郕降于齊師獨言還其君刦外不得已故可直言也至於他師皆其君之適也而曰非師之罪是臣下案他本下誤作莫之不為君父受罪罪不臣子莫大焉夫至明者其照無疆至晦者其闇無疆今春秋緣魯以言王義殺隱桓以為遠祖宗定哀以為考妣至尊且案他本且作尚高至顯且明其基壤之所加潤澤之所被條條無疆前是常數十年鄰之幽人近其墓而高明大國齊宋離不原註一無不字言㑹微國之君卒葬之禮録而辭繁遠夷之君内而不外當此之時魯無鄙疆請案他本無請字諸侯之伐哀者皆言我邾婁庶其鼻我邾婁大夫其於我無以親以近之故乃得顯明隱桓親春秋之先人也益師卒而不日于稷之㑹不日言其亂以通外也黄池之㑹以兩伯之辭言不以為外以近内也春秋襄公二十一年邾庶其以漆閭邱來奔左氏曰庶其非卿也公羊曰邾庶其者何邾婁大夫也二十三年邾卑我來奔杜注卑我是庶其之黨同有竊邑叛君之罪公羊作鼻我邾婁大夫也榖梁作畀我本案以上七十九字據文義乃舊時繁露注原本他俱誤作正文今校正春秋繁露卷九
