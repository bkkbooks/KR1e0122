body:
  text: 春秋繁露卷十漢董仲舒撰深察名號第三十五治天下之端在審辨大辨大之端在深察名號名者大理之首章也録其首章之意以窺其中之事則是非可知案他本知誤作之逆順自著其㡬通於天地矣是非之正取之逆順逆順之正取之名號名號之正取之天地天地為名號之大義也古之聖人謞原註火角切而效天地謂之號鳴而命施謂之名名之為言鳴與命也號之為言謞而效也謞而效天地者為號鳴而命者為名名號異聲而同本皆鳴號而達天意者也天不言使人發其意弗為使人行其中名則聖人所發天意不可不深觀也受命之君天意之所予也故號為天子者宜視天如父事天以孝道也號為諸侯者宜謹視所俟案他本俟作候奉之天子也案他本也作者號為大夫者宜厚其忠信敦其禮義使善大案他本大誤作天於匹夫之義足以化也士者事也民者瞑也士不及化可使守事從上而已案他本下衍一丑字五號自讚各有分分中委曲曲有名名衆於號號其大全名也者名其别離分散也號凡而畧名詳而目目者徧辨其事也凡者獨舉其大案他本無大字事也享鬼神者案他本無者字號一曰祭祭之散名春曰祠夏曰礿秋曰嘗冬曰烝獵禽獸者號一曰田田之散名春苗秋蒐冬狩夏獮無有不皆中天意者物莫不有凡號號莫不有散名如是是故案他本無故字事各順於名名各順於天天人之際合而為一同而通理動而相益順而相受謂之徳道詩曰維號斯言有倫有脊此之謂也深察王號之人意其中有五科皇科方科厈科黄科徃科合此五科以一言謂之王王者皇也王者方也王者厈也王者黄也王者徃也是故王意不普大皇則道不能正直而方道不能正直而方則徳不能厈運周徧徳不厈運周徧則美不能黄美不能黄則四方不能徃四方不能徃則案他本下有可字不全於王故曰天覆無外地載兼愛風行令而一其威雨布施而均其徳王術之謂也深察君號之大意其中亦有五科元科原科權科温科羣科合此五科以一言謂之君君者元也君者原也案他本脱君者原也四字君者權也君者温也君者羣也是故君意不比於元則動而失本動而失本則所為不立所為不立則不效於原不效於原則自委舍自委舍則化不行用權於變則失中適之宜失中適之宜則道不平徳不温道不平徳不温則衆不親安衆不親安則離散不羣離散不羣則不全於君名生於真非其真弗以為名名者聖人之所以真物也名之為言真也故凡百譏有黮黮者各反其真則黮黮者還昭昭耳欲審曲直莫如引繩欲審是非莫如引名名之審於是非也猶繩之審於曲直也詰其名實觀其離合則是非之情不可以相讕原註力但切誣言相加已今世闇於性言之者不同胡不試反性之名性之名非生與如其生之自然之資謂之性性者質也詰性之質於善之名能中之與既不能中矣而尚謂之質善何哉性之名不得離質離質如毛則非性已不可不察也春秋辨物之理以正其名名物如其真不失秋毫之末故名霣石則後其五言退鷁則先其六聖人之謹於正名如此君子於其言無所苟而已五石六鷁之辭是也栣原註栣疑袵知甚切榒也衆惡於内弗使得發於外者心也故心之為名栣也人之受氣苟無惡者心何栣哉吾以心之名得人之誠人之誠有貪有仁仁貪之氣兩在於身身之名取諸天天兩有隂陽之施身亦兩有貪仁之性天有隂陽禁身有情欲栣與天道一也是故隂之行不得千春夏而月之魄常厭於日光乍全乍傷天之禁隂如此安得不損其欲而輟其情以應天天所禁而身禁之故曰身猶天也禁天所禁非禁案他本無禁字天也必知天性不乘於教終不能栣察實以為名無教之時性禁天所禁非天也原註一本無上天字何據若是故性比於禾善比於米米出禾中而禾未可全為米案他本米誤作美也善出性中而性未可全為善也善與米人之所繼天而成於外非在天案他本在天誤作天在所為之内也天之所為有所至而止止之内謂之天性案他本之天性誤作天之性止之外謂之人事事在性外而性不得不成徳民之號取之瞑也使性而已善則何故以瞑為號以霣者言案他本言字在者字上弗扶將則案他本無則字顛陷猖狂安能善性有似目目臥幽而瞑待覺而後見當其未覺可謂有見質而不可謂見今萬民之案他本誤以下文言無驗之説至故謹於正名名非四百六字移在此處性有其質而未能覺譬如瞑者待覺教之然後善當其未覺可謂有質而不可謂善與目之瞑而覺一槩之比也靜心徐察之其言可見矣性如案他本如作而瞑之未覺天所為也效天所為為之起號故謂之民民之為言固猶案他本猶誤作有瞑也隨其名號以入其理則得之矣案他本矣作也是正名號者於天地天地之所生謂之性情性情相與為一瞑情亦性也謂性已善奈其情何故聖人莫謂性善累其名也身之有性情也若天之有隂陽也言人之質而無其情猶言天之陽而無其隂也窮論者無時受也名性不以上不以下以其中民案他本民誤作名之性如繭如卵卵待覆而為雛繭待繰而為絲性待教而為善此之謂真天天生民性有善質而未能善於是為之立王以善之此天意也民受未能善之性於天而退受成性之教於王王承天意以成民之案他本下有善字性為任者案他本無者字也今案其真質而謂民性己善者是失天意而去王任也萬民之性苟性己善則王者受命尚何案他本何誤作可任矣案他本矣作也其設民不正故棄重任而違大命非法案他本法誤作吾言也春秋之辭内事之待外者從外言之今萬民之性待外教然後能善善當與教不當與性與性則多累而不精自成功而無賢聖此世長者案他本者作古之所誤出也非春秋為辭之術也不法之案他本此下誤接未行所始如之何十一字言無騐之説君子之所外何以為哉或曰性有善端心有善質尚安非善應之曰非也繭有絲而繭非絲也卵有雛而卵非雛也比類率然有何疑焉天生民有六經言性者不當異然其或曰性也善或曰性未善則所謂善者各異意也性有善端動之愛父母善於禽獸則謂之善此孟子之言循三綱五紀通八端之理忠信而博愛敦厚而好禮乃可謂善此聖人之善也是故孔子曰善人吾不得而見之得見有恒者斯可矣由是觀之聖人之所謂善案他本下有亦字未易當也非善於禽獸則謂之善也使動其端善於禽獸則可謂之善善奚為弗見也夫善於禽獸之未得為善也猶知於案他本知於作之有草木而不得名知萬民之性善於禽獸而不得名善知之案他本知之作之知名乃取之聖聖人之所命天下以為正正朝夕者視北辰正嫌疑者視聖人聖人以為無王之世不教之名民莫能當善善之難當如此而謂萬民之性皆能當之過矣質於禽獸之性則萬民之性善矣質於人道之善則民性弗及也萬民之性善於禽獸者許之聖人之所案他本下有謂字善者勿許吾質之命性者異孟子孟子下質於禽獸之所為故曰性己善吾上質於聖人之所善故謂性未善善過性聖人過善春秋大元故謹於正名名非所始如之何謂未善已善也實性第三十六孔子曰名不正則言不順今謂性案他本性誤作善己善不幾於無教而如其自然又不順於為政之道矣且名者性之實實者性之質也案他本也誤作之無教之時何處能善善如米性如禾禾雖出米而禾未可謂米也性雖出善而性未可謂善也米與善人之繼天而成於外也非在天所為之内也天所為有所至而止止之内謂之天止之外謂之王教王教在性外而性不得不遂故曰性有善資案他本資作質而未能為善也豈敢美辭其實然也天之所為止於繭麻與禾以麻為布以繭為絲以米為飯以性為善此皆聖人所繼天而進也非情性質樸之能至也故不可謂性正朝夕者視北辰正嫌疑者視聖人聖人之所名天下以為正今按聖人言中本無性善名而有善人吾不得見之矣使萬民之性皆已案他本已作以能善善人者何為不見也觀孔子言此之意以為善難當甚而孟子以為萬民性皆能當之過矣聖人之性不可以名性斗筲之性又不可以名性名性者中民之性中民之性如繭如卵卵待覆二十日而後能為雛繭待繰以綰湯而後能為絲性待漸於教訓而後能為善善教訓案他本訓作誨之所然也非質樸之所至能也故不謂性性者宜知名矣無所待而起生而所自有也善所自有則教訓已非性也是以米出於粟而粟不可謂米玉出於璞而璞不可謂玉善出於性而性不可謂善其比多在物者為然在性者以為不然何不通於類也卵之性未能作雛也繭之性未能作絲也麻之性未能為縷也粟之性未能為米也春秋别物之理以正其名名物必各因其真真案他本脱下真字其義也真其情也乃以為名名霣石則後其五退飛則先其六此皆其真也聖人於言無所苟而已矣性者天質之樸也善者王教之化也無其質則王教不能化無其王教則質樸不能善質而不以善性其名不正故不受也諸侯第三十七生育養長成而案他本脱而字更生終而復始其事所以利活民者案他本下有而字無已天雖不言其欲贍足之意可見也古案他本古誤作士之聖人見天意之厚於人也故南面而君天下必以兼利之為其遠者目不能見其隱者耳不能聞於是千里之外割地分民而建國案他本國誤作間立君使為天子視所不見聴所不聞朝者召而問之也諸侯之為言猶諸侯也五行對第三十八河間獻王問温城董君曰孝經曰夫孝天之經地之義何謂也對曰天有五行木火土金水是也木生火火生土土生金金生水水為冬金為秋土為季夏火為夏木為春春主生夏主長季夏主養秋主収冬主藏藏冬之所成也是故父之所生其子長之父之所長其子養之父之所養其子成之諸父所為其子皆奉承而續行之不敢不致如父之意盡為人之道也故五行者五行也由此觀之父授案他本下有之字子受之乃天之道也故曰夫孝者天之經也此之謂也王曰善哉天經既聞得之矣願聞地之義對曰地出雲為雨起氣為風風雨者地之所為案他本所為誤作為為地不敢有其功名必上之於天命若從天氣者故曰天風天雨也其曰地風地雨也勤勞在地名一歸於天非至有義其孰能行此故下事上如地事天也可謂大忠矣土者火之子也五行莫貴於土土之於四時無所命者不與火分功名木名春火名夏金名秋水名冬忠臣之義孝子之行取之土上者五行最貴者也其義不可以加矣五聲案他本聲作音莫貴於宫五味莫美於甘五色莫貴於黄此謂孝者地之義也王曰善哉衣服容貌者所以説目也聲言應對者所以説耳也好惡去就者所以説心也故君子衣服中而容貌恭則目説矣言理應對遜則耳説矣好仁厚而惡淺薄就善人而遠僻鄙則心説矣故曰行意可樂容止可觀此之謂也闕文第三十九闕文第四十春秋繁露卷十
