body:
  text: 春秋繁露卷十二漢董仲舒撰隂陽終始第四十八天之道終而復始故北方者天之所終始也隂陽之所合别案他本合别作别合也冬至之後隂俛而西入陽仰而東出出入之處常相反也多少調和之適常相順也有多而無溢有少而無絶春夏陽多而隂少秋冬陽少而隂多多少無常未嘗不分而相散也以出入相損益以多少相溉濟也多勝少者倍案他本倍誤作借入入者損一案他本一誤作益而出者益二天所起一案益二以下六字他本闕動而再倍常乘反衡再登之勢以就同類與案以就以下五字他本闕之相報故其氣相俠而以變化相輸也春秋之中案輸也以下六字他本闕隂陽之氣俱相併也中春以生中秋以殺由案生中以下六字他本闕此見之天之所起其氣積天之所廢其氣隨案他本闕隨字故至春少陽東出就木與之俱生至夏太陽南出就火與之俱煖此非各就其類而與之相起與少陽就木太陽就火火木案他本木誤作不相稱各就其正此非正其倫與至於秋時少隂興而不得以秋從金從金而傷火功雖不得以從金亦以秋出於東方俛其處而適其事以成嵗功此非權與隂之行固常居虛而不得居實至於冬而止空虛太陽乃得北就其類而與水起寒是故天之道有倫有經有權隂陽義第四十九天道之常一隂一陽陽者天之徳也隂者天之刑也迹隂陽終嵗之行以觀天之所親而任成天之功猶謂之空空者之實也故清凓案他本凓誤作漂之於嵗也若酸醎之於味也僅有而已矣聖人之治亦從而然天之少隂用於功太隂用於空人之少隂用於嚴而太隂用於喪喪亦空空亦喪也是故天之道以三時成尘以一時喪死死之者謂百物枯落也喪之者謂隂氣悲哀也天亦有喜怒之氣哀樂之心與人相副以類合之天人一也春喜氣也故生秋怒氣也故殺夏樂氣也故養冬哀氣也故藏四者天人同有之有其理而一用之與天同者大治與天異者大亂故為人主之道莫明於在身之與天同者而用之使喜怒必當義乃出如寒暑之必當其時乃發也使徳之厚於刑也如陽之多於隂也是故天之行隂氣也少取以成秋其餘以歸之冬聖人之行隂氣也少取以立嚴其餘歸之喪喪亦人之冬氣故人之太隂不用於刑而用於喪天之太隂不用於物而用於空空亦為喪喪亦為空其實一也皆喪死亡之心也隂陽出入上下第五十天道大數相反之物也不得俱出隂陽是也春出陽而入隂秋出隂而入陽夏右陽而左隂冬右隂而左陽隂出則陽入陽入則隂出隂右則陽左隂左則陽右是故春俱南秋俱北而不同道夏交於前冬交於後而不同理並行而不相亂澆滑而各持分此之謂天之意而何以從事天之道初薄大冬隂陽各從一方來而移於後隂由東方來西陽由西方來東至於中冬之月相遇北方合而為一謂之曰至别而相去隂適右陽適左適左案他本脱下適左二字者其道順適右者其道逆逆氣左上順氣右下故下煖而上寒以此見天之冬右隂案他本隂誤作氣而左陽也上所右而下所左也冬月盡而隂陽俱南還陽南還出於寅隂南還入於戌此隂陽所始出地入地之見處也至於中春之月陽在正東隂在正西謂之春分春分者隂陽相半也故晝夜均而寒暑平隂日損而隨陽陽日益而鴻故為煖案他本煖作燒熱初得大夏之月相遇南方合而為一謂之曰至别而相去陽適右隂適左適左案他本左誤作右由下適右案他本右誤作左由上上暑而下寒以此見天之夏右陽而左隂也上其所右下其所左夏月盡而隂陽俱北還陽北還而入於申隂北還而入於辰此隂陽之所始出地入地之見處也至於中秋之月陽在正西隂在正東謂之秋分秋分者隂陽相半也故晝夜均而寒暑平陽日損而隨隂隂日益而鴻故至於季秋而始霜至於孟冬而始大寒下雪而物咸成大寒而物畢藏天地之功終矣天道無二第五十一天之常道相反之物也不得兩起故謂之一一而不二者天之行也隂與陽相反之物也故或出或入或右或左春俱南秋俱北夏交於前冬交於後並行而不同路交㑹而各代理此其文與天之道有一出一入一休一伏其一度也然而不同意陽之出常縣於前而任嵗事隂之出常縣於後而守空虛陽之休也功已成於上而伏於下隂之伏也不得近義而遠其處也天之任陽不任隂好徳不好刑如是故陽出而前隂出而後尊徳而卑刑之心見矣陽出而積於夏任徳以嵗事也隂出而積於冬錯刑於空處也小以此察之天無常於物而一於時時之所宜而一為之故開一塞一起一廢一而至畢時而止終有復始其一一者一也是於天凡在隂位者皆惡亂善不得主名天之道也故常一而不滅天之道事無大小物無難易反天之道無成者是以目不能二視耳不能二聴一手不能二事一手畫方一手畫圓莫能成人為小易之物而終不能成反天之不可行如是是故古案他本古誤作右之人物而書文止於一者謂之忠持二忠者謂之患患人之忠不一者也不一者故患之所由生也是故君子賤二而貴一人孰無善善不一故不足以立身治孰無常常不一故不足以致功詩云上帝臨汝無一爾心知天道者之言也煖燠孰多第五十二天之道出陽為煖以生之出隂為清以成之是故非薫也不能有育非凓案他本凓誤作漂下同也不能有熟嵗之精也知心而不省薫與凓孰多者用之必與天戾與天戾雖勞不成是自正月至於十月而天之功畢計其間者案他本無者字隂與陽案他本隂與陽誤作與隂陽各居幾何薫與凓其案他本其誤作具下衍者字日孰多距物之初生至其畢成露與霜其下孰倍故從中春生於秋氣温柔和調乃季秋九月隂乃始多於陽天於是時出凓下霜出凓下霜而大案他本大作天降物固已皆成矣故九月者天之功大究於是月也十月而悉畢故案其迹數其實清凓之日少少耳功已畢成之後隂乃大出天之成功也少隂與而太隂不與少隂在内而太隂在外故霜加物而雪加於案他本無於字空空者亶地而已不逮物也功已畢成之後物未復生之前太隂之所常出也雖曰隂亦以太陽資化其位而不知所受之故聖王在上位天覆地載風令雨施雨施者布徳均也風令者言令直也詩云不識不知順帝之則言弗能知識而效天之所為云爾禹水湯旱非常經也適遭世氣之變而隂陽失平堯視民如子民親堯如父母尚書曰二十有八載放勲乃殂落百姓如喪考妣四海之内閼宻八音三年三年陽氣壓於隂隂氣大興此禹所以有水名也桀天下之殘賊也湯天下之盛徳也天下除殘賊而得盛徳大善者再是重陽也故湯有旱之名皆適遭之變非禹湯之過毋以適遭之變疑平生之常則所守不失則正道益明基義第五十三凡物必有合合必有上必有下必有左必有右必有前必有後必有表必有裏有美必有惡有順必有逆有喜必有怒有寒必有暑有晝必有夜此皆其合也隂者陽之合夫者妻之合子者父之合臣者君之合物莫無合而合各有隂陽陽兼於隂隂兼於陽夫兼於妻妻兼於夫父兼於子子兼於父君兼於臣臣兼於君君臣父子夫婦之義皆取諸隂陽之道君為陽臣為隂父為陽子為隂夫為陽妻為隂隂道無所獨行其始也不得專起其終也不得分功有所兼之義是故臣兼功於君子兼功於父妻兼功於夫隂兼功於陽地兼功於天舉而上者抑而下也有屏送而左也有引而右也有親而任也有疎而遠也有欲日益也有欲日損也益而用而損其妨有時損少而益多有時損多而益少少而不至絶多而不至溢隂陽二物終嵗各壹出壹其出遠近同度而不同意陽之出也常縣於前而任事隂之出也常縣於後而守空處而見天之親陽而疎隂任徳而不任刑也是故仁義制度之數盡取之天天為君而覆露之地為臣而持載之陽為夫而生之隂為婦而助之春為父而生之夏為子而養之秋為死而棺之冬為痛而喪之王道之三綱可求於天天出陽為煖以生之地出隂為清以成之不煖不生不清不成然而計其多少之分則煖暑居百而清寒居一徳教其與刑罰猶此也故聖人多其愛而少其嚴厚其徳而簡其刑以此配天天之大數必有十旬旬天地之數十而畢舉旬生長之功十而畢成天之氣徐乍寒乍暑故寒不凍暑不渴以其有餘徐來不暴卒也易曰履霜堅冰蓋言遜也然則上堅不踰等果是天之所為弗作而成也人之所為亦當勿作而極也凡有興者稍稍上之以遜順徃使人心説而安之無使人心案他本心作之恐原註一作怨而不使案他本而字上誤衍作字故曰君子以人治人謹能愿此之謂也聖人之道同諸天地蕩諸四海變習易俗闕文第五十四春秋繁露卷十二
