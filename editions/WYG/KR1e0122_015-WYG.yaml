body:
  text: 春秋繁露卷十五漢董仲舒撰郊義第六十六郊義春秋之法王者嵗一祭天于郊四祭于宗廟宗廟因于四時之易案他本易誤作房郊因于新嵗之初聖人有以起之其以祭不可不親也天者百神之君也王者之所最尊也以最尊天之故故易始嵗更紀即以其初郊郊必以正月上辛者言以所最尊首一嵗之事每更紀者以郊郊祭首之先貴之義尊天之道也郊祭第六十七春秋之義國有大喪者止宗廟之祭而不止郊祭不敢以父母之喪廢事天地之禮也父母之喪至哀痛悲苦也尚不敢廢郊也孰足以廢郊者故其在禮亦曰喪者不祭惟祭天為越喪而行事夫古之畏敬天而重天郊如此甚也今羣臣學士不探察曰萬民多貧或頗饑寒足郊乎是何言之誤天子父母事天而案他本而字誤移在天字上子孫畜萬民民未徧飽無用祭天者是猶子孫未得食無用食父母也言莫逆於是是其去禮遠也先貴而後賤孰貴于天子天子號天之子也奈何受為天子之號而無天子之禮天子不可不祭天也無異人之不可以不食父故古之聖王文章之最重者也前世王莫不從重栗精奉之以事上天至於秦而獨闕案他本闕作曠然廢之一何不率由舊章之大甚也天者百神之大君也事天不備雖百神猶無益也何以言其然也祭而地原註疑是他字神者春秋譏之孔子曰獲罪於天無所禱也是其法也故未見秦國致天案他本天作大福如周國也詩曰唯此文王小心翼翼昭事上帝允懷多福多福者非謂人也事功也謂天之所福也傳曰周國子多賢蕃案他本蕃誤作審殖至于駢孕案他本孕誤作厚男者四四産而得八案他本八誤作人男皆君子俊雄也今此天之所以興周國也非周國之所能為也今秦與周俱得為天子而所以事天者異于周以郊為百神始始入嵗首必以正月上辛日先享天乃敢于地先貴之義也夫嵗先之與嵗弗行也相去遠矣天下福若無可怪者然所以乆弗行者案他本者作也非灼灼見其當而故弗行也典禮之官常嫌疑莫案他本莫誤作其能昭昭明其當也今切以為其當與不當可内返於心而定也堯謂舜曰天之歴數在爾躬言察身以知天也今身有子孰不欲其有子禮也聖人正名名不虛生天子者則天之子也以身度天獨何為不欲其子之有子禮也今為其天子而闕然無祭于天天何必善之所聞曰天下和平則災害不生今災害生見天下未和平也天下所未和平者天子之教化不行也詩曰有覺徳行四國順之覺者著也王者有明著之徳行于世則四方莫不響應風化善于彼矣故曰悦于慶賞嚴于刑罰疾于法令四祭第六十八古者嵗四祭四祭者因四時之所生熟而祭其先祖父母也故春曰祠夏曰礿秋曰嘗冬曰蒸此言不失其時以奉祭先祖也過時不祭則失為天子之道也祠者以正月始食韭也礿者以四月食麥也嘗者以七月嘗黍稷也蒸者以十月進初稻也此天之經也地之義也孝子孝婦縁天之時因地之利己受命而王必先祭天乃行王事文王之伐崇是也詩曰濟濟辟王左右奉璋奉璋峩峩髦士攸宜此文王之郊也其下之辭曰淠彼涇舟烝徒檝之周王于邁六師及之此文王之伐崇也上言奉璋下言伐崇以是見文王之先郊而後伐也文王受命則郊郊乃伐崇崇國之民方困於暴亂之君未得被聖人徳澤而文王已郊矣安在徳澤未洽者不可以郊乎郊祀第六十九為人子而不事父者天下莫能以為可今為天之子而不事天何以異是是故天子每至嵗首必先郊祭以享天乃敢為地行子禮也每將興師必先郊祭以吿天乃敢征伐行子道也文王受天命而王天下先郊乃敢行事而興師伐崇其詩曰芃芃棫樸薪之槱之濟濟辟王左右趨之濟濟辟王左右奉璋奉璋峩峩髦士攸宜此郊辭也其下曰淠彼涇舟烝徒檝之周王于邁六師及之此伐辭也其下曰文王受命有此武功既伐于崇作邑于豐以此辭者見文王受命則郊郊乃伐崇伐崇之時民何處央原註一作殃乎周宣王時天下旱嵗惡甚王憂之其詩曰倬彼雲漢昭囘于天王曰嗚呼何辜今之人天降喪亂飢饉薦臻靡神不舉靡愛斯牲圭璧既卒寧莫我聴旱既太甚藴隆蟲蟲不殄禋祀自郊徂宫上下奠瘞靡神不宗后稷不克上帝不臨耗射下土寧丁我躬宣王自以為不能乎后稷不中乎上帝故有此災有此災愈恐懼案他本愈恐懼三字在有此災句上而謹事天天若不予是家是家案他本脱下是家二字者安得立為天子立為天子者天予是家天予是家者天使是家天使是家者是家案他本無家字天之所予也案他本無也字天之所使也天已予之天已使之其間不可以接天何哉故春秋凡議郊未嘗譏君徳不成于郊也及案他本及作乃不郊而祭山川失祭之叙案他本叙誤作後逆于禮故必譏之以此觀之不祭天者乃不可祭小神也郊因先卜不吉不敢郊百神之祭不卜而郊獨卜郊祭最大也春秋譏喪祭不譏喪郊郊不辟喪喪尚不辟况他物郊祀案他本祀作祝曰皇皇上天案他本天作帝照臨下土集地之靈降甘風雨庶物羣生言而已矣夫不自為言而為庶物羣生言以人心庶天無尤焉案他本焉作也天無尤焉而辭恭順宜可喜也右郊祀九句九句者陽數也順命第七十父者子之天也天者父之天也無天而生未之有也天者萬物之祖萬物非天不生獨隂不生獨陽不生隂陽與天地參然後生故曰父之子也可尊母之子也可卑尊者取尊號卑者取卑號故徳侔天地者皇天右而子之號稱天子其次有五等之爵以尊之皆以國邑為號其無徳於天地之間者州國人民甚者不得繫國邑皆絶骨肉之屬離人倫謂之案他本謂之作之調閽盜案他本盜作甚而已無名姓案他本無字誤移在姓字下號氏于天地之間至賤乎賤者也其案他本其作甚尊至徳巍巍乎不可以加矣其案他本其作甚卑至賤冥冥其無下矣春秋列序位卑尊之陳累累乎可得而觀也雖闇且愚莫不昭然地之菜茹𤓰果藝之稻麥黍稷菜生榖熟永思吉日供具祭物齋戒沐浴潔清致敬祀其先祖父母孝子孝婦不使時過已處之以愛敬行之以恭讓亦殆免于罪矣公子慶父罪亦不當繫于國以親之故為之諱而諸母之國齊之仲孫去其公子之親也故有大罪不奉其天命者皆棄其天倫人于天也以道受命其于人以言受命不若于道者天絶之不若于言者人絶之臣子大受命于君辭而出疆唯有社稷國家之危猶得發辭而專安之盟是也天子受命于天諸侯受命于天子子受命于父臣妾受命于君妻受命于夫諸所受命者其尊皆天也雖謂受命于天亦可不天亦可天子不能奉天之命則廢而稱公王者之後是也公侯不能奉天子之命則名絶而不得就位衛侯朔是也子不奉父命則有伯討之罪衛世子蒯聵是也臣不奉君命雖善以叛言晉趙鞅入于晉陽以叛是也妾不奉君之命則媵女先至者是也妻不奉夫之命則絶夫不言及是也曰不奉順於天者其罪如此孔子曰畏天命畏大人畏聖人之言其案他本無其字祭社稷宗廟山川鬼神不以其道無災無害至於祭天不享其卜不從使其牛口案他本口誤作曰傷鼷鼠食其角或言食牛或言食而死或食而生或不食而自死或改卜而牛死或卜而食其角過有深淺薄厚而災有簡甚不可不察也猶郊之變因其災而之變應而無為也見百事之變之所不知而自然者勝言與以此見其可畏專誅絶者其唯案他本唯作為天乎臣殺君子殺父三十有餘諸其賤者則損以此觀之可畏者其唯天命大人乎亡國五十有餘皆不事畏者也况不畏大人專誅之君之滅者何日之有哉魯宣違案他本違誤作為聖人之言變古易常而災立至聖人之言可不慎此三畏者異指而同致故聖人同之俱言其可畏也郊事對第七十一廷尉臣湯昧死言曰臣湯承制以郊事問故膠西相仲舒臣仲舒對曰所聞古者天子之禮莫重於郊郊常以正月上辛者所以先百神而最居前禮三年喪不祭其先而不敢廢郊郊重於宗廟天尊於人也王制曰祭天地之牛繭栗宗廟之牛握賓客之牛尺此言徳滋美而牲滋微也春秋曰魯祭周公用白牡色白貴純也帝牲在滌三月牲貴肥潔而不貪其大也凡養牲之道務在肥潔而已駒犢未能勝芻豢之食莫如令食其母便臣謹問仲舒魯祀周公用白牲非禮臣仲舒對曰禮也臣湯問曰周天子用騂剛羣公不毛周公諸公也何以得用純牲臣仲舒對曰武王崩成王幼案他本幼作立而在襁褓之中周公繼文武之業成二聖之功徳漸天地澤被四海故成王賢而貴之詩云無徳不報故成王使祭周公以白牡上不得與天子同色下有異于諸侯仲舒愚以為報徳之禮臣湯問仲舒天子祭天諸侯祭土魯何縁以祭郊臣仲舒對曰周公傅成王成王遂及聖功莫大於此周公聖人也有祭故成王令魯郊也臣湯問仲舒魯祭周公用白牲其郊何用臣案他本臣誤作至仲舒對曰魯郊用純騂剛周色上赤魯以天子命郊故以騂臣湯問仲舒祠宗廟或以鶩當鳧鶩非鳧可用否仲舒對曰鶩非鳧鳧非鶩也臣聞孔子入太廟每事問慎之至也陛下察躬親齋戒沐浴以承宗廟甚敬謹奈何以鳧當鶩鶩當鳧名實不相應以承太廟不亦不稱乎臣仲舒愚以為不可臣犬焉齒衰賜案他本脱賜字骸骨伏陋巷案他本脱巷字陛下乃幸使九卿問以朝廷之事臣愚陋曽不足以承明詔奉大對臣仲舒昧死以聞春秋繁露卷十五
