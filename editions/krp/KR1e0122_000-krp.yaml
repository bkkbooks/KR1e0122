body:
  text: 卷一楚莊王第一玉杯第二卷二竹林第三卷三玉英第四精華第五卷四王道第六卷五滅國上第七滅國下第八隨本消息第九㑹盟要第十正貫第十一十指第十二重政第十三卷六服制象第十四二端第十五符瑞第十六俞序第十七離合根第十八立元神第十九保位權第二十卷七考功名第二十一通國身第二十二三代改制第二十三官制象天第二十四堯舜湯武第二十五服制第二十六卷八制度第二十七爵國第二十八仁義法第二十九必仁且知第三十卷九身之養第三十一對膠西王第三十二觀德第三十三奉本第三十四卷十深察名號第三十五實性第三十六諸侯第三十七五行第三十八闕文第三十九闕文第四十卷十一爲人者第四十一五行之義第四十二陽尊陰卑第四十三王道通三第四十四天容第四十五天辨在人第四十六陰陽位第四十七卷十二陰陽終始第四十八陰陽義第四十九陰陽出入第五十天道無二第五十一煖燠孰多第五十二基義第五十三闕文第五十四卷十三四時之副第五十五人副天數第五十六同類相動第五十七五行相勝第五十八五行相生第五十九五行逆順第六十治水五行第六十一卷十四治亂五行第六十二五行變救第六十三五行五事第六十四郊語第六十五卷十五郊義第六十六郊祭第六十七四祭第六十八郊祀第六十九順命第七十郊祀對第七十一卷十六執贄第七十二山川頌第七十三求雨第七十四止雨第七十五祭義第七十六循天之道第七十七卷十七天地之行第七十八威德所生第七十九如天之爲第八十天地陰陽第八十一天地施第八十二臣等謹案春秋繁露十七卷漢董仲舒撰繁或作蕃蓋古字相通其立名之義不可解中興館閣書目謂繁露冕之所垂有聯貫之象春秋比事屬辭立名或取諸此亦以意爲說也其書發揮春秋之旨多主公羊而徃徃及陰陽五行考仲舒本傳蕃露玉杯竹林皆所著書名而今本玉杯竹林乃在此書之中故崇文總目頗疑之而程大昌攻之尤力今觀其文雖未必全出仲舒然中多根極理要之言非後人所能依託也是書宋代巳有四本多寡不同至樓鑰所校乃爲定本鑰本原闕三篇明人重刻又闕第五十五篇及第五十六篇首三百九十六字第七十五篇中一百八十字第四十八篇中二十四字又第三十五篇顚倒一頁遂不可讀其餘訛脫不可勝乙蓋海内藏書之家不見完本三四百年於茲矣今以永樂大典所存樓鑰本詳校其異于他本者凡補一千一百餘字刪一百十餘字改定一千八百二十餘字神明煥然頓還舊觀雖曰習見之書實則絶無僅有之本也儻非幸遇聖朝右文稽古使巳湮舊籍復發幽光則此十七卷者終沈於蠧簡中矣茲豈非萬世一遇哉臣等編校之餘爲是書幸且爲讀是書者幸也乾隆三十八年十月恭校上
