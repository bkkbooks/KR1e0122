front:
  text: 春秋繁露卷四
  hash: sha256:52fd2bb46a978f1cd9245fe4561799a534d90e279c6e82432d595e2d7e92bec4
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1e0122_SBCK_004-1a}
body:
  text: 漢董仲舒撰王道第六春秋何貴乎元而言之元者始也言本正也道王道也王者人之始也王正則元氣和順風雨時景星見黃龍下王不正則上變天賊氣案他本無氣字並見五帝三王之治天下不敢有君民之心什一而稅教以愛使以忠敬長老親親而尊尊不奪民時使民不過歲三日民家給人足無怨望忿怒之患彊弱之難無讒案讒他本作强賊妒疾之人民修德而美好被髮銜哺而游不慕富貴恥惡不犯父不哭子兄不哭弟毒蟲不螫猛獸不搏抵蟲不觸案蟲不觸他本誤作不觸蟲故天爲之下甘露朱草生醴泉出風雨時嘉禾興鳳凰麒麟遊於郊囹圄空虛畫衣裳而民不犯四夷傳譯而朝民情至樸而不文郊天祀地秩山川以時至封於泰山禪於梁父立明堂宗祀先帝以祖配天天下諸侯各以其職來祭貢土地所有案所有二字他本誤作有所先以入宗廟端冕盛服而後見先德恩之報奉元之應也桀紂皆聖王之後驕溢妄行侈宮室廣苑囿窮五采之變極飾材之工困野獸之足竭山澤之利食類惡之獸奪民財食高雕文刻鏤之觀盡案盡他本誤作畫金玉骨象之工盛羽族之飾窮原註一作殽白黑之變深刑妄殺以凌下聽鄭衞之音充傾宮原註一作害之志靈案他本無靈字虎兕文采之獸以希見之意賞佞賜讒以糟爲邱以酒爲池孤貧不養殺聖賢而剖其心生燔人聞其臭剔婦孕見其化斮朝涉之足察其拇原註一作腑一作脛殺梅伯以爲醢刑鬼侯之女取其環誅求無巳天下空虛羣臣畏恐莫敢盡忠紂愈自賢周發兵不期㑹於孟津之上者八百諸侯共誅紂大亡天下春秋以爲戒曰亳社災周衰天子微弱諸侯力政大夫專國士專邑不能行度制法文之禮諸侯背叛莫修貢聘奉獻天子臣弑其君子弑其父孽殺其宗不能統理更相伐銼以廣地以强相脅不能制屬强奄弱衆暴寡富使貧并兼無巳臣下上僭不能禁止日爲之食星霣如雨雨螽沙鹿崩夏大雨水冬大雨雪霣石于宋五六鷁退飛霣霜不殺草李梅實正月不雨至於秋七月地震梁山崩壅河三日不流晝晦彗星見于東方孛于原註一作升大辰鸜鵒來巢春秋異之以此見悖亂之徵孔子明得失差貴賤反王道之本譏天王以致太平刺惡譏微不遺小大善無細而不舉惡無細而不去進善誅惡絶諸本案他本無本字而巳矣天王使宰咺來歸惠公仲子之賵刺不及事也天王伐鄭譏親也㑹王世子譏微也祭公來逆王后譏失禮也刺家父求車武氏毛伯求賻金王人救衞王師敗于貿戎案貿戎地名本公羊傳他本俱從左傳作茅戎下同天王不養案他本無不養二字出居于鄭殺母弟王室亂不能及外分爲東西周無以先天下召衞侯不能致遣子宇征衞不能絶伐鄭不能從無駭滅極不能誅諸侯得以大亂篡弑無巳臣下上偪僭儗天子諸侯彊者行威小國破滅晉至三侵周與天王戰于貿戎而大敗之戎執凡伯于楚邱以歸諸侯本怨隨惡發兵相破夷人宗廟社稷不能統理臣子强至弑其君法度廢而不復用威武絶而不復行案他本無行字誤衍一復字故鄭魯易地晉文再致天子齊桓㑹王世子擅封邢衞𣏌橫行中國意欲王天下魯舞八佾北祭泰山郊天祀地如天子之爲以此之故弒君三十二亡國五十一細惡不絶之所致也春秋立義天子祭天地諸侯祭社稷諸山川不在封内不祭有天子在諸侯不得專地不得專封不得專執天子之大夫不得舞天子之樂不得致天子之賦不得適天子之貴君親無將將案他本脫一將字而誅大夫不得世大夫不得廢置君命立適以長不以賢立子以貴不以長立夫人以適不以妾天子不臣母后之黨親迎案迎字原本他本俱同據文義疑是近字之誤以來遠故案他本無遠故二字未有不先近而致遠者也案他本無也字故内其國而外諸夏内諸夏而外夷狄言自近者始也諸侯案侯他本作夏來朝者得褒邾婁儀父稱字滕薛稱侯荆得人介葛盧得名内出言如諸侯來曰朝大夫來曰聘王道之意也案他本無也字誅惡而不得遺細大諸侯不得爲匹夫興師不得執天子之大夫執天子之案之字他本誤移在大夫二字下大夫與伐國同罪執凡伯言伐獻八佾諱八言六鄭魯易地諱易言假晉文再致天子諱致言狩桓公存邢衞杞不見春秋内心予之行法絶而不予止亂之道也非諸侯所當爲也春秋之義臣不討賊非臣也子不復讎非子也故誅趙盾賊不討者不書葬臣子之誅也許世子止不嘗藥而誅爲弑父楚公子比脅而立而不免於死齊桓晉文擅封致天子誅絶繼絶案絶他本作世存亡侵伐㑹同常爲本主曰桓公救中國攘夷狄卒服楚至爲王者事晉文再致天子皆止不誅善其牧案牧他本作救諸侯奉獻天子而復周室春秋予之爲伯誅意不誅辭之謂也魯隱之代桓立祭仲之出忽立突仇牧孔父荀息之死節公子目夷不與楚國此皆執權存國行正世之義守惓惓之心春秋嘉氣義焉故皆見之復正之謂也夷狄邾婁人牟人葛人爲其天王崩而相朝聘也此其誅也殺世子母弟直稱君明失親親也魯季子之免罪吳季子之讓國明親親之恩也閽殺吳子餘祭見刑人之不可近鄭伯髠頑卒于會諱殺痛彊臣專君君不得爲善也衞人殺州吁齊人殺無知明君臣之義守國之正也衞人立晉美得衆也君將不言率師重君之義也正月公在楚臣子思君無一日無君之意也誅受令恩衞葆以正囹圄之平也言圍成甲午祠兵案祠兵本公羊傳他本從左傳作治兵以别迫脅之罪誅意之法也作南門刻桷丹楹作雉門及兩觀築三臺新延廏譏驕溢不恤下也故臧孫辰請糴于齊孔子曰君子爲國必有三年之積一年不熟乃請糴失君之職也誅犯始者省刑絶惡疾案他本無疾字始也大夫盟於澶淵刺大夫之專政也諸侯㑹同賢爲主賢賢也春秋紀纖芥之失反之王道追古貴信結言而巳不至用牲盟而後成約故曰齊侯衞侯胥命于蒲傳曰古者不盟結言而退宋伯姬曰婦人夜出傅母不在不下堂曰古者周公東征則西國怨桓公曰無貯粟無鄣谷無易樹子無以妾爲妻宋襄公曰不鼓不成列不阨人莊王曰古者杅不穿皮不蠧則不出君子篤於禮薄於利要其人不要其土告從不赦不祥彊不凌弱齊頃公弔死視疾孔父正色而立於朝人莫過而致難乎其君齊國佐不辱君命而尊齊侯此春秋之救文以質也救文以質見天下諸侯所以失其國者亦有焉潞子欲合中國之禮義離乎夷狄未合乎中國所以亡也吳王夫差行彊於越臣人之王妾人之妻卒以自亡宗廟夷案夷他本作失社稷滅其可痛也長王投死於戲豈不哀哉晉靈行無禮處臺上彈羣臣枝解宰人而棄漏陽處父之謀使陽處父死及患趙盾之諫欲殺之卒爲趙穿案穿他本誤作盾所殺晉獻公行逆理殺世子申生以驪姬立奚齊卓子皆殺死國大亂四世乃定幾爲秦所從驪姬起也原註所下脫一字從一作徒非楚昭王行無度殺伍子胥父兄蔡昭公朝之因請其裘昭公不與吳王非之舉兵加楚大敗之君舍乎君室大夫舍大夫室妻楚王之母貪暴之所致也晉厲公行暴道殺無罪人一朝而殺大臣三人明年臣下畏恐晉國殺之陳侯佗淫乎蔡蔡人殺之古者諸侯出疆必具左右備一案一字他本作二師以備不虞今蔡侯恣以身出入民間案他本無民間二字至死閭里之庸甚非人君之行也宋閔公矜婦人而心妒案而心他本誤作心而與大夫萬博萬案他本脫博萬二字譽魯莊公曰天下諸侯宜爲君唯魯侯爾閔公妒其言曰此虜也爾虜焉知魯侯之美惡乎至萬怒搏閔公絶脰此以與臣博之過也古者人君立於陰大夫立於陽所以别位明貴賤今與臣相對而博置婦人在側此君臣無別也故使萬稱他國卑閔公之意閔公籍萬而身與之博下君自置有辱之婦人之房俱而矜案矜他本誤作務婦人獨得殺死之道也春秋曰大夫不適君遠此逼案逼他本作過也梁内役原註一作取民無巳其民不能堪使民比地爲伍一家亡五家殺刑其民曰先亡者封後亡者刑君者將使民以孝於父母順於長老守邱墓承宗廟世世祀其先今求財不足行罰如將不勝殺戮如屠原註一作從仇讎其民魚爛而止案而止二字他本作則亡國中盡空春秋曰梁亡亡者自亡也非人亡之也虞公貪財不顧其難快耳說目受晉之璧屈產之乘假晉師道還以自滅宗廟破毁社稷不祀身死不葬貪財之所致也故春秋以此見物不空來寶不虛出自内出者無匹不行自外至者無主不止此其應也楚靈王行彊乎陳蔡意廣以武不顧其行慮所美内罷其衆乾谿有物女水盡則女見水滿則不見靈王舉發其國而役三年不罷楚國大怨案怨他本作怒有行暴意殺無罪臣成然楚國大懣公子棄疾卒令靈王父子自殺而取其國虞不離津澤農不去疇土而民相愛也此非盈意之過耶魯莊公好宮室一年三起臺夫人内淫兩弟弟兄子父相殺國絶莫繼爲齊所存夫人淫之過也妃匹貴妾可不愼邪此皆内自彊從心之敗巳見自彊之敗尙有正諫而不用卒皆取亡曹羈諫案諌他本作陳其君案他本下有也字曰戎衆以無義君無自適原註一作敵君不聽果死戎寇伍子胥諫吳王以爲越不可不取吳王不聽至死伍子胥還九年越果大滅吳國秦穆公將襲鄭百里蹇叔諫曰千里而襲人者未有不亡者也穆公不聽師果大敗殽中匹馬隻輪無反者晉假道道案原本無下道字虞虞公許之宮之奇諫曰唇亡齒寒虞虢之相救非相賜也君請勿許虞公不聽後虞果亡於春秋明此存亡道可觀也觀乎亳社知驕溢之罰觀乎許田知諸侯不得專封觀乎齊桓晉文宋襄楚莊知任賢奉上之功觀乎魯隱祭伸叔武孔父荀息仇牧吳季子公子目夷知忠臣之效觀乎楚公子比知臣子之道效死之義觀乎潞子知無輔自詛之敗觀乎公在楚知臣子之恩觀乎漏言知忠道之絶觀乎獻案他本無獻字六羽知上下之差觀乎宋伯姬知貞婦之信觀乎吳王夫差知彊凌弱觀乎晉獻公知逆理近色之過觀乎楚昭王之伐蔡知無義之反觀乎晉厲之妄殺無罪知行暴之報案報他本誤作暴觀乎陳佗宋閔知妒案妒他本作嫉淫之過觀乎虞公梁亡知貪財枉法之窮觀乎楚靈知苦民之壤觀乎魯莊之起臺知驕奢淫泆之失觀乎衞侯朔知不卽召之罪觀乎執凡伯知犯上之法觀乎晉郤缺之伐邾婁知臣下作福之誅觀乎公子翬知臣窺原註一作規君之意觀乎世卿知移權之敗故明王視於冥冥聽於無聲天覆地載天下萬國莫敢不悉靖共職受命者不示臣下以知之至也故道同則不能案他本無能字相先情同則不能相使此其敎也由此觀之未有去人君之權能制其勢者也未有貴賤無差能全其案他本無其字位者也故君子愼之春秋繁露卷四
