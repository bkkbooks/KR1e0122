front:
  text: 春秋繁露卷五
  hash: sha256:9911d7ce827b56853ed9235df5f116e1ccef2d74ee3c56fe98e1874c78346886
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1e0122_SBCK_005-1a}
body:
  text: 漢董仲舒撰滅國上第七王者民之所徃君者不失其羣者也案他本無也字故能使萬民徃之而得天下之羣者無敵於天下失國之君三十一亡國之君五十二小國德薄不朝聘大國不與諸侯㑹聚孤特不相守獨居不同案同他本作成羣遭難莫之救所以亡也非獨公侯大人如此生天地之間根本微者不可遭大風疾雨立鑠消耗衞侯朔固事齊襄而天下患之虞虢并力晉獻難之晉趙盾一夫之士也無尺寸之土無一介之衆也而靈公據霸王之餘尊而欲誅之窮變極詐詐盡力竭禍大及身推盾之心載案載他本作戴小國之位孰能亡之哉故伍子胥一夫之士也去楚干闔廬遂得意於楚所托者誠是何可禦耶楚王髠托其國於子玉得臣而天下畏之虞公托其國於宮之奇晉獻患之及髠殺得臣天下輕之虞公不用宮之奇晉獻亡之存亡之端不可不知也諸侯見加以兵逃遁奔走至于滅亡而案他本脫遁奔以下八字莫之救平生之素行可見也隱代桓立所謂僅存耳使無駭帥師滅極内無諫臣外無諸侯之救載亦由是也宋蔡衞國伐之鄭因其力而取之此無以異於遺重寶於道而莫之守見者掇之也鄧穀失地而朝魯桓鄧穀失地不亦宜乎滅國下第八紀侯之所以滅者乃九世之讎也一旦之言危百世之嗣故曰大去衞人侵成鄭入成及齊師圍成三被大兵終滅莫之救所恃者安在齊桓公欲行霸道譚遂違命故滅而奔莒不事大而事小曹伯之所以戰死於位諸侯莫助憂者幽之㑹齊桓數合諸侯曹小未嘗來也魯大國幽之㑹莊公不徃戎人乃窺兵於濟西由見魯孤獨而莫之救也此時大夫廢君命專救危者魯莊公二十七年齊桓爲幽之案他本無之字㑹衞人不來其明年桓公怒而大敗之及伐山戎張旗陳獲以驕諸侯於是魯一年三築臺亂臣比案比他本作此三起於内夷狄之兵仍滅於外衞滅之端以失案他本無失字幽之會亂之本存親内蔽邢未嘗㑹齊桓也附晉又微晉侯獲於韓而背之淮之㑹是也齊桓卒豎刁易牙之亂作邢與狄伐案伐他本誤作戎其同姓取之其行如此雖爾親庸能親爾乎是君也其滅于同姓衞案衛他本誤作魏侯燬滅邢是也齊桓爲幽之會衞不至桓怒而伐之狄滅之桓憂而立之魯莊爲柯之盟劫汶陽魯絕案絶他本作滅桓立之邢𣏌未嘗朝聘齊桓見其滅率諸侯而立之用心如此豈不霸哉故以憂天下與之隨本消息第九顔淵死子曰天喪予子路死子曰天祝予西狩獲麟曰吾道窮吾道窮三年身隨而卒階此而觀天命成敗聖人知之有所不能救命矣夫先晉獻公之卒齊桓爲葵邱之㑹再致其集先齊孝未卒案他本無卒字一年魯僖乞師取穀晉文之威天子再致先卒一年魯僖公之心分而事齊文公不事晉先齊侯潘卒一年文公如晉衞侯鄭伯皆不期來齊侯巳卒諸侯果㑹晉大夫於新城魯昭公以事楚案楚他本作齊之故晉人不入楚國彊而得意一年再㑹諸侯伐彊吳爲齊誅亂臣遂滅厲魯得其威案威他本誤作滅以滅鄫其明年如案如他本作知晉無河上之難先晉昭之卒一年無難楚國内亂臣弑君諸侯㑹於平邱謀誅楚亂臣昭公不得與盟案盟他本誤作明大夫見執吳大敗楚之黨六國於雞父公如晉而大辱春秋爲之諱而言有疾由此觀之所行從不足恃所事者不可不愼此亦存亡榮辱之要也先楚莊王之卒三年晉滅赤狄潞氏及甲氏留吁先楚子審卒之三年鄭服蕭魚晉侯周卒一年先楚子昭之卒年與陳蔡伐鄭而大克其明年楚屈建會諸侯而張中國卒之三年諸夏之君朝於楚楚子卷繼之四年而卒其國不爲侵奪而顧隆盛彊大中國不出年餘何也楚子昭蓋諸侯可者也天下之疾其君者皆起愬而乘之兵四五出常以衆擊少以專擊散義之盡也先卒四五年案他本作四十五年誤中國内乖齊晉魯衞之兵分守大國襲小案他本無小字諸夏再㑹陳儀齊不肯徃吳在其南而二君殺中國在其北而齊衞殺其君慶封刦案刦他本誤作切君亂國石惡之徒聚而成羣衞衎據陳儀而爲諼林父據戚而以案以他本作已畔宋公殺其世子魯大饑中國之行亡國之跡也譬如於案他本無於字文宣之際中國之君五年之中案之中他本誤作中之五君殺以晉靈之行使一大夫立於蜚案蜚他本誤作棐林拱揖指撝諸侯莫敢不出此猶濕之有拔也原註一作隰之有泮盟㑹要第十至意雖難喻蓋聖人者貴除天下之患貴除天下之患故春秋重而書天下之患偏矣以爲本於見天下之所以致患其意欲以除天下之案他本無之字患何謂哉天下者無患然後性可善性可善然後清廉之化流清廉之化流然後王道舉禮樂興其心在此矣傳曰諸侯相聚而盟案盟他本誤作明君子修國曰此將率爲也哉是以君子以天下爲憂也患乃至於弑君三十一亡國五十二細惡不絶之所致也辭巳喻矣故曰立義以明尊卑之分彊幹弱枝以明大小之職别嫌疑之行以明正世之義采摭托意以矯失案失他本誤作矣禮善無小而不舉惡無小而不去以純其美别賢不肖以明其尊親近以來遠因原註一作自其國而容天下名倫案倫他本誤作何等物不失其理公心以是非賞善誅惡而王澤洽始於除患正一而萬物備故曰大矣哉其號案號他本作别兩言而管天下此之謂也正貫第十一春秋大義之所本耶六者之科六者之指之謂也然後援天端布流物而貫通其理則事變散其辭矣故志得失之所從生而後差貴賤之所始矣論罪源深淺定法誅然後絶屬之分別矣立義定尊卑之序而後君臣之職明矣載定下之賢方表謙案謙他本作兼義之所在則見復正焉耳幽隱不相踰而近之則密矣而後萬物之應無窮者故可施其用於人而不悖其倫矣是以必明其統於施之宜故知其氣矣然後能食其志也知其聲矣而後能扶其精也知其行矣而後能遂其形案形他本作刑也知其物矣然後能别其情也故唱而民和之動而民隨之是知引其天性所好而壓其情之所憎者也如是則言雖約說原註一作德必布矣事雖小功必大矣聲響盛化運於物散入於理德在天地神明休集並行而不竭盈於四海而頌聲案他本無聲字詠書曰八音克諧無相奪倫神人以和乃是謂也故明於情案他本無情字性乃可與論爲政不然雖勞無功夙夜是寤思慮惓心猶不能覩故天下案下他本作不有非案非他本作罪者三示當中孔子之所謂非尚安知通哉十指第十二春秋二百四十二年之文天下之大事變之博無不有也雖然大畧之案他本無之字要有十指十指者事之所案他本無所字繫也王化之由得流也舉事變見有重焉一指也見事變之所至者一指也因其所以至者而治之一指也疆幹弱枝大本小末一指也别嫌疑異同類一指也論賢才之義别所長之能一指也親近來遠同民所欲一指也承周文而反之質一指也木生火火爲夏天之端一指也切刺譏之所罰考變異之所加天案天他本作大之端一指也舉事變見有重焉則百姓安矣見事變之所至者則得案則得他本誤作得則失審矣因其所以至而治之則事之本正矣疆幹弱枝大本小末則君臣之分明矣别嫌疑異同類案類他本作異則是非著矣論賢才之義别所長之能則百官序矣承周文而反之質則化所務立矣親近來遠同民所欲則仁恩達矣木生火火爲夏則陰陽四時之理相受而次矣切刺譏之所罰考異變之所加則天所欲爲行矣統此案他本行矣下有切刺譏之四字無綂此二字而舉之仁徃而義來德澤廣大衍溢於四海隂陽和調萬物靡不得其理矣說春秋者凡用是矣此其法也重政第十三惟聖人能屬萬物於一而繫之元也終原註一作故不及本所從來而承之不能遂其功是以春秋變一謂之元元猶原也其義以隨天地終始也故人唯有終始也而生不必應四時之變故元者爲萬物之本而人之元在焉安在之乃存乎天地之前案他本無前字故人雖生天氣及奉天氣者不得與天元本天元命而共違其所爲也故春正月者承天地之所爲也繼天之所爲而終之也其道相與共功持業安容言乃案乃他本作及天地之元天地之元奚爲於此惡施於人大其貫承意之理矣能說鳥獸之類者非聖人所欲案他本無欲字說也聖人所欲說在於說仁義而理之知其分科條别貫所附明其義之所審勿使嫌疑是乃聖人之所貴而已矣不然傳於衆辭觀於衆物說不急之言而以惑後進者君子之所甚惡也奚以爲哉聖人思慮不厭晝日繼之以夜然後萬物察者仁義矣由此言之尚自爲得之哉故曰於乎爲人師者可無愼耶夫案夫字下他本衍一之字義出於經經傳大本也棄營勞心也苦志盡情頭白齒落尙不合自錄也哉人始生有大命是其體也有變命案此下他本複衍有變命三字存其間者其政案政他本作致也政不齊則人案他本無人字有忿怒之志若將施危難之中而時有隨遭者神明之所接絶屬之符也亦有變其間使之不齊如此不可不省之省之則重政之本矣撮以爲一進義誅惡絶之本而以其施此與湯武同案他本無同字而有異湯武用之治仁案仁他本作徃故春秋明得失差貴賤本之天王之所失天下者使諸侯得以大亂之說而後引而反之故曰博案博他本誤作傳而明切而深矣春秋繁露卷五
