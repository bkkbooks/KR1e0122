body:
  text: 春秋繁露卷九漢董仲舒撰身之養重於義第三十一天之生人也使之案他本之作人生義與利利以養其體義以養其心心不得義不能樂體不得利不能安義者心之養也利者體之養也體莫貴於心故養莫重於義義之養生人大於利案他本下有矣字奚案他本奚作何以知之今人大有義而甚無利雖貧與賤尚容其行以自好而樂生原憲曾閔之屬是也人甚有利而大無義雖甚富則羞辱大惡惡深禍患重非立死其罪者卽旋傷殃憂爾莫能以樂生而終其身案他本脫身字刑戮折夭之民是也夫人原註一作民有義者雖貧能案他本能字在雖字上自樂也而大無案他本無字在大字上義者雖富莫能自存吾以此實義之養生人大於利而案他本而誤作中厚於財也民不能知而常反之皆忘義而殉利去理而走邪以賊其身而禍其家此非其自爲計不忠也則其知之所不能明也今握棗與錯金以示嬰兒必取棗而不取金也握一斤金與千萬之案他本無之字珠以示野人野人必取金而不取珠也故物之於人小者易知也其於大者難見也今利之於人小而義之於人大者無怪民之皆趨利而不趨義也固其所闇也聖人事明義以照燿其所闇故民不陷詩云示我顯德行此之謂也先王顯德以示民民樂而歌之以爲詩說而化之以爲俗故不令而自行不禁而自止從上之意不待使之若自然矣故曰聖人天地動四時化者非有他也其見義大故能動動故能化化故能大行化大行故法不犯法不犯故刑不用刑案他本下衍一有字不用則堯舜之功德此大治之道也先聖傳授而復也故孔子曰誰能出不由戸何莫由斯道也今不示顯德行民闇於義不能照迷於道不能解因欲大嚴㦧以必正之直殘賊案他本賊誤作賤天民而薄主德耳其勢不行仲尼曰國有道雖加刑無刑也案他本也字在無字上國無道雖殺之不可勝也其所謂有道無道者示之以顯德行與不示爾對膠西王越大夫不得爲仁第三十二命令相曰大夫蠡大夫種大夫庸大夫睪原註音澤大夫車成越王與此五大夫謀伐吳遂滅之雪會稽之恥卒爲霸主范蠡去之種死之寡人以此案他本以此誤作此以二大夫者爲皆賢孔子曰殷有三仁今以案他本以作有越王之賢與蠡種之能此三人者寡人亦以爲越有三仁其於君何如桓公決疑於管仲寡人決疑於君仲舒伏地再拜對曰仲舒知褊而學淺不足以決之雖然主有問於臣臣不敢不悉以對禮也臣仲舒聞昔者魯君問於柳下惠曰我欲攻齊何如柳下惠對曰不可退而有憂色曰吾聞之也謀伐國者不問於仁人也此何爲至於我但見問而尚羞之而况乃與爲詐案他本爲詐作詐僞以伐吳乎其不宜明矣以此觀之越本無一仁而安得三仁仁人者正其道不謀其利修其理不急其功致無爲而習俗大化可謂仁聖矣三王是也春秋之義貴信而賤詐詐人而勝之雖有功君子弗爲也是以仲尼之門五尺之童子言羞稱五伯爲其詐以成功苟爲而巳也故不足稱於大君子之門五伯者比於他諸侯爲賢者比於仁案他本仁作聖賢何賢之有譬猶珷玞比於美玉也臣仲舒伏地再拜以聞觀德第三十三天地者萬物之本先祖之所出也廣大無極其德炤明歴年衆多永永無疆天出至明原註一作炤衆之案他本之作知類也其伏無不炤也地出至晦星日爲明不敢闇君臣父子夫婦之道取之此大禮之終也臣子三年案他本年誤作子不敢當雖當之必稱先君必稱先人不敢貪至尊也百禮之貴皆編於案他本於作之月月編於時時編於君君編於天天之所棄天子弗祐桀紂是也天子之所誅絶臣子弗得立蔡世子逢丑父是也王父父案他本無下父字所絶子孫不得屬魯莊公之原闕不得念母衞輒之辭父命是也故受命而海内順之猶衆星之共北辰流水之宗滄海也况生天地之間法太祖先人之容貌則其至德取象衆名尊貴案他本貴作賢是以聖人爲貴也泰伯至德之侔天地也上帝爲之廢適案他本適誤作週易姓而子之讓其至德海内懷歸之泰伯三讓而不敢就位伯邑考之羣心貳自引而激順神明也至德以受命豪英高明之人輻輳歸之高者列爲公侯下至卿大夫濟濟乎哉皆以德序是故案他本無故字吳魯同姓也鍾離之會不得序而稱君殊魯而會之爲其夷狄之行也雞父之戰吳不得與中國爲禮至於伯莒黃池之行變而反道乃爵而不殊召陵之㑹魯君在是而不得爲主避齊桓也魯桓卽位十三年齊宋衞燕舉師而東紀鄭與魯勠力而報之後其巳以魯不得徧避紀侯與鄭厲公也春秋常辭夷狄不得與中國爲禮至邲之戰夷狄反背中國不得與夷狄爲禮避楚莊也案他本避字在禮字上邢衞魯之同姓也狄人滅之春秋不爲案他本爲作得諱避齊桓也當其如此也唯德是親其皆先其親是故周之子孫其親等也而文王最先四時等也而春最先十二月等也而正月最先德等也則先親親魯十二公等而定哀最尊衞俱諸夏也善稻案善稻本公羊傳他本從左傳作善道之㑹獨先内之爲其與我同姓也吳俱夷狄也柤之㑹獨先内之爲其與我同姓也滅國十五有餘獨先諸夏曹晉俱諸夏也譏二名獨先及之盛伯郜子俱當絶而獨不名爲其與我同姓兄弟也外出者衆以母弟出獨大惡之爲其亡母背骨肉也滅人者莫案他本莫作不絶衞侯燬滅同姓獨絶賤其本祖而忘先也親等從近者始立適以長母以子貴先原註或有母字甲戌己丑陳侯鮑卒書所見也而不言其闇者隕石于宋五六鷁退飛耳聞而案他本而作其記目見而書或徐或察案他本察誤作蔡皆以其先接於我者序之其於會朝聘之禮亦猶是諸侯與盟者衆矣而儀父獨漸進鄭僖公方來㑹我而道殺春秋致其意謂之如㑹潞子離狄而歸黨以得上春秋謂之子以領其意苞來首戴黃池踐土與操之㑹陳鄭案他本脫鄭字去我謂之逃歸鄭處案他本處作去而不來謂之乞盟陳侯後案他本後誤作俊至謂之如㑹莒人疑我貶而稱人諸侯朝案他本脫朝字魯者衆矣而滕薛獨稱侯州公化我奪爵而無號吳楚國先聘我者見賢曲棘與鞌之戰先憂我者見賢案他本賢作尊奉本第三十四禮者繼天地體陰陽而愼至容序尊卑貴賤大小之位而差外内遠近新故案他本故作舊之級者也以德多爲象萬物以廣博衆多歴年久者爲象其在天而象天者莫大日月繼天地之光明莫不照也星莫大於太辰北斗常星北斗常星案他本脫下北斗常星四字部星三百衞星三千大火二十六星伐十三案他本三作六星北斗七星常星九辭二十八㝛多者㝛二十八九其猶蓍百莖而共一本龜千歲而人寶是以三代傳決疑焉其得地體者莫如山阜人之得天案他本天誤作失得衆者莫如受命之天子下至公侯伯子男海内之心懸於天子疆内之民統於諸侯日月食並吉凶不以其行有星茀于東方泰辰北斗入常星不見地震梁山沙鹿崩宋衞陳鄭災王公大夫篡弑案他本下有者字春秋皆書以爲大異不言衆星之茀入霣雨原隰之襲崩一國之小民死亡不決疑於衆草木也唯田邑之稱多者主名君將不言臣臣不言師王夷君獲不言師敗孔子曰唯天爲大唯堯則之則之者大也巍巍乎其有成功也言其尊大以成功也齊桓晉文不尊周室不能霸三代聖人不則天地不能至王自原註一作階此而觀之可以知天地之貴案他本貴誤作責矣夫流深者其水不測尊至者其敬無窮是故天之所加雖爲災害猶承而大之其欽無窮震夷伯之廟是也天無錯舛之災地有震動之異天子所誅絶所敗師雖不中道而春秋者不敢闕謹之也故師出者衆矣莫言還至師及齊師圍郕郕降于齊師獨言還其君刦外不得巳故可直言也至於他師皆其君之適也而曰非師之罪是臣下案他本下誤作莫之不爲君父受罪罪不臣子莫大焉夫至明者其照無疆至晦者其闇無疆今春秋緣魯以言王義殺隱桓以爲遠祖宗定哀以爲考妣至尊且案他本且作尙高至顯且明其基壤之所加潤澤之所被條條無疆前是常數十年鄰之幽人近其墓而高明大國齊宋離不原註一無不字言㑹微國之君卒葬之禮錄而辭繁遠夷之君内而不外當此之時魯無鄙疆請案他本無請字諸侯之伐哀者皆言我邾婁庶其鼻我邾婁大夫其於我無以親以近之故乃得顯明隱桓親春秋之先人也益師卒而不日于稷之會不日言其亂以通外也黃池之㑹以兩伯之辭言不以爲外以近内也春秋襄公二十一年邾庶其以漆閭邱來奔左氏日庶其非卿也公羊日邾庶其者何邾婁大夫也二十三年邾卑我來奔杜注卑我是庶其之黨同有竊邑叛君之罪公羊作鼻我邾婁大夫也穀梁作卑我案以上七十九字據文義乃舊時繁露注原本他本俱誤作正文今校正春秋繁露卷九
