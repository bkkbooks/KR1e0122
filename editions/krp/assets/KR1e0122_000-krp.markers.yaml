  - {type: variant, offset: 88, length: 365, content: 等祿士三品制郊宮明堂内方外衡其屋習而案而他本作其衡祭器衡同作秩案秩他本作佚機玉厚六分白藻三絲衣長後袵服首原註一無首字習而垂流鸞輿卑備地周象載垂二鸞樂縣鼓用萬儛儛溢衡先烹而後用樂正刑文公原註未詳案他本公字下複衍一公字封壇於左位春秋繁露序六經道大而難知惟春秋聖人之志在焉自孔子沒莫不有傳名於傳者五家用於世纔三而止耳其後傳世學散源迷而流分蓋公羊之學後有胡母子都董仲舒治其說信勤矣嘗爲武帝置對於篇又自著書以傳于後其微言至要蓋深於春秋者也然聖人之㫖在經經之失傳傳之失學故漢諸儒多病專門之見各務高師之言至窮智畢學或不出聖人大中之道使周公孔子之志旣晦而隱焉董生之書視諸儒尤慱極閎深也本傳稱玉杯繁露清明竹林之屬今其書十卷又總名繁露其是非請伺賢者辨之太原王君家藏此書常謂仲舒之學乆欝不發將以廣之天下就予求序因書其本末云慶曆七年二月大理評事四明樓郁書, WYG: ''}
