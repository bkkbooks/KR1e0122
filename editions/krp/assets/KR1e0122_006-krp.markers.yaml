  - {type: variant, offset: 860, length: 0, content: '', WYG: 仲尼之作春秋也上探原註一作深正天端王公之位萬案他本萬字下有物字民之所欲原註一作始下明得失起賢才以待後聖故引史記理徃事正是非見案見他本作也王公史記十二公之間皆衰世之事故門人惑孔子曰吾原註一無曰吾字因其行事而加乎王心焉以為見之空言不如行事博深切明案他本無明字故子貢閔子公肩子言其切而為國家賢案賢他本作資也其為切而至於殺君亡國奔走不得保社稷其所以然是皆不明於道不覽於春秋也故衛子夏言有國家者不可不學春秋不學春秋則無以見前後旁}
