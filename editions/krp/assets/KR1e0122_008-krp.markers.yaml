  - {type: variant, offset: 147, length: 0, content: '', WYG: 欲無所窮而俗得自恣其勢無極大人病不足於上而小民羸瘠於下則富者愈貪利而不肯為義貧者日犯禁而不可得止是世之所以難治也孔子曰君子不盡利以遺民詩云彼有遺秉此有不斂穧伊寡婦之利故君子仕則不稼田則不漁食時不力珍案珍他本作修大夫不坐羊士不坐犬詩曰采葑采菲無以下體徳音莫違及爾同死以此防民民猶忘義而爭利以亡其身天不重與有角不得有上齒故已有大者不得有小者天數也夫已有大者又兼小者天不能足案足}
